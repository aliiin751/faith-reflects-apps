<!DOCTYPE html>
<html lang="en" class="bg-[#191919]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambient Soundscape Mixer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        /* Notion Dark Mode Base - Forced completely */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: #191919 !important; 
            color: #D4D4D4; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        .widget-box {
            background-color: #191919; 
            border: 1px solid #2d2d2d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: all 1.5s ease;
        }

        .widget-box.is-active {
            border-color: rgba(217, 119, 6, 0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 30px rgba(217, 119, 6, 0.03);
        }

        /* Scripture Crossfade Animations */
        #scriptureDisplay {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 1.5s ease-in-out, transform 1.5s ease-in-out;
        }
        #scriptureDisplay.fading {
            opacity: 0;
            transform: translateY(5px);
        }

        /* The Mixer Board */
        .mixer-board {
            background-color: #111111;
            border: 1px solid #2d2d2d;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Vertical Slider Magic */
        .slider-container {
            position: relative;
            width: 40px;
            height: 160px;
            display: flex;
            justify-content: center;
        }

        .vertical-slider {
            -webkit-appearance: none;
            background: transparent;
            width: 160px; /* Width becomes height when rotated */
            height: 40px; /* Height becomes width when rotated */
            position: absolute;
            top: 60px; /* Centers the rotated 160px width inside the 160px height container */
            transform: rotate(-90deg);
            transform-origin: center;
            cursor: pointer;
        }

        /* Track */
        .vertical-slider::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #262626;
            border-radius: 3px;
            border: 1px solid #111;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.8);
            transition: background 0.3s ease;
        }

        /* Thumb (The Knob) */
        .vertical-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 16px;
            border-radius: 4px;
            background: linear-gradient(to bottom, #D4AF37, #B48025);
            border: 1px solid #5C451A;
            box-shadow: 0 4px 6px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.4);
            margin-top: -10px; /* Centers thumb on the track */
            transition: transform 0.1s;
        }
        .vertical-slider:active::-webkit-slider-thumb {
            transform: scale(1.1);
            background: linear-gradient(to bottom, #FCD34D, #D97706);
        }
        .vertical-slider:focus { outline: none; }

        /* Track Active Glows (Driven by JS volume levels) */
        .track-glow {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            border-radius: 2px;
            background-color: #D4AF37;
            box-shadow: 0 0 10px rgba(217, 119, 6, 0.8);
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            transition: height 0.1s ease, opacity 0.5s ease;
        }
        .is-active .track-glow { opacity: 1; }

        /* Power Switch & LEDs */
        .power-led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #333;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        .is-active .power-led {
            background-color: #10B981;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.6), inset 0 1px 2px rgba(255,255,255,0.4);
        }

        .power-btn {
            background-color: #262626;
            color: #A3A3A3;
            border: 1px solid #333333;
            transition: all 0.3s ease;
        }
        .power-btn:hover { background-color: #333; color: #E5E5E5; }
        .power-btn:active { transform: scale(0.95); }
        .is-active .power-btn {
            background-color: #2D2416;
            color: #FCD34D;
            border-color: #5C451A;
            box-shadow: 0 0 15px rgba(217, 119, 6, 0.15);
        }

        /* Ambient Room Glow */
        .ambient-glow {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(ellipse, rgba(217, 119, 6, 0.08) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 2s ease;
            pointer-events: none;
            z-index: 0;
        }
        .is-active .ambient-glow { opacity: 1; }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden bg-[#191919]">

    <!-- Hidden Audio Players (Mixkit Open Assets - 100% Reliable MP3s) -->
    <audio id="audio-rain" loop preload="auto" crossorigin="anonymous"><source src="https://assets.mixkit.co/active_storage/sfx/2388/2388-preview.mp3" type="audio/mpeg"></audio>
    <audio id="audio-thunder" loop preload="auto" crossorigin="anonymous"><source src="https://assets.mixkit.co/active_storage/sfx/2405/2405-preview.mp3" type="audio/mpeg"></audio>
    <audio id="audio-fire" loop preload="auto" crossorigin="anonymous"><source src="https://assets.mixkit.co/active_storage/sfx/2996/2996-preview.mp3" type="audio/mpeg"></audio>
    <audio id="audio-night" loop preload="auto" crossorigin="anonymous"><source src="https://assets.mixkit.co/active_storage/sfx/2501/2501-preview.mp3" type="audio/mpeg"></audio>

    <div id="widgetContainer" class="widget-box relative w-full max-w-md rounded-3xl p-6 md:p-8 flex flex-col items-center h-[560px] overflow-hidden">
        
        <div class="ambient-glow"></div>

        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-6 z-10 shrink-0">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#737373]">@faithreflects</span>
            <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#A3A3A3] border border-[#333] bg-[#1a1a1a]">
                Soundscapes
            </div>
        </div>

        <!-- Scripture Crossfader -->
        <div class="w-full flex-1 flex flex-col items-center justify-center z-10 min-h-[120px] mb-4 relative px-2">
            <div id="scriptureDisplay" class="text-center">
                <p id="verseText" class="serif italic text-[17px] text-[#EDEDED] leading-relaxed mb-3 filter drop-shadow-md">
                    "You make known to me the path of life; You will fill me with joy in Your presence..."
                </p>
                <p id="verseRef" class="text-[10px] uppercase tracking-widest font-bold text-[#D4AF37]">
                    Psalm 16:11
                </p>
            </div>
        </div>

        <!-- The Mixing Board -->
        <div class="mixer-board w-full rounded-2xl p-5 z-10 shrink-0 flex flex-col">
            
            <!-- Channel Labels & Icons -->
            <div class="flex justify-between items-center mb-4 px-2">
                <div class="flex flex-col items-center w-12">
                    <span class="text-lg mb-1">🌧️</span>
                    <span class="text-[8px] font-bold tracking-widest uppercase text-[#737373]">Rain</span>
                </div>
                <div class="flex flex-col items-center w-12">
                    <span class="text-lg mb-1 opacity-80">🌩️</span>
                    <span class="text-[8px] font-bold tracking-widest uppercase text-[#737373]">Thunder</span>
                </div>
                <div class="flex flex-col items-center w-12">
                    <span class="text-lg mb-1">🔥</span>
                    <span class="text-[8px] font-bold tracking-widest uppercase text-[#737373]">Fire</span>
                </div>
                <div class="flex flex-col items-center w-12">
                    <span class="text-lg mb-1 opacity-90">🌙</span>
                    <span class="text-[8px] font-bold tracking-widest uppercase text-[#737373]">Night</span>
                </div>
            </div>

            <!-- Faders (Sliders) -->
            <div class="flex justify-between items-center px-2 mb-6">
                
                <!-- Channel 1: Rain -->
                <div class="slider-container">
                    <div class="track-glow" id="glow-rain"></div>
                    <input type="range" id="slider-rain" class="vertical-slider z-10" min="0" max="1" step="0.01" value="0.5">
                </div>

                <!-- Channel 2: Thunder -->
                <div class="slider-container">
                    <div class="track-glow" id="glow-thunder"></div>
                    <input type="range" id="slider-thunder" class="vertical-slider z-10" min="0" max="1" step="0.01" value="0.2">
                </div>

                <!-- Channel 3: Fire -->
                <div class="slider-container">
                    <div class="track-glow" id="glow-fire"></div>
                    <input type="range" id="slider-fire" class="vertical-slider z-10" min="0" max="1" step="0.01" value="0.0">
                </div>

                <!-- Channel 4: Night (Crickets) -->
                <div class="slider-container">
                    <div class="track-glow" id="glow-night"></div>
                    <input type="range" id="slider-night" class="vertical-slider z-10" min="0" max="1" step="0.01" value="0.6">
                </div>

            </div>

            <!-- Master Controls -->
            <div class="border-t border-[#222] pt-4 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <div class="power-led"></div>
                    <span class="text-[10px] font-bold tracking-widest uppercase text-[#525252]" id="statusText">System Standby</span>
                </div>
                
                <button id="masterPlayBtn" class="power-btn px-6 py-2.5 rounded-xl text-xs font-semibold uppercase tracking-wider flex items-center space-x-2 shadow-md">
                    <svg id="playIcon" class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                    <span id="playText">Power On</span>
                </button>
            </div>

        </div>

    </div>

    <script>
        // Database of Scriptures from the template
        const scriptures = [
            { verse: "You make known to me the path of life; You will fill me with joy in Your presence, with eternal pleasures at Your right hand.", ref: "Psalm 16:11" },
            { verse: "One thing I ask from the Lord, this only do I seek: that I may dwell in the house of the Lord all the days of my life, to gaze on the beauty of the Lord.", ref: "Psalm 27:4" },
            { verse: "Come near to God and He will come near to you.", ref: "James 4:8" },
            { verse: "Be still, and know that I am God; I will be exalted among the nations, I will be exalted in the earth.", ref: "Psalm 46:10" },
            { verse: "The Lord your God is with you, the Mighty Warrior who saves. He will take great delight in you... he will rejoice over you with singing.", ref: "Zephaniah 3:17" }
        ];

        // State
        let isPlaying = false;
        let verseIndex = 0;
        let savedVolumes = JSON.parse(localStorage.getItem('faithreflects_mixer_vols_2')) || {
            rain: 0.5, thunder: 0.2, fire: 0.0, night: 0.6
        };

        // Elements
        const container = document.getElementById('widgetContainer');
        const scriptureDisplay = document.getElementById('scriptureDisplay');
        const verseText = document.getElementById('verseText');
        const verseRef = document.getElementById('verseRef');
        const masterPlayBtn = document.getElementById('masterPlayBtn');
        const playIcon = document.getElementById('playIcon');
        const playText = document.getElementById('playText');
        const statusText = document.getElementById('statusText');

        // Audio Channels Object Mapping
        const channels = {
            rain: { audio: document.getElementById('audio-rain'), slider: document.getElementById('slider-rain'), glow: document.getElementById('glow-rain') },
            thunder: { audio: document.getElementById('audio-thunder'), slider: document.getElementById('slider-thunder'), glow: document.getElementById('glow-thunder') },
            fire: { audio: document.getElementById('audio-fire'), slider: document.getElementById('slider-fire'), glow: document.getElementById('glow-fire') },
            night: { audio: document.getElementById('audio-night'), slider: document.getElementById('slider-night'), glow: document.getElementById('glow-night') }
        };

        // Initialize Sliders and Audio volumes
        Object.keys(channels).forEach(key => {
            const ch = channels[key];
            ch.slider.value = savedVolumes[key];
            ch.audio.volume = savedVolumes[key];
            
            // Set initial visual glow height (mapped to the 160px height of the slider track)
            updateGlow(key, savedVolumes[key]);

            // Add Listener
            ch.slider.addEventListener('input', (e) => {
                const vol = parseFloat(e.target.value);
                ch.audio.volume = vol;
                
                // Save state
                savedVolumes[key] = vol;
                localStorage.setItem('faithreflects_mixer_vols', JSON.stringify(savedVolumes));
                
                // Update visual
                updateGlow(key, vol);
            });
        });

        function updateGlow(key, volume) {
            // Track is 160px high. We set the height of the glowing div based on the percentage.
            const heightPx = volume * 160;
            channels[key].glow.style.height = `${heightPx}px`;
        }

        // Scripture Crossfade Engine
        function cycleScripture() {
            scriptureDisplay.classList.add('fading');
            
            setTimeout(() => {
                verseIndex = (verseIndex + 1) % scriptures.length;
                const nextScripture = scriptures[verseIndex];
                
                verseText.innerText = `"${nextScripture.verse}"`;
                verseRef.innerText = nextScripture.ref;
                
                scriptureDisplay.classList.remove('fading');
            }, 1500); // Wait for fade out
        }

        // Start cycling scriptures every 12 seconds
        setInterval(cycleScripture, 12000);

        // Master Play/Pause Controller
        async function toggleMixer() {
            isPlaying = !isPlaying;

            if (isPlaying) {
                // UI Update
                container.classList.add('is-active');
                statusText.innerText = "System Active";
                statusText.classList.add('text-[#10B981]');
                playText.innerText = "Power Off";
                playIcon.innerHTML = `<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path>`;
                
                // Play all audios safely, handling promises individually to avoid AbortError crashing the app
                Object.values(channels).forEach(ch => {
                    const playPromise = ch.audio.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(error => {
                            console.log("Audio playback interrupted/prevented:", error);
                        });
                    }
                });

            } else {
                // UI Update
                container.classList.remove('is-active');
                statusText.innerText = "System Standby";
                statusText.classList.remove('text-[#10B981]');
                playText.innerText = "Power On";
                playIcon.innerHTML = `<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path>`;
                
                // Pause all audios
                Object.values(channels).forEach(ch => ch.audio.pause());
            }
        }

        masterPlayBtn.addEventListener('click', () => {
            // Button feedback
            masterPlayBtn.style.transform = 'scale(0.95)';
            setTimeout(() => masterPlayBtn.style.transform = 'scale(1)', 150);
            
            toggleMixer();
        });

    </script>
</body>
</html>
