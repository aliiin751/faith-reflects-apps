<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Prayer Focus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: transparent; color: #37352f; user-select: none; }
        .serif { font-family: 'Playfair Display', serif; }

        /* Day Selector Styles */
        .day-pill {
            transition: all 0.3s ease;
        }
        .day-pill.active {
            background-color: #37352f;
            color: #ffffff;
            border-color: #37352f;
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .day-pill.inactive {
            background-color: transparent;
            color: #9ca3af;
            border-color: transparent;
        }

        /* Bowl & Embers Animation */
        .embers {
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }
        .is-offered .embers {
            opacity: 1;
            animation: pulse-ember 3s infinite alternate ease-in-out;
        }
        @keyframes pulse-ember {
            0% { filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.4)); opacity: 0.8; transform: scale(0.98); }
            100% { filter: drop-shadow(0 0 16px rgba(245, 158, 11, 0.8)); opacity: 1; transform: scale(1.02); }
        }

        /* Incense Smoke Animation */
        .smoke-path {
            opacity: 0;
            stroke-dasharray: 150;
            stroke-dashoffset: 150;
        }
        .is-offered .smoke-1 {
            animation: rise 4s infinite linear;
        }
        .is-offered .smoke-2 {
            animation: rise 5s infinite linear 1.5s;
        }
        .is-offered .smoke-3 {
            animation: rise 6s infinite linear 0.7s;
        }
        
        @keyframes rise {
            0% { stroke-dashoffset: 150; opacity: 0; transform: translateY(10px) scale(0.9); }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { stroke-dashoffset: -150; opacity: 0; transform: translateY(-30px) scale(1.1); }
        }

        /* Ambient Background Glow */
        .ambient-glow {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 2s ease;
            pointer-events: none;
            z-index: 0;
        }
        .is-offered ~ .ambient-glow {
            opacity: 1;
        }

        /* Text transitions */
        .fade-content {
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div class="relative w-full max-w-sm bg-white rounded-3xl p-8 border border-[#e9e9e7] shadow-[0_8px_30px_rgb(0,0,0,0.03)] flex flex-col min-h-[580px] overflow-hidden">
        
        <div class="ambient-glow"></div>

        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-6 z-10">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#a3b8ac]">@faithreflects</span>
            <span class="text-[10px] tracking-widest text-gray-400 uppercase">Rev 5:8</span>
        </div>

        <h2 class="serif text-2xl text-[#37352f] mb-6 z-10">Daily Prayer Focus</h2>

        <!-- Days Selector (Auto-selects current day) -->
        <div class="flex justify-between w-full mb-8 z-10" id="daysContainer">
            <!-- Injected by JS -->
        </div>

        <!-- The Interactive Offering Bowl -->
        <div class="relative w-full h-40 mb-6 flex items-center justify-center z-10" id="offeringBowl">
            <svg viewBox="0 0 200 160" class="w-full h-full overflow-visible">
                
                <!-- Smoke Paths (Behind Rim) -->
                <g fill="none" stroke="#e9e5dc" stroke-width="3" stroke-linecap="round" filter="blur(2px)">
                    <path class="smoke-path smoke-1" d="M100 80 Q90 50 110 30 T90 -10"/>
                    <path class="smoke-path smoke-2" d="M110 85 Q130 60 100 20 T120 -20" stroke-width="2"/>
                    <path class="smoke-path smoke-3" d="M90 85 Q70 60 100 20 T80 -20" stroke-width="4"/>
                </g>

                <!-- Bowl Base (Back) -->
                <path d="M 60 90 C 60 140, 140 140, 140 90 Z" fill="#EAE5D9"/>
                
                <!-- Pedestal -->
                <path d="M 90 135 L 85 150 L 115 150 L 110 135 Z" fill="#D2B48C"/>
                <ellipse cx="100" cy="150" rx="20" ry="4" fill="#A06B44"/>

                <!-- Bowl Body (Front) -->
                <path d="M 50 85 C 50 145, 150 145, 150 85 Z" fill="#D2B48C"/>
                
                <!-- Embers / Burning Incense -->
                <g class="embers" style="transform-origin: 100px 85px;">
                    <!-- Base glow -->
                    <ellipse cx="100" cy="85" rx="42" ry="12" fill="url(#emberGlow)"/>
                    <!-- Hot spots -->
                    <circle cx="85" cy="85" r="3" fill="#FFFBEB"/>
                    <circle cx="100" cy="87" r="4" fill="#FFFBEB"/>
                    <circle cx="115" cy="84" r="2.5" fill="#FFFBEB"/>
                    <circle cx="92" cy="82" r="2" fill="#FEF3C7"/>
                    <circle cx="108" cy="86" r="2" fill="#FEF3C7"/>
                </g>

                <!-- Bowl Rim -->
                <ellipse cx="100" cy="85" rx="50" ry="14" fill="none" stroke="#A06B44" stroke-width="3"/>
                <ellipse cx="100" cy="85" rx="46" ry="10" fill="none" stroke="#e9e5dc" stroke-width="1" opacity="0.5"/>
                
                <!-- Decorative Handles -->
                <path d="M 50 85 C 30 85, 30 110, 55 110" fill="none" stroke="#A06B44" stroke-width="3" stroke-linecap="round"/>
                <path d="M 150 85 C 170 85, 170 110, 145 110" fill="none" stroke="#A06B44" stroke-width="3" stroke-linecap="round"/>

                <defs>
                    <radialGradient id="emberGlow" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#F59E0B"/>
                        <stop offset="60%" stop-color="#D97706"/>
                        <stop offset="100%" stop-color="rgba(217, 119, 6, 0)"/>
                    </radialGradient>
                </defs>
            </svg>
        </div>

        <!-- Dynamic Daily Content -->
        <div class="flex-1 flex flex-col items-center text-center z-10 fade-content" id="contentArea">
            <div class="flex items-center justify-center space-x-2 mb-3">
                <span id="focusIcon" class="text-xl">✨</span>
                <h3 id="focusTitle" class="text-sm font-bold tracking-widest uppercase text-[#D4AF37]">Worship & Surrender</h3>
            </div>
            
            <p id="focusPrayer" class="serif italic text-[15px] text-[#5a5852] leading-relaxed mb-6">
                "Lord, I surrender my week to You. You alone are worthy of all my praise and adoration."
            </p>

            <button id="offerBtn" class="mt-auto w-full bg-[#f7f6f3] text-[#37352f] border border-[#e9e9e7] py-3.5 rounded-2xl text-xs font-semibold uppercase tracking-wider hover:bg-[#efede8] transition-all flex items-center justify-center space-x-2 shadow-sm">
                <span>Offer Prayer</span>
            </button>

            <div id="completedMsg" class="hidden mt-auto w-full py-3.5 rounded-2xl text-[11px] font-semibold uppercase tracking-widest text-[#a3b8ac] flex items-center justify-center space-x-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                <span>Offering Received</span>
            </div>
        </div>

    </div>

    <script>
        // Exact mapping from the user's provided static table
        const weeklyFocus = [
            { day: 'Sun', icon: '✨', title: 'Worship & Surrender', prayer: "Lord, I surrender this week to You. Search my heart, realign my desires, and let my life be a continuous act of worship." },
            { day: 'Mon', icon: '🙏', title: 'Family & Relationships', prayer: "Father, bless my family and friends today. Give me the grace, patience, and deeply rooted love to serve them exactly as You love me." },
            { day: 'Tue', icon: '🌍', title: 'World & Community', prayer: "Lord, bring peace to a broken world. Give wisdom to leaders, comfort to the hurting, and let Your light shine brightly through our local community." },
            { day: 'Wed', icon: '💼', title: 'Work & Calling', prayer: "Direct my steps today. Let my daily work be an offering to You. Give me diligence, integrity, and purpose in everything I set my hands to do." },
            { day: 'Thu', icon: '🛡️', title: 'Spiritual Warfare', prayer: "Equip me with Your armor today. Guard my mind against lies, protect my spirit from discouragement, and give me victory over temptation." },
            { day: 'Fri', icon: '🤲', title: 'Gratitude & Praise', prayer: "Thank you for Your endless faithfulness. For every breath, every provision, and every grace I've taken for granted this week, I give You praise." },
            { day: 'Sat', icon: '❤️', title: 'Healing & Restoration', prayer: "Divine Healer, mend what is broken. I pray for physical healing for the sick, emotional healing for the anxious, and total restoration of the weary soul." }
        ];

        // 0 = Sunday, 1 = Monday, etc.
        const currentDayIndex = new Date().getDay(); 
        const todayDateString = new Date().toISOString().split('T')[0];

        // Elements
        const daysContainer = document.getElementById('daysContainer');
        const offeringBowl = document.getElementById('offeringBowl');
        const focusIcon = document.getElementById('focusIcon');
        const focusTitle = document.getElementById('focusTitle');
        const focusPrayer = document.getElementById('focusPrayer');
        const offerBtn = document.getElementById('offerBtn');
        const completedMsg = document.getElementById('completedMsg');

        // Check LocalStorage to see if today's prayer was already offered
        const lastPrayedDate = localStorage.getItem('faithreflects_daily_prayer');
        let isOfferedToday = (lastPrayedDate === todayDateString);

        function initUI() {
            // Render Day Pills
            daysContainer.innerHTML = weeklyFocus.map((focus, index) => {
                const isActive = (index === currentDayIndex);
                const initialLetter = focus.day.charAt(0);
                return `
                    <div class="day-pill flex items-center justify-center w-8 h-8 rounded-full border text-xs font-semibold ${isActive ? 'active' : 'inactive'}">
                        ${initialLetter}
                    </div>
                `;
            }).join('');

            // Set Content
            const todayFocus = weeklyFocus[currentDayIndex];
            focusIcon.innerText = todayFocus.icon;
            focusTitle.innerText = todayFocus.title;
            focusPrayer.innerText = `"${todayFocus.prayer}"`;

            // Set Animation State
            if (isOfferedToday) {
                offeringBowl.classList.add('is-offered');
                offerBtn.classList.add('hidden');
                completedMsg.classList.remove('hidden');
            }
        }

        offerBtn.addEventListener('click', () => {
            // Update State
            isOfferedToday = true;
            localStorage.setItem('faithreflects_daily_prayer', todayDateString);
            
            // Trigger Visuals
            offeringBowl.classList.add('is-offered');
            
            // Button transition
            offerBtn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                offerBtn.classList.add('hidden');
                completedMsg.classList.remove('hidden');
                
                // Subtle fade in for message
                completedMsg.style.opacity = '0';
                setTimeout(() => completedMsg.style.opacity = '1', 50);
            }, 200);
        });

        // Start
        initUI();
    </script>
</body>
</html>
