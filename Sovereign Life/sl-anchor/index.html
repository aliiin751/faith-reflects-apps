<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Morning Anchor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        /* Sovereign Light Mode Base */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: transparent; 
            color: #37352f; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        /* The Widget Container */
        .widget-box {
            background-color: #FCFBF9; /* Ivory Parchment */
            border: 1px solid #E9E5DC;
            box-shadow: 0 8px 30px rgba(0,0,0,0.03), inset 0 0 20px rgba(255,255,255,0.5);
            transition: all 1.5s ease;
        }

        /* View Transitions */
        .view-section {
            position: absolute;
            inset: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), visibility 0.8s;
        }
        
        #setupView {
            opacity: 1; transform: scale(1); visibility: visible; z-index: 20;
        }
        #setupView.hidden-view {
            opacity: 0; transform: scale(0.95); visibility: hidden; pointer-events: none;
        }

        #lockedView {
            opacity: 0; transform: scale(1.05); visibility: hidden; z-index: 10;
        }
        #lockedView.visible-view {
            opacity: 1; transform: scale(1); visibility: visible; z-index: 30;
        }

        /* Ambient Glow */
        .ambient-glow {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.0) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: background 1.5s ease;
        }
        .is-anchored .ambient-glow {
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            animation: breathe-glow 4s infinite alternate ease-in-out;
        }
        
        @keyframes breathe-glow {
            0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
        }

        /* SVG Compass & Anchor Animations */
        .compass-ring {
            transform-origin: center;
            transition: transform 2s cubic-bezier(0.25, 1, 0.3, 1);
        }
        
        .is-anchoring .compass-ring {
            /* Rapid spin when clicking anchor */
            transform: rotate(720deg);
        }

        .anchor-icon {
            transform-origin: center;
            transform: translateY(-40px) scale(0);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .is-anchored .anchor-icon {
            transform: translateY(0) scale(1);
            opacity: 1;
            filter: drop-shadow(0 4px 6px rgba(212, 175, 55, 0.4));
        }

        .is-anchored .compass-base {
            stroke: #D4AF37;
            transition: stroke 1s ease;
        }

        /* Inputs */
        input[type="text"] {
            background-color: #FFFFFF;
            border: 1px solid #E9E5DC;
            color: #37352f;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1), inset 0 2px 4px rgba(0,0,0,0.01);
        }
        input::placeholder { color: #A39F96; font-style: italic; }

        /* Buttons */
        .btn-primary {
            background-color: #37352f;
            color: #FFFFFF;
            border: 1px solid #2d2d2d;
            transition: all 0.4s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn-primary:hover { 
            background-color: #000000; 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }
        .btn-primary:active { transform: translateY(1px) scale(0.98); }

        .btn-reset {
            background-color: transparent;
            color: #A39F96;
            transition: all 0.3s ease;
        }
        .btn-reset:hover { color: #37352f; }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E9E5DC; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #D4AF37; }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(255,255,255,0.8); }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div id="widgetContainer" class="widget-box relative w-full max-w-sm rounded-3xl h-[620px] overflow-hidden">
        
        <div class="ambient-glow"></div>

        <!-- ================= VIEW 1: SETUP (MORNING PLANNING) ================= -->
        <div id="setupView" class="view-section">
            <!-- Header -->
            <div class="w-full flex justify-between items-center mb-6 shrink-0 z-10">
                <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#A39F96]">@faithreflects</span>
                <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#8A867D] border border-[#E9E5DC] bg-white flex items-center space-x-1">
                    <span id="currentDateDisplay" class="text-[#B48025]">Date</span>
                </div>
            </div>

            <!-- Compass SVG (Setup State) -->
            <div class="relative w-full h-24 mb-4 z-10 shrink-0 flex justify-center items-center">
                <svg viewBox="0 0 100 100" class="w-full h-full overflow-visible">
                    <g class="compass-ring">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#E9E5DC" stroke-width="2" class="compass-base"/>
                        <circle cx="50" cy="50" r="40" fill="none" stroke="#D4AF37" stroke-width="1" stroke-dasharray="2 4"/>
                        <!-- Cardinal Points -->
                        <path d="M50 5 L53 12 L47 12 Z" fill="#B48025"/>
                        <path d="M50 95 L53 88 L47 88 Z" fill="#A39F96"/>
                        <path d="M5 50 L12 47 L12 53 Z" fill="#A39F96"/>
                        <path d="M95 50 L88 47 L88 53 Z" fill="#A39F96"/>
                    </g>
                    <!-- Empty Center Circle for Setup -->
                    <circle cx="50" cy="50" r="15" fill="#FCFBF9" stroke="#E9E5DC" stroke-width="1"/>
                    <circle cx="50" cy="50" r="3" fill="#D4AF37"/>
                </svg>
            </div>

            <h2 class="serif text-2xl text-[#37352f] mb-1 z-10 text-center">Morning Anchor</h2>
            <p class="text-xs text-[#8A867D] italic mb-6 z-10 text-center">"Begin with intention."</p>

            <!-- Form Fields -->
            <div class="flex-1 flex flex-col space-y-4 justify-center pb-2 z-10 min-h-0 overflow-y-auto custom-scrollbar pr-1">
                
                <div class="flex flex-col">
                    <label class="text-[9px] font-bold tracking-widest uppercase text-[#A39F96] mb-1.5 pl-1 flex items-center space-x-1">
                        <span>🌤️</span> <span>Weather / Vibe</span>
                    </label>
                    <input type="text" id="weatherInput" placeholder="e.g., 68° / Sunny" class="w-full rounded-xl px-4 py-3 text-xs font-medium" autocomplete="off">
                </div>

                <div class="flex flex-col">
                    <label class="text-[9px] font-bold tracking-widest uppercase text-[#A39F96] mb-1.5 pl-1 flex items-center space-x-1">
                        <span>⚡</span> <span>Word of the Day</span>
                    </label>
                    <input type="text" id="wordInput" placeholder="e.g., Dominion, Grace, Focus..." class="w-full rounded-xl px-4 py-3 text-sm font-semibold text-[#B48025]" autocomplete="off">
                </div>

                <div class="flex flex-col">
                    <label class="text-[9px] font-bold tracking-widest uppercase text-[#A39F96] mb-1.5 pl-1 flex items-center space-x-1">
                        <span>📖</span> <span>Verse of the Day</span>
                    </label>
                    <input type="text" id="verseInput" placeholder="Write the scripture anchoring you..." class="w-full rounded-xl px-4 py-3 text-xs font-medium italic" autocomplete="off">
                </div>

                <div class="flex flex-col">
                    <label class="text-[9px] font-bold tracking-widest uppercase text-[#A39F96] mb-1.5 pl-1 flex items-center space-x-1">
                        <span>🎧</span> <span>Now Playing</span>
                    </label>
                    <input type="text" id="musicInput" placeholder="Soundtrack for the day..." class="w-full rounded-xl px-4 py-3 text-xs font-medium" autocomplete="off">
                </div>

            </div>

            <!-- Action -->
            <button id="anchorBtn" class="btn-primary w-full mt-4 py-4 rounded-xl text-xs font-bold uppercase tracking-widest flex items-center justify-center space-x-2 shrink-0 z-10">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                <span>Drop Anchor</span>
            </button>
        </div>


        <!-- ================= VIEW 2: LOCKED (LIVING THE DAY) ================= -->
        <div id="lockedView" class="view-section items-center">
            
            <!-- Header (Minimal) -->
            <div class="w-full flex justify-between items-center mb-6 shrink-0 z-10">
                <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#A39F96]">@faithreflects</span>
                <span class="text-[10px] tracking-widest uppercase text-[#D4AF37] font-bold flex items-center space-x-1">
                    <span class="w-1.5 h-1.5 bg-[#D4AF37] rounded-full animate-pulse inline-block"></span>
                    <span id="lockedDateDisplay">Date</span>
                </span>
            </div>

            <!-- Compass SVG (Locked State) -->
            <div class="relative w-full h-32 mb-8 z-10 shrink-0 flex justify-center items-center">
                <svg viewBox="0 0 100 100" class="w-full h-full overflow-visible">
                    <g class="compass-ring">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#D4AF37" stroke-width="2"/>
                        <circle cx="50" cy="50" r="40" fill="none" stroke="#B48025" stroke-width="1" stroke-dasharray="2 4"/>
                        <!-- Cardinal Points -->
                        <path d="M50 5 L53 12 L47 12 Z" fill="#D4AF37"/>
                        <path d="M50 95 L53 88 L47 88 Z" fill="#D4AF37"/>
                        <path d="M5 50 L12 47 L12 53 Z" fill="#D4AF37"/>
                        <path d="M95 50 L88 47 L88 53 Z" fill="#D4AF37"/>
                    </g>
                    
                    <!-- The Heavy Dropped Anchor -->
                    <g class="anchor-icon">
                        <circle cx="50" cy="50" r="22" fill="#FCFBF9" stroke="#D4AF37" stroke-width="2"/>
                        <!-- Anchor Shape -->
                        <path d="M50 35 C48 35, 46 37, 46 39 C46 41, 48 43, 50 43 C52 43, 54 41, 54 39 C54 37, 52 35, 50 35 Z" fill="none" stroke="#37352f" stroke-width="2"/>
                        <line x1="50" y1="43" x2="50" y2="65" stroke="#37352f" stroke-width="2.5" stroke-linecap="round"/>
                        <line x1="42" y1="48" x2="58" y2="48" stroke="#37352f" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M38 55 C38 65, 62 65, 62 55" fill="none" stroke="#37352f" stroke-width="2.5" stroke-linecap="round"/>
                        <!-- Hooks -->
                        <path d="M38 55 L35 52 L41 52 Z" fill="#37352f"/>
                        <path d="M62 55 L65 52 L59 52 Z" fill="#37352f"/>
                    </g>
                </svg>
            </div>

            <!-- Display Area -->
            <div class="flex-1 w-full flex flex-col space-y-6 z-10 min-h-0 overflow-y-auto custom-scrollbar pr-2 pb-4">
                
                <div class="flex flex-col items-center text-center">
                    <span class="text-[9px] uppercase tracking-widest text-[#A39F96] font-bold mb-1">Word of the Day</span>
                    <h3 id="displayWord" class="serif text-3xl text-[#B48025] font-medium leading-tight">Dominion</h3>
                </div>

                <div class="w-full bg-[#FFFFFF] border border-[#E9E5DC] rounded-xl p-4 shadow-sm flex flex-col items-center text-center">
                    <span class="text-[9px] uppercase tracking-widest text-[#A39F96] font-bold mb-2">The Anchor Verse</span>
                    <p id="displayVerse" class="serif italic text-[15px] text-[#37352f] leading-relaxed">
                        "I can do all things through Christ who strengthens me."
                    </p>
                </div>

                <div class="flex justify-center items-center space-x-6">
                    <div class="flex flex-col items-center">
                        <span class="text-[9px] uppercase tracking-widest text-[#A39F96] font-bold mb-1">Weather</span>
                        <span id="displayWeather" class="text-xs font-semibold text-[#5C451A]">68° / Sunny</span>
                    </div>
                    <div class="h-6 w-px bg-[#E9E5DC]"></div>
                    <div class="flex flex-col items-center">
                        <span class="text-[9px] uppercase tracking-widest text-[#A39F96] font-bold mb-1">Soundtrack</span>
                        <span id="displayMusic" class="text-xs font-semibold text-[#5C451A]">Oceans - Hillsong</span>
                    </div>
                </div>

            </div>

            <!-- Actions -->
            <div class="w-full z-10 shrink-0 mt-4 border-t border-[#E9E5DC] pt-4">
                <button id="liftAnchorBtn" class="btn-reset w-full py-2 text-[10px] font-bold uppercase tracking-widest flex items-center justify-center space-x-2">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                    <span>Lift Anchor (Edit)</span>
                </button>
            </div>

        </div>

    </div>

    <script>
        // Format Date nicely
        const today = new Date();
        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        const formattedDate = today.toLocaleDateString('en-US', options);
        const dateKey = today.toDateString();

        // Elements
        const container = document.getElementById('widgetContainer');
        const setupView = document.getElementById('setupView');
        const lockedView = document.getElementById('lockedView');
        
        const currentDateDisplay = document.getElementById('currentDateDisplay');
        const lockedDateDisplay = document.getElementById('lockedDateDisplay');
        
        const weatherInput = document.getElementById('weatherInput');
        const wordInput = document.getElementById('wordInput');
        const verseInput = document.getElementById('verseInput');
        const musicInput = document.getElementById('musicInput');
        const anchorBtn = document.getElementById('anchorBtn');
        
        const displayWord = document.getElementById('displayWord');
        const displayVerse = document.getElementById('displayVerse');
        const displayWeather = document.getElementById('displayWeather');
        const displayMusic = document.getElementById('displayMusic');
        const liftAnchorBtn = document.getElementById('liftAnchorBtn');

        currentDateDisplay.innerText = formattedDate;
        lockedDateDisplay.innerText = formattedDate;

        // State Management
        let state = JSON.parse(localStorage.getItem('sovereign_anchor')) || {
            date: dateKey,
            weather: '',
            word: '',
            verse: '',
            music: '',
            isAnchored: false
        };

        // Reset if new day
        if (state.date !== dateKey) {
            state = { date: dateKey, weather: '', word: '', verse: '', music: '', isAnchored: false };
            localStorage.setItem('sovereign_anchor', JSON.stringify(state));
        }

        function initUI() {
            if (state.isAnchored) {
                // Populate display
                displayWord.innerText = state.word || "Focused";
                displayVerse.innerText = state.verse ? `"${state.verse}"` : "Anchored in truth.";
                displayWeather.innerText = state.weather || "Not recorded";
                displayMusic.innerText = state.music || "Silence";

                // Snap instantly to locked view
                setupView.classList.add('hidden-view');
                lockedView.classList.add('visible-view');
                container.classList.add('is-anchored');
            } else {
                // Populate inputs
                weatherInput.value = state.weather;
                wordInput.value = state.word;
                verseInput.value = state.verse;
                musicInput.value = state.music;

                setupView.classList.remove('hidden-view');
                lockedView.classList.remove('visible-view');
                container.classList.remove('is-anchored');
            }
        }

        anchorBtn.addEventListener('click', () => {
            // Button physical feedback
            anchorBtn.style.transform = 'scale(0.95)';
            setTimeout(() => anchorBtn.style.transform = 'scale(1)', 150);

            // Save State
            state = {
                date: dateKey,
                weather: weatherInput.value.trim(),
                word: wordInput.value.trim(),
                verse: verseInput.value.trim(),
                music: musicInput.value.trim(),
                isAnchored: true
            };
            localStorage.setItem('sovereign_anchor', JSON.stringify(state));

            // Trigger Animation Phase 1: Spin Compass
            container.classList.add('is-anchoring');

            // Trigger Animation Phase 2: Drop Anchor & Swap Views
            setTimeout(() => {
                // Populate display
                displayWord.innerText = state.word || "Focused";
                displayVerse.innerText = state.verse ? `"${state.verse}"` : "Anchored in truth.";
                displayWeather.innerText = state.weather || "Not recorded";
                displayMusic.innerText = state.music || "Silence";

                setupView.classList.add('hidden-view');
                lockedView.classList.add('visible-view');
                
                // Triggers the heavy anchor drop and glow
                container.classList.remove('is-anchoring'); 
                container.classList.add('is-anchored');
            }, 800); // Wait for compass spin
        });

        liftAnchorBtn.addEventListener('click', () => {
            state.isAnchored = false;
            localStorage.setItem('sovereign_anchor', JSON.stringify(state));
            
            container.classList.remove('is-anchored');
            
            // Remove view classes immediately to smoothly transition back
            lockedView.classList.remove('visible-view');
            setupView.classList.remove('hidden-view');
            
            // Populate inputs in case they want to edit
            weatherInput.value = state.weather;
            wordInput.value = state.word;
            verseInput.value = state.verse;
            musicInput.value = state.music;
        });

        // Auto-save typing
        const inputs = [weatherInput, wordInput, verseInput, musicInput];
        inputs.forEach(input => {
            input.addEventListener('input', () => {
                state.weather = weatherInput.value;
                state.word = wordInput.value;
                state.verse = verseInput.value;
                state.music = musicInput.value;
                localStorage.setItem('sovereign_anchor', JSON.stringify(state));
            });
        });

        // Initialize on load
        initUI();

    </script>
</body>
</html>
