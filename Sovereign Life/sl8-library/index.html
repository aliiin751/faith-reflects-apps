<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Scholar's Bookshelf</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        /* Sovereign Light Mode Base - Scholar Aesthetic */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: transparent; 
            color: #37352f; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        /* The Widget Container */
        .widget-box {
            background-color: #FCFBF9; /* Ivory Parchment */
            border: 1px solid #E9E5DC;
            box-shadow: 0 8px 30px rgba(0,0,0,0.03), inset 0 0 20px rgba(255,255,255,0.5);
            transition: all 1.5s ease;
        }

        /* Ambient Morning Glow */
        .ambient-glow {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: background 1.5s ease;
        }
        .goal-met .ambient-glow {
            background: radial-gradient(circle, rgba(212, 175, 55, 0.18) 0%, transparent 70%);
            animation: breathe-glow 4s infinite alternate ease-in-out;
        }
        
        @keyframes breathe-glow {
            0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
        }

        /* SVG Bookshelf Physics & Animations */
        .wood-texture {
            fill: url(#woodGrad);
            stroke: #2D1A0A;
            stroke-width: 1.5;
        }
        .wood-shelf-top {
            fill: #E9E5DC; /* Dust reflection / light hitting top of shelf */
            opacity: 0.6;
        }

        .book-spine {
            cursor: pointer;
            transition: filter 0.3s ease, transform 0.3s ease;
            transform-origin: bottom center;
        }
        .book-spine:hover {
            filter: brightness(1.2) drop-shadow(0 0 6px rgba(212, 175, 55, 0.5));
            transform: translateY(-2px);
        }

        /* Dropping Animation for New Books */
        .is-dropping {
            animation: heavyDrop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes heavyDrop {
            0% { transform: translateY(-150px) rotate(-10deg); opacity: 0; filter: drop-shadow(0 20px 10px rgba(0,0,0,0.3)); }
            60% { transform: translateY(0) rotate(0deg); opacity: 1; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1)); }
            75% { transform: translateY(-4px) rotate(2deg); }
            90% { transform: translateY(1px); }
            100% { transform: translateY(0) rotate(0deg); opacity: 1; }
        }

        /* Dust Particles upon landing */
        .dust-cloud {
            position: absolute;
            background-color: #DCD7CA;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(1.5px);
            z-index: 20;
            opacity: 0;
            animation: dustPuff 0.7s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes dustPuff {
            0% { transform: translate(0, 0) scale(0.5); opacity: 0.7; }
            100% { transform: translate(var(--tx), var(--ty)) scale(3); opacity: 0; }
        }

        /* Tooltip Card */
        .tooltip-card {
            opacity: 0;
            transform: translateY(10px) scale(0.95);
            transition: all 0.2s ease;
            pointer-events: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            margin-left: -45%; /* 90% width centered */
            width: 90%;
            z-index: 50;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .tooltip-card.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Book List Items */
        .book-row {
            transition: all 0.3s ease;
            border: 1px solid transparent;
            cursor: default;
        }
        .book-row:hover {
            background-color: #f7f6f3;
            border-color: #E9E5DC;
            transform: translateX(4px);
        }

        .delete-btn {
            opacity: 0;
            transition: opacity 0.2s ease;
            color: #C4B5B7;
        }
        .book-row:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: #EF4444; }

        /* Progress Bar */
        .progress-track {
            background-color: #E9E5DC;
            border-radius: 4px;
            overflow: hidden;
            height: 6px;
            width: 100%;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }
        .progress-fill {
            background: linear-gradient(90deg, #B48025, #D4AF37);
            height: 100%;
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }

        /* Inputs & Buttons */
        input[type="text"], input[type="number"] {
            background-color: #FFFFFF;
            border: 1px solid #E9E5DC;
            color: #37352f;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }
        input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1), inset 0 2px 4px rgba(0,0,0,0.01);
        }
        input::placeholder { color: #A39F96; font-style: italic; }

        .btn-primary {
            background: linear-gradient(180deg, #37352f 0%, #1a1a1a 100%);
            color: #D4AF37;
            border: 1px solid #2d2d2d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.4s ease;
        }
        .btn-primary:hover { 
            background: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
            color: #FCD34D;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.15), inset 0 1px 0 rgba(255,255,255,0.05);
            transform: translateY(-2px);
        }
        .btn-primary:active { transform: translateY(1px) scale(0.98); }

        .btn-reset {
            background-color: transparent;
            color: #A39F96;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }
        .btn-reset:hover { color: #37352f; border-bottom-color: #37352f; }

        /* Goal Met Banner */
        .victory-banner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scaleX(0);
            background: linear-gradient(90deg, #B48025, #D4AF37, #B48025);
            color: #FFFFFF;
            padding: 6px 24px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            box-shadow: 0 4px 15px rgba(217, 119, 6, 0.4);
            border: 1px solid #FCD34D;
            white-space: nowrap;
            opacity: 0;
            z-index: 40;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.6s ease;
        }
        .goal-met .victory-banner {
            transform: translate(-50%, -50%) scaleX(1);
            opacity: 1;
            transition-delay: 0.8s;
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #DCD7CA; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #B48025; }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(255,255,255,0.8); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div id="widgetContainer" class="widget-box relative w-full max-w-4xl rounded-3xl p-6 md:p-10 flex flex-col md:flex-row h-[750px] md:h-[600px] overflow-hidden gap-8">
        
        <div class="ambient-glow"></div>

        <!-- Left Side: The Bookshelf Visualizer -->
        <div class="flex-shrink-0 flex flex-col items-center w-full md:w-[380px] h-full relative z-20">
            
            <div class="w-full flex justify-between items-center mb-2">
                <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#A39F96]">@faithreflects</span>
            </div>
            
            <h2 class="serif text-3xl text-[#37352f] mb-1 text-center w-full">The Library</h2>
            <p class="text-[11px] text-[#8A867D] italic mb-6 text-center w-full">"Leaders are readers."</p>

            <!-- Progress Bar Area -->
            <div class="w-full mb-6 relative z-10 px-2">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-[10px] font-bold tracking-widest uppercase text-[#B48025]">Reading Goal</span>
                    <div class="flex items-center space-x-1 cursor-pointer hover:opacity-70 transition-opacity" id="goalEditTrigger" title="Click to edit goal">
                        <span class="font-serif text-xl text-[#37352f] font-semibold" id="readCount">0</span>
                        <span class="text-xs text-[#8A867D] font-medium pb-0.5">/ <span id="goalCount">12</span></span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="progressBar" class="progress-fill" style="width: 0%;"></div>
                </div>
            </div>

            <!-- SVG Bookshelf Environment -->
            <div class="relative w-full h-[280px] flex justify-center items-end" id="bookshelfArea">
                
                <div id="dustContainer" class="absolute inset-0 pointer-events-none z-30 overflow-visible"></div>

                <svg viewBox="0 0 400 300" class="w-full h-full overflow-visible z-10">
                    <defs>
                        <!-- Mahogany Wood Gradient -->
                        <linearGradient id="woodGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#4A2C1C"/>
                            <stop offset="50%" stop-color="#3A1E0D"/>
                            <stop offset="100%" stop-color="#251206"/>
                        </linearGradient>
                        <linearGradient id="goldTrim" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#D4AF37"/>
                            <stop offset="50%" stop-color="#FDE68A"/>
                            <stop offset="100%" stop-color="#B48025"/>
                        </linearGradient>
                    </defs>

                    <!-- Bookshelf Backing (Darker Wood) -->
                    <rect x="10" y="10" width="380" height="280" fill="#251206" stroke="#1A0D04" stroke-width="2"/>
                    
                    <!-- Vertical Side Panels -->
                    <rect x="0" y="0" width="20" height="300" class="wood-texture"/>
                    <rect x="380" y="0" width="20" height="300" class="wood-texture"/>

                    <!-- Books Injected Here (Grouped by Shelf) -->
                    <g id="shelf-1-books"></g>
                    <g id="shelf-2-books"></g>

                    <!-- Top Shelf Board (Y=140) -->
                    <rect x="10" y="135" width="380" height="5" class="wood-shelf-top"/>
                    <rect x="0" y="140" width="400" height="15" class="wood-texture"/>
                    <rect x="0" y="142" width="400" height="3" fill="url(#goldTrim)" opacity="0.8"/>

                    <!-- Bottom Shelf Board (Y=280) -->
                    <rect x="10" y="275" width="380" height="5" class="wood-shelf-top"/>
                    <rect x="0" y="280" width="400" height="20" class="wood-texture"/>
                    <rect x="0" y="282" width="400" height="3" fill="url(#goldTrim)" opacity="0.8"/>

                </svg>

                <div class="victory-banner">LIBRARY GOAL MET</div>

                <!-- Hover Tooltip -->
                <div id="bookTooltip" class="tooltip-card bg-[#37352f] text-white rounded-xl p-4 text-center">
                    <span id="tooltipTitle" class="serif text-lg font-medium text-[#FCD34D] block mb-1 leading-tight">Book Title</span>
                    <span id="tooltipAuthor" class="text-[10px] font-bold tracking-widest uppercase text-[#A39F96]">Author Name</span>
                </div>

            </div>
        </div>

        <!-- Right Side: The Log & Inputs -->
        <div class="flex-1 w-full flex flex-col z-20 min-h-0 pl-2 md:pl-0 border-t md:border-t-0 md:border-l border-[#E9E5DC] pt-6 md:pt-0 md:pl-8 h-full">
            
            <div class="flex justify-between items-end mb-4 shrink-0 px-1">
                <span class="text-[11px] font-bold tracking-widest uppercase text-[#B48025]">Books Finished</span>
            </div>

            <!-- Scrollable Log List -->
            <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-2 mb-4 min-h-0" id="booksList">
                <!-- Injected via JS -->
            </div>

            <!-- Input Area to Log New Book -->
            <div class="w-full shrink-0 border-t border-[#E9E5DC] pt-4 mt-auto">
                <div class="flex flex-col space-y-3">
                    <input type="text" id="newTitleInput" placeholder="Book Title..." class="w-full rounded-xl px-4 py-3 text-sm font-semibold" autocomplete="off">
                    <div class="flex space-x-2">
                        <input type="text" id="newAuthorInput" placeholder="Author..." class="flex-1 rounded-xl px-4 py-3 text-xs" autocomplete="off">
                        <button id="addBookBtn" class="btn-primary px-5 py-3 rounded-xl text-xs font-bold uppercase tracking-widest flex items-center justify-center space-x-1 shadow-md">
                            <span>+</span>
                            <span>Add to Shelf</span>
                        </button>
                    </div>
                </div>
            </div>

            <button id="resetTriggerBtn" class="mt-5 text-[9px] tracking-widest uppercase pb-0.5 z-10 shrink-0 btn-reset self-center">
                Clear Shelves (New Year)
            </button>

        </div>

        <!-- Modal: Set Goal -->
        <div id="goalModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#FCFBF9] rounded-2xl p-6 w-full max-w-[260px] border border-[#E9E5DC] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#37352f]">Set Reading Goal</h3>
                <p class="text-xs text-[#8A867D] mb-5">How many books do you intend to read this year?</p>
                
                <input type="number" id="goalInput" min="1" max="100" class="w-full rounded-xl px-4 py-3 text-xl font-bold text-center text-[#B48025] mb-6">
                
                <div class="flex space-x-3">
                    <button id="cancelGoalBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#8A867D] hover:bg-gray-100 border border-transparent transition-colors">Cancel</button>
                    <button id="saveGoalBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#37352f] text-white hover:bg-black transition-colors shadow-md">Save Goal</button>
                </div>
            </div>
        </div>

        <!-- Modal: Clear Shelves -->
        <div id="resetModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#FCFBF9] rounded-2xl p-6 w-full max-w-[260px] border border-[#E9E5DC] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#37352f]">Clear Library?</h3>
                <p class="text-xs text-[#8A867D] mb-6">This will empty your shelves to begin a new year of reading.</p>
                <div class="flex space-x-3">
                    <button id="cancelResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#8A867D] hover:bg-gray-100 border border-transparent transition-colors">Cancel</button>
                    <button id="confirmResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#EF4444] text-white hover:bg-red-600 transition-colors shadow-md">Empty</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Vintage Leather Book Color Palette
        const bookColors = [
            '#4A1515', // Deep Burgundy
            '#0F2035', // Navy Blue
            '#1A3320', // Forest Green
            '#3A2411', // Warm Leather Brown
            '#1E1E1E', // Charcoal
            '#522D16', // Umber
            '#253F4A'  // Deep Teal
        ];

        // State Management
        let state = JSON.parse(localStorage.getItem('faithreflects_library')) || {
            goal: 12,
            books: [
                // Sample mock data for empty states
                // { id: 1, title: "Deep Work", author: "Cal Newport", ui: { w: 22, h: 80, c: '#0F2035' } }
            ]
        };

        // Constants for SVG calculations
        const SHELF_WIDTH = 340; // 380 total - padding on sides
        const START_X = 30; // X offset for first book
        const SHELF_1_Y = 135; // Y coord for books resting on top shelf
        const SHELF_2_Y = 275; // Y coord for books resting on bottom shelf

        // Elements
        const container = document.getElementById('widgetContainer');
        const shelf1Group = document.getElementById('shelf-1-books');
        const shelf2Group = document.getElementById('shelf-2-books');
        const dustContainer = document.getElementById('dustContainer');
        
        const booksList = document.getElementById('booksList');
        const readCountDisplay = document.getElementById('readCount');
        const goalCountDisplay = document.getElementById('goalCount');
        const progressBar = document.getElementById('progressBar');
        
        const newTitleInput = document.getElementById('newTitleInput');
        const newAuthorInput = document.getElementById('newAuthorInput');
        const addBookBtn = document.getElementById('addBookBtn');
        
        const bookTooltip = document.getElementById('bookTooltip');
        const tooltipTitle = document.getElementById('tooltipTitle');
        const tooltipAuthor = document.getElementById('tooltipAuthor');

        // Modals
        const goalEditTrigger = document.getElementById('goalEditTrigger');
        const goalModal = document.getElementById('goalModal');
        const goalInput = document.getElementById('goalInput');
        const saveGoalBtn = document.getElementById('saveGoalBtn');
        const cancelGoalBtn = document.getElementById('cancelGoalBtn');

        const resetTriggerBtn = document.getElementById('resetTriggerBtn');
        const resetModal = document.getElementById('resetModal');
        const confirmResetBtn = document.getElementById('confirmResetBtn');
        const cancelResetBtn = document.getElementById('cancelResetBtn');

        function generateBookUI() {
            return {
                w: Math.floor(Math.random() * 8) + 16, // Width: 16px to 24px
                h: Math.floor(Math.random() * 25) + 65, // Height: 65px to 90px
                c: bookColors[Math.floor(Math.random() * bookColors.length)]
            };
        }

        function createBookSVG(book, x, yBase, isNew) {
            // Build the rects and lines that make it look like a vintage book spine
            // yBase is the bottom coordinate where the book rests
            const y = yBase - book.ui.h;
            
            // Outer wrapper for fixed positioning on the shelf
            const wrapper = document.createElementNS("http://www.w3.org/2000/svg", "g");
            wrapper.setAttribute("transform", `translate(${x}, ${y})`);

            // Inner group for hover and drop animations
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("class", `book-spine ${isNew ? 'is-dropping' : ''}`);
            
            // Spine body
            const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            rect.setAttribute("width", book.ui.w);
            rect.setAttribute("height", book.ui.h);
            rect.setAttribute("rx", "2");
            rect.setAttribute("fill", book.ui.c);
            rect.setAttribute("stroke", "#111");
            rect.setAttribute("stroke-width", "1");
            
            // Inner shadow/depth
            const shadow = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            shadow.setAttribute("x", "2");
            shadow.setAttribute("width", book.ui.w - 4);
            shadow.setAttribute("height", book.ui.h);
            shadow.setAttribute("fill", "rgba(255,255,255,0.1)");
            
            // Gold Ribs (Vintage spine details)
            const lines = [];
            const numRibs = Math.floor(book.ui.h / 18);
            for(let i=1; i<=numRibs; i++) {
                const ry = i * (book.ui.h / (numRibs + 1));
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", "1");
                line.setAttribute("y1", ry);
                line.setAttribute("x2", book.ui.w - 1);
                line.setAttribute("y2", ry);
                line.setAttribute("stroke", "#D4AF37");
                line.setAttribute("stroke-width", "1.5");
                line.setAttribute("opacity", "0.7");
                lines.push(line);
            }

            g.appendChild(rect);
            g.appendChild(shadow);
            lines.forEach(l => g.appendChild(l));

            // Tooltip Interactions
            wrapper.addEventListener('mouseenter', () => {
                tooltipTitle.innerText = book.title;
                tooltipAuthor.innerText = book.author || "Unknown";
                bookTooltip.classList.add('visible');
            });
            wrapper.addEventListener('mouseleave', () => {
                bookTooltip.classList.remove('visible');
            });

            wrapper.appendChild(g);
            return wrapper;
        }

        function spawnDust(x, y) {
            // Convert SVG logical coords to DOM pixels roughly
            const svgRect = document.getElementById('bookshelfArea').getBoundingClientRect();
            // Aspect ratio scaling approximation
            const scaleX = svgRect.width / 400;
            const scaleY = svgRect.height / 300;
            
            const px = x * scaleX;
            const py = y * scaleY;

            for(let i=0; i<6; i++) {
                setTimeout(() => {
                    const dust = document.createElement('div');
                    dust.className = 'dust-cloud';
                    
                    const size = 10 + Math.random() * 15;
                    dust.style.width = `${size}px`;
                    dust.style.height = `${size}px`;
                    
                    dust.style.left = `${px + (Math.random() * 20 - 10)}px`;
                    dust.style.top = `${py - 10}px`;
                    
                    const travelX = (Math.random() * 40) - 20;
                    const travelY = -(Math.random() * 20);
                    
                    dust.style.setProperty('--tx', `${travelX}px`);
                    dust.style.setProperty('--ty', `${travelY}px`);
                    
                    dustContainer.appendChild(dust);
                    
                    setTimeout(() => {
                        if (dustContainer.contains(dust)) dust.remove();
                    }, 700);
                }, i * 50);
            }
        }

        function renderLibrary(animateLast = false) {
            shelf1Group.innerHTML = '';
            shelf2Group.innerHTML = '';
            
            let currentX1 = START_X;
            let currentX2 = START_X;

            state.books.forEach((book, index) => {
                const isNew = animateLast && (index === state.books.length - 1);
                
                // Determine shelf and calculate X
                let targetShelf, yBase, x;
                
                if (currentX1 + book.ui.w <= START_X + SHELF_WIDTH) {
                    // Fits on Shelf 1
                    targetShelf = shelf1Group;
                    yBase = SHELF_1_Y;
                    x = currentX1;
                    currentX1 += book.ui.w + 1; // +1px gap
                } else if (currentX2 + book.ui.w <= START_X + SHELF_WIDTH) {
                    // Fits on Shelf 2
                    targetShelf = shelf2Group;
                    yBase = SHELF_2_Y;
                    x = currentX2;
                    currentX2 += book.ui.w + 1;
                } else {
                    // Library is full (Visually cap it, but data still saves)
                    return; 
                }

                const svgBook = createBookSVG(book, x, yBase, isNew);
                targetShelf.appendChild(svgBook);

                // Trigger dust if it's the newly dropped book
                if (isNew) {
                    setTimeout(() => {
                        spawnDust(x + (book.ui.w/2), yBase);
                    }, 600); // Trigger dust when animation hits the shelf (0.6s)
                }
            });
        }

        function updateProgress() {
            const count = state.books.length;
            const goal = state.goal;
            
            readCountDisplay.innerText = count;
            goalCountDisplay.innerText = goal;
            
            const progress = Math.min(100, (count / goal) * 100);
            progressBar.style.width = `${progress}%`;

            if (count >= goal && goal > 0) {
                container.classList.add('goal-met');
                readCountDisplay.classList.add('text-[#D4AF37]');
            } else {
                container.classList.remove('goal-met');
                readCountDisplay.classList.remove('text-[#D4AF37]');
            }
        }

        function renderList() {
            booksList.innerHTML = '';
            
            if (state.books.length === 0) {
                booksList.innerHTML = '<p class="text-xs text-[#A39F96] italic text-center mt-6">Your library awaits its first book.</p>';
                return;
            }

            // Render newest at top
            [...state.books].reverse().forEach(book => {
                const row = document.createElement('div');
                row.className = 'book-row p-3 rounded-xl flex items-center justify-between group';
                row.innerHTML = `
                    <div class="flex items-center space-x-3 min-w-0 flex-1 pr-2">
                        <div class="w-2.5 h-6 rounded-sm shrink-0" style="background-color: ${book.ui.c}; border: 1px solid #111;"></div>
                        <div class="flex flex-col min-w-0">
                            <span class="text-xs font-semibold text-[#37352f] truncate">${book.title}</span>
                            <span class="text-[10px] uppercase tracking-widest text-[#A39F96] truncate mt-0.5">${book.author || 'Unknown'}</span>
                        </div>
                    </div>
                    <button onclick="deleteBook(${book.id})" class="delete-btn p-1 shrink-0" title="Remove Book">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                `;
                booksList.appendChild(row);
            });
        }

        window.deleteBook = function(id) {
            state.books = state.books.filter(b => b.id !== id);
            localStorage.setItem('faithreflects_library', JSON.stringify(state));
            
            renderLibrary();
            renderList();
            updateProgress();
            bookTooltip.classList.remove('visible'); // Safety hide
        };

        addBookBtn.addEventListener('click', () => {
            const title = newTitleInput.value.trim();
            const author = newAuthorInput.value.trim();
            
            if (title) {
                // Button feedback
                addBookBtn.style.transform = 'scale(0.95)';
                setTimeout(() => addBookBtn.style.transform = 'scale(1)', 150);

                state.books.push({
                    id: Date.now(),
                    title: title,
                    author: author,
                    ui: generateBookUI()
                });
                
                localStorage.setItem('faithreflects_library', JSON.stringify(state));
                
                newTitleInput.value = '';
                newAuthorInput.value = '';
                newTitleInput.focus();

                renderLibrary(true);
                renderList();
                updateProgress();
            }
        });

        // Enter key support
        newTitleInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addBookBtn.click(); });
        newAuthorInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addBookBtn.click(); });

        // Goal Modal Logic
        goalEditTrigger.addEventListener('click', () => {
            goalInput.value = state.goal;
            goalModal.classList.remove('hidden');
            goalInput.focus();
        });
        cancelGoalBtn.addEventListener('click', () => goalModal.classList.add('hidden'));
        saveGoalBtn.addEventListener('click', () => {
            const newGoal = parseInt(goalInput.value);
            if (newGoal > 0) {
                state.goal = newGoal;
                localStorage.setItem('faithreflects_library', JSON.stringify(state));
                updateProgress();
                goalModal.classList.add('hidden');
            }
        });

        // Reset Modal Logic
        resetTriggerBtn.addEventListener('click', () => resetModal.classList.remove('hidden'));
        cancelResetBtn.addEventListener('click', () => resetModal.classList.add('hidden'));
        confirmResetBtn.addEventListener('click', () => {
            state.books = [];
            localStorage.setItem('faithreflects_library', JSON.stringify(state));
            renderLibrary();
            renderList();
            updateProgress();
            resetModal.classList.add('hidden');
        });

        // Init
        renderLibrary();
        renderList();
        updateProgress();

    </script>
</body>
</html>
