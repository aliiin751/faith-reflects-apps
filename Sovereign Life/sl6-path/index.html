<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pilgrim's Path</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        /* Sovereign Light Mode Base */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: transparent; 
            color: #37352f; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        /* The Widget Container */
        .widget-box {
            background-color: #FCFBF9; /* Ivory Parchment */
            border: 1px solid #E9E5DC;
            box-shadow: 0 8px 30px rgba(0,0,0,0.03), inset 0 0 20px rgba(255,255,255,0.5);
            transition: all 1.5s ease;
        }

        /* Landscape Scene & SVG */
        .landscape-container {
            border-radius: 1.5rem;
            overflow: hidden;
            position: relative;
            background: linear-gradient(180deg, #FDFCFB 0%, #FDE68A 100%);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
            border: 1px solid #E9E5DC;
        }

        .sun-orb {
            animation: sun-pulse 4s infinite alternate ease-in-out;
            transform-origin: center;
        }

        @keyframes sun-pulse {
            0% { filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.4)); transform: scale(0.98); }
            100% { filter: drop-shadow(0 0 25px rgba(245, 158, 11, 0.8)); transform: scale(1.02); }
        }

        /* The Path */
        .path-base {
            fill: none;
            stroke: #E9E5DC;
            stroke-width: 6;
            stroke-linecap: round;
            opacity: 0.6;
        }

        .path-progress {
            fill: none;
            stroke: url(#goldGrad);
            stroke-width: 6;
            stroke-linecap: round;
            filter: drop-shadow(0 2px 4px rgba(212, 175, 55, 0.4));
            /* JS will handle stroke-dashoffset */
        }

        /* The Pilgrim Spark */
        .pilgrim-spark {
            filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.9));
        }

        /* Inputs & Buttons */
        input[type="number"] {
            background-color: #FFFFFF;
            border: 1px solid #E9E5DC;
            color: #37352f;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: #B48025;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1), inset 0 2px 4px rgba(0,0,0,0.01);
        }
        
        /* Hide number spin buttons */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn-log {
            background-color: #37352f;
            color: #FFFFFF;
            border: 1px solid #2d2d2d;
            transition: all 0.4s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn-log:hover { 
            background-color: #000000; 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }
        .btn-log:active { transform: translateY(1px) scale(0.98); }

        .is-complete .btn-log {
            background-color: #FCFBF9;
            color: #B48025;
            border-color: #D4AF37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            pointer-events: none;
        }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(255,255,255,0.8); }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div id="widgetContainer" class="widget-box relative w-full max-w-sm rounded-3xl p-6 md:p-8 flex flex-col h-[620px] overflow-hidden">
        
        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-4 z-10 shrink-0">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#A39F96]">@faithreflects</span>
            <div id="progressBadge" class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#8A867D] border border-[#E9E5DC] bg-white flex items-center space-x-1 shadow-sm transition-colors duration-500">
                <span>Day</span>
                <span id="dayDisplay" class="text-[#B48025]">0</span>
                <span>/ 365</span>
            </div>
        </div>

        <h2 class="serif text-3xl text-[#37352f] mb-1 z-10 shrink-0 text-center">The Pilgrim's Path</h2>
        <p class="text-[11px] text-[#8A867D] italic mb-6 z-10 shrink-0 text-center">"Your word is a lamp unto my feet."</p>

        <!-- SVG Landscape & Path -->
        <div class="landscape-container relative w-full h-56 mb-6 z-10 flex justify-center items-end shrink-0">
            <svg viewBox="0 0 300 200" class="w-full h-full overflow-visible" id="landscapeSvg">
                
                <defs>
                    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#FCD34D"/>
                        <stop offset="50%" stop-color="#D4AF37"/>
                        <stop offset="100%" stop-color="#B48025"/>
                    </linearGradient>
                    
                    <linearGradient id="hillBack" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#A3B8AC"/>
                        <stop offset="100%" stop-color="#8A9D92"/>
                    </linearGradient>
                    <linearGradient id="hillMid" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#8A9D92"/>
                        <stop offset="100%" stop-color="#6F8578"/>
                    </linearGradient>
                    <linearGradient id="hillFront" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#738A7D"/>
                        <stop offset="100%" stop-color="#556B5F"/>
                    </linearGradient>
                </defs>

                <!-- The Morning Sun -->
                <circle cx="150" cy="80" r="30" fill="#FFFBEB" class="sun-orb"/>
                <circle cx="150" cy="80" r="25" fill="#FDE68A"/>

                <!-- Background Hill -->
                <path d="M 0 100 Q 150 60 300 120 L 300 200 L 0 200 Z" fill="url(#hillBack)"/>
                
                <!-- Silhouettes on back hill -->
                <g fill="#4A5D52" opacity="0.6">
                    <!-- The Cross -->
                    <path d="M 148 70 L 152 70 L 152 75 L 158 75 L 158 79 L 152 79 L 152 90 L 148 90 L 148 79 L 142 79 L 142 75 L 148 75 Z"/>
                    <!-- Tiny Trees -->
                    <path d="M 40 90 L 45 80 L 50 90 Z M 43 90 L 45 85 L 47 90 Z"/>
                    <path d="M 220 100 L 225 85 L 230 100 Z"/>
                    <path d="M 230 105 L 233 95 L 236 105 Z"/>
                </g>

                <!-- Middle Hill -->
                <path d="M -20 140 Q 100 90 220 150 T 320 140 L 320 200 L -20 200 Z" fill="url(#hillMid)"/>
                
                <!-- Front Hill -->
                <path d="M -20 180 Q 80 120 200 180 T 320 160 L 320 200 L -20 200 Z" fill="url(#hillFront)"/>

                <!-- The Winding Path -->
                <!-- We define it starting from bottom (0 progress) to top (100 progress) -->
                <!-- Note: SVG getPointAtLength() goes from start to end of path definition. -->
                <path id="basePath" class="path-base" d="M 30 220 C 130 180, 260 160, 200 130 C 140 100, 70 120, 100 90 C 120 70, 140 75, 150 78"/>
                
                <!-- The Golden Progress Trail (Exact duplicate of base path) -->
                <path id="progressPath" class="path-progress" d="M 30 220 C 130 180, 260 160, 200 130 C 140 100, 70 120, 100 90 C 120 70, 140 75, 150 78"/>

                <!-- The Pilgrim Spark (Moved by JS) -->
                <g id="sparkGroup" transform="translate(30, 220)">
                    <circle cx="0" cy="0" r="8" fill="rgba(252, 211, 77, 0.4)" class="pilgrim-spark"/>
                    <circle cx="0" cy="0" r="4" fill="#FCD34D"/>
                    <circle cx="0" cy="0" r="2" fill="#FFFBEB"/>
                </g>

            </svg>
        </div>

        <!-- Input Area -->
        <div class="w-full flex-1 flex flex-col justify-center items-center z-10 min-h-0 mb-4">
            
            <label class="text-[9px] font-bold tracking-widest uppercase text-[#A39F96] mb-3">Current Day</label>
            
            <div class="flex items-center justify-center space-x-3 w-full">
                <input type="number" id="dayInput" placeholder="1" min="1" max="365" class="w-24 rounded-2xl py-3 shadow-sm">
                <span class="text-xs font-semibold text-[#A39F96] uppercase tracking-wider">of 365</span>
            </div>

        </div>

        <!-- Action & Reset -->
        <div class="w-full z-10 shrink-0 mt-auto">
            <button id="logBtn" class="btn-log w-full py-4 rounded-xl text-xs font-bold uppercase tracking-widest flex items-center justify-center space-x-2">
                <span id="btnIcon">🚶</span>
                <span id="btnText">Log Progress</span>
            </button>
            
            <button id="resetTriggerBtn" class="mt-4 text-[9px] tracking-widest text-[#A39F96] uppercase hover:text-[#37352f] transition-colors pb-0.5 border-b border-transparent hover:border-[#37352f] w-full text-center">
                Restart Journey (New Year)
            </button>
        </div>

        <!-- Custom Reset Modal -->
        <div id="resetModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#FCFBF9] rounded-2xl p-6 w-full max-w-[260px] border border-[#E9E5DC] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#37352f]">Restart Pilgrimage?</h3>
                <p class="text-xs text-[#8A867D] mb-6">This will clear your trail and place you back at the beginning of the path.</p>
                <div class="flex space-x-3">
                    <button id="cancelResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#8A867D] hover:bg-gray-100 border border-transparent transition-colors">Cancel</button>
                    <button id="confirmResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#37352f] text-white hover:bg-black transition-colors shadow-md">Restart</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // State
        let currentDay = parseInt(localStorage.getItem('faithreflects_pilgrimage')) || 0;
        const TOTAL_DAYS = 365;

        // Elements
        const container = document.getElementById('widgetContainer');
        const dayInput = document.getElementById('dayInput');
        const dayDisplay = document.getElementById('dayDisplay');
        const logBtn = document.getElementById('logBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const progressBadge = document.getElementById('progressBadge');
        
        // SVG Elements
        const basePath = document.getElementById('basePath');
        const progressPath = document.getElementById('progressPath');
        const sparkGroup = document.getElementById('sparkGroup');
        
        // Modal Elements
        const resetModal = document.getElementById('resetModal');
        const resetTriggerBtn = document.getElementById('resetTriggerBtn');
        const cancelResetBtn = document.getElementById('cancelResetBtn');
        const confirmResetBtn = document.getElementById('confirmResetBtn');

        // Math Constants
        // Needs a slight delay on initial load for SVG path length to calculate properly
        let pathLength = 0; 
        
        function initPath() {
            pathLength = basePath.getTotalLength();
            progressPath.style.strokeDasharray = pathLength;
            progressPath.style.strokeDashoffset = pathLength; // Start completely un-drawn
            
            // Render initial state instantly
            if (currentDay > 0) {
                dayInput.value = currentDay;
                animateTo(currentDay, 0); // 0ms duration = instant
            }
        }

        // Custom JS Animation Engine for perfect Sync of Path and Spark
        function animateTo(targetDay, duration = 1500) {
            const startDay = parseInt(dayDisplay.innerText) || 0;
            const startTime = performance.now();
            
            // Constrain target
            targetDay = Math.max(0, Math.min(targetDay, TOTAL_DAYS));

            function step(currentTime) {
                const elapsed = currentTime - startTime;
                let progressRaw = duration === 0 ? 1 : Math.min(elapsed / duration, 1);
                
                // Cubic ease-in-out
                const ease = progressRaw < 0.5 
                    ? 4 * progressRaw * progressRaw * progressRaw 
                    : 1 - Math.pow(-2 * progressRaw + 2, 3) / 2;
                
                const currentAnimatedDay = startDay + (targetDay - startDay) * ease;
                const progressPct = currentAnimatedDay / TOTAL_DAYS;
                
                // 1. Update text
                dayDisplay.innerText = Math.round(currentAnimatedDay);
                
                // 2. Update Path Dash Offset
                // Offset = length means empty. Offset = 0 means full.
                const offset = pathLength - (pathLength * progressPct);
                progressPath.style.strokeDashoffset = offset;
                
                // 3. Move Spark exactly along the path
                const pt = basePath.getPointAtLength(pathLength * progressPct);
                sparkGroup.setAttribute('transform', `translate(${pt.x}, ${pt.y})`);
                
                if (progressRaw < 1) {
                    requestAnimationFrame(step);
                } else {
                    checkCompletionState(targetDay);
                }
            }
            
            requestAnimationFrame(step);
        }

        function checkCompletionState(day) {
            if (day >= TOTAL_DAYS) {
                container.classList.add('is-complete');
                btnText.innerText = "Journey Complete";
                btnIcon.innerText = "✨";
                progressBadge.classList.replace('border-[#E9E5DC]', 'border-[#D4AF37]');
                progressBadge.classList.replace('bg-white', 'bg-[#FFFBEB]');
            } else {
                container.classList.remove('is-complete');
                btnText.innerText = "Log Progress";
                btnIcon.innerText = "🚶";
                progressBadge.classList.replace('border-[#D4AF37]', 'border-[#E9E5DC]');
                progressBadge.classList.replace('bg-[#FFFBEB]', 'bg-white');
            }
        }

        // Actions
        logBtn.addEventListener('click', () => {
            const val = parseInt(dayInput.value);
            if (!isNaN(val) && val >= 1 && val <= 365) {
                
                // Button feedback
                logBtn.style.transform = 'scale(0.95)';
                setTimeout(() => logBtn.style.transform = 'scale(1)', 150);

                currentDay = val;
                localStorage.setItem('faithreflects_pilgrimage', currentDay);
                
                animateTo(currentDay, 1500); // Smooth 1.5s animation
            } else {
                dayInput.focus();
            }
        });

        // Enter key support
        dayInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') logBtn.click();
        });

        // Modal Logic
        resetTriggerBtn.addEventListener('click', () => resetModal.classList.remove('hidden'));
        cancelResetBtn.addEventListener('click', () => resetModal.classList.add('hidden'));
        
        confirmResetBtn.addEventListener('click', () => {
            currentDay = 0;
            localStorage.setItem('faithreflects_pilgrimage', 0);
            dayInput.value = '';
            
            animateTo(0, 1000); // Animate smoothly back to start
            
            resetModal.classList.add('hidden');
        });

        // Initialize
        setTimeout(initPath, 100); // Wait for DOM layout to calculate SVG path length

    </script>
</body>
</html>
