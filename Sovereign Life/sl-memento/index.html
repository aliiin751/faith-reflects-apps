<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Memento Mori Medallion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        /* Sovereign Light Mode Base */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: transparent; 
            color: #37352f; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        /* The Widget Container */
        .widget-box {
            background-color: #FCFBF9; /* Ivory Parchment */
            border: 1px solid #E9E5DC;
            box-shadow: 0 8px 30px rgba(0,0,0,0.03), inset 0 0 20px rgba(255,255,255,0.5);
            transition: all 1.5s ease;
        }

        /* 3D Scene Physics */
        .perspective-scene {
            perspective: 1200px;
            position: relative;
        }

        .coin-toss-wrapper {
            position: relative;
            z-index: 20;
            transition: transform 0.1s;
        }

        .coin {
            width: 140px;
            height: 140px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 3s cubic-bezier(0.1, 0.8, 0.2, 1);
            transform: rotateY(0deg);
            border-radius: 50%;
        }

        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Polished Brass Gradient */
            background: linear-gradient(135deg, #FDE68A 0%, #D4AF37 50%, #B48025 100%);
            box-shadow: 
                inset 0 0 0 4px #5C451A, 
                inset 0 0 0 6px #FCD34D,
                inset 0 0 20px rgba(92, 69, 26, 0.5);
        }

        .coin-front {
            transform: translateZ(3px);
        }

        .coin-back {
            transform: rotateY(180deg) translateZ(3px);
        }

        /* Coin Depth Edge (Simulating thickness) */
        .coin::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: linear-gradient(to right, #B48025, #FDE68A, #5C451A);
            transform: translateZ(-3px);
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        /* Engraved Typography Effects */
        .engraved-text {
            color: #5C451A;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.4), -1px -1px 0px rgba(0,0,0,0.15);
        }
        
        .engraved-svg {
            fill: #5C451A;
            filter: drop-shadow(1px 1px 0px rgba(255,255,255,0.4)) drop-shadow(-1px -1px 0px rgba(0,0,0,0.15));
        }

        /* Toss Animations */
        .is-tossing .coin-toss-wrapper {
            animation: toss-up-down 3s cubic-bezier(0.3, 0.1, 0.4, 1) forwards;
        }

        @keyframes toss-up-down {
            0% { transform: translateY(0) scale(1); }
            40% { transform: translateY(-110px) scale(1.2); }
            85% { transform: translateY(0) scale(1); }
            92% { transform: translateY(-15px) scale(1.02); } /* Satisfying Bounce */
            100% { transform: translateY(0) scale(1); }
        }

        /* Pedestal Shadow */
        .pedestal-shadow {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 15px;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.3) 0%, transparent 70%);
            transition: all 3s cubic-bezier(0.3, 0.1, 0.4, 1);
            z-index: 10;
        }

        .is-tossing .pedestal-shadow {
            animation: shadow-shrink 3s cubic-bezier(0.3, 0.1, 0.4, 1) forwards;
        }

        @keyframes shadow-shrink {
            0% { transform: translateX(-50%) scale(1); opacity: 1; }
            40% { transform: translateX(-50%) scale(0.4); opacity: 0.2; }
            85% { transform: translateX(-50%) scale(1); opacity: 1; }
            92% { transform: translateX(-50%) scale(0.9); opacity: 0.8; }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        /* Ambient Background Glow */
        .ambient-glow {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: opacity 1s ease;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(180deg, #37352f 0%, #1a1a1a 100%);
            color: #D4AF37;
            border: 1px solid #2d2d2d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.4s ease;
        }
        .btn-primary:hover:not(:disabled) { 
            background: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
            color: #FCD34D;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.15), inset 0 1px 0 rgba(255,255,255,0.05);
            transform: translateY(-2px);
        }
        .btn-primary:active:not(:disabled) { transform: translateY(1px) scale(0.98); }
        
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Status Fade */
        .status-text {
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.8s ease;
        }
        .status-text.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(255,255,255,0.8); }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div id="widgetContainer" class="widget-box relative w-full max-w-sm rounded-3xl p-8 flex flex-col items-center h-[520px] overflow-hidden">
        
        <div class="ambient-glow"></div>

        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-6 z-10 shrink-0">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#A39F96]">@faithreflects</span>
            <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#8A867D] border border-[#E9E5DC] bg-white flex items-center space-x-1 shadow-sm">
                <span>Daily Oracle</span>
            </div>
        </div>

        <h2 class="serif text-2xl text-[#37352f] mb-1 z-10 shrink-0">Memento Mori</h2>
        <p class="text-xs text-[#8A867D] italic mb-10 z-10 shrink-0 text-center">"Consult the stoic virtues."</p>

        <!-- 3D Coin Scene -->
        <div class="perspective-scene w-full flex-1 flex flex-col items-center justify-center z-10" id="sceneContainer">
            
            <div class="coin-toss-wrapper" id="tossWrapper">
                <div class="coin" id="coin">
                    
                    <!-- FRONT: Crown & Laurel Wreath -->
                    <div class="coin-face coin-front">
                        <svg viewBox="0 0 100 100" class="w-[70%] h-[70%]">
                            <!-- Outer Laurel Wreath -->
                            <path class="engraved-svg" d="M 50 10 C 30 10, 15 25, 15 45 C 15 65, 30 80, 50 85 C 70 80, 85 65, 85 45 C 85 25, 70 10, 50 10 Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 4"/>
                            <path class="engraved-svg" d="M 20 45 Q 30 25, 50 15 Q 70 25, 80 45" fill="none" stroke="currentColor" stroke-width="2"/>
                            <!-- Leaves -->
                            <path class="engraved-svg" d="M 20 45 Q 25 35, 15 35 Q 10 45, 20 45 Z" />
                            <path class="engraved-svg" d="M 30 30 Q 35 20, 25 20 Q 20 30, 30 30 Z" />
                            <path class="engraved-svg" d="M 80 45 Q 75 35, 85 35 Q 90 45, 80 45 Z" />
                            <path class="engraved-svg" d="M 70 30 Q 65 20, 75 20 Q 80 30, 70 30 Z" />
                            
                            <!-- Center Sovereign Crown -->
                            <g class="engraved-svg" transform="translate(50, 55) scale(0.6)">
                                <path d="M -25,10 L 25,10 L 35,-15 L 15,-2 L 0,-25 L -15,-2 L -35,-15 Z" fill="currentColor"/>
                                <line x1="-20" y1="15" x2="20" y2="15" stroke="currentColor" stroke-width="3"/>
                            </g>
                            
                            <!-- Surrounding Stars -->
                            <circle cx="50" cy="25" r="2" class="engraved-svg"/>
                            <circle cx="35" cy="70" r="1.5" class="engraved-svg"/>
                            <circle cx="65" cy="70" r="1.5" class="engraved-svg"/>
                        </svg>
                    </div>

                    <!-- BACK: The Virtue Text -->
                    <div class="coin-face coin-back flex flex-col p-4 text-center">
                        <div class="w-full h-full flex flex-col items-center justify-center border border-[#5C451A] rounded-full p-2 border-opacity-30">
                            <span class="text-3xl mb-1 opacity-80" id="virtueIcon">🏛️</span>
                            <span id="virtueTitle" class="engraved-text serif text-[13px] font-bold tracking-widest uppercase mb-2 leading-tight">MEMENTO MORI</span>
                            <span id="virtueDesc" class="engraved-text font-sans text-[8px] font-medium italic leading-snug px-3">
                                Remember you must die. Live this day as if it were your last.
                            </span>
                        </div>
                    </div>

                </div>
            </div>

            <div class="pedestal-shadow" id="pedestalShadow"></div>

        </div>

        <!-- Status Message -->
        <div class="h-8 flex items-center justify-center w-full z-10 mt-4 mb-2">
            <p id="statusMsg" class="text-[10px] font-bold tracking-widest uppercase text-[#B48025] status-text">
                Virtue Established
            </p>
        </div>

        <!-- Controls -->
        <div class="w-full mt-auto z-10 shrink-0">
            <button id="tossBtn" class="btn-primary w-full py-4 rounded-xl text-xs font-bold uppercase tracking-widest flex items-center justify-center space-x-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                <span id="btnText">Set Daily Virtue</span>
            </button>
            
            <button id="resetTriggerBtn" class="mt-4 text-[9px] tracking-widest text-[#A39F96] uppercase hover:text-[#37352f] transition-colors pb-0.5 border-b border-transparent hover:border-[#37352f] w-full text-center">
                Consult Oracle Again
            </button>
        </div>

        <!-- Custom Reset Modal -->
        <div id="resetModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#FCFBF9] rounded-2xl p-6 w-full max-w-[260px] border border-[#E9E5DC] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#37352f]">Flip Again?</h3>
                <p class="text-xs text-[#8A867D] mb-6">This will discard your current virtue and cast the medallion again.</p>
                <div class="flex space-x-3">
                    <button id="cancelResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#8A867D] hover:bg-gray-100 border border-transparent transition-colors">Cancel</button>
                    <button id="confirmResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#37352f] text-white hover:bg-black transition-colors shadow-md">Toss</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const virtues = [
            { icon: "⏳", title: "MEMENTO MORI", desc: "Remember you must die. Time is your only non-renewable resource." },
            { icon: "🏔️", title: "AMOR FATI", desc: "Love your fate. Embrace everything that happens today as necessary." },
            { icon: "⚔️", title: "DISCIPLINA", desc: "Discipline equals freedom. Master your impulses before they master you." },
            { icon: "🛡️", title: "TEMPERANTIA", desc: "Absolute self-control. Do not let your emotions dictate your actions." },
            { icon: "🔥", title: "AUDACIA", desc: "Courage in the fire. Step into the discomfort you have been avoiding." },
            { icon: "⚓", title: "PATIENTIA", desc: "Endure with grace. The obstacle in your path is the path." },
            { icon: "👑", title: "SUMMUM BONUM", desc: "The highest good. Act with complete virtue, regardless of the outcome." }
        ];

        // State
        const today = new Date().toDateString();
        let state = JSON.parse(localStorage.getItem('sovereign_medallion')) || {
            date: null,
            virtueIndex: -1
        };

        // Elements
        const coin = document.getElementById('coin');
        const tossWrapper = document.getElementById('tossWrapper');
        const sceneContainer = document.getElementById('sceneContainer');
        const tossBtn = document.getElementById('tossBtn');
        const btnText = document.getElementById('btnText');
        const statusMsg = document.getElementById('statusMsg');
        
        const virtueIcon = document.getElementById('virtueIcon');
        const virtueTitle = document.getElementById('virtueTitle');
        const virtueDesc = document.getElementById('virtueDesc');
        
        const resetModal = document.getElementById('resetModal');
        const resetTriggerBtn = document.getElementById('resetTriggerBtn');
        const cancelResetBtn = document.getElementById('cancelResetBtn');
        const confirmResetBtn = document.getElementById('confirmResetBtn');

        let isAnimating = false;
        let currentRotation = 0; // Tracks total degrees so the spin is always continuous

        function updateVirtueContent(index) {
            const v = virtues[index];
            virtueIcon.innerText = v.icon;
            virtueTitle.innerText = v.title;
            virtueDesc.innerText = v.desc;
        }

        function setInitialState() {
            if (state.date === today && state.virtueIndex !== -1) {
                // Already flipped today. Snap to back face showing virtue.
                updateVirtueContent(state.virtueIndex);
                coin.style.transition = 'none'; // Prevent animation on load
                currentRotation = 180; // Show back face
                coin.style.transform = `rotateY(${currentRotation}deg)`;
                
                // Update UI Buttons
                tossBtn.disabled = true;
                btnText.innerText = "Virtue Active";
                statusMsg.classList.add('visible');
                
                // Force reflow before restoring transitions
                void coin.offsetWidth;
                coin.style.transition = 'transform 3s cubic-bezier(0.1, 0.8, 0.2, 1)';
            } else {
                // Not flipped today. Show front face.
                coin.style.transition = 'none';
                currentRotation = 0;
                coin.style.transform = `rotateY(${currentRotation}deg)`;
                
                tossBtn.disabled = false;
                btnText.innerText = "Set Daily Virtue";
                statusMsg.classList.remove('visible');
                
                void coin.offsetWidth;
                coin.style.transition = 'transform 3s cubic-bezier(0.1, 0.8, 0.2, 1)';
            }
        }

        function triggerToss() {
            if (isAnimating) return;
            isAnimating = true;
            
            // UI Updates
            tossBtn.disabled = true;
            btnText.innerText = "Consulting Oracle...";
            statusMsg.classList.remove('visible');

            // Pick random virtue
            const randIndex = Math.floor(Math.random() * virtues.length);
            
            // We want to spin the coin rapidly in the air, then land on the back face.
            // 180 = back, 360 = front. 
            // So we need: currentRotation + (X full spins) + 180 to land on back.
            // E.g., 5 full spins (1800) + 180 = 1980.
            // If currentRotation is 180 (already on back), we want 180 + 1800 (front) + 180 = 2160 (back).
            // Actually, we just need the final rotation to be an odd multiple of 180.
            
            // Calculate spins to ensure it lands on an odd multiple of 180.
            let spins = 5 * 360; // 1800
            if (currentRotation % 360 === 0) {
                // Started on front (0). Adding 1800 keeps it on front. We add 180 to flip to back.
                currentRotation += spins + 180;
            } else {
                // Started on back (180). Adding 1800 keeps it on back. Perfect.
                currentRotation += spins;
            }

            // Start CSS Toss Animation (Up and Down)
            sceneContainer.classList.add('is-tossing');
            
            // Start CSS Rotate Animation
            coin.style.transform = `rotateY(${currentRotation}deg)`;

            // Halfway through the animation (when it's at the apex and spinning fast), swap the text invisibly
            setTimeout(() => {
                updateVirtueContent(randIndex);
                
                // Save to state
                state.date = today;
                state.virtueIndex = randIndex;
                localStorage.setItem('sovereign_medallion', JSON.stringify(state));
            }, 1500);

            // Finish animation
            setTimeout(() => {
                isAnimating = false;
                sceneContainer.classList.remove('is-tossing');
                
                btnText.innerText = "Virtue Active";
                statusMsg.classList.add('visible');
            }, 3000);
        }

        tossBtn.addEventListener('click', triggerToss);

        // Reset Logic
        resetTriggerBtn.addEventListener('click', () => {
            if (!isAnimating) resetModal.classList.remove('hidden');
        });
        cancelResetBtn.addEventListener('click', () => resetModal.classList.add('hidden'));
        
        confirmResetBtn.addEventListener('click', () => {
            resetModal.classList.add('hidden');
            
            // Clear state and flip back to front instantly, then auto-toss
            state = { date: null, virtueIndex: -1 };
            localStorage.setItem('sovereign_medallion', JSON.stringify(state));
            
            // Animate flip to front before re-tossing
            currentRotation += 180; // Add half turn to go from back to front
            coin.style.transition = 'transform 0.6s ease-in-out';
            coin.style.transform = `rotateY(${currentRotation}deg)`;
            
            statusMsg.classList.remove('visible');
            
            setTimeout(() => {
                coin.style.transition = 'transform 3s cubic-bezier(0.1, 0.8, 0.2, 1)';
                triggerToss();
            }, 800);
        });

        // Initialize
        setInitialState();

    </script>
</body>
</html>
