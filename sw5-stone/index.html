<!DOCTYPE html>
<html lang="en" class="bg-[#191919]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebenezer Stone Wall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        /* Notion Dark Mode Base - Forced completely */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: #191919 !important; 
            color: #D4D4D4; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        .widget-box {
            background-color: #191919; 
            border: 1px solid #2d2d2d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: all 1.5s ease;
        }

        /* The Wall Container */
        .wall-container {
            display: flex;
            flex-wrap: wrap-reverse; /* Builds from bottom to top automatically! */
            align-content: flex-start;
            justify-content: center;
            gap: 4px;
            width: 100%;
            height: 100%;
            padding: 10px;
            overflow-y: auto;
            position: relative;
            z-index: 10;
        }
        
        /* Custom Scrollbar for Wall */
        .wall-container::-webkit-scrollbar { width: 4px; }
        .wall-container::-webkit-scrollbar-track { background: transparent; }
        .wall-container::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .wall-container::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Individual Stone Block */
        .ebenezer-stone {
            height: 32px;
            flex-grow: 1; /* Allows stones to stretch and fill gaps naturally */
            cursor: pointer;
            transition: filter 0.3s ease, transform 0.2s ease;
            position: relative;
            /* 3D Bevel effect */
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 2px solid rgba(0,0,0,0.8);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.05), 0 4px 6px rgba(0,0,0,0.4);
        }

        .ebenezer-stone:hover {
            filter: brightness(1.3) drop-shadow(0 0 12px rgba(217, 119, 6, 0.6));
            transform: scale(1.02);
            z-index: 20;
        }

        /* The falling animation when a new stone is added */
        .falling-stone {
            animation: slamDown 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slamDown {
            0% { transform: translateY(-200px) scale(1.1); opacity: 0; filter: drop-shadow(0 20px 10px rgba(0,0,0,0.5)); }
            70% { transform: translateY(5px) scale(0.98); opacity: 1; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.8)); }
            85% { transform: translateY(-2px) scale(1.01); }
            100% { transform: translateY(0) scale(1); }
        }

        /* Dust Particles upon landing */
        .dust-cloud {
            position: absolute;
            bottom: 0;
            width: 8px;
            height: 8px;
            background-color: #525252;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            filter: blur(2px);
            z-index: 30;
        }
        .puff {
            animation: dustPuff 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes dustPuff {
            0% { transform: translate(0, 0) scale(0.5); opacity: 0.8; }
            100% { transform: translate(var(--tx), var(--ty)) scale(3); opacity: 0; }
        }

        /* Hover Display Card */
        .testimony-card {
            opacity: 0;
            transform: translateY(10px) scale(0.95);
            transition: all 0.3s ease;
            pointer-events: none;
            position: absolute;
            top: 20px;
            left: 50%;
            transform-origin: center;
            width: 85%;
            margin-left: -42.5%;
            z-index: 40;
        }
        
        .testimony-card.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Input Area & Buttons */
        textarea {
            background-color: #111111;
            border: 1px solid #333333;
            color: #E5E5E5;
            transition: all 0.3s ease;
            resize: none;
        }
        textarea:focus {
            outline: none;
            border-color: #D4AF37;
            background-color: #151515;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }
        textarea::placeholder { color: #525252; font-style: italic; }

        .lay-btn {
            background-color: #2D2416;
            color: #FCD34D;
            border: 1px solid #5C451A;
            transition: all 0.4s ease;
        }
        .lay-btn:hover { 
            background-color: #3d311d; 
            box-shadow: 0 0 15px rgba(217, 119, 6, 0.2);
        }
        .lay-btn:active { transform: scale(0.96); }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(0,0,0,0.6); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden bg-[#191919]">

    <div id="widgetContainer" class="widget-box relative w-full max-w-sm rounded-3xl p-6 md:p-8 flex flex-col h-[600px] overflow-hidden">
        
        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-2 shrink-0 z-20">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#737373]">@faithreflects</span>
            <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#A3A3A3] border border-[#333] bg-[#1a1a1a] flex items-center space-x-1">
                <span id="stoneCount" class="text-[#D4AF37]">0</span>
                <span>Stones</span>
            </div>
        </div>

        <h2 class="serif text-2xl text-[#EDEDED] mb-1 shrink-0 z-20">Answered Prayers</h2>
        <p class="text-[10px] text-[#8B8B8B] uppercase tracking-widest mb-6 border-b border-[#333] pb-4 w-full text-center shrink-0 z-20">"Thus far the Lord has helped us."</p>

        <!-- Hover Display Card (Shows testimony when a stone is hovered) -->
        <div id="displayCard" class="testimony-card bg-[#111111] border border-[#2d2d2d] shadow-2xl rounded-xl p-5 text-center flex flex-col items-center">
            <svg class="w-5 h-5 text-[#D4AF37] mb-2 opacity-80" fill="currentColor" viewBox="0 0 24 24"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"/></svg>
            <p id="cardDate" class="text-[9px] font-bold tracking-widest uppercase text-[#737373] mb-2">DATE</p>
            <p id="cardText" class="serif italic text-sm text-[#D4D4D4] leading-relaxed line-clamp-4">Hover over a stone in the wall to read your answered prayer.</p>
        </div>

        <!-- The Physical Wall Environment -->
        <div class="relative w-full h-48 mb-4 border-b-2 border-[#2d2d2d] bg-gradient-to-t from-[#111111] to-transparent shrink-0" id="wallEnvironment">
            
            <div class="wall-container" id="wall">
                <!-- Stones generated here -->
            </div>

            <!-- Empty State Message -->
            <div id="emptyMsg" class="absolute inset-0 flex items-center justify-center opacity-40 pointer-events-none">
                <span class="text-[10px] uppercase tracking-widest text-[#737373]">Awaiting your first stone...</span>
            </div>

        </div>

        <!-- Input Area -->
        <div class="flex-1 w-full flex flex-col min-h-0 z-20">
            <textarea id="prayerInput" placeholder="What has God done for you? Write it down to remember..." class="flex-1 w-full rounded-xl p-3 text-sm font-light leading-relaxed mb-3" autocomplete="off"></textarea>
            
            <button id="addBtn" class="lay-btn w-full py-3.5 rounded-xl text-xs font-semibold uppercase tracking-wider flex items-center justify-center space-x-2 shadow-lg shrink-0">
                <span class="text-base">🪨</span>
                <span>Lay a Stone</span>
            </button>
            
            <button id="resetTriggerBtn" class="mt-4 text-[9px] tracking-widest text-[#525252] uppercase hover:text-[#A3A3A3] transition-colors pb-1 text-center border-b border-transparent hover:border-[#333] self-center">
                Clear Wall
            </button>
        </div>

        <!-- Action Modals -->
        
        <!-- Delete Single Stone Modal -->
        <div id="deleteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#191919] rounded-2xl p-6 w-full max-w-[280px] border border-[#2d2d2d] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#EDEDED]">Remove Stone?</h3>
                <p id="deleteStoneText" class="serif italic text-[13px] text-[#A3A3A3] mb-6 leading-relaxed line-clamp-3"></p>
                <div class="flex space-x-3">
                    <button id="cancelDeleteBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#A3A3A3] hover:bg-[#262626] border border-transparent transition-colors">Cancel</button>
                    <button id="confirmDeleteBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#EF4444]/10 text-[#EF4444] border border-[#EF4444]/30 hover:bg-[#EF4444]/20 transition-colors">Remove</button>
                </div>
            </div>
        </div>

        <!-- Clear All Modal -->
        <div id="clearModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#191919] rounded-2xl p-6 w-full max-w-[260px] border border-[#2d2d2d] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#EDEDED]">Clear Entire Wall?</h3>
                <p class="text-xs text-[#8B8B8B] mb-6">This will tear down the wall and remove all answered prayers.</p>
                <div class="flex space-x-3">
                    <button id="cancelClearBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#A3A3A3] hover:bg-[#262626] border border-transparent transition-colors">Cancel</button>
                    <button id="confirmClearBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#262626] text-[#EDEDED] border border-[#333] hover:bg-[#333] transition-colors">Clear All</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Organic stone color palette for Dark Mode
        const stoneColors = [
            '#2d2d2d', '#333333', '#262626', '#2a2a2a', '#1f1f1f', '#363636'
        ];

        // State Management
        let testimonies = JSON.parse(localStorage.getItem('faithreflects_ebenezer')) || [];
        
        // Elements
        const wall = document.getElementById('wall');
        const input = document.getElementById('prayerInput');
        const countDisplay = document.getElementById('stoneCount');
        const emptyMsg = document.getElementById('emptyMsg');
        
        const displayCard = document.getElementById('displayCard');
        const cardDate = document.getElementById('cardDate');
        const cardText = document.getElementById('cardText');
        const wallEnvironment = document.getElementById('wallEnvironment');
        
        // Modal Elements
        const deleteModal = document.getElementById('deleteModal');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
        const deleteStoneText = document.getElementById('deleteStoneText');
        
        const clearModal = document.getElementById('clearModal');
        const resetTriggerBtn = document.getElementById('resetTriggerBtn');
        const cancelClearBtn = document.getElementById('cancelClearBtn');
        const confirmClearBtn = document.getElementById('confirmClearBtn');
        
        let stoneToDelete = -1;

        // Function to create a stone element with organic traits
        function createStoneElement(t, index, isNew = false) {
            const stone = document.createElement('div');
            stone.className = 'ebenezer-stone';
            
            // Seeded randomness based on timestamp so the wall rebuilds exactly the same on refresh
            const seedStr = t.timestamp.toString();
            const seed1 = parseInt(seedStr.slice(-1)); // 0-9
            const seed2 = parseInt(seedStr.slice(-2, -1)) || 5; // 0-9
            
            // Physical organic traits
            const minW = 35 + (seed1 * 4); // 35px to 71px min width
            const maxW = 60 + (seed2 * 5); // 60px to 105px max width
            const color = stoneColors[seed1 % stoneColors.length];
            
            // Rounded corners to make them look like hewn stone blocks
            const br1 = 2 + (seed1 % 4);
            const br2 = 2 + (seed2 % 4);
            const br3 = 2 + ((seed1+seed2) % 4);
            const br4 = 2 + (Math.abs(seed1-seed2) % 4);

            stone.style.minWidth = `${minW}px`;
            stone.style.maxWidth = `${maxW}px`;
            stone.style.backgroundColor = color;
            stone.style.borderRadius = `${br1}px ${br2}px ${br3}px ${br4}px`;
            
            if (isNew) {
                stone.classList.add('falling-stone');
                
                // Spawn dust particles after animation finishes (0.6s)
                setTimeout(() => {
                    spawnDust(stone);
                }, 600);
            }

            // Hover Interactions
            stone.addEventListener('mouseenter', () => {
                const dateObj = new Date(t.timestamp);
                cardDate.innerText = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                cardText.innerText = `"${t.text}"`;
                displayCard.classList.add('visible');
            });
            
            stone.addEventListener('mouseleave', () => {
                displayCard.classList.remove('visible');
            });
            
            // Click to Delete
            stone.addEventListener('click', () => {
                stoneToDelete = index;
                deleteStoneText.innerText = `"${t.text}"`;
                deleteModal.classList.remove('hidden');
                displayCard.classList.remove('visible');
            });

            return stone;
        }

        // Particle effect when a heavy stone lands
        function spawnDust(stoneElement) {
            const rect = stoneElement.getBoundingClientRect();
            const wallRect = wallEnvironment.getBoundingClientRect();
            
            // Calculate center bottom of the stone
            const x = (rect.left - wallRect.left) + (rect.width / 2);
            const y = (rect.bottom - wallRect.top);

            for (let i = 0; i < 5; i++) {
                const dust = document.createElement('div');
                dust.className = 'dust-cloud puff';
                
                dust.style.left = `${x}px`;
                dust.style.top = `${y - 4}px`;
                
                // Random outward trajectory
                const angle = Math.random() * Math.PI; // Upper half
                const dist = 10 + Math.random() * 20;
                
                dust.style.setProperty('--tx', `${Math.cos(angle) * dist}px`);
                dust.style.setProperty('--ty', `-${Math.sin(angle) * dist}px`);
                
                wallEnvironment.appendChild(dust);
                
                setTimeout(() => {
                    if (wallEnvironment.contains(dust)) dust.remove();
                }, 800);
            }
        }

        function renderWall(animateLast = false) {
            wall.innerHTML = '';
            countDisplay.innerText = testimonies.length;

            if (testimonies.length > 0) emptyMsg.classList.add('hidden');
            else emptyMsg.classList.remove('hidden');

            testimonies.forEach((t, index) => {
                const isNew = animateLast && (index === testimonies.length - 1);
                const stone = createStoneElement(t, index, isNew);
                wall.appendChild(stone);
            });
            
            // Auto-scroll to bottom of wall (which is the top physically due to column-reverse)
            if (animateLast) {
                wall.scrollTop = wall.scrollHeight;
            }
        }

        // Add Stone
        document.getElementById('addBtn').addEventListener('click', () => {
            const text = input.value.trim();
            if (text) {
                testimonies.push({
                    text: text,
                    timestamp: Date.now()
                });
                localStorage.setItem('faithreflects_ebenezer', JSON.stringify(testimonies));
                
                input.value = '';
                
                // Button feedback
                const btn = document.getElementById('addBtn');
                btn.style.transform = 'scale(0.95)';
                setTimeout(() => btn.style.transform = 'scale(1)', 150);

                renderWall(true);
            } else {
                input.focus();
            }
        });

        // Enter key support
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('addBtn').click();
            }
        });

        // Delete Single
        cancelDeleteBtn.addEventListener('click', () => {
            deleteModal.classList.add('hidden');
            stoneToDelete = -1;
        });
        
        confirmDeleteBtn.addEventListener('click', () => {
            if (stoneToDelete > -1) {
                testimonies.splice(stoneToDelete, 1);
                localStorage.setItem('faithreflects_ebenezer', JSON.stringify(testimonies));
                renderWall(); // Re-render without animation
            }
            deleteModal.classList.add('hidden');
            stoneToDelete = -1;
        });

        // Clear All
        resetTriggerBtn.addEventListener('click', () => clearModal.classList.remove('hidden'));
        cancelClearBtn.addEventListener('click', () => clearModal.classList.add('hidden'));
        
        confirmClearBtn.addEventListener('click', () => {
            testimonies = [];
            localStorage.setItem('faithreflects_ebenezer', JSON.stringify(testimonies));
            renderWall();
            clearModal.classList.add('hidden');
        });

        // Initial render
        renderWall();
    </script>
</body>
</html>
