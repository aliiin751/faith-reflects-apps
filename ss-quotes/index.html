<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Quotes Carousel</title>
    <!-- Importing Playfair Display for the quotes and Inter for the author/branding -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Notion Light Theme Native Colors */
            --bg-color: transparent; 
            --text-main: #37352f; /* Native Notion primary text */
            --text-muted: #787774; /* Native Notion secondary text */
            --brand-warm: #d4a373; /* FaithReflects Warm Tone */
            --quote-mark-bg: rgba(212, 163, 115, 0.12); /* Very faint warm gold for background */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Prevent scrollbars in Notion embeds */
        }

        .widget-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 260px;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 320px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 160px;
            margin-bottom: 20px;
        }

        /* Large decorative background quote mark */
        .big-quote-mark {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            color: var(--quote-mark-bg);
            line-height: 1;
            z-index: 1;
            pointer-events: none;
            user-select: none;
        }

        /* The actual text container */
        .quote-content {
            position: relative;
            z-index: 10;
            transition: opacity 1.5s ease-in-out;
            opacity: 0; /* Starts hidden to allow fade-in */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .quote-content.visible {
            opacity: 1;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--text-main);
            margin: 0;
            font-weight: 500;
            font-style: italic;
            line-height: 1.5;
        }

        .quote-author {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
            margin: 0;
        }

        /* Brand Tag Styling */
        .brand-tag {
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            color: #b5b3ad;
            letter-spacing: 0.8px;
            text-decoration: none;
            transition: color 0.3s ease;
            position: absolute;
            bottom: 10px;
        }

        .brand-tag:hover {
            color: var(--brand-warm);
        }
    </style>
</head>
<body>

    <div class="widget-wrapper">
        <div class="carousel-container">
            <div class="big-quote-mark">“</div>
            <div class="quote-content" id="quote-container">
                <p class="quote-text" id="quote-text">Loading...</p>
                <p class="quote-author" id="quote-author"></p>
            </div>
        </div>

        <a href="https://www.instagram.com/faithreflects/" target="_blank" class="brand-tag">@faithreflects</a>
    </div>

    <script>
        // Array of powerful, classic Christian quotes perfectly suited for a sermon/application board
        const quotes = [
            { text: "Relying on God has to begin all over again every day as if nothing had yet been done.", author: "C.S. Lewis" },
            { text: "Faith does not eliminate questions. But faith knows where to take them.", author: "Elisabeth Elliot" },
            { text: "To be a Christian without prayer is no more possible than to be alive without breathing.", author: "Martin Luther" },
            { text: "He is no fool who gives what he cannot keep to gain that which he cannot lose.", author: "Jim Elliot" },
            { text: "Worry does not empty tomorrow of its sorrow, it empties today of its strength.", author: "Corrie ten Boom" },
            { text: "God does not give us everything we want, but He does fulfill His promises.", author: "Dietrich Bonhoeffer" },
            { text: "Continuous effort—not strength or intelligence—is the key to unlocking our potential.", author: "Liane Cardes" } // Can be swapped for any sermon quote
        ];

        let currentQuoteIndex = 0;
        const quoteContainer = document.getElementById('quote-container');
        const quoteText = document.getElementById('quote-text');
        const quoteAuthor = document.getElementById('quote-author');

        function changeQuote() {
            // 1. Fade out the current quote
            quoteContainer.classList.remove('visible');

            // 2. Wait for fade out to complete, then swap text
            setTimeout(() => {
                const currentQuote = quotes[currentQuoteIndex];
                
                // Add quotes manually to the text so they look stylish
                quoteText.innerHTML = `"${currentQuote.text}"`;
                quoteAuthor.innerHTML = `— ${currentQuote.author}`;

                // 3. Fade back in
                quoteContainer.classList.add('visible');

                // Move to the next quote, looping back to the start if needed
                currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
            }, 1500); // 1.5 seconds matches the CSS transition time
        }

        // Initialize the widget
        document.addEventListener('DOMContentLoaded', () => {
            // Load the first quote immediately (invisible)
            const currentQuote = quotes[currentQuoteIndex];
            quoteText.innerHTML = `"${currentQuote.text}"`;
            quoteAuthor.innerHTML = `— ${currentQuote.author}`;
            
            // Trigger the fade in shortly after load
            setTimeout(() => {
                quoteContainer.classList.add('visible');
                currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
            }, 500);

            // Change quote every 10 seconds (1500ms fade out + 1500ms fade in + 7000ms display time)
            setInterval(changeQuote, 10000);
        });
    </script>
</body>
</html>
