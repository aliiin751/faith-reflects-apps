<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Insight Lantern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: transparent; color: #37352f; }
        .serif { font-family: 'Playfair Display', serif; }

        /* Lantern Flame Animation */
        .flame {
            transform-origin: 50% 100%;
            animation: flicker 3s ease-in-out infinite alternate;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        .lantern.is-lit .flame { opacity: 1; }

        @keyframes flicker {
            0% { transform: scale(1) rotate(-2deg); filter: drop-shadow(0 0 10px rgba(252, 211, 77, 0.4)); }
            50% { transform: scale(1.05) rotate(2deg); filter: drop-shadow(0 0 20px rgba(252, 211, 77, 0.8)); }
            100% { transform: scale(0.95) rotate(-1deg); filter: drop-shadow(0 0 15px rgba(252, 211, 77, 0.6)); }
        }

        /* Ambient Glow */
        .ambient-glow {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(252, 211, 77, 0.15) 0%, rgba(255,255,255,0) 70%);
            opacity: 0;
            transition: opacity 2s ease;
            pointer-events: none;
            z-index: 0;
        }
        .lantern.is-lit ~ .ambient-glow { opacity: 1; }

        /* Sparks */
        .spark {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: #FCD34D;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 6px #FCD34D;
            animation: fly-spark 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 10;
        }
        @keyframes fly-spark {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* Input styling */
        textarea {
            transition: all 0.3s ease;
            resize: none;
        }
        textarea:focus {
            background-color: #fff;
            border-color: #D4AF37;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div class="relative w-full max-w-sm bg-white rounded-3xl p-8 border border-[#e9e9e7] shadow-[0_8px_30px_rgb(0,0,0,0.03)] flex flex-col items-center min-h-[500px]">
        
        <div class="ambient-glow"></div>

        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-6 z-10">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#a3b8ac]">@faithreflects</span>
            <button id="clearBtn" class="text-[10px] tracking-widest text-gray-400 uppercase hover:text-gray-700 transition-colors">
                Clear
            </button>
        </div>

        <h2 class="serif text-2xl text-[#37352f] mb-1 z-10">Golden Insight</h2>
        <p class="text-xs text-gray-400 italic mb-8 z-10">"Thy word is a lamp unto my feet."</p>

        <!-- Lantern SVG container -->
        <div class="relative w-32 h-40 mb-6 lantern z-10" id="lanternGroup">
            <!-- Sparks container -->
            <div id="sparksContainer" class="absolute inset-0 z-20 overflow-visible"></div>

            <svg viewBox="0 0 100 140" class="w-full h-full overflow-visible">
                <!-- Lantern Ring/Handle -->
                <path d="M50 10 C40 10, 35 20, 35 25" stroke="#8c8a82" stroke-width="3" fill="none" stroke-linecap="round"/>
                <path d="M50 10 C60 10, 65 20, 65 25" stroke="#8c8a82" stroke-width="3" fill="none" stroke-linecap="round"/>
                <circle cx="50" cy="10" r="4" fill="none" stroke="#8c8a82" stroke-width="2"/>
                
                <!-- Lantern Top Hood -->
                <path d="M30 40 L70 40 L60 25 L40 25 Z" fill="#4a4843"/>
                <rect x="25" y="40" width="50" height="4" rx="2" fill="#37352f"/>
                
                <!-- Glass Body -->
                <path d="M30 44 L70 44 L65 95 L35 95 Z" fill="rgba(247, 246, 243, 0.6)" stroke="#e9e9e7" stroke-width="1"/>
                <!-- Metal framing lines -->
                <line x1="50" y1="44" x2="50" y2="95" stroke="#37352f" stroke-width="1" opacity="0.3"/>
                <line x1="38" y1="44" x2="43" y2="95" stroke="#37352f" stroke-width="1" opacity="0.3"/>
                <line x1="62" y1="44" x2="57" y2="95" stroke="#37352f" stroke-width="1" opacity="0.3"/>

                <!-- Base -->
                <rect x="30" y="95" width="40" height="6" rx="1" fill="#37352f"/>
                <path d="M30 101 L70 101 L75 115 L25 115 Z" fill="#4a4843"/>
                <rect x="20" y="115" width="60" height="5" rx="2" fill="#37352f"/>

                <!-- Inner Candle -->
                <rect x="44" y="70" width="12" height="25" fill="#fcfbf9" rx="2"/>
                <line x1="50" y1="70" x2="50" y2="66" stroke="#555" stroke-width="1.5"/>

                <!-- The Flame -->
                <path class="flame" d="M50 48 C50 48, 43 58, 43 64 C43 68, 46 71, 50 71 C54 71, 57 68, 57 64 C57 58, 50 48, 50 48 Z" fill="url(#flameGrad)"/>

                <defs>
                    <linearGradient id="flameGrad" x1="50" y1="48" x2="50" y2="71" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#FEF3C7"/>
                        <stop offset="40%" stop-color="#FCD34D"/>
                        <stop offset="100%" stop-color="#D97706"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <!-- Input Area -->
        <div class="w-full flex-1 flex flex-col z-10">
            <textarea id="insightText" placeholder="What stood out to you this week? Type your revelation here..." class="w-full flex-1 p-4 bg-[#fdfdfc] border border-[#e9e9e7] rounded-2xl text-sm leading-relaxed text-[#5a5852] focus:outline-none placeholder-gray-300"></textarea>
            
            <button id="saveBtn" class="mt-4 w-full bg-[#f7f6f3] text-[#37352f] border border-[#e9e9e7] py-3.5 rounded-2xl text-xs font-semibold uppercase tracking-wider hover:bg-[#efede8] transition-all flex items-center justify-center space-x-2">
                <span>Light the Lantern</span>
            </button>
        </div>

        <!-- Custom Clear Confirmation Modal -->
        <div id="clearModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-white/60 backdrop-blur-sm transition-opacity">
            <div class="bg-white rounded-2xl p-6 w-full max-w-[260px] border border-[#e9e9e7] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#37352f]">Extinguish Lantern?</h3>
                <p class="text-xs text-gray-400 mb-6">This will clear your current insight.</p>
                <div class="flex space-x-3">
                    <button id="cancelClearBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-gray-500 hover:bg-gray-50 border border-transparent hover:border-gray-200 transition-colors">Cancel</button>
                    <button id="confirmClearBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#37352f] text-white hover:bg-black transition-colors">Clear</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const lanternGroup = document.getElementById('lanternGroup');
        const sparksContainer = document.getElementById('sparksContainer');
        const insightText = document.getElementById('insightText');
        const saveBtn = document.getElementById('saveBtn');
        const clearBtn = document.getElementById('clearBtn');
        const clearModal = document.getElementById('clearModal');
        const cancelClearBtn = document.getElementById('cancelClearBtn');
        const confirmClearBtn = document.getElementById('confirmClearBtn');

        // State
        let state = JSON.parse(localStorage.getItem('faithreflects_lantern')) || { text: '', isLit: false };

        // Initialize from state
        if (state.text) insightText.value = state.text;
        if (state.isLit) {
            lanternGroup.classList.add('is-lit');
            saveBtn.innerHTML = '<span>Update Insight</span>';
        }

        // Spark Effect Generator
        function createSpark() {
            // Don't spark if already lit
            if(state.isLit) return; 

            const spark = document.createElement('div');
            spark.className = 'spark';
            
            // Start roughly at the candle wick
            spark.style.left = '50%';
            spark.style.top = '50%';
            
            // Random trajectory
            const angle = Math.random() * Math.PI * 2;
            const distance = 30 + Math.random() * 40;
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance - 20; // Bias upwards
            
            spark.style.setProperty('--tx', `${tx}px`);
            spark.style.setProperty('--ty', `${ty}px`);
            
            sparksContainer.appendChild(spark);
            
            setTimeout(() => {
                if (sparksContainer.contains(spark)) spark.remove();
            }, 1000);
        }

        // Emit sparks while typing
        insightText.addEventListener('input', () => {
            if (!state.isLit && Math.random() > 0.5) { // Spark randomly
                createSpark();
            }
        });

        // Save and Light
        saveBtn.addEventListener('click', () => {
            const text = insightText.value.trim();
            if (text) {
                state = { text: text, isLit: true };
                localStorage.setItem('faithreflects_lantern', JSON.stringify(state));
                
                lanternGroup.classList.add('is-lit');
                saveBtn.innerHTML = '<span>Update Insight</span>';
                
                // Add a burst of sparks on save
                for(let i=0; i<15; i++) {
                    setTimeout(createSpark, i * 50);
                }
                
                // Button click feedback
            saveBtn.style.transform = 'scale(0.97)';
            setTimeout(() => saveBtn.style.transform = 'scale(1)', 150);
        }
    });

    // Clear triggers modal
    clearBtn.addEventListener('click', () => {
        clearModal.classList.remove('hidden');
    });

    // Cancel clear
    cancelClearBtn.addEventListener('click', () => {
        clearModal.classList.add('hidden');
    });

    // Confirm clear
    confirmClearBtn.addEventListener('click', () => {
        clearModal.classList.add('hidden');
        state = { text: '', isLit: false };
        localStorage.setItem('faithreflects_lantern', JSON.stringify(state));
        
        insightText.value = '';
        lanternGroup.classList.remove('is-lit');
        saveBtn.innerHTML = '<span>Light the Lantern</span>';
    });
</script>
</body>
</html>
