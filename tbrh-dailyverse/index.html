<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Verse — FaithReflects</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #F5F0E8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .widget {
    width: 100%;
    max-width: 800px;
    padding: 36px 44px 28px;
    text-align: center;
    position: relative;
    background: linear-gradient(135deg, #F5F0E8 0%, #F0EBE0 40%, #EDE5D5 100%);
  }

  /* Subtle parchment texture overlay */
  .widget::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(212,168,83,0.015) 2px,
      rgba(212,168,83,0.015) 4px
    );
    pointer-events: none;
  }

  /* Decorative top ornament */
  .ornament {
    font-size: 14px;
    color: #D4A853;
    letter-spacing: 8px;
    margin-bottom: 20px;
    opacity: 0.6;
  }

  /* Verse */
  .verse-container {
    animation: fadeInUp 1.2s ease forwards;
  }

  .verse-text {
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    font-style: italic;
    font-weight: 400;
    color: #3D2B1F;
    line-height: 1.65;
    max-width: 620px;
    margin: 0 auto;
    opacity: 0;
    animation: fadeInUp 1s ease 0.2s forwards;
  }

  .verse-ref {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: #D4A853;
    margin-top: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeInUp 1s ease 0.5s forwards;
  }

  /* Divider line */
  .divider {
    width: 40px;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, #D4A853, transparent);
    margin: 18px auto 14px;
    opacity: 0;
    animation: fadeInUp 1s ease 0.7s forwards;
  }

  /* Navigation */
  .nav-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    opacity: 0;
    animation: fadeInUp 1s ease 0.9s forwards;
  }

  .nav-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1.5px solid #D4C9B0;
    background: transparent;
    color: #A0937D;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
  }

  .nav-btn:hover {
    border-color: #D4A853;
    color: #D4A853;
    background: rgba(212,168,83,0.06);
  }

  .day-label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    color: #A0937D;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Watermark */
  .watermark {
    position: absolute;
    bottom: 8px;
    right: 16px;
    font-family: 'Playfair Display', serif;
    font-size: 9px;
    color: #D4C9B0;
    letter-spacing: 1.5px;
  }

  /* Animations */
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .fade-out {
    opacity: 0 !important;
    transform: translateY(-8px) !important;
    transition: all 0.4s ease !important;
  }

  .fade-in {
    animation: fadeInUp 0.6s ease forwards !important;
  }

  /* Responsive */
  @media (max-width: 580px) {
    .widget { padding: 28px 24px 22px; }
    .verse-text { font-size: 16px; }
  }
</style>
</head>

  function getDayOfYear() {
    const now = new Date();
    const start = new Date(now.getFullYear(), 0, 0);
    const diff = now - start;
    const oneDay = 1000 * 60 * 60 * 24;
    return Math.floor(diff / oneDay);
  }

  let currentIndex = getDayOfYear() % verses.length;
  const verseText = document.getElementById('verseText');
  const verseRef = document.getElementById('verseRef');
  const dayLabel = document.getElementById('dayLabel');

  function showVerse(animate) {
    const v = verses[currentIndex];
    if (animate) {
      verseText.classList.add('fade-out');
      verseRef.classList.add('fade-out');
      setTimeout(() => {
        verseText.innerHTML = '\u201c' + v.t + '\u201d';
        verseRef.textContent = v.r;
        dayLabel.textContent = 'Day ' + (currentIndex + 1) + ' of ' + verses.length;
        verseText.classList.remove('fade-out');
        verseRef.classList.remove('fade-out');
        verseText.classList.add('fade-in');
        verseRef.classList.add('fade-in');
        setTimeout(() => {
          verseText.classList.remove('fade-in');
          verseRef.classList.remove('fade-in');
        }, 700);
      }, 400);
    } else {
      verseText.innerHTML = '\u201c' + v.t + '\u201d';
      verseRef.textContent = v.r;
      dayLabel.textContent = 'Day ' + (currentIndex + 1) + ' of ' + verses.length;
    }
  }

  document.getElementById('prevBtn').addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + verses.length) % verses.length;
    showVerse(true);
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % verses.length;
    showVerse(true);
  });

  showVerse(false);
</script>
