<!DOCTYPE html>
<html lang="en" class="bg-[#191919]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Surrender Firepit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        /* Notion Dark Mode Base - Forced completely */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: #191919 !important; 
            color: #D4D4D4; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        .widget-box {
            background-color: #191919; 
            border: 1px solid #2d2d2d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: all 1.5s ease;
        }

        .widget-box.is-surrendered {
            border-color: rgba(217, 119, 6, 0.15);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 50px rgba(217, 119, 6, 0.05);
        }

        /* Input Styling */
        textarea {
            background-color: #222222;
            border: 1px solid #333333;
            transition: all 0.3s ease;
            resize: none;
            color: #E5E5E5;
        }
        textarea:focus {
            outline: none;
            border-color: #D4AF37;
            background-color: #262626;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }
        textarea::placeholder { color: #525252; font-style: italic; }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Button Styling */
        .surrender-btn {
            background-color: #262626;
            color: #A3A3A3;
            border: 1px solid #333333;
            transition: all 0.4s ease;
        }
        .surrender-btn:hover { 
            background-color: #2D2416; 
            color: #FCD34D; 
            border-color: #5C451A; 
            box-shadow: 0 0 20px rgba(217, 119, 6, 0.2);
        }
        .surrender-btn:active { transform: scale(0.96); }

        /* Flame Animations */
        .flame-base {
            transform-origin: 50% 100%;
            animation: flicker-slow 3s infinite alternate ease-in-out;
            transition: transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1), filter 1.5s ease;
        }
        .flame-mid {
            transform-origin: 50% 100%;
            animation: flicker-fast 2s infinite alternate ease-in-out 0.5s;
            transition: transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .flame-core {
            transform-origin: 50% 100%;
            animation: flicker-fast 1.5s infinite alternate ease-in-out 1s;
            transition: transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes flicker-slow {
            0% { transform: scaleY(1) rotate(-2deg); }
            100% { transform: scaleY(1.05) rotate(2deg); }
        }
        @keyframes flicker-fast {
            0% { transform: scaleY(0.95) scaleX(1.02) rotate(1deg); }
            100% { transform: scaleY(1.05) scaleX(0.98) rotate(-1deg); }
        }

        /* Surged Fire State (When Clicked) */
        .is-surrendered .flame-base { transform: scaleY(1.8) scaleX(1.3); filter: drop-shadow(0 0 25px rgba(245, 158, 11, 0.6)); }
        .is-surrendered .flame-mid { transform: scaleY(2) scaleX(1.2); }
        .is-surrendered .flame-core { transform: scaleY(1.6) scaleX(1.1); }
        
        .ambient-fire-glow {
            position: absolute;
            bottom: 20%;
            right: 20%;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(217, 119, 6, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transition: all 1.5s ease;
            transform: translate(50%, 50%) scale(1);
        }
        .is-surrendered .ambient-fire-glow {
            background: radial-gradient(circle, rgba(245, 158, 11, 0.25) 0%, transparent 70%);
            transform: translate(50%, 50%) scale(1.5);
        }

        /* UI State Transitions */
        .fade-out {
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .fade-in {
            opacity: 1 !important;
            transform: translateY(0) !important;
            pointer-events: auto !important;
        }

        #successMessage {
            opacity: 0;
            transform: translateY(10px);
            transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s; /* Delayed appearance */
            pointer-events: none;
        }

        /* Flying Embers Physics */
        .ember {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 30;
            animation: wind-blow 2.5s cubic-bezier(0.25, 1, 0.3, 1) forwards;
        }
        .ember.gold { background-color: #FCD34D; box-shadow: 0 0 10px #F59E0B; }
        .ember.orange { background-color: #F59E0B; box-shadow: 0 0 12px #D97706; }
        .ember.red { background-color: #D97706; box-shadow: 0 0 8px #B45309; }

        @keyframes wind-blow {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            30% { opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden bg-[#191919]">

    <!-- Forced Landscape Container -->
    <div id="widgetContainer" class="widget-box relative w-full max-w-2xl rounded-3xl p-6 flex flex-row items-center h-[260px] overflow-hidden gap-4">
        
        <div class="ambient-fire-glow"></div>

        <!-- Left Side: Input Area (55%) -->
        <div class="w-[55%] relative z-20 flex flex-col justify-center h-full pl-2">
            
            <div id="inputSection" class="w-full flex flex-col h-full justify-center">
                <span class="text-[9px] tracking-[0.2em] uppercase font-bold text-[#737373] mb-1">Daily Surrender</span>
                <h2 class="serif text-xl text-[#EDEDED] mb-1 leading-tight">Release to the Fire</h2>
                <p class="text-[10px] text-[#8B8B8B] italic mb-3">"Cast all your anxiety on Him."</p>
                
                <textarea id="surrenderInput" rows="2" placeholder="Lord, today I am releasing..." class="w-full flex-1 min-h-[60px] rounded-xl p-3 text-xs font-light mb-3 custom-scrollbar" autocomplete="off"></textarea>
                
                <button id="surrenderBtn" class="surrender-btn w-full py-2.5 rounded-xl text-xs font-semibold uppercase tracking-wider flex items-center justify-center space-x-2 shadow-lg shrink-0 mt-auto">
                    <span class="text-sm">🔥</span>
                    <span>Surrender</span>
                </button>
            </div>

            <!-- Hidden Success Message -->
            <div id="successMessage" class="absolute inset-0 flex flex-col justify-center items-start w-full h-full pl-2">
                <span class="text-2xl mb-2">🕊️</span>
                <h3 class="serif italic text-[#D4AF37] text-xl mb-1 leading-tight">It is in His hands.</h3>
                <p class="text-[11px] text-[#A3A3A3] mb-5">Your burden has been released.</p>
                
                <button id="resetBtn" class="text-[9px] tracking-widest text-[#525252] uppercase hover:text-[#A3A3A3] transition-colors border-b border-[#333] pb-0.5 mt-auto">
                    Offer another burden
                </button>
            </div>

        </div>

        <!-- Right Side: The Visual Firepit (45%) -->
        <div class="w-[45%] h-full relative z-10 flex items-end justify-center pr-2" id="firepitArea">
            <svg viewBox="0 0 300 220" class="w-full h-full overflow-visible">
                
                <!-- Back Stones -->
                <path d="M 100 190 C 100 170, 120 160, 150 160 C 180 160, 200 170, 200 190" fill="#1A1A1A" stroke="#222" stroke-width="2"/>
                <circle cx="120" cy="175" r="12" fill="#262626"/>
                <circle cx="150" cy="170" r="15" fill="#222222"/>
                <circle cx="180" cy="175" r="12" fill="#262626"/>

                <!-- Fire Group -->
                <g id="fire-flames">
                    <!-- Base Orange Flame -->
                    <path class="flame-base" d="M 110 180 C 110 180, 90 100, 150 70 C 210 100, 190 180, 190 180 Z" fill="url(#gradOrange)"/>
                    <!-- Mid Yellow Flame -->
                    <path class="flame-mid" d="M 125 180 C 125 180, 115 120, 150 90 C 185 120, 175 180, 175 180 Z" fill="url(#gradYellow)"/>
                    <!-- Core White Flame -->
                    <path class="flame-core" d="M 135 180 C 135 180, 130 140, 150 120 C 170 140, 165 180, 165 180 Z" fill="url(#gradWhite)"/>
                </g>

                <!-- Logs -->
                <path d="M 110 195 L 180 175 L 190 185 L 120 205 Z" fill="#3A2411" stroke="#1A0F05" stroke-width="2"/>
                <path d="M 185 195 L 115 175 L 105 185 L 175 205 Z" fill="#2D1A0A" stroke="#1A0F05" stroke-width="2"/>
                <!-- Glowing log embers -->
                <ellipse cx="140" cy="185" rx="8" ry="3" fill="#D97706" filter="blur(1px)"/>
                <ellipse cx="160" cy="190" rx="6" ry="2" fill="#F59E0B" filter="blur(1px)"/>

                <!-- Front Stones -->
                <circle cx="95" cy="195" r="14" fill="#2A2A2A" stroke="#1A1A1A" stroke-width="2"/>
                <circle cx="125" cy="205" r="16" fill="#333333" stroke="#222" stroke-width="2"/>
                <circle cx="150" cy="210" r="18" fill="#262626" stroke="#111" stroke-width="2"/>
                <circle cx="175" cy="205" r="15" fill="#2A2A2A" stroke="#1A1A1A" stroke-width="2"/>
                <circle cx="205" cy="195" r="14" fill="#333333" stroke="#222" stroke-width="2"/>

                <defs>
                    <linearGradient id="gradOrange" x1="0" y1="1" x2="0" y2="0">
                        <stop offset="0%" stop-color="#B45309"/>
                        <stop offset="100%" stop-color="#EA580C"/>
                    </linearGradient>
                    <linearGradient id="gradYellow" x1="0" y1="1" x2="0" y2="0">
                        <stop offset="0%" stop-color="#D97706"/>
                        <stop offset="100%" stop-color="#FCD34D"/>
                    </linearGradient>
                    <linearGradient id="gradWhite" x1="0" y1="1" x2="0" y2="0">
                        <stop offset="0%" stop-color="#F59E0B"/>
                        <stop offset="100%" stop-color="#FFFBEB"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <!-- Embers Container (Overlay over entire widget) -->
        <div id="embersContainer" class="absolute inset-0 pointer-events-none z-30 overflow-hidden"></div>

    </div>

    <script>
        const container = document.getElementById('widgetContainer');
        const inputSection = document.getElementById('inputSection');
        const surrenderInput = document.getElementById('surrenderInput');
        const surrenderBtn = document.getElementById('surrenderBtn');
        const successMessage = document.getElementById('successMessage');
        const resetBtn = document.getElementById('resetBtn');
        const embersContainer = document.getElementById('embersContainer');
        const firepitArea = document.getElementById('firepitArea');

        // Check if already surrendered today
        const today = new Date().toDateString();
        let lastSurrender = localStorage.getItem('faithreflects_lofi_surrender');

        if (lastSurrender === today) {
            showSuccessState(false); 
        }

        // Cinematic Wind/Ember Physics
        function createEmbers() {
            // Get position of the firepit to spawn embers
            const fireRect = firepitArea.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            
            // Fire origin point
            const originX = (fireRect.left - containerRect.left) + (fireRect.width / 2);
            const originY = (fireRect.top - containerRect.top) + (fireRect.height * 0.8);
            
            // Generate a blast of 40 embers
            for(let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const ember = document.createElement('div');
                    
                    // Colors
                    const rand = Math.random();
                    let colorClass = 'gold';
                    if (rand > 0.5) colorClass = 'orange';
                    if (rand > 0.8) colorClass = 'red';
                    
                    ember.className = `ember ${colorClass}`;
                    
                    // Start in the fire
                    ember.style.left = `${originX + (Math.random() * 40 - 20)}px`;
                    ember.style.top = `${originY}px`;
                    
                    // Wind blows them up and heavily to the LEFT (across the text)
                    const travelX = -(Math.random() * 250 + 50); // Fly left 50px to 300px
                    const travelY = -(Math.random() * 150 + 50); // Fly up 50px to 200px
                    
                    ember.style.setProperty('--tx', `${travelX}px`);
                    ember.style.setProperty('--ty', `${travelY}px`);
                    
                    embersContainer.appendChild(ember);
                    
                    // Cleanup
                    setTimeout(() => {
                        if (embersContainer.contains(ember)) ember.remove();
                    }, 2500);
                }, i * 25); // Rapid fire staggered spawn
            }
        }

        function showSuccessState(animate = true) {
            container.classList.add('is-surrendered');
            
            if (animate) {
                inputSection.classList.add('fade-out');
                successMessage.classList.add('fade-in');
            } else {
                // Instant state load
                inputSection.style.display = 'none';
                successMessage.style.opacity = '1';
                successMessage.style.transform = 'translateY(0)';
                successMessage.classList.remove('pointer-events-none');
            }
        }

        surrenderBtn.addEventListener('click', () => {
            if (surrenderInput.value.trim() === '') {
                surrenderInput.focus();
                return;
            }

            // 1. Save
            localStorage.setItem('faithreflects_lofi_surrender', today);

            // 2. Visuals
            surrenderBtn.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                createEmbers();
                showSuccessState(true);
            }, 150);
        });

        // Reset
        resetBtn.addEventListener('click', () => {
            localStorage.removeItem('faithreflects_lofi_surrender');
            
            container.classList.remove('is-surrendered');
            inputSection.classList.remove('fade-out');
            successMessage.classList.remove('fade-in');
            
            inputSection.style.display = '';
            successMessage.style.opacity = '0';
            successMessage.style.transform = 'translateY(10px)';
            successMessage.classList.add('pointer-events-none');
            
            surrenderInput.value = '';
        });

    </script>
</body>
</html>
