<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Legacy Vault Seals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        /* Sovereign Light Mode Base */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: transparent; 
            color: #37352f; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        /* The Widget Container */
        .widget-box {
            background-color: #FCFBF9; /* Ivory Parchment */
            border: 1px solid #E9E5DC;
            box-shadow: 0 8px 30px rgba(0,0,0,0.03), inset 0 0 20px rgba(255,255,255,0.5);
            transition: all 1.5s ease;
        }

        /* Ambient Glow */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Scrollable Gallery */
        .vault-gallery {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 1.5rem;
            padding: 1rem 2rem 2rem 2rem;
            scroll-behavior: smooth;
            /* Firefox */
            scrollbar-width: thin; 
            scrollbar-color: #E9E5DC transparent;
        }
        
        /* Chrome, Edge, Safari */
        .vault-gallery::-webkit-scrollbar { height: 8px; }
        .vault-gallery::-webkit-scrollbar-track { background: transparent; margin: 0 2rem; }
        .vault-gallery::-webkit-scrollbar-thumb { background: #E9E5DC; border-radius: 4px; cursor: pointer; }
        .vault-gallery::-webkit-scrollbar-thumb:hover { background: #D4AF37; }

        /* Parchment Certificate Card */
        .legacy-card {
            flex: 0 0 220px;
            height: 310px;
            scroll-snap-align: center;
            background: #FFFFFF;
            border: 1px solid #E9E5DC;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05), inset 0 0 40px rgba(233, 229, 220, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        /* Inner decorative border */
        .legacy-card::before {
            content: '';
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            pointer-events: none;
            z-index: 10;
        }

        .legacy-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.08), inset 0 0 40px rgba(233, 229, 220, 0.3);
            border-color: #D4AF37;
        }

        .legacy-card.is-sealed {
            background: #FCFBF9;
            border-color: #D4AF37;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.15), inset 0 0 40px rgba(212, 175, 55, 0.05);
        }
        .legacy-card.is-sealed::before {
            border-color: rgba(212, 175, 55, 0.4);
        }

        /* Seal Interaction Area */
        .seal-target {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px dashed #DCD7CA;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            z-index: 20;
        }
        .seal-target:hover {
            border-color: #D4AF37;
            background-color: rgba(212, 175, 55, 0.05);
            transform: scale(1.05);
        }
        .seal-target span {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #A39F96;
            transition: color 0.3s ease;
        }
        .seal-target:hover span {
            color: #B48025;
        }

        /* SVG Wax Seal Animation */
        .wax-seal {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            margin-top: -50px;
            margin-left: -50px;
            pointer-events: none;
            opacity: 0;
            transform: scale(3);
            z-index: 30;
        }

        .legacy-card.is-sealed .wax-seal {
            opacity: 1;
            transform: scale(1);
            filter: drop-shadow(0 6px 8px rgba(153, 27, 27, 0.4));
        }

        .legacy-card.animating .wax-seal {
            animation: slamSeal 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slamSeal {
            0% { transform: scale(3); opacity: 0; filter: drop-shadow(0 20px 20px rgba(0,0,0,0.5)); }
            60% { transform: scale(0.9); opacity: 1; filter: drop-shadow(0 2px 2px rgba(153, 27, 27, 0.8)); }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; filter: drop-shadow(0 6px 8px rgba(153, 27, 27, 0.4)); }
        }

        /* Splatter Particles */
        .wax-drop {
            position: absolute;
            border-radius: 50%;
            background-color: #991B1B;
            pointer-events: none;
            z-index: 25;
            opacity: 0;
        }
        .legacy-card.animating .wax-drop {
            animation: splatter 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards 0.1s;
        }
        @keyframes splatter {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* Card Actions (Edit & Delete) */
        .card-actions {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 40;
        }
        .legacy-card:hover .card-actions { opacity: 1; }
        .action-icon-btn {
            color: #A39F96;
            transition: color 0.2s ease, transform 0.2s ease;
        }
        .action-icon-btn:hover { transform: scale(1.1); }
        .action-icon-btn.edit:hover { color: #D4AF37; }
        .action-icon-btn.delete:hover { color: #EF4444; }

        /* Add Card Button */
        .add-card {
            flex: 0 0 220px;
            height: 310px;
            scroll-snap-align: center;
            background: transparent;
            border: 2px dashed #E9E5DC;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .add-card:hover {
            border-color: #D4AF37;
            background-color: rgba(212, 175, 55, 0.05);
        }

        /* Text Utilities */
        .text-dimmed { color: #A39F96; }
        .is-sealed .text-dimmed { color: #B48025; }

        /* Inputs & Modals */
        input[type="text"], input[type="number"] {
            background-color: #FFFFFF;
            border: 1px solid #E9E5DC;
            color: #37352f;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }
        input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1), inset 0 2px 4px rgba(0,0,0,0.01);
        }
        
        .btn-primary {
            background-color: #37352f;
            color: #FFFFFF;
            transition: all 0.4s ease;
        }
        .btn-primary:hover { background-color: #000000; box-shadow: 0 4px 10px rgba(0,0,0,0.15); transform: translateY(-2px); }
        .btn-primary:active { transform: translateY(1px) scale(0.98); }

        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(255,255,255,0.8); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div id="widgetContainer" class="widget-box relative w-full max-w-4xl rounded-3xl pt-8 pb-4 flex flex-col h-[520px] overflow-hidden">
        
        <div class="ambient-glow"></div>

        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-2 px-8 z-10 shrink-0">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#A39F96]">@faithreflects</span>
            <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#8A867D] border border-[#E9E5DC] bg-white shadow-sm flex items-center space-x-1">
                <span id="sealedCount" class="text-[#B48025]">0</span>
                <span>/</span>
                <span id="totalCount">0</span>
                <span>Legacies</span>
            </div>
        </div>

        <h2 class="serif text-3xl text-[#37352f] mb-1 px-8 z-10 shrink-0 text-center md:text-left">The Legacy Vault</h2>
        <p class="text-xs text-[#8A867D] italic mb-6 px-8 z-10 shrink-0 text-center md:text-left border-b border-[#E9E5DC] pb-4">
            "Record the defining milestones. Seal them when the harvest comes."
        </p>

        <!-- Horizontal Scrolling Gallery -->
        <div class="vault-gallery flex-1 z-10" id="galleryContainer">
            <!-- Cards Injected by JS -->
        </div>

        <!-- Defs for the Wax Seal SVG -->
        <svg width="0" height="0" class="absolute hidden">
            <defs>
                <radialGradient id="waxGrad" cx="35%" cy="30%" r="70%">
                    <stop offset="0%" stop-color="#DC2626"/> <!-- Bright Red Highlight -->
                    <stop offset="50%" stop-color="#991B1B"/> <!-- Deep Crimson -->
                    <stop offset="100%" stop-color="#7F1D1D"/> <!-- Dark Edges -->
                </radialGradient>
                <filter id="emboss">
                    <feDropShadow dx="0" dy="2" stdDeviation="1" flood-color="#000" flood-opacity="0.4"/>
                    <feDropShadow dx="0" dy="-1" stdDeviation="1" flood-color="#fff" flood-opacity="0.2"/>
                </filter>
            </defs>
        </svg>

        <!-- Add Milestone Modal -->
        <div id="addModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#FCFBF9] rounded-2xl p-6 w-full max-w-[320px] border border-[#E9E5DC] shadow-2xl transform transition-all">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="modalTitle" class="font-serif text-2xl text-[#37352f]">Draft a Legacy</h3>
                    <button id="closeAddBtn" class="text-[#A39F96] hover:text-[#37352f] transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>

                <div class="space-y-4 mb-6">
                    <div class="flex flex-col">
                        <label class="text-[9px] font-bold tracking-widest uppercase text-[#8A867D] mb-1.5 pl-1">Target Year</label>
                        <input type="number" id="yearInput" placeholder="e.g., 2028" class="w-full rounded-xl px-4 py-3 text-sm font-bold text-[#B48025]">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[9px] font-bold tracking-widest uppercase text-[#8A867D] mb-1.5 pl-1">The Milestone</label>
                        <input type="text" id="titleInput" placeholder="e.g., Launch flagship business..." class="w-full rounded-xl px-4 py-3 text-sm font-medium">
                    </div>
                </div>

                <button id="saveBtn" class="btn-primary w-full py-3.5 rounded-xl text-xs font-semibold uppercase tracking-widest shadow-lg">
                    Draft Certificate
                </button>
            </div>
        </div>

        <!-- Delete Modal -->
        <div id="deleteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#FCFBF9] rounded-2xl p-6 w-full max-w-[260px] border border-[#E9E5DC] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#37352f]">Burn Certificate?</h3>
                <p class="text-xs text-[#8A867D] mb-6">This will permanently remove this legacy milestone from your vault.</p>
                <div class="flex space-x-3">
                    <button id="cancelDeleteBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#8A867D] hover:bg-gray-100 border border-transparent transition-colors">Cancel</button>
                    <button id="confirmDeleteBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#EF4444] text-white hover:bg-red-600 transition-colors shadow-md">Remove</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Initial Mock Data aligned with user's specific Notion template items
        const defaultMilestones = [
            { id: 1, title: "Launch flagship template on Etsy", year: "2026", isSealed: true },
            { id: 2, title: "Publish first book", year: "2028", isSealed: false },
            { id: 3, title: "Buy family home with studio", year: "2029", isSealed: false },
            { id: 4, title: "Speak at a creator conference", year: "2027", isSealed: false },
            { id: 5, title: "Mentor 100 faith-driven creators", year: "2036", isSealed: false }
        ];

        // State
        let legacies = JSON.parse(localStorage.getItem('sovereign_legacies')) || defaultMilestones;
        let deleteId = null;
        let editId = null;

        // Elements
        const gallery = document.getElementById('galleryContainer');
        const sealedCount = document.getElementById('sealedCount');
        const totalCount = document.getElementById('totalCount');
        
        // Enable horizontal scrolling with mouse wheel
        gallery.addEventListener('wheel', (evt) => {
            if (evt.deltaY !== 0) {
                evt.preventDefault();
                gallery.scrollLeft += evt.deltaY;
            }
        });
        
        const addModal = document.getElementById('addModal');
        const yearInput = document.getElementById('yearInput');
        const titleInput = document.getElementById('titleInput');
        const saveBtn = document.getElementById('saveBtn');
        const closeAddBtn = document.getElementById('closeAddBtn');
        const modalTitle = document.getElementById('modalTitle');

        const deleteModal = document.getElementById('deleteModal');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

        // Render the exact heavy crimson wax seal SVG
        function getWaxSealSvg() {
            return `
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <svg viewBox="0 -10 100 130" class="wax-seal">
                        <!-- Elegant Gold Ribbon behind seal -->
                        <path d="M30 60 L20 120 L35 110 L50 125 L50 60 Z" fill="#B48025" filter="drop-shadow(0 4px 4px rgba(0,0,0,0.2))"/>
                        <path d="M70 60 L80 120 L65 110 L50 125 L50 60 Z" fill="#D97706" filter="drop-shadow(0 4px 4px rgba(0,0,0,0.2))"/>
                        
                        <!-- Messy Outer Splatter Base -->
                        <path d="M50 5 C75 0, 95 20, 90 45 C98 65, 85 90, 60 95 C35 100, 5 85, 10 60 C0 40, 20 5, 50 5 Z" fill="url(#waxGrad)" filter="drop-shadow(0 6px 8px rgba(0,0,0,0.4))"/>
                        <path d="M50 8 C70 5, 88 25, 85 45 C90 60, 78 88, 55 90 C35 95, 12 80, 15 55 C8 35, 25 10, 50 8 Z" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.6"/>
                        
                        <!-- Inner Raised Ring -->
                        <circle cx="50" cy="50" r="32" fill="none" stroke="#7F1D1D" stroke-width="4" opacity="0.9"/>
                        <circle cx="50" cy="50" r="29" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
                        
                        <!-- Embossed Crown Center (The Sovereign Vibe) -->
                        <g transform="translate(50, 55) scale(1.5)" filter="url(#emboss)">
                            <path d="M -12,4 L 12,4 L 18,-6 L 8,0 L 0,-12 L -8,0 L -18,-6 Z" fill="#991B1B" stroke="#7F1D1D" stroke-width="1"/>
                            <circle cx="-18" cy="-6" r="1.5" fill="#991B1B"/>
                            <circle cx="0" cy="-12" r="2" fill="#991B1B"/>
                            <circle cx="18" cy="-6" r="1.5" fill="#991B1B"/>
                            <line x1="-8" y1="8" x2="8" y2="8" stroke="#7F1D1D" stroke-width="1.5"/>
                        </g>
                    </svg>
                </div>
            `;
        }

        // Generates random splatter elements that fly out when the seal drops
        function getWaxSplatterHtml() {
            let splatters = '';
            for(let i=0; i<8; i++) {
                const size = Math.random() * 4 + 2;
                const angle = Math.random() * Math.PI * 2;
                const dist = 30 + Math.random() * 50;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;
                
                splatters += `<div class="wax-drop" style="width:${size}px; height:${size}px; left:50%; top:50%; margin-left:-${size/2}px; margin-top:-${size/2}px; --tx:${tx}px; --ty:${ty}px;"></div>`;
            }
            return splatters;
        }

        function renderGallery() {
            gallery.innerHTML = '';
            
            const sealed = legacies.filter(l => l.isSealed).length;
            sealedCount.innerText = sealed;
            totalCount.innerText = legacies.length;

            legacies.forEach(leg => {
                const card = document.createElement('div');
                card.className = `legacy-card ${leg.isSealed ? 'is-sealed' : ''}`;
                card.id = `card-${leg.id}`;

                card.innerHTML = `
                    <div class="card-actions">
                        <button class="action-icon-btn edit" onclick="triggerEdit(${leg.id})" title="Edit Legacy">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        </button>
                        <button class="action-icon-btn delete" onclick="triggerDelete(${leg.id})" title="Burn Certificate">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                    
                    <div class="flex-1 flex flex-col items-center justify-start text-center pt-6 px-4 z-20">
                        <span class="text-[9px] font-bold tracking-[0.2em] uppercase text-dimmed mb-3">Milestone • ${leg.year}</span>
                        <h3 class="serif text-lg text-[#37352f] leading-snug line-clamp-4">"${leg.title}"</h3>
                        <div class="w-10 h-px bg-[#E9E5DC] mt-4 mb-2 mx-auto"></div>
                    </div>

                    <div class="h-[100px] w-full flex items-center justify-center relative z-20 mb-3">
                        ${!leg.isSealed ? `
                            <div class="seal-target" onclick="stampSeal(${leg.id})">
                                <span>Seal</span>
                            </div>
                        ` : ''}
                        
                        ${getWaxSealSvg()}
                        ${getWaxSplatterHtml()}
                    </div>
                `;
                
                gallery.appendChild(card);
            });

            // Add the "Draft New" card at the end
            const addCard = document.createElement('div');
            addCard.className = 'add-card';
            addCard.onclick = () => {
                editId = null;
                modalTitle.innerText = "Draft a Legacy";
                saveBtn.innerText = "Draft Certificate";
                titleInput.value = '';
                
                const currentYear = new Date().getFullYear();
                yearInput.value = currentYear + 1; // Default to next year
                addModal.classList.remove('hidden');
                setTimeout(() => titleInput.focus(), 100);
            };
            addCard.innerHTML = `
                <div class="w-12 h-12 rounded-full border-2 border-[#E9E5DC] flex items-center justify-center mb-3 text-[#A39F96]">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </div>
                <span class="text-[10px] font-bold tracking-widest uppercase text-[#A39F96]">Draft New Legacy</span>
            `;
            gallery.appendChild(addCard);
        }

        window.stampSeal = function(id) {
            const index = legacies.findIndex(l => l.id === id);
            if (index > -1 && !legacies[index].isSealed) {
                const card = document.getElementById(`card-${id}`);
                const targetBtn = card.querySelector('.seal-target');
                
                // Hide the target button smoothly
                if (targetBtn) {
                    targetBtn.style.opacity = '0';
                    targetBtn.style.transform = 'scale(0.5)';
                }

                // Trigger Animation
                card.classList.add('animating');
                
                setTimeout(() => {
                    legacies[index].isSealed = true;
                    localStorage.setItem('sovereign_legacies', JSON.stringify(legacies));
                    
                    // Finalize UI State
                    card.classList.add('is-sealed');
                    card.classList.remove('animating');
                    if (targetBtn) targetBtn.remove();
                    
                    // Update header counts
                    const sealed = legacies.filter(l => l.isSealed).length;
                    sealedCount.innerText = sealed;
                    
                }, 800); // Wait for the slam animation to complete
            }
        };

        // Modal Logic
        closeAddBtn.addEventListener('click', () => {
            addModal.classList.add('hidden');
            titleInput.value = '';
            editId = null;
        });

        saveBtn.addEventListener('click', () => {
            const title = titleInput.value.trim();
            const year = yearInput.value.trim();
            
            if (title && year) {
                if (editId) {
                    // Update existing
                    const index = legacies.findIndex(l => l.id === editId);
                    if (index > -1) {
                        legacies[index].title = title;
                        legacies[index].year = year;
                    }
                } else {
                    // Add new
                    legacies.push({
                        id: Date.now(),
                        title: title,
                        year: year,
                        isSealed: false
                    });
                }
                
                // Sort chronologically
                legacies.sort((a, b) => parseInt(a.year) - parseInt(b.year));
                
                localStorage.setItem('sovereign_legacies', JSON.stringify(legacies));
                
                titleInput.value = '';
                addModal.classList.add('hidden');
                editId = null;
                renderGallery();
                
                // Scroll to the end to see the new addition (or where it was sorted)
                setTimeout(() => gallery.scrollTo({ left: gallery.scrollWidth, behavior: 'smooth' }), 100);
            } else {
                titleInput.focus();
            }
        });

        // Edit Logic
        window.triggerEdit = function(id) {
            const leg = legacies.find(l => l.id === id);
            if (leg) {
                editId = id;
                yearInput.value = leg.year;
                titleInput.value = leg.title;
                modalTitle.innerText = "Edit Legacy";
                saveBtn.innerText = "Update Certificate";
                addModal.classList.remove('hidden');
                setTimeout(() => titleInput.focus(), 100);
            }
        };

        // Delete Logic
        window.triggerDelete = function(id) {
            deleteId = id;
            deleteModal.classList.remove('hidden');
        };

        cancelDeleteBtn.addEventListener('click', () => {
            deleteId = null;
            deleteModal.classList.add('hidden');
        });

        confirmDeleteBtn.addEventListener('click', () => {
            if (deleteId) {
                const card = document.getElementById(`card-${deleteId}`);
                card.style.transform = 'scale(0.8)';
                card.style.opacity = '0';
                
                setTimeout(() => {
                    legacies = legacies.filter(l => l.id !== deleteId);
                    localStorage.setItem('sovereign_legacies', JSON.stringify(legacies));
                    renderGallery();
                    deleteModal.classList.add('hidden');
                    deleteId = null;
                }, 300);
            }
        });

        // Initialize
        renderGallery();

    </script>
</body>
</html>
