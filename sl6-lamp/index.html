<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vigilance Lamp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Sovereign Light Mode Base */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: transparent; 
            color: #37352f; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* The Widget Container */
        .widget-box {
            background-color: #FCFBF9; /* Ivory Parchment */
            border: 1px solid #E9E5DC;
            box-shadow: 0 8px 30px rgba(0,0,0,0.03), inset 0 0 20px rgba(255,255,255,0.5);
            transition: all 1.5s ease;
        }

        .widget-box.is-burning {
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 10px 40px rgba(0,0,0,0.05), inset 0 0 40px rgba(245, 158, 11, 0.05);
        }

        /* Ambient Glow (Activated when burning) */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.0) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: background 2s ease;
        }
        .is-burning .ambient-glow {
            background: radial-gradient(circle, rgba(245, 158, 11, 0.15) 0%, transparent 70%);
            animation: breathe-glow 4s infinite alternate ease-in-out;
        }
        
        @keyframes breathe-glow {
            0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
        }

        /* View Transitions */
        .view-section {
            position: absolute;
            inset: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), visibility 0.8s;
        }
        
        #setupView {
            opacity: 1; transform: scale(1); visibility: visible; z-index: 20;
        }
        #setupView.hidden-view {
            opacity: 0; transform: scale(0.95); visibility: hidden; pointer-events: none;
        }

        #activeView {
            opacity: 0; transform: scale(1.05); visibility: hidden; z-index: 10;
        }
        #activeView.visible-view {
            opacity: 1; transform: scale(1); visibility: visible; z-index: 30;
        }

        /* Flame Animations */
        #lamp-flame {
            opacity: 0;
            transform-origin: 165px 105px;
            transform: scale(0.5);
            transition: all 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .is-burning #lamp-flame {
            opacity: 1;
            transform: scale(1);
        }

        .flicker-1 { animation: flick1 3s infinite alternate ease-in-out; transform-origin: 165px 105px; }
        .flicker-2 { animation: flick2 2s infinite alternate ease-in-out 0.5s; transform-origin: 165px 105px; }
        .flicker-3 { animation: flick3 1.5s infinite alternate ease-in-out 1s; transform-origin: 165px 105px; }
        .pulse-glow { animation: pulseGlow 3s infinite alternate ease-in-out; transform-origin: 165px 95px; }

        @keyframes flick1 {
            0% { transform: scaleY(0.95) scaleX(1.05) rotate(-2deg); }
            100% { transform: scaleY(1.05) scaleX(0.95) rotate(2deg); }
        }
        @keyframes flick2 {
            0% { transform: scaleY(0.9) scaleX(1.1) rotate(3deg); }
            100% { transform: scaleY(1.1) scaleX(0.9) rotate(-3deg); }
        }
        @keyframes flick3 {
            0% { transform: scaleY(0.95) scaleX(1.02); }
            100% { transform: scaleY(1.05) scaleX(0.98); }
        }
        @keyframes pulseGlow {
            0% { opacity: 0.4; transform: scale(0.9); filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.5)); }
            100% { opacity: 0.7; transform: scale(1.1); filter: drop-shadow(0 0 20px rgba(245, 158, 11, 0.8)); }
        }

        /* Sparks */
        .spark {
            position: absolute; width: 3px; height: 3px; background-color: #FCD34D;
            border-radius: 50%; pointer-events: none; box-shadow: 0 0 8px #F59E0B; z-index: 30;
            animation: fly-spark 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes fly-spark {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* Inputs & Buttons */
        input[type="text"], input[type="number"] {
            background-color: #FFFFFF;
            border: 1px solid #E9E5DC;
            color: #37352f;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }
        input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1), inset 0 2px 4px rgba(0,0,0,0.01);
        }
        input::placeholder { color: #A39F96; font-style: italic; }

        /* Hide number spin buttons */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none; margin: 0;
        }

        .btn-primary {
            background-color: #37352f;
            color: #FFFFFF;
            border: 1px solid #2d2d2d;
            transition: all 0.4s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn-primary:hover { 
            background-color: #000000; 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }
        .btn-primary:active { transform: translateY(1px) scale(0.98); }

        .btn-reset {
            background-color: transparent;
            color: #A39F96;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }
        .btn-reset:hover { 
            color: #37352f; 
            border-bottom-color: #37352f;
        }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(255,255,255,0.8); }

        /* Completion Flash */
        .victory-flash {
            position: absolute;
            inset: 0;
            background-color: #ffffff;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            border-radius: 1.5rem;
        }
        .victory-flash.trigger {
            animation: flash 2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes flash {
            0% { opacity: 0; }
            10% { opacity: 1; }
            100% { opacity: 0; }
        }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div id="widgetContainer" class="widget-box relative w-full max-w-sm rounded-3xl h-[580px] overflow-hidden">
        
        <div class="ambient-glow"></div>
        <div class="victory-flash" id="victoryFlash"></div>
        <div id="sparksContainer" class="absolute inset-0 pointer-events-none z-30"></div>

        <!-- ================= VIEW 1: SETUP ================= -->
        <div id="setupView" class="view-section">
            
            <!-- Header -->
            <div class="w-full flex justify-between items-center mb-6 shrink-0">
                <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#A39F96]">@faithreflects</span>
                <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#8A867D] border border-[#E9E5DC] bg-white">
                    Discipline
                </div>
            </div>

            <h2 class="serif text-3xl text-[#37352f] mb-1">The Vigilance Lamp</h2>
            <p class="text-xs text-[#8A867D] italic mb-6">"Keep the flame burning."</p>

            <div class="flex-1 flex flex-col space-y-5 justify-center pb-6">
                
                <!-- Intention Input -->
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold tracking-widest uppercase text-[#A39F96] mb-2 pl-1">My Focus / Intention</label>
                    <input type="text" id="intentionInput" placeholder="e.g., Clarity for the coming year..." class="w-full rounded-xl px-4 py-3.5 text-sm font-medium" autocomplete="off">
                </div>

                <!-- Duration Input -->
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold tracking-widest uppercase text-[#A39F96] mb-2 pl-1">Duration of Fast</label>
                    <div class="flex space-x-3">
                        <div class="flex-1 relative">
                            <input type="number" id="hoursInput" placeholder="0" min="0" max="72" class="w-full rounded-xl px-4 py-3.5 text-xl font-medium font-mono text-[#B48025] text-center">
                            <span class="absolute right-3 top-1/2 transform -translate-y-1/2 text-[9px] uppercase tracking-widest text-[#A39F96] font-bold">HRS</span>
                        </div>
                        <div class="flex-1 relative">
                            <input type="number" id="minsInput" placeholder="0" min="0" max="59" class="w-full rounded-xl px-4 py-3.5 text-xl font-medium font-mono text-[#B48025] text-center">
                            <span class="absolute right-3 top-1/2 transform -translate-y-1/2 text-[9px] uppercase tracking-widest text-[#A39F96] font-bold">MIN</span>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Action -->
            <button id="igniteBtn" class="btn-primary w-full py-4 rounded-xl text-xs font-bold uppercase tracking-widest flex items-center justify-center space-x-2 shrink-0">
                <span class="text-base">🔥</span>
                <span>Ignite the Lamp</span>
            </button>
        </div>


        <!-- ================= VIEW 2: ACTIVE VIGIL ================= -->
        <div id="activeView" class="view-section items-center">
            
            <!-- Header (Minimal) -->
            <div class="w-full flex justify-between items-center mb-4 shrink-0 z-10">
                <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#A39F96]">Active Vigil</span>
                <span class="text-[10px] tracking-widest uppercase text-[#D4AF37] font-bold flex items-center space-x-1" id="statusBadge">
                    <span class="w-1.5 h-1.5 bg-[#D4AF37] rounded-full animate-pulse inline-block"></span>
                    <span>Burning</span>
                </span>
            </div>

            <p id="activeIntention" class="serif italic text-[15px] text-[#37352f] leading-relaxed text-center px-4 mb-4 line-clamp-3">
                "Intention text goes here"
            </p>

            <!-- SVG Clay Lamp -->
            <div class="relative w-full h-44 z-10 shrink-0 flex justify-center items-center my-auto">
                <svg viewBox="0 0 200 200" class="w-full h-full overflow-visible">
                    
                    <!-- Definitions -->
                    <defs>
                        <radialGradient id="flameGlow" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#FCD34D"/>
                            <stop offset="50%" stop-color="#F59E0B"/>
                            <stop offset="100%" stop-color="transparent"/>
                        </radialGradient>
                    </defs>

                    <!-- Stone Pedestal -->
                    <path d="M 40 170 L 160 170 L 150 150 L 50 150 Z" fill="#E9E5DC" stroke="#DCD7CA" stroke-width="2"/>
                    <path d="M 30 190 L 170 190 L 160 170 L 40 170 Z" fill="#FCFBF9" stroke="#DCD7CA" stroke-width="2"/>
                    <path d="M 20 190 L 180 190" stroke="#DCD7CA" stroke-width="2" stroke-linecap="round"/>

                    <!-- Antique Clay Lamp -->
                    <g filter="drop-shadow(0 10px 15px rgba(0,0,0,0.1))">
                        <!-- Handle -->
                        <path d="M 60 130 C 20 130, 20 80, 70 100" fill="none" stroke="#A06B44" stroke-width="14" stroke-linecap="round"/>
                        <path d="M 60 130 C 20 130, 20 80, 70 100" fill="none" stroke="#8B5A2B" stroke-width="10" stroke-linecap="round"/>
                        
                        <!-- Main Body -->
                        <ellipse cx="100" cy="130" rx="48" ry="22" fill="#A06B44" stroke="#8B5A2B" stroke-width="2"/>
                        
                        <!-- Top Engraved Detail -->
                        <ellipse cx="100" cy="122" rx="26" ry="9" fill="#8B5A2B"/>
                        <ellipse cx="100" cy="122" rx="20" ry="7" fill="#4A3018"/> <!-- Oil Reservoir Hole -->
                        
                        <!-- Spout -->
                        <path d="M 125 118 C 160 115, 175 120, 165 135 C 150 142, 130 145, 125 140 Z" fill="#A06B44" stroke="#8B5A2B" stroke-width="2"/>
                        
                        <!-- Spout Hole & Wick -->
                        <ellipse cx="162" cy="122" rx="7" ry="4" fill="#4A3018"/>
                        <path d="M 162 122 Q 165 115, 165 105" fill="none" stroke="#2D2416" stroke-width="3" stroke-linecap="round"/>
                    </g>

                    <!-- The Flame (Hidden by default, shown by CSS) -->
                    <g id="lamp-flame">
                        <!-- Radiant Glow -->
                        <circle cx="165" cy="95" r="30" fill="url(#flameGlow)" class="pulse-glow"/>
                        
                        <!-- Actual Fire -->
                        <path d="M 165 105 C 178 90, 180 75, 165 60 C 150 75, 152 90, 165 105 Z" fill="#EA580C" class="flicker-1"/>
                        <path d="M 165 105 C 172 92, 174 82, 165 70 C 156 82, 158 92, 165 105 Z" fill="#F59E0B" class="flicker-2"/>
                        <path d="M 165 105 C 169 95, 170 88, 165 80 C 160 88, 161 95, 165 105 Z" fill="#FCD34D" class="flicker-3"/>
                        <circle cx="165" cy="102" r="2" fill="#FFFBEB"/>
                    </g>
                </svg>
            </div>

            <!-- The Digital Timer -->
            <div id="timerDisplay" class="mono text-4xl font-medium text-[#B48025] tracking-tight mb-4 filter drop-shadow-sm">
                00:00:00
            </div>
            
            <p id="completionMsg" class="hidden text-xs text-[#10B981] font-bold uppercase tracking-widest text-center mb-4">
                The vigil is complete.
            </p>

            <!-- Actions -->
            <div class="w-full z-10 shrink-0 mt-auto border-t border-[#E9E5DC] pt-4">
                <button id="cancelTriggerBtn" class="btn-reset w-full py-2 text-[10px] font-bold uppercase tracking-widest flex items-center justify-center">
                    Extinguish Early
                </button>
            </div>

        </div>

        <!-- Custom Abort Modal -->
        <div id="abortModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#FCFBF9] rounded-2xl p-6 w-full max-w-[260px] border border-[#E9E5DC] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#37352f]">Extinguish Lamp?</h3>
                <p class="text-xs text-[#8A867D] mb-6">Are you sure you want to end this fast early?</p>
                <div class="flex space-x-3">
                    <button id="cancelAbortBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#8A867D] hover:bg-gray-100 border border-transparent transition-colors">Resume</button>
                    <button id="confirmAbortBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#37352f] text-white hover:bg-black transition-colors shadow-md">End Fast</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Elements
        const container = document.getElementById('widgetContainer');
        const setupView = document.getElementById('setupView');
        const activeView = document.getElementById('activeView');
        
        const intentionInput = document.getElementById('intentionInput');
        const hoursInput = document.getElementById('hoursInput');
        const minsInput = document.getElementById('minsInput');
        const startBtn = document.getElementById('igniteBtn');
        
        const activeIntention = document.getElementById('activeIntention');
        const timerDisplay = document.getElementById('timerDisplay');
        const statusBadge = document.getElementById('statusBadge');
        const completionMsg = document.getElementById('completionMsg');
        const cancelTriggerBtn = document.getElementById('cancelTriggerBtn');
        const sparksContainer = document.getElementById('sparksContainer');
        const victoryFlash = document.getElementById('victoryFlash');
        
        // Modal
        const abortModal = document.getElementById('abortModal');
        const cancelAbortBtn = document.getElementById('cancelAbortBtn');
        const confirmAbortBtn = document.getElementById('confirmAbortBtn');

        // State Variables
        let isRunning = false;
        let timerId = null;
        
        // Load State
        let state = JSON.parse(localStorage.getItem('faithreflects_vigilance')) || {
            intention: '',
            endTime: null,
            isBurning: false,
            totalDuration: 0 // Used to track total time if needed later
        };

        function formatTime(totalSeconds) {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = Math.floor(totalSeconds % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function createSparks() {
            // Spawn sparks at the wick location (approx 75% right, 45% down relative to container)
            const rect = document.getElementById('lamp-flame').getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            
            const originX = rect.left - containerRect.left + (rect.width / 2);
            const originY = rect.top - containerRect.top + (rect.height / 2);

            for(let i=0; i<15; i++) {
                setTimeout(() => {
                    const spark = document.createElement('div');
                    spark.className = 'spark';
                    
                    spark.style.left = `${originX}px`;
                    spark.style.top = `${originY}px`;
                    
                    // Explode outward and upward
                    const angle = Math.random() * Math.PI + Math.PI; // Upper half circle
                    const distance = 40 + Math.random() * 80;
                    
                    spark.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                    spark.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                    
                    sparksContainer.appendChild(spark);
                    
                    setTimeout(() => {
                        if(sparksContainer.contains(spark)) spark.remove();
                    }, 1500);
                }, i * 40);
            }
        }

        function tick() {
            if (!state.endTime) return;
            
            const now = Date.now();
            const diff = state.endTime - now;

            if (diff <= 0) {
                // Fast Completed!
                clearInterval(timerId);
                timerDisplay.innerText = "00:00:00";
                
                // If it JUST completed while looking at it, flash and celebrate
                if (isRunning) {
                    victoryFlash.classList.add('trigger');
                    setTimeout(() => victoryFlash.classList.remove('trigger'), 2000);
                    isRunning = false;
                }

                // Update UI to completion state
                timerDisplay.classList.replace('text-[#B48025]', 'text-[#10B981]');
                statusBadge.innerHTML = `<span class="w-1.5 h-1.5 bg-[#10B981] rounded-full inline-block"></span><span class="text-[#10B981]">Sacrifice Honored</span>`;
                completionMsg.classList.remove('hidden');
                cancelTriggerBtn.innerText = "Reset Lamp (New Vigil)";

                // Ensure it's still burning visually
                container.classList.add('is-burning');

            } else {
                // Still running
                const secondsLeft = Math.floor(diff / 1000);
                timerDisplay.innerText = formatTime(secondsLeft);
                
                // Ensure UI is active state
                timerDisplay.classList.replace('text-[#10B981]', 'text-[#B48025]');
                statusBadge.innerHTML = `<span class="w-1.5 h-1.5 bg-[#D4AF37] rounded-full animate-pulse inline-block"></span><span class="text-[#D4AF37]">Burning</span>`;
                completionMsg.classList.add('hidden');
                cancelTriggerBtn.innerText = "Extinguish Early";
            }
        }

        function initUI() {
            if (state.isBurning && state.endTime) {
                activeIntention.innerText = `"${state.intention}"` || "Quiet Vigilence";
                
                setupView.classList.add('hidden-view');
                activeView.classList.add('visible-view');
                container.classList.add('is-burning');
                
                isRunning = true;
                tick(); // Initial tick
                timerId = setInterval(tick, 1000);
            } else {
                setupView.classList.remove('hidden-view');
                activeView.classList.remove('visible-view');
                container.classList.remove('is-burning');
                
                // Populate inputs if they exist
                intentionInput.value = state.intention;
            }
        }

        // --- Start Fast ---
        startBtn.addEventListener('click', () => {
            const intention = intentionInput.value.trim();
            const h = parseInt(hoursInput.value) || 0;
            const m = parseInt(minsInput.value) || 0;

            if (h === 0 && m === 0) {
                hoursInput.focus();
                return;
            }

            // Button feedback
            startBtn.style.transform = 'scale(0.95)';
            setTimeout(() => startBtn.style.transform = 'scale(1)', 150);

            // Calculate End Time
            const totalMs = ((h * 60 * 60) + (m * 60)) * 1000;
            
            state = {
                intention: intention,
                endTime: Date.now() + totalMs,
                isBurning: true,
                totalDuration: totalMs
            };
            localStorage.setItem('faithreflects_vigilance', JSON.stringify(state));

            // Setup UI for Active View
            activeIntention.innerText = `"${intention}"`;
            timerDisplay.innerText = formatTime(Math.floor(totalMs / 1000)); // Instant feedback

            // Transition Views
            setupView.classList.add('hidden-view');
            activeView.classList.add('visible-view');

            // Trigger Ignition Effects
            setTimeout(() => {
                createSparks();
                container.classList.add('is-burning');
                
                isRunning = true;
                if(timerId) clearInterval(timerId);
                timerId = setInterval(tick, 1000);
            }, 600); // Wait for card transition
        });

        // --- Extinguish Logic ---
        cancelTriggerBtn.addEventListener('click', () => {
            if (Date.now() > state.endTime) {
                // If it's already completed, just reset without asking
                endFast();
            } else {
                // Ask for confirmation to end early
                abortModal.classList.remove('hidden');
            }
        });

        cancelAbortBtn.addEventListener('click', () => {
            abortModal.classList.add('hidden');
        });

        confirmAbortBtn.addEventListener('click', () => {
            abortModal.classList.add('hidden');
            endFast();
        });

        function endFast() {
            isRunning = false;
            clearInterval(timerId);
            
            // Extinguish animation
            container.classList.remove('is-burning');
            
            // Wait for flame to die down before transitioning views
            setTimeout(() => {
                state.isBurning = false;
                state.endTime = null;
                localStorage.setItem('faithreflects_vigilance', JSON.stringify(state));
                
                // Clear inputs for next time
                hoursInput.value = '';
                minsInput.value = '';
                
                initUI();
            }, 800);
        }

        // Initialize on load
        initUI();

    </script>
</body>
</html>
