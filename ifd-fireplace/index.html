<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Family Hearth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: transparent; color: #37352f; user-select: none; }
        .serif { font-family: 'Playfair Display', serif; }

        /* Hearth Animations */
        .flame {
            transform-origin: center bottom;
            transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0.2;
            transform: scaleY(0.3) scaleX(0.8);
        }
        
        .flame-active {
            opacity: 0.9;
            animation: flicker 2s infinite alternate ease-in-out;
        }

        @keyframes flicker {
            0% { transform: scaleY(1) scaleX(1) rotate(-2deg); filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.4)); }
            50% { transform: scaleY(1.1) scaleX(0.95) rotate(2deg); filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.6)); }
            100% { transform: scaleY(0.95) scaleX(1.05) rotate(-1deg); filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.3)); }
        }

        .log {
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease;
            transform: translateY(-50px) rotate(-10deg);
            opacity: 0;
        }
        .log-dropped {
            transform: translateY(0) rotate(0deg);
            opacity: 1;
        }

        /* Spark Particles */
        .spark {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: #FCD34D;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 6px #F59E0B;
            animation: float-up 2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            opacity: 0;
            z-index: 20;
        }

        @keyframes float-up {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            50% { opacity: 0.8; }
            100% { transform: translate(var(--tx), -100px) scale(0); opacity: 0; }
        }

        /* Ambient Glow */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
            z-index: 0;
        }
        .is-burning .ambient-glow { opacity: 1; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div class="relative w-full max-w-sm bg-white rounded-3xl p-8 border border-[#e9e9e7] shadow-[0_8px_30px_rgb(0,0,0,0.03)] flex flex-col items-center min-h-[480px]">
        
        <div class="ambient-glow" id="glow"></div>

        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-6 z-10">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#a3b8ac]">@faithreflects</span>
        </div>

        <h2 class="serif text-2xl text-[#37352f] mb-1 z-10">The Family Hearth</h2>
        <p class="text-xs text-gray-400 italic mb-8 z-10 text-center">"A fire shall always be burning." — Lev 6:13</p>

        <!-- SVG Hearth Container -->
        <div class="relative w-48 h-48 mb-8 z-10 flex items-end justify-center" id="hearthContainer">
            
            <div id="sparksContainer" class="absolute inset-0 z-30 pointer-events-none"></div>

            <svg viewBox="0 0 200 160" class="w-full h-full overflow-visible z-10">
                <!-- Hearth Back Wall -->
                <path d="M40 140 L40 40 Q100 0 160 40 L160 140 Z" fill="#EAE5D9" stroke="#d4d4d0" stroke-width="2"/>
                <!-- Bricks detail -->
                <line x1="40" y1="100" x2="160" y2="100" stroke="#d4d4d0" stroke-width="1" opacity="0.5"/>
                <line x1="40" y1="70" x2="160" y2="70" stroke="#d4d4d0" stroke-width="1" opacity="0.5"/>
                <line x1="100" y1="100" x2="100" y2="140" stroke="#d4d4d0" stroke-width="1" opacity="0.5"/>
                <line x1="70" y1="70" x2="70" y2="100" stroke="#d4d4d0" stroke-width="1" opacity="0.5"/>
                <line x1="130" y1="70" x2="130" y2="100" stroke="#d4d4d0" stroke-width="1" opacity="0.5"/>

                <!-- The Flames -->
                <g id="flamesGroup" style="transform-origin: 100px 130px;">
                    <!-- Back Flame (Red/Orange) -->
                    <path class="flame" id="flame-back" d="M100 50 C120 80 130 110 100 130 C70 110 80 80 100 50 Z" fill="#EA580C"/>
                    <!-- Middle Flame (Orange/Gold) -->
                    <path class="flame" id="flame-mid" d="M100 70 C115 95 120 115 100 130 C80 115 85 95 100 70 Z" fill="#F59E0B" style="animation-delay: 0.2s;"/>
                    <!-- Front Flame (Yellow) -->
                    <path class="flame" id="flame-front" d="M100 90 C108 105 110 120 100 130 C90 120 92 105 100 90 Z" fill="#FDE68A" style="animation-delay: 0.4s;"/>
                </g>

                <!-- Iron Grate -->
                <rect x="60" y="125" width="80" height="4" fill="#4a4843" rx="2"/>
                <rect x="70" y="125" width="4" height="15" fill="#4a4843" rx="1"/>
                <rect x="98" y="125" width="4" height="15" fill="#4a4843" rx="1"/>
                <rect x="126" y="125" width="4" height="15" fill="#4a4843" rx="1"/>

                <!-- Logs (Added dynamically) -->
                <!-- Base log (always there, burnt out) -->
                <path d="M70 120 L130 120 L125 110 L75 110 Z" fill="#8B5A2B" stroke="#5C3A21" stroke-width="1"/>
                
                <!-- Interactive Logs -->
                <g id="log-1" class="log" style="transform-origin: 100px 115px;">
                    <path d="M65 115 L120 105 L118 95 L68 105 Z" fill="#A06B44" stroke="#704420" stroke-width="1"/>
                </g>
                <g id="log-2" class="log" style="transform-origin: 100px 110px;">
                    <path d="M85 110 L135 115 L132 105 L82 100 Z" fill="#A06B44" stroke="#704420" stroke-width="1"/>
                </g>
                <g id="log-3" class="log" style="transform-origin: 100px 105px;">
                    <path d="M75 100 L125 100 L120 90 L80 90 Z" fill="#A06B44" stroke="#704420" stroke-width="1"/>
                </g>

                <!-- Front Stone Arch -->
                <path d="M20 160 L40 160 L40 40 Q100 0 160 40 L160 160 L180 160 L180 30 Q100 -10 20 30 Z" fill="#D4DFD2" stroke="#a3b8ac" stroke-width="1"/>
                <!-- Hearth floor -->
                <ellipse cx="100" cy="150" rx="70" ry="10" fill="#EAE5D9"/>
            </svg>
        </div>

        <!-- Controls -->
        <div class="w-full flex-1 flex flex-col z-10">
            <div class="flex items-center justify-center space-x-2 mb-4">
                <span class="text-[10px] font-bold tracking-widest uppercase text-gray-500">Devotions This Week:</span>
                <span id="burnCount" class="text-lg font-serif text-[#37352f] font-bold">0</span>
            </div>
            
            <button id="stokeBtn" class="mt-auto w-full bg-[#f7f6f3] text-[#37352f] border border-[#e9e9e7] py-3.5 rounded-2xl text-xs font-semibold uppercase tracking-wider hover:bg-[#efede8] hover:border-gray-300 transition-all flex items-center justify-center space-x-2 shadow-sm">
                <span>🔥 Stoke the Fire</span>
            </button>

            <button id="resetBtn" class="mt-4 text-[9px] tracking-widest text-gray-400 uppercase hover:text-gray-700 transition-colors text-center w-full">
                Sweep Hearth
            </button>
        </div>

        <!-- Custom Reset Confirmation Modal -->
        <div id="resetModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-white/60 backdrop-blur-sm transition-opacity">
            <div class="bg-white rounded-2xl p-6 w-full max-w-[260px] border border-[#e9e9e7] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#37352f]">Sweep Hearth?</h3>
                <p class="text-xs text-gray-400 mb-6">This will clear the fire to start a new week.</p>
                <div class="flex space-x-3">
                    <button id="cancelResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-gray-500 hover:bg-gray-50 border border-transparent hover:border-gray-200 transition-colors">Cancel</button>
                    <button id="confirmResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#37352f] text-white hover:bg-black transition-colors">Sweep</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // State
        let logCount = parseInt(localStorage.getItem('faithreflects_hearth')) || 0;
        
        const container = document.getElementById('hearthContainer');
        const sparksContainer = document.getElementById('sparksContainer');
        const stokeBtn = document.getElementById('stokeBtn');
        const resetBtn = document.getElementById('resetBtn');
        const burnCountText = document.getElementById('burnCount');
        const glow = document.getElementById('glow');
        
        // Modal Elements
        const resetModal = document.getElementById('resetModal');
        const cancelResetBtn = document.getElementById('cancelResetBtn');
        const confirmResetBtn = document.getElementById('confirmResetBtn');
        
        const flames = [
            document.getElementById('flame-back'),
            document.getElementById('flame-mid'),
            document.getElementById('flame-front')
        ];

        function createSparks() {
            for(let i=0; i<8; i++) {
                setTimeout(() => {
                    const spark = document.createElement('div');
                    spark.className = 'spark';
                    spark.style.left = `${40 + Math.random() * 20}%`;
                    spark.style.top = '70%';
                    spark.style.setProperty('--tx', `${(Math.random() * 60) - 30}px`);
                    
                    sparksContainer.appendChild(spark);
                    
                    setTimeout(() => {
                        if (sparksContainer.contains(spark)) spark.remove();
                    }, 2000);
                }, i * 150);
            }
        }

        function updateVisuals(animate = false) {
            burnCountText.innerText = logCount;

            // Logs
            for(let i=1; i<=3; i++) {
                const log = document.getElementById(`log-${i}`);
                if (i <= logCount) {
                    log.classList.add('log-dropped');
                } else {
                    log.classList.remove('log-dropped');
                }
            }

            // Flames Intensity
            if (logCount > 0) {
                container.classList.add('is-burning');
                flames.forEach(f => f.classList.add('flame-active'));
                
                // Scale flames based on logs - properly capped so it doesn't burn down your screen!
                const scale = Math.min(1.25, 0.8 + (logCount * 0.15));
                document.getElementById('flamesGroup').style.transform = `scale(${scale})`;
                
                if (animate) createSparks();
            } else {
                container.classList.remove('is-burning');
                flames.forEach(f => f.classList.remove('flame-active'));
                document.getElementById('flamesGroup').style.transform = `scale(1)`;
            }

            // Cap at 3 logs visually
            if (logCount >= 3) {
                stokeBtn.innerHTML = '<span>🔥 Keep it Burning</span>';
            } else {
                stokeBtn.innerHTML = '<span>🔥 Stoke the Fire</span>';
            }
        }

        stokeBtn.addEventListener('click', () => {
            logCount++;
            localStorage.setItem('faithreflects_hearth', logCount);
            
            // Button feedback
            stokeBtn.style.transform = 'scale(0.96)';
            setTimeout(() => stokeBtn.style.transform = 'scale(1)', 150);

            updateVisuals(true);
        });

        // Show custom modal
        resetBtn.addEventListener('click', () => {
            resetModal.classList.remove('hidden');
        });

        // Hide modal on cancel
        cancelResetBtn.addEventListener('click', () => {
            resetModal.classList.add('hidden');
        });

        // Execute reset on confirm
        confirmResetBtn.addEventListener('click', () => {
            resetModal.classList.add('hidden');
            logCount = 0;
            localStorage.setItem('faithreflects_hearth', 0);
            updateVisuals();
        });

        // Initialize
        updateVisuals();
    </script>
</body>
</html>
