<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorial Stones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: transparent; color: #37352f; }
        .serif { font-family: 'Playfair Display', serif; }

        /* The Altar Ground */
        .altar-container {
            position: relative;
            width: 100%;
            height: 250px;
            border-bottom: 2px solid #e9e9e7;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        /* Individual Stones */
        .memorial-stone {
            position: absolute;
            bottom: 0;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.06));
            animation: dropIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes dropIn {
            0% { transform: translateY(-150px) rotate(var(--start-rot)) scale(0.5); opacity: 0; }
            100% { transform: translateY(var(--end-y)) translateX(var(--end-x)) rotate(var(--end-rot)) scale(1); opacity: 1; }
        }

        .memorial-stone:hover {
            transform: translateY(calc(var(--end-y) - 15px)) translateX(var(--end-x)) rotate(var(--end-rot)) scale(1.05);
            filter: drop-shadow(0 15px 15px rgba(210, 180, 140, 0.4));
            z-index: 20;
        }

        /* Tooltip Card */
        .testimony-card {
            opacity: 0;
            transform: translateY(10px) scale(0.95);
            transition: all 0.3s ease;
            pointer-events: none;
            position: absolute;
            top: 20px;
            left: 50%;
            transform-origin: center;
            width: 85%;
            margin-left: -42.5%; /* center hack */
            z-index: 30;
        }
        
        .testimony-card.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div class="relative w-full max-w-sm bg-white rounded-3xl p-8 border border-[#e9e9e7] shadow-[0_8px_30px_rgb(0,0,0,0.03)] flex flex-col items-center min-h-[500px]">
        
        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-2">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#a3b8ac]">@faithreflects</span>
            <div class="px-3 py-1 bg-[#f7f6f3] rounded-full text-[10px] font-semibold tracking-wider text-gray-500">
                <span id="stoneCount">0</span> STONES
            </div>
        </div>

        <h2 class="serif text-2xl text-[#37352f] mb-1">Memorial Altar</h2>
        <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-6 border-b border-gray-100 pb-4 w-full text-center">Joshua 4:7</p>

        <!-- Hover Display Card (Shows testimony when a stone is hovered) -->
        <div id="displayCard" class="testimony-card bg-[#fdfdfc] border border-[#e9e9e7] shadow-lg rounded-xl p-5 text-center flex flex-col items-center">
            <svg class="w-6 h-6 text-[#D2B48C] mb-2 opacity-50" fill="currentColor" viewBox="0 0 24 24"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"/></svg>
            <p id="cardDate" class="text-[9px] font-bold tracking-widest uppercase text-gray-400 mb-2">DATE</p>
            <p id="cardText" class="serif italic text-sm text-[#5a5852] leading-relaxed line-clamp-4">Hover over a stone to read a testimony of God's faithfulness.</p>
        </div>

        <!-- The Physical Altar -->
        <div class="altar-container mt-auto mb-6" id="altar">
            <!-- Stones generated here -->
        </div>

        <!-- Add Button -->
        <button onclick="openModal()" class="w-full bg-[#f7f6f3] text-[#37352f] border border-[#e9e9e7] py-3.5 rounded-2xl text-xs font-semibold uppercase tracking-wider hover:bg-[#efede8] transition-colors shadow-sm flex justify-center items-center space-x-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
            <span>Lay a Stone</span>
        </button>

        <!-- Input Modal -->
        <div id="testimonyModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg bg-white/60">
            <div class="bg-white rounded-2xl p-6 w-full max-w-sm border border-[#e9e9e7] shadow-2xl">
                <h3 class="font-serif text-xl mb-2 text-[#37352f]">Remember His Faithfulness</h3>
                <p class="text-xs text-gray-400 mb-4">What did God do for you today?</p>
                
                <textarea id="testimonyInput" rows="4" placeholder="Type your testimony..." class="w-full px-4 py-3 bg-[#f7f6f3] border border-transparent focus:border-gray-300 rounded-xl outline-none text-sm mb-4 transition-colors resize-none"></textarea>
                
                <div class="flex space-x-3">
                    <button onclick="closeModal()" class="flex-1 py-3 rounded-xl text-xs font-semibold text-gray-500 hover:bg-gray-50 transition-colors">Cancel</button>
                    <button onclick="saveTestimony()" class="flex-1 py-3 rounded-xl text-xs font-semibold bg-[#37352f] text-white hover:bg-black transition-colors">Add to Altar</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        let testimonies = JSON.parse(localStorage.getItem('faithreflects_testimonies')) || [];
        
        const altar = document.getElementById('altar');
        const modal = document.getElementById('testimonyModal');
        const input = document.getElementById('testimonyInput');
        const countDisplay = document.getElementById('stoneCount');
        
        const displayCard = document.getElementById('displayCard');
        const cardDate = document.getElementById('cardDate');
        const cardText = document.getElementById('cardText');

        // Generates random SVG shapes that look like river stones
        function generateStoneSvg(seed) {
            const colors = ['#C4C2BC', '#D4DFD2', '#E2DFD8', '#E8D5C4', '#D2B48C']; // Greys, sage, warm sand
            const color = colors[seed % colors.length];
            
            // Generate a random-ish but organic path
            const v1 = 10 + (seed % 5);
            const v2 = 20 - (seed % 4);
            const v3 = 15 + (seed % 6);
            
            return `
            <svg width="45" height="35" viewBox="0 0 45 35" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M22 2 C32 1, 42 ${v1}, 43 18 C44 28, 35 33, 22 33 C10 33, 2 28, 2 18 C1 ${v2}, 10 3, 22 2 Z" fill="${color}" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>
                <path d="M15 7 C22 5, 28 6, 35 ${v3}" stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>`;
        }

        function calculateStonePosition(index, total) {
            // Creates a visually pleasing "pile" structure. 
            // Bottom layer fills first, then stacks up in a pyramid shape.
            const row = Math.floor(Math.sqrt(index)); 
            const indexInRow = index - (row * row);
            const stonesInRow = (row * 2) + 1;
            
            // X distribution
            const spread = 40; // Pixels apart
            const startX = -(stonesInRow - 1) * spread / 2;
            const xOffset = startX + (indexInRow * spread);
            
            // Add a little randomness so it looks natural, not perfect
            const jitterX = (Math.random() * 10) - 5;
            const jitterY = (Math.random() * 5);
            
            const finalX = xOffset + jitterX;
            const finalY = -(row * 15) - jitterY; // Y builds upwards from bottom
            const finalRot = (Math.random() * 40) - 20;

            return { x: finalX, y: finalY, rot: finalRot };
        }

        function renderAltar() {
            altar.innerHTML = '';
            countDisplay.innerText = testimonies.length;

            testimonies.forEach((t, index) => {
                const pos = calculateStonePosition(index, testimonies.length);
                const stone = document.createElement('div');
                
                stone.className = 'memorial-stone';
                stone.style.setProperty('--start-rot', `${(Math.random() * 180) - 90}deg`);
                stone.style.setProperty('--end-x', `${pos.x}px`);
                stone.style.setProperty('--end-y', `${pos.y}px`);
                stone.style.setProperty('--end-rot', `${pos.rot}deg`);
                
                // Keep the final positions intact
                stone.style.transform = `translateY(${pos.y}px) translateX(${pos.x}px) rotate(${pos.rot}deg)`;
                
                // We use the timestamp as a seed to keep the shape consistent
                stone.innerHTML = generateStoneSvg(t.timestamp);

                // Interactions
                stone.addEventListener('mouseenter', () => {
                    const dateObj = new Date(t.timestamp);
                    cardDate.innerText = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    cardText.innerText = `"${t.text}"`;
                    displayCard.classList.add('visible');
                    // Add subtle glow to the hovered stone via CSS z-index and filters
                });

                stone.addEventListener('mouseleave', () => {
                    displayCard.classList.remove('visible');
                });

                altar.appendChild(stone);
            });
        }

        function openModal() {
            modal.classList.remove('hidden');
            input.focus();
        }

        function closeModal() {
            modal.classList.add('hidden');
            input.value = '';
        }

        function saveTestimony() {
            const text = input.value.trim();
            if (text) {
                testimonies.push({
                    text: text,
                    timestamp: Date.now()
                });
                localStorage.setItem('faithreflects_testimonies', JSON.stringify(testimonies));
                renderAltar();
                closeModal();
            }
        }

        // Initial render
        renderAltar();
    </script>
</body>
</html>
