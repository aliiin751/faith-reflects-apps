<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Somatic Prism</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        /* Sovereign Light Mode Base */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: transparent; 
            color: #37352f; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        /* The Widget Container */
        .widget-box {
            background-color: #FCFBF9; /* Ivory Parchment */
            border: 1px solid #E9E5DC;
            box-shadow: 0 8px 30px rgba(0,0,0,0.03), inset 0 0 20px rgba(255,255,255,0.5);
            transition: all 1.5s ease;
            position: relative;
            overflow: hidden;
        }

        /* Dynamic Theme Variables */
        :root {
            --prism-color: #FCD34D; /* Default Amber/Neutral */
            --prism-glow: rgba(252, 211, 77, 0.4);
            --prism-beam: rgba(252, 211, 77, 0.15);
        }

        .theme-excellent { --prism-color: #10B981; --prism-glow: rgba(16, 185, 129, 0.4); --prism-beam: rgba(16, 185, 129, 0.15); }
        .theme-good { --prism-color: #3B82F6; --prism-glow: rgba(59, 130, 246, 0.4); --prism-beam: rgba(59, 130, 246, 0.15); }
        .theme-neutral { --prism-color: #F59E0B; --prism-glow: rgba(245, 158, 11, 0.4); --prism-beam: rgba(245, 158, 11, 0.15); }
        .theme-low { --prism-color: #EF4444; --prism-glow: rgba(239, 68, 68, 0.4); --prism-beam: rgba(239, 68, 68, 0.15); }
        .theme-anxious { --prism-color: #8B5CF6; --prism-glow: rgba(139, 92, 246, 0.4); --prism-beam: rgba(139, 92, 246, 0.15); }

        /* Ambient Room Glow */
        .ambient-glow {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--prism-beam) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: background 1.5s ease;
            animation: breathe-glow 4s infinite alternate ease-in-out;
        }

        @keyframes breathe-glow {
            0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
        }

        /* SVG Prism & Light Physics */
        .incoming-beam {
            fill: url(#sunbeamGrad);
            opacity: 0.6;
            animation: pulse-sun 3s infinite alternate ease-in-out;
            pointer-events: none;
        }

        @keyframes pulse-sun {
            0% { opacity: 0.5; }
            100% { opacity: 0.7; }
        }

        .refracted-beam {
            fill: url(#refractedGrad);
            transition: fill 1.5s ease, opacity 1s ease;
            opacity: 0.8;
            pointer-events: none;
        }

        /* The Glass Prism Rotation */
        #prism-core {
            transform-origin: 100px 90px;
            transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }
        
        .prism-face {
            transition: fill 1s ease;
        }

        /* Flash Effect when changing mood */
        .is-refracting .refracted-beam {
            animation: light-flash 1.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        .is-refracting #prism-glow {
            animation: prism-flash 1.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes light-flash {
            0% { opacity: 0.8; transform: scaleX(1); }
            20% { opacity: 1; transform: scaleX(1.1) rotate(2deg); filter: brightness(1.5); }
            100% { opacity: 0.8; transform: scaleX(1) rotate(0deg); filter: brightness(1); }
        }

        @keyframes prism-flash {
            0% { opacity: 0; }
            20% { opacity: 1; filter: drop-shadow(0 0 20px var(--prism-color)); }
            100% { opacity: 0.4; filter: drop-shadow(0 0 10px var(--prism-color)); }
        }

        /* Emotion Buttons */
        .mood-btn {
            background-color: #FFFFFF;
            border: 1px solid #E9E5DC;
            color: #8A867D;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }
        .mood-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border-color: #DCD7CA;
            color: #37352f;
        }
        .mood-btn:active { transform: translateY(1px) scale(0.96); }

        /* Selected States */
        .theme-excellent .btn-excellent { border-color: #10B981; background-color: #ECFDF5; color: #065F46; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15); }
        .theme-good .btn-good { border-color: #3B82F6; background-color: #EFF6FF; color: #1E40AF; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15); }
        .theme-neutral .btn-neutral { border-color: #F59E0B; background-color: #FFFBEB; color: #92400E; box-shadow: 0 4px 12px rgba(245, 158, 11, 0.15); }
        .theme-low .btn-low { border-color: #EF4444; background-color: #FEF2F2; color: #991B1B; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.15); }
        .theme-anxious .btn-anxious { border-color: #8B5CF6; background-color: #F5F3FF; color: #5B21B6; box-shadow: 0 4px 12px rgba(139, 92, 246, 0.15); }

        /* Log List */
        .log-item {
            animation: slideDown 0.4s ease forwards;
            background-color: #FFFFFF;
            border: 1px solid #E9E5DC;
            transition: all 0.3s ease;
        }
        .log-item:hover {
            background-color: #FCFBF9;
            border-color: #DCD7CA;
            transform: translateX(2px);
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #DCD7CA; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #B48025; }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(255,255,255,0.8); }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div id="widgetContainer" class="widget-box theme-neutral relative w-full max-w-sm rounded-3xl p-6 md:p-8 flex flex-col h-[650px] overflow-hidden">
        
        <div class="ambient-glow"></div>

        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-2 z-10 shrink-0">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#A39F96]">@faithreflects</span>
            <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#8A867D] border border-[#E9E5DC] bg-white flex items-center space-x-1 shadow-sm transition-colors duration-500" id="dominantBadge">
                <span>Dominant:</span>
                <span id="dominantMoodText" class="text-[--prism-color] transition-colors duration-500">Neutral</span>
            </div>
        </div>

        <h2 class="serif text-2xl text-[#37352f] mb-1 z-10 shrink-0 text-center md:text-left">Somatic Prism</h2>
        <p class="text-xs text-[#8A867D] italic mb-4 z-10 shrink-0 text-center md:text-left">"Let the light pass through."</p>

        <!-- SVG 3D Prism Environment -->
        <div class="relative w-full h-52 mb-4 z-10 flex justify-center items-center shrink-0 overflow-hidden rounded-2xl bg-[#FCFBF9] border border-[#E9E5DC] shadow-inner" id="prismEnvironment">
            <svg viewBox="0 0 200 160" class="w-full h-full overflow-visible">
                
                <defs>
                    <linearGradient id="sunbeamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="rgba(255, 255, 255, 0.9)"/>
                        <stop offset="50%" stop-color="rgba(255, 253, 240, 0.4)"/>
                        <stop offset="100%" stop-color="rgba(255, 255, 255, 0)"/>
                    </linearGradient>

                    <linearGradient id="refractedGrad" x1="0%" y1="0%" x2="100%" y2="50%">
                        <stop offset="0%" stop-color="var(--prism-color)"/>
                        <stop offset="100%" stop-color="var(--prism-beam)"/>
                    </linearGradient>

                    <radialGradient id="prismGlowGrad" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="var(--prism-color)"/>
                        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                    </radialGradient>
                </defs>

                <!-- Incoming Light Beam -->
                <polygon points="0,0 30,-10 100,75 80,95" class="incoming-beam"/>
                
                <!-- Refracted Outgoing Light Beam -->
                <!-- Originates from the prism center (100, 90) and expands outward to the right/bottom -->
                <polygon points="100,75 110,105 220,160 220,80" class="refracted-beam"/>

                <!-- Marble Pedestal Base -->
                <ellipse cx="100" cy="130" rx="35" ry="8" fill="#E9E5DC" stroke="#DCD7CA" stroke-width="1"/>
                <path d="M 65 130 L 65 140 C 65 145, 135 145, 135 140 L 135 130 Z" fill="#F4F1EB" stroke="#DCD7CA" stroke-width="1"/>

                <!-- The Glass Prism (Interactive) -->
                <!-- Glow behind the prism -->
                <circle cx="100" cy="90" r="30" fill="url(#prismGlowGrad)" id="prism-glow" opacity="0.4" style="transition: opacity 1s ease;"/>

                <g id="prism-core" onclick="randomSpin()">
                    <!-- Drop Shadow -->
                    <ellipse cx="100" cy="125" rx="20" ry="5" fill="rgba(0,0,0,0.1)"/>
                    
                    <!-- Back Face -->
                    <polygon points="100,30 65,120 135,110" fill="rgba(255,255,255,0.6)" stroke="#FFFFFF" stroke-width="1" stroke-linejoin="round"/>
                    
                    <!-- Left Face -->
                    <polygon points="100,30 65,120 100,125" fill="rgba(255,255,255,0.8)" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round" class="prism-face"/>
                    
                    <!-- Right Face (Darker reflection) -->
                    <polygon points="100,30 100,125 135,110" fill="rgba(240,240,240,0.5)" stroke="#FFFFFF" stroke-width="1" stroke-linejoin="round" class="prism-face"/>
                    
                    <!-- Core color reflection (tinted by mood) -->
                    <polygon points="98,40 70,115 100,120" fill="var(--prism-glow)" opacity="0.5" style="transition: fill 1s ease;"/>
                    <polygon points="102,40 100,120 130,108" fill="var(--prism-glow)" opacity="0.3" style="transition: fill 1s ease;"/>
                    
                    <!-- Specular Highlights -->
                    <line x1="100" y1="30" x2="100" y2="125" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
                    <line x1="95" y1="45" x2="70" y2="110" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
                </g>

            </svg>
        </div>

        <!-- Emotion Buttons Grid -->
        <div class="grid grid-cols-5 gap-2 w-full mb-4 z-10 shrink-0">
            <button onclick="setMood('excellent')" class="mood-btn btn-excellent py-2.5 rounded-xl flex flex-col items-center justify-center">
                <span class="text-sm mb-1">✨</span><span class="text-[8px] font-bold uppercase tracking-widest">Excel</span>
            </button>
            <button onclick="setMood('good')" class="mood-btn btn-good py-2.5 rounded-xl flex flex-col items-center justify-center">
                <span class="text-sm mb-1">🌿</span><span class="text-[8px] font-bold uppercase tracking-widest">Good</span>
            </button>
            <button onclick="setMood('neutral')" class="mood-btn btn-neutral py-2.5 rounded-xl flex flex-col items-center justify-center">
                <span class="text-sm mb-1">〰️</span><span class="text-[8px] font-bold uppercase tracking-widest">Neut</span>
            </button>
            <button onclick="setMood('low')" class="mood-btn btn-low py-2.5 rounded-xl flex flex-col items-center justify-center">
                <span class="text-sm mb-1">🌧️</span><span class="text-[8px] font-bold uppercase tracking-widest">Low</span>
            </button>
            <button onclick="setMood('anxious')" class="mood-btn btn-anxious py-2.5 rounded-xl flex flex-col items-center justify-center">
                <span class="text-sm mb-1">🌩️</span><span class="text-[8px] font-bold uppercase tracking-widest">Anx</span>
            </button>
        </div>

        <!-- History Log -->
        <div class="flex-1 w-full flex flex-col min-h-0 z-10">
            <div class="flex justify-between items-end mb-2 shrink-0 px-1 border-b border-[#E9E5DC] pb-2">
                <span class="text-[10px] font-bold tracking-widest uppercase text-[#A39F96]">Recent History</span>
            </div>
            
            <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-2" id="logList">
                <!-- Injected via JS -->
            </div>
        </div>

        <button id="resetTriggerBtn" class="mt-4 text-[9px] tracking-widest uppercase pb-0.5 z-10 shrink-0 text-[#A39F96] hover:text-[#37352f] transition-colors border-b border-transparent hover:border-[#37352f] self-center">
            Clear Logs (New Month)
        </button>

        <!-- Custom Reset Modal -->
        <div id="resetModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#FCFBF9] rounded-2xl p-6 w-full max-w-[260px] border border-[#E9E5DC] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#37352f]">Clear History?</h3>
                <p class="text-xs text-[#8A867D] mb-6">This will wipe your mood logs so you can begin tracking a new month.</p>
                <div class="flex space-x-3">
                    <button id="cancelResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#8A867D] hover:bg-gray-100 border border-transparent transition-colors">Cancel</button>
                    <button id="confirmResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#37352f] text-white hover:bg-black transition-colors shadow-md">Clear</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Mood Config
        const moods = {
            'excellent': { name: 'Excellent', icon: '✨', color: '#10B981' }, // Emerald
            'good': { name: 'Good', icon: '🌿', color: '#3B82F6' }, // Blue
            'neutral': { name: 'Neutral', icon: '〰️', color: '#F59E0B' }, // Amber
            'low': { name: 'Low', icon: '🌧️', color: '#EF4444' }, // Red
            'anxious': { name: 'Anxious', icon: '🌩️', color: '#8B5CF6' } // Violet
        };

        // State Management
        let logs = JSON.parse(localStorage.getItem('faithreflects_somatic_logs')) || [];

        // Elements
        const widgetContainer = document.getElementById('widgetContainer');
        const logList = document.getElementById('logList');
        const dominantMoodText = document.getElementById('dominantMoodText');
        const dominantBadge = document.getElementById('dominantBadge');
        const prismCore = document.getElementById('prism-core');
        
        // Modal Elements
        const resetModal = document.getElementById('resetModal');
        const resetTriggerBtn = document.getElementById('resetTriggerBtn');
        const cancelResetBtn = document.getElementById('cancelResetBtn');
        const confirmResetBtn = document.getElementById('confirmResetBtn');

        let currentRotation = 0;
        const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

        function calculateDominantMood() {
            if (logs.length === 0) {
                dominantMoodText.innerText = "Neutral";
                widgetContainer.className = 'widget-box theme-neutral relative w-full max-w-sm rounded-3xl p-6 md:p-8 flex flex-col h-[650px] overflow-hidden';
                return;
            }

            // Count frequencies
            const counts = {};
            logs.forEach(log => {
                counts[log.moodId] = (counts[log.moodId] || 0) + 1;
            });

            // Find max
            let dominantId = logs[logs.length-1].moodId; // fallback to most recent if tied
            let maxCount = 0;
            
            for (const [id, count] of Object.entries(counts)) {
                if (count > maxCount) {
                    maxCount = count;
                    dominantId = id;
                }
            }

            // Apply Theme based on DOMINANT mood
            widgetContainer.className = `widget-box theme-${dominantId} relative w-full max-w-sm rounded-3xl p-6 md:p-8 flex flex-col h-[650px] overflow-hidden`;
            dominantMoodText.innerText = moods[dominantId].name;
            
            // Adjust badge colors to match dominant theme
            const hex = moods[dominantId].color;
            dominantBadge.style.borderColor = `${hex}40`; // 40 is hex for 25% opacity
            dominantBadge.style.backgroundColor = `${hex}10`;
        }

        // Cosmetic spin when clicked
        window.randomSpin = function() {
            currentRotation += (120 + Math.random() * 120); // Spin 1-2 faces
            prismCore.style.transform = `rotate(${currentRotation}deg)`;
        };

        window.setMood = function(moodId) {
            // 1. Check if we already logged today. If so, replace it. If not, add it.
            const existingIndex = logs.findIndex(l => l.date === today);
            
            const newLog = {
                id: Date.now(),
                date: today,
                moodId: moodId,
                name: moods[moodId].name,
                icon: moods[moodId].icon,
                color: moods[moodId].color
            };

            if (existingIndex > -1) {
                logs[existingIndex] = newLog;
            } else {
                logs.push(newLog);
            }

            // Cap at 30 days history to prevent massive localstorage
            if (logs.length > 30) logs.shift();
            
            localStorage.setItem('faithreflects_somatic_logs', JSON.stringify(logs));

            // 2. Trigger Visual Animations
            currentRotation += 72; // Spin the prism
            prismCore.style.transform = `rotate(${currentRotation}deg)`;
            
            widgetContainer.classList.remove('is-refracting');
            void widgetContainer.offsetWidth; // Reflow
            widgetContainer.classList.add('is-refracting');

            // 3. Update UI
            calculateDominantMood();
            renderLogs();
        };

        window.deleteLog = function(id) {
            logs = logs.filter(l => l.id !== id);
            localStorage.setItem('faithreflects_somatic_logs', JSON.stringify(logs));
            calculateDominantMood();
            renderLogs();
        };

        function renderLogs() {
            logList.innerHTML = '';
            
            if (logs.length === 0) {
                logList.innerHTML = '<p class="text-xs text-[#A39F96] italic text-center mt-6">Select a mood above to cast your first light.</p>';
                return;
            }

            // Render from newest to oldest
            [...logs].reverse().forEach((log, i) => {
                const isToday = log.date === today;
                const label = isToday ? `Today` : log.date;
                
                const item = document.createElement('div');
                item.className = 'log-item p-3 rounded-xl flex items-center justify-between group';
                item.style.animationDelay = `${i * 0.05}s`;
                
                item.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <div class="w-8 h-8 rounded-lg flex items-center justify-center shadow-sm" style="background-color: ${log.color}20; border: 1px solid ${log.color}50;">
                            <span class="text-sm">${log.icon}</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[10px] font-bold tracking-widest uppercase" style="color: ${log.color};">${log.name}</span>
                            <span class="text-[10px] text-[#A39F96] mt-0.5">${label}</span>
                        </div>
                    </div>
                    <button onclick="deleteLog(${log.id})" class="opacity-0 group-hover:opacity-100 text-[#DCD7CA] hover:text-[#EF4444] transition-all p-1" title="Remove">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                `;
                logList.appendChild(item);
            });
        }

        // Modal Logic
        resetTriggerBtn.addEventListener('click', () => resetModal.classList.remove('hidden'));
        cancelResetBtn.addEventListener('click', () => resetModal.classList.add('hidden'));
        
        confirmResetBtn.addEventListener('click', () => {
            logs = [];
            localStorage.setItem('faithreflects_somatic_logs', JSON.stringify(logs));
            
            calculateDominantMood();
            renderLogs();
            
            // Snap back to neutral
            currentRotation += 180;
            prismCore.style.transform = `rotate(${currentRotation}deg)`;
            
            resetModal.classList.add('hidden');
        });

        // Initialize
        calculateDominantMood();
        renderLogs();

    </script>
</body>
</html>
