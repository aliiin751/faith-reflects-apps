<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sealed Epistles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        /* Light Mode Base - Relationships Aesthetic */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: transparent; 
            color: #37352f; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        /* The Widget Container */
        .widget-box {
            background-color: #FCFBF9; /* Ivory Parchment */
            border: 1px solid #F5E6E8; /* Soft blush border */
            box-shadow: 0 8px 30px rgba(159, 18, 57, 0.04), inset 0 0 20px rgba(255,255,255,0.6);
            transition: all 1.5s ease;
        }

        /* Ambient Glow */
        .ambient-glow {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 154, 137, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* The Epistles (Letter Items) */
        .epistle-card {
            background-color: #FFFFFF;
            border: 1px solid #E5D5D8;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02), inset 0 0 10px rgba(245, 230, 232, 0.2);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            transform-origin: center;
        }
        .epistle-card:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 8px 15px rgba(159, 18, 57, 0.05), inset 0 0 10px rgba(245, 230, 232, 0.4);
            border-color: #D49A89;
        }
        
        /* Left Accent Lines */
        .accent-courage { border-left: 3px solid #94A3B8; }
        .accent-appreciation { border-left: 3px solid #D49A89; }

        /* Sealing Animation Engine */
        .seal-wrapper {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            pointer-events: none;
        }

        .wax-stamp {
            transform: scale(3);
            opacity: 0;
        }

        .is-sealing .wax-stamp {
            animation: slamSeal 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slamSeal {
            0% { transform: scale(3); opacity: 0; filter: drop-shadow(0 20px 20px rgba(0,0,0,0.5)); }
            60% { transform: scale(0.9); opacity: 1; filter: drop-shadow(0 2px 2px rgba(153, 27, 27, 0.8)); }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; filter: drop-shadow(0 6px 8px rgba(153, 27, 27, 0.4)); }
        }

        /* Wax Splatter Particles */
        .wax-drop {
            position: absolute;
            border-radius: 50%;
            background-color: #BE123C;
            pointer-events: none;
            z-index: 25;
            opacity: 0;
        }
        .is-sealing .wax-drop {
            animation: splatter 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards 0.1s;
        }
        @keyframes splatter {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* After sealing, the card folds and slides away */
        .is-sealed-complete {
            animation: foldAway 0.5s ease-in forwards;
        }
        @keyframes foldAway {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.95); opacity: 1; }
            100% { transform: scale(0.8) translateY(30px); opacity: 0; }
        }

        /* Content fades during seal */
        .is-sealing .card-content {
            opacity: 0.3;
            filter: blur(1px);
            transition: all 0.4s ease;
        }

        /* Buttons & Inputs */
        input[type="text"] {
            background-color: #FFFFFF;
            border: 1px solid #E5D5D8;
            color: #37352f;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }
        input:focus {
            outline: none;
            border-color: #D49A89;
            box-shadow: 0 0 10px rgba(212, 154, 137, 0.2), inset 0 2px 4px rgba(0,0,0,0.01);
        }
        input::placeholder { color: #C4B5B7; font-style: italic; }

        .btn-seal {
            background-color: #FCFBF9;
            color: #B76E79;
            border: 1px solid #E5D5D8;
            transition: all 0.3s ease;
        }
        .btn-seal:hover {
            background-color: #FFFDFD;
            border-color: #D49A89;
            color: #9F1239;
            box-shadow: 0 4px 10px rgba(212, 154, 137, 0.15);
        }
        
        .btn-add {
            background-color: #37352f;
            color: #FFFFFF;
            transition: all 0.3s ease;
        }
        .btn-add:hover { background-color: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-add:active { transform: scale(0.95); }

        .btn-archive {
            background-color: transparent;
            color: #A39F96;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }
        .btn-archive:hover { 
            color: #37352f; 
            border-bottom-color: #37352f;
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E5D5D8; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #B76E79; }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(255,255,255,0.8); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div id="widgetContainer" class="widget-box relative w-full max-w-4xl rounded-3xl p-6 md:p-10 flex flex-col h-auto min-h-[620px] overflow-hidden">
        
        <div class="ambient-glow"></div>

        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-2 z-10 shrink-0">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#A39F96]">@faithreflects</span>
            <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#B76E79] border border-[#F5E6E8] bg-white flex items-center space-x-1 shadow-sm">
                <span id="sealedCount" class="text-[#9F1239]">0</span>
                <span>Sealed</span>
            </div>
        </div>

        <div class="flex items-end justify-between w-full mb-8 z-10 shrink-0 border-b border-[#F5E6E8] pb-4">
            <div>
                <h2 class="serif text-3xl text-[#37352f] mb-1">Conversations to Have</h2>
                <p class="text-xs text-[#8A867D] italic">"Speak truth with love."</p>
            </div>
            <button id="viewArchiveBtn" class="text-[9px] font-bold tracking-widest uppercase text-[#B76E79] hover:text-[#9F1239] transition-colors underline">
                Vault
            </button>
        </div>

        <!-- Two Column Layout -->
        <div class="flex-1 w-full flex flex-col md:flex-row gap-6 md:gap-10 z-10 min-h-0">
            
            <!-- LEFT COLUMN: COURAGE (Silver/Slate Theme) -->
            <div class="flex-1 flex flex-col min-h-0 border border-[#E9E5DC] bg-[#FCFBF9]/50 rounded-2xl p-4 shadow-inner">
                
                <div class="flex items-center space-x-2 mb-4 shrink-0 px-2">
                    <span class="text-xl">🛡️</span>
                    <div>
                        <h3 class="font-serif text-lg text-[#37352f] leading-none">Courage</h3>
                        <p class="text-[9px] uppercase tracking-widest text-[#94A3B8] font-bold mt-1">Hard conversations</p>
                    </div>
                </div>

                <!-- Courage List -->
                <div class="flex-1 overflow-y-auto custom-scrollbar space-y-3 px-1 pb-2" id="courageList">
                    <!-- Injected by JS -->
                </div>

                <!-- Add Courage Input -->
                <div class="flex space-x-2 shrink-0 mt-3 pt-3 border-t border-[#E9E5DC]">
                    <input type="text" id="courageInput" placeholder="I need to speak with..." class="flex-1 rounded-xl px-3 py-2 text-xs">
                    <button id="addCourageBtn" class="btn-add px-3 py-2 rounded-xl flex items-center justify-center">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    </button>
                </div>
            </div>

            <!-- RIGHT COLUMN: APPRECIATION (Rose Gold Theme) -->
            <div class="flex-1 flex flex-col min-h-0 border border-[#E9E5DC] bg-[#FCFBF9]/50 rounded-2xl p-4 shadow-inner">
                
                <div class="flex items-center space-x-2 mb-4 shrink-0 px-2">
                    <span class="text-xl">💝</span>
                    <div>
                        <h3 class="font-serif text-lg text-[#37352f] leading-none">Appreciation</h3>
                        <p class="text-[9px] uppercase tracking-widest text-[#D49A89] font-bold mt-1">Gratitude to express</p>
                    </div>
                </div>

                <!-- Appreciation List -->
                <div class="flex-1 overflow-y-auto custom-scrollbar space-y-3 px-1 pb-2" id="appreciationList">
                    <!-- Injected by JS -->
                </div>

                <!-- Add Appreciation Input -->
                <div class="flex space-x-2 shrink-0 mt-3 pt-3 border-t border-[#E9E5DC]">
                    <input type="text" id="appreciationInput" placeholder="I need to thank..." class="flex-1 rounded-xl px-3 py-2 text-xs">
                    <button id="addAppreciationBtn" class="btn-add px-3 py-2 rounded-xl flex items-center justify-center">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    </button>
                </div>
            </div>

        </div>

        <!-- Defs for Wax Seal SVG -->
        <svg width="0" height="0" class="absolute hidden">
            <defs>
                <radialGradient id="waxGrad" cx="35%" cy="30%" r="70%">
                    <stop offset="0%" stop-color="#E11D48"/> <!-- Bright Red Highlight -->
                    <stop offset="50%" stop-color="#BE123C"/> <!-- Deep Crimson -->
                    <stop offset="100%" stop-color="#881337"/> <!-- Dark Edges -->
                </radialGradient>
            </defs>
        </svg>

        <!-- Archive Vault Modal -->
        <div id="archiveModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#FCFBF9] rounded-3xl p-6 md:p-8 w-full max-w-2xl border border-[#F5E6E8] shadow-2xl flex flex-col h-[500px] transform transition-all">
                
                <div class="flex justify-between items-center mb-6 border-b border-[#E5D5D8] pb-4 shrink-0">
                    <h3 class="font-serif text-2xl text-[#37352f] flex items-center space-x-2">
                        <span class="text-[#9F1239]">💌</span>
                        <span>Sealed Epistles</span>
                    </h3>
                    <button id="closeArchiveBtn" class="text-[#A39F96] hover:text-[#37352f] transition-colors p-1">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                
                <div id="archiveList" class="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-4">
                    <!-- Logs injected by JS -->
                </div>
                
                <button id="clearArchiveBtn" class="mt-6 w-full py-3 rounded-xl text-xs font-semibold text-[#C4B5B7] hover:text-[#EF4444] border border-transparent hover:bg-red-50 transition-colors shrink-0">
                    Burn Archive (Permanent Delete)
                </button>
            </div>
        </div>

    </div>

    <script>
        // Initial Mock Data aligned with user's Notion template
        const defaultCourage = [
            { id: 101, type: 'courage', text: "With Elena about planning the Q3 family sabbatical", sealed: false, date: null },
            { id: 102, type: 'courage', text: "With Dad about estate planning", sealed: false, date: null },
            { id: 103, type: 'courage', text: "With Marcus about honest feedback on my launch", sealed: false, date: null }
        ];

        const defaultAppreciation = [
            { id: 201, type: 'appreciation', text: "Thank Mom for showing up at every milestone since I was born", sealed: false, date: null },
            { id: 202, type: 'appreciation', text: "Thank Paul for the mentorship that rewired my work ethic", sealed: false, date: null },
            { id: 203, type: 'appreciation', text: "Thank Elena for carrying faith for us when mine wavered", sealed: false, date: null }
        ];

        // State
        let letters = JSON.parse(localStorage.getItem('faithreflects_epistles')) || [...defaultCourage, ...defaultAppreciation];

        // Elements
        const courageList = document.getElementById('courageList');
        const appreciationList = document.getElementById('appreciationList');
        const sealedCount = document.getElementById('sealedCount');
        
        const courageInput = document.getElementById('courageInput');
        const addCourageBtn = document.getElementById('addCourageBtn');
        const appreciationInput = document.getElementById('appreciationInput');
        const addAppreciationBtn = document.getElementById('addAppreciationBtn');

        const archiveModal = document.getElementById('archiveModal');
        const viewArchiveBtn = document.getElementById('viewArchiveBtn');
        const closeArchiveBtn = document.getElementById('closeArchiveBtn');
        const clearArchiveBtn = document.getElementById('clearArchiveBtn');
        const archiveList = document.getElementById('archiveList');

        // SVG Generators
        function getWaxSealHtml(type) {
            // Heart for appreciation, Shield for courage
            const iconSvg = type === 'courage' 
                ? `<path d="M50 30 L70 40 L70 65 C70 80 50 90 50 90 C50 90 30 80 30 65 L30 40 Z" fill="none" stroke="#881337" stroke-width="4" stroke-linejoin="round"/>`
                : `<path d="M50 40 C50 40 40 25 25 35 C10 45 30 75 50 90 C70 75 90 45 75 35 C60 25 50 40 50 40 Z" fill="none" stroke="#881337" stroke-width="4" stroke-linejoin="round"/>`;

            let splatters = '';
            for(let i=0; i<6; i++) {
                const size = Math.random() * 4 + 3;
                const angle = Math.random() * Math.PI * 2;
                const dist = 35 + Math.random() * 25;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;
                splatters += `<div class="wax-drop" style="width:${size}px; height:${size}px; left:50%; top:50%; margin-left:-${size/2}px; margin-top:-${size/2}px; --tx:${tx}px; --ty:${ty}px;"></div>`;
            }

            return `
                <div class="seal-wrapper">
                    ${splatters}
                    <svg viewBox="0 0 100 100" class="w-16 h-16 wax-stamp">
                        <!-- Messy Outer Splatter Base -->
                        <path d="M50 5 C75 0, 95 20, 90 45 C98 65, 85 90, 60 95 C35 100, 5 85, 10 60 C0 40, 20 5, 50 5 Z" fill="url(#waxGrad)"/>
                        
                        <!-- Inner Raised Rings -->
                        <circle cx="50" cy="50" r="34" fill="none" stroke="#881337" stroke-width="3" opacity="0.6"/>
                        <circle cx="50" cy="50" r="30" fill="none" stroke="#E11D48" stroke-width="1.5" opacity="0.4"/>
                        
                        <!-- Embossed Icon -->
                        ${iconSvg}
                    </svg>
                </div>
            `;
        }

        function renderLists() {
            courageList.innerHTML = '';
            appreciationList.innerHTML = '';
            
            const activeCourage = letters.filter(l => l.type === 'courage' && !l.sealed);
            const activeAppreciation = letters.filter(l => l.type === 'appreciation' && !l.sealed);
            const sealedTotal = letters.filter(l => l.sealed).length;
            
            sealedCount.innerText = sealedTotal;

            if (activeCourage.length === 0) {
                courageList.innerHTML = `<p class="text-[10px] text-[#A39F96] italic text-center mt-4">No hard conversations pending.</p>`;
            } else {
                activeCourage.forEach(l => courageList.appendChild(createCard(l)));
            }

            if (activeAppreciation.length === 0) {
                appreciationList.innerHTML = `<p class="text-[10px] text-[#A39F96] italic text-center mt-4">Who needs to hear "thank you"?</p>`;
            } else {
                activeAppreciation.forEach(l => appreciationList.appendChild(createCard(l)));
            }
        }

        function createCard(letter) {
            const el = document.createElement('div');
            el.className = `epistle-card p-4 rounded-xl accent-${letter.type}`;
            el.id = `letter-${letter.id}`;
            
            el.innerHTML = `
                <div class="card-content flex flex-col h-full">
                    <p class="serif italic text-[13px] text-[#37352f] leading-relaxed mb-4 flex-1 pr-4 break-words">
                        "${letter.text}"
                    </p>
                    <div class="flex justify-between items-center mt-auto">
                        <button onclick="deleteActive(${letter.id})" class="text-[#C4B5B7] hover:text-[#EF4444] transition-colors p-1" title="Discard">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                        <button onclick="stampSeal(${letter.id}, '${letter.type}')" class="btn-seal px-3 py-1.5 rounded-lg text-[9px] font-bold tracking-widest uppercase flex items-center space-x-1">
                            <span>Seal</span>
                        </button>
                    </div>
                </div>
            `;
            return el;
        }

        function renderArchive() {
            archiveList.innerHTML = '';
            const sealedLetters = letters.filter(l => l.sealed).reverse();

            if (sealedLetters.length === 0) {
                archiveList.innerHTML = `<p class="text-xs text-[#A39F96] italic text-center mt-10">The vault is empty.</p>`;
                return;
            }

            sealedLetters.forEach(l => {
                const icon = l.type === 'courage' ? '🛡️' : '💝';
                const tagColor = l.type === 'courage' ? 'text-[#94A3B8]' : 'text-[#D49A89]';
                
                const item = document.createElement('div');
                item.className = 'bg-[#FCFBF9] border border-[#E5D5D8] p-4 rounded-xl flex items-start space-x-4 relative group';
                
                item.innerHTML = `
                    <div class="flex flex-col items-center justify-center shrink-0">
                        <span class="text-2xl mb-1">${icon}</span>
                        <div class="w-6 h-6 rounded-full bg-[#9F1239] flex items-center justify-center shadow-sm">
                            <span class="text-white text-[8px] font-bold">✓</span>
                        </div>
                    </div>
                    <div class="flex-1 min-w-0 pt-1">
                        <div class="flex items-center space-x-2 mb-1">
                            <span class="text-[9px] font-bold uppercase tracking-widest ${tagColor}">${l.type}</span>
                            <span class="text-[9px] text-[#A39F96]">• ${l.date}</span>
                        </div>
                        <p class="serif italic text-[15px] text-[#37352f] leading-relaxed">"${l.text}"</p>
                    </div>
                    <button onclick="deleteArchived(${l.id})" class="absolute top-3 right-3 opacity-0 group-hover:opacity-100 text-[#C4B5B7] hover:text-[#EF4444] transition-colors p-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                `;
                archiveList.appendChild(item);
            });
        }

        // Actions
        window.stampSeal = function(id, type) {
            const index = letters.findIndex(l => l.id === id);
            if (index > -1 && !letters[index].sealed) {
                const card = document.getElementById(`letter-${id}`);
                
                // Inject the Seal SVG
                card.insertAdjacentHTML('beforeend', getWaxSealHtml(type));
                
                // Trigger animations
                card.classList.add('is-sealing');
                
                setTimeout(() => {
                    card.classList.add('is-sealed-complete');
                    
                    setTimeout(() => {
                        // Update Data
                        letters[index].sealed = true;
                        letters[index].date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                        localStorage.setItem('faithreflects_epistles', JSON.stringify(letters));
                        
                        renderLists();
                    }, 500); // Wait for foldAway animation
                }, 1200); // Wait for slamSeal animation to hold for a moment
            }
        };

        function addLetter(type) {
            const input = type === 'courage' ? courageInput : appreciationInput;
            const text = input.value.trim();
            
            if (text) {
                letters.push({
                    id: Date.now(),
                    type: type,
                    text: text,
                    sealed: false,
                    date: null
                });
                
                localStorage.setItem('faithreflects_epistles', JSON.stringify(letters));
                input.value = '';
                renderLists();
                
                // Scroll list to bottom
                const list = type === 'courage' ? courageList : appreciationList;
                list.scrollTop = list.scrollHeight;
            }
        }

        addCourageBtn.addEventListener('click', () => addLetter('courage'));
        courageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') addLetter('courage'); });
        
        addAppreciationBtn.addEventListener('click', () => addLetter('appreciation'));
        appreciationInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') addLetter('appreciation'); });

        window.deleteActive = function(id) {
            letters = letters.filter(l => l.id !== id);
            localStorage.setItem('faithreflects_epistles', JSON.stringify(letters));
            renderLists();
        };

        window.deleteArchived = function(id) {
            letters = letters.filter(l => l.id !== id);
            localStorage.setItem('faithreflects_epistles', JSON.stringify(letters));
            renderArchive();
            renderLists(); // Updates the count
        };

        // Modal Logic
        viewArchiveBtn.addEventListener('click', () => {
            renderArchive();
            archiveModal.classList.remove('hidden');
        });

        closeArchiveBtn.addEventListener('click', () => {
            archiveModal.classList.add('hidden');
        });

        clearArchiveBtn.addEventListener('click', () => {
            if (confirm("Are you sure you want to permanently burn all sealed letters?")) {
                letters = letters.filter(l => !l.sealed);
                localStorage.setItem('faithreflects_epistles', JSON.stringify(letters));
                renderArchive();
                renderLists();
            }
        });

        // Initialize
        renderLists();

    </script>
</body>
</html>
