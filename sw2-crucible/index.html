<!DOCTYPE html>
<html lang="en" class="bg-[#191919]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Refiner's Crucible</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        /* Notion Dark Mode Base - Forced completely */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: #191919 !important; 
            color: #D4D4D4; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        .widget-box {
            background-color: #191919; 
            border: 1px solid #2d2d2d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: all 1.5s ease;
        }

        /* Crucible SVG Animations */
        .flame-layer {
            transform-origin: 50% 100%;
            transition: transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1), filter 1.5s ease;
        }
        
        .flame-back { animation: flicker 3s infinite alternate ease-in-out; }
        .flame-mid { animation: flicker 2s infinite alternate ease-in-out 0.5s; }
        .flame-front { animation: flicker 2.5s infinite alternate ease-in-out 1s; }

        @keyframes flicker {
            0% { transform: scaleY(0.95) scaleX(1.02) rotate(-2deg); }
            100% { transform: scaleY(1.05) scaleX(0.98) rotate(2deg); }
        }

        /* Surge effect when refining */
        .is-refining .flame-back { transform: scaleY(1.6) scaleX(1.2); filter: drop-shadow(0 0 20px rgba(234, 88, 12, 0.6)); }
        .is-refining .flame-mid { transform: scaleY(1.8) scaleX(1.1); filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.8)); }
        .is-refining .flame-front { transform: scaleY(1.4) scaleX(1.05); }

        .ambient-glow {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translate(-50%, 50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(234, 88, 12, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transition: all 1.5s ease;
        }
        .is-refining .ambient-glow {
            background: radial-gradient(circle, rgba(245, 158, 11, 0.3) 0%, transparent 70%);
            transform: translate(-50%, 50%) scale(1.5);
        }

        /* Input Area Fade Out */
        #inputSection {
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #inputSection.burned {
            opacity: 0;
            transform: translateY(-20px) scale(0.95);
            pointer-events: none;
        }

        /* Truth Reveal Animation */
        #truthSection {
            opacity: 0;
            transform: translateY(30px);
            pointer-events: none;
            transition: opacity 1.5s ease 1s, transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) 1s;
            position: absolute;
            top: 25%;
            left: 0;
            width: 100%;
            padding: 0 2rem;
            text-align: center;
        }
        #truthSection.revealed {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* Ash & Ember Particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 30;
            animation: float-burn 2.5s cubic-bezier(0.25, 1, 0.3, 1) forwards;
        }
        .particle.ash { background-color: #525252; width: 6px; height: 6px; filter: blur(1px); }
        .particle.ember { background-color: #F59E0B; width: 3px; height: 3px; box-shadow: 0 0 8px #D97706; }

        @keyframes float-burn {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            70% { opacity: 0.8; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* Inputs & Buttons */
        textarea {
            background-color: #111111;
            border: 1px solid #333333;
            transition: all 0.3s ease;
            color: #E5E5E5;
            resize: none;
        }
        textarea:focus {
            outline: none;
            border-color: #D4AF37;
            background-color: #1a1a1a;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }
        textarea::placeholder { color: #525252; font-style: italic; }

        .refine-btn {
            background-color: #262626;
            color: #A3A3A3;
            border: 1px solid #333333;
            transition: all 0.4s ease;
        }
        .refine-btn:hover { 
            background-color: #2D2416; 
            color: #FCD34D; 
            border-color: #5C451A; 
            box-shadow: 0 0 15px rgba(217, 119, 6, 0.15);
        }
        .refine-btn:active { transform: scale(0.96); }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden bg-[#191919]">

    <div id="widgetContainer" class="widget-box relative w-full max-w-sm rounded-3xl p-8 flex flex-col items-center h-[520px] overflow-hidden">
        
        <div class="ambient-glow"></div>

        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-6 z-10 shrink-0">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#737373]">@faithreflects</span>
            <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#A3A3A3] border border-[#333] bg-[#1a1a1a] flex items-center space-x-1">
                <span id="refineCount" class="text-[#D4AF37]">0</span>
                <span>Refined</span>
            </div>
        </div>

        <h2 class="serif text-2xl text-[#EDEDED] mb-1 z-10 shrink-0">The Crucible</h2>
        <p class="text-xs text-[#8B8B8B] italic mb-6 z-10 shrink-0">"Let the fire test it."</p>

        <!-- Input Area (Fades out) -->
        <div id="inputSection" class="w-full z-20 flex flex-col flex-1 relative">
            <label class="text-[10px] font-bold tracking-widest uppercase text-[#525252] mb-2 pl-1">The Anxious Thought</label>
            <textarea id="anxietyInput" placeholder='"What if everything falls apart..."' class="w-full flex-1 rounded-xl p-4 text-sm font-light mb-4" autocomplete="off"></textarea>
            
            <button id="refineBtn" class="refine-btn w-full py-3.5 rounded-xl text-xs font-semibold uppercase tracking-wider flex items-center justify-center space-x-2 shadow-lg shrink-0 mt-auto">
                <span class="text-base">🔥</span>
                <span>Refine in the Fire</span>
            </button>
        </div>

        <!-- Truth Reveal Area (Hidden initially) -->
        <div id="truthSection" class="z-20">
            <span class="text-xl mb-3 block">🕊️</span>
            <span class="text-[10px] font-bold tracking-widest uppercase text-[#D4AF37] block mb-2">God's Truth</span>
            <h3 id="truthText" class="serif italic text-[17px] text-[#EDEDED] leading-relaxed mb-3">
                "Do not fear, for I am with you."
            </h3>
            <p id="truthRef" class="text-[11px] text-[#A3A3A3] uppercase tracking-widest font-semibold border-b border-[#333] inline-block pb-1">
                Isaiah 41:10
            </p>
            
            <button id="resetBtn" class="mt-8 text-[10px] tracking-widest text-[#525252] uppercase hover:text-[#A3A3A3] transition-colors pb-1 border-b border-transparent hover:border-[#333]">
                Refine Another Thought
            </button>
        </div>

        <!-- Particles Container -->
        <div id="particlesContainer" class="absolute inset-0 pointer-events-none z-30 overflow-hidden"></div>

        <!-- Visual Crucible SVG (Bottom) -->
        <div class="relative w-full h-32 mt-auto z-10 flex justify-center items-end shrink-0 pointer-events-none">
            <svg viewBox="0 0 200 120" class="w-full h-full overflow-visible">
                
                <!-- Back inner bowl -->
                <ellipse cx="100" cy="50" rx="60" ry="15" fill="#111111"/>
                <path d="M40 50 Q100 80 160 50" fill="#1A1A1A"/>

                <!-- The Flames -->
                <g id="crucibleFlames" transform="translate(0, -10)">
                    <!-- Back Flame (Deep Orange) -->
                    <path class="flame-layer flame-back" d="M100 20 C125 50 135 80 100 90 C65 80 75 50 100 20 Z" fill="#EA580C"/>
                    <!-- Middle Flame (Amber) -->
                    <path class="flame-layer flame-mid" d="M100 40 C115 65 120 85 100 90 C80 85 85 65 100 40 Z" fill="#F59E0B"/>
                    <!-- Front Flame (Yellow/White) -->
                    <path class="flame-layer flame-front" d="M100 60 C108 75 110 88 100 90 C90 88 92 75 100 60 Z" fill="#FEF3C7"/>
                </g>

                <!-- Stone Crucible Front -->
                <path d="M30 45 C30 110, 170 110, 170 45 C170 60, 30 60, 30 45 Z" fill="#222222" stroke="#111111" stroke-width="2"/>
                <path d="M40 50 C40 100, 160 100, 160 50" fill="none" stroke="#2A2A2A" stroke-width="3"/>
                
                <!-- Stone texture details -->
                <path d="M60 60 L70 80 L90 85 L85 65 Z" fill="#262626" stroke="#1A1A1A" stroke-width="1"/>
                <path d="M90 85 L120 80 L110 60 L85 65 Z" fill="#1F1F1F" stroke="#1A1A1A" stroke-width="1"/>
                <path d="M120 80 L140 65 L130 55 L110 60 Z" fill="#262626" stroke="#1A1A1A" stroke-width="1"/>
                <path d="M50 55 L60 60 L85 65 L70 50 Z" fill="#1F1F1F" stroke="#1A1A1A" stroke-width="1"/>

                <!-- Front rim highlight -->
                <path d="M32 46 C32 60, 168 60, 168 46" fill="none" stroke="#333333" stroke-width="1.5" opacity="0.6"/>
            </svg>
        </div>

    </div>

    <script>
        // Truth Database
        const truths = [
            { verse: "Do not fear, for I am with you; do not be dismayed, for I am your God.", ref: "Isaiah 41:10" },
            { verse: "And we know that in all things God works for the good of those who love him.", ref: "Romans 8:28" },
            { verse: "My grace is sufficient for you, for my power is made perfect in weakness.", ref: "2 Cor 12:9" },
            { verse: "Cast all your anxiety on him because he cares for you.", ref: "1 Peter 5:7" },
            { verse: "Peace I leave with you; my peace I give you. I do not give to you as the world gives.", ref: "John 14:27" },
            { verse: "For God has not given us a spirit of fear, but of power and of love and of a sound mind.", ref: "2 Timothy 1:7" },
            { verse: "When anxiety was great within me, your consolation brought me joy.", ref: "Psalm 94:19" }
        ];

        // State
        let refineCount = parseInt(localStorage.getItem('faithreflects_crucible')) || 0;
        
        // Elements
        const container = document.getElementById('widgetContainer');
        const inputSection = document.getElementById('inputSection');
        const truthSection = document.getElementById('truthSection');
        const input = document.getElementById('anxietyInput');
        const refineBtn = document.getElementById('refineBtn');
        const resetBtn = document.getElementById('resetBtn');
        const countDisplay = document.getElementById('refineCount');
        const truthText = document.getElementById('truthText');
        const truthRef = document.getElementById('truthRef');
        const particlesContainer = document.getElementById('particlesContainer');

        // Init
        countDisplay.innerText = refineCount;

        function createBurnEffect() {
            // Get input box dimensions to spawn particles from the text area
            const rect = input.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            
            const startX = rect.left - containerRect.left;
            const startY = rect.top - containerRect.top;
            const width = rect.width;
            const height = rect.height;

            // Generate 40 mixed particles (Ash and Embers)
            for(let i=0; i<40; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    const isEmber = Math.random() > 0.6; // 40% chance to be an ember
                    p.className = `particle ${isEmber ? 'ember' : 'ash'}`;
                    
                    // Spawn inside the input box area
                    p.style.left = `${startX + (Math.random() * width)}px`;
                    p.style.top = `${startY + (Math.random() * height)}px`;
                    
                    // Float UP and slightly sideways
                    const travelX = (Math.random() * 100) - 50; 
                    const travelY = -(Math.random() * 150 + 100); 
                    
                    p.style.setProperty('--tx', `${travelX}px`);
                    p.style.setProperty('--ty', `${travelY}px`);
                    
                    particlesContainer.appendChild(p);
                    
                    setTimeout(() => {
                        if (particlesContainer.contains(p)) p.remove();
                    }, 2500);
                }, i * 20); // Stagger spawn
            }
        }

        refineBtn.addEventListener('click', () => {
            if (input.value.trim() === '') {
                input.focus();
                return;
            }

            // 1. Start Burn Visuals
            refineBtn.style.transform = 'scale(0.95)';
            container.classList.add('is-refining');
            
            setTimeout(() => {
                inputSection.classList.add('burned');
                createBurnEffect();
            }, 150);

            // 2. Select Truth
            const randomTruth = truths[Math.floor(Math.random() * truths.length)];
            truthText.innerText = `"${randomTruth.verse}"`;
            truthRef.innerText = randomTruth.ref;

            // 3. Reveal Truth & Update Count
            setTimeout(() => {
                truthSection.classList.add('revealed');
                
                refineCount++;
                localStorage.setItem('faithreflects_crucible', refineCount);
                countDisplay.innerText = refineCount;
                
                // Let flames calm down after reveal
                setTimeout(() => {
                    container.classList.remove('is-refining');
                }, 1500);

            }, 1200); // Wait for ash to fly up
        });

        // Reset for another entry
        resetBtn.addEventListener('click', () => {
            truthSection.classList.remove('revealed');
            
            setTimeout(() => {
                input.value = '';
                inputSection.classList.remove('burned');
            }, 800); // Wait for truth to fade out before showing input
        });

        // Enter key support
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                refineBtn.click();
            }
        });

    </script>
</body>
</html>
