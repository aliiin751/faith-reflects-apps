<!DOCTYPE html>
<html lang="en" class="bg-[#191919]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Vinyl Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        /* Notion Dark Mode Base - Forced completely */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: #191919 !important; 
            color: #D4D4D4; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        .widget-box {
            background-color: #191919; 
            border: 1px solid #2d2d2d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: all 1.5s ease;
        }
        
        .widget-box.is-playing {
            border-color: rgba(217, 119, 6, 0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 40px rgba(217, 119, 6, 0.05);
        }

        /* SVG Animations */
        .vinyl {
            transform-origin: 120px 100px;
        }
        .is-playing .vinyl {
            animation: spinVinyl 3.5s linear infinite;
        }
        @keyframes spinVinyl {
            100% { transform: rotate(360deg); }
        }

        /* Tonearm Animation Physics */
        .tonearm {
            transform-origin: 240px 50px;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(4px 4px 6px rgba(0,0,0,0.5));
            cursor: pointer;
        }
        .tonearm:hover {
            filter: drop-shadow(4px 4px 8px rgba(212, 175, 55, 0.4));
        }
        .tonearm:active {
            transform: scale(0.98);
        }
        .is-playing .tonearm {
            /* Physically drops onto the grooves */
            transform: rotate(35deg); 
        }

        /* Center LED indicator */
        .power-led {
            fill: #333;
            transition: fill 0.3s ease, filter 0.3s ease;
        }
        .is-playing .power-led {
            fill: #EF4444;
            filter: drop-shadow(0 0 6px rgba(239, 68, 68, 0.8));
        }

        /* Ambient Glow */
        .ambient-glow {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(217, 119, 6, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 2s ease;
            pointer-events: none;
            z-index: 0;
        }
        .is-playing .ambient-glow { opacity: 1; }

        /* UI Text Fades */
        .track-info {
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.8s ease;
        }
        .is-playing .track-info {
            opacity: 1;
            transform: translateY(0);
        }

        /* Volume Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100px;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px; width: 12px;
            border-radius: 50%;
            background: #D4AF37;
            cursor: pointer;
            margin-top: -5px;
            box-shadow: 0 0 5px rgba(212, 175, 55, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 2px;
            cursor: pointer; background: #404040;
        }
        input[type=range]:focus { outline: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden bg-[#191919]">

    <!-- Hidden Audio Players -->
    <!-- Vintage Vinyl Crackle -->
    <audio id="crackleAudio" loop>
        <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_b253ba63d0.mp3" type="audio/mpeg">
    </audio>
    <!-- Ambient Worship Pad -->
    <audio id="padAudio" loop>
        <source src="https://cdn.pixabay.com/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg">
    </audio>

    <div id="widgetContainer" class="widget-box relative w-full max-w-sm rounded-3xl p-6 md:p-8 flex flex-col items-center min-h-[500px] overflow-hidden">
        
        <div class="ambient-glow"></div>

        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-6 z-10 shrink-0">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#737373]">@faithreflects</span>
            <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#A3A3A3] border border-[#333] bg-[#1a1a1a] flex items-center space-x-1">
                <span class="power-led w-2 h-2 rounded-full inline-block mr-1" style="fill: transparent; background: currentColor;"></span>
                <span>Power</span>
            </div>
        </div>

        <h2 class="serif text-2xl text-[#EDEDED] mb-1 z-10">Worship Lounge</h2>
        <p class="text-xs text-[#8B8B8B] italic mb-8 z-10" id="statusText">"Click the tonearm to drop the needle."</p>

        <!-- Top-Down Record Player SVG -->
        <div class="relative w-full h-48 mb-6 z-10 shrink-0 flex justify-center items-center">
            <svg viewBox="0 0 300 200" class="w-full h-full overflow-visible drop-shadow-2xl">
                
                <!-- Main Wooden Chassis -->
                <rect x="10" y="10" width="280" height="180" rx="15" fill="#22150E" stroke="#110A07" stroke-width="4"/>
                <rect x="15" y="15" width="270" height="170" rx="10" fill="#301F14"/>
                
                <!-- Wood Grain Detail Lines -->
                <path d="M 25 30 Q 150 20 275 40 M 20 70 Q 150 90 280 60 M 25 140 Q 150 160 275 130" stroke="#25160E" stroke-width="1" fill="none" opacity="0.6"/>

                <!-- Turntable Platter (Base) -->
                <circle cx="120" cy="100" r="76" fill="#111111" filter="drop-shadow(0 8px 8px rgba(0,0,0,0.6))"/>
                <circle cx="120" cy="100" r="74" fill="#1A1A1A"/>

                <!-- Spinning Vinyl Record -->
                <g class="vinyl">
                    <!-- The Record -->
                    <circle cx="120" cy="100" r="73" fill="#0A0A0A"/>
                    
                    <!-- Vinyl Grooves -->
                    <circle cx="120" cy="100" r="68" fill="none" stroke="#1F1F1F" stroke-width="1.5"/>
                    <circle cx="120" cy="100" r="63" fill="none" stroke="#1F1F1F" stroke-width="1"/>
                    <circle cx="120" cy="100" r="57" fill="none" stroke="#151515" stroke-width="2"/>
                    <circle cx="120" cy="100" r="51" fill="none" stroke="#1F1F1F" stroke-width="1.5"/>
                    <circle cx="120" cy="100" r="44" fill="none" stroke="#151515" stroke-width="1"/>
                    <circle cx="120" cy="100" r="37" fill="none" stroke="#1F1F1F" stroke-width="1.5"/>
                    <circle cx="120" cy="100" r="32" fill="none" stroke="#151515" stroke-width="1"/>

                    <!-- Subtle light reflection on the vinyl (creates the spinning effect) -->
                    <path d="M 120 27 A 73 73 0 0 1 193 100 L 173 100 A 53 53 0 0 0 120 47 Z" fill="rgba(255,255,255,0.03)"/>
                    <path d="M 120 173 A 73 73 0 0 1 47 100 L 67 100 A 53 53 0 0 0 120 153 Z" fill="rgba(255,255,255,0.03)"/>

                    <!-- Custom FaithReflects Label -->
                    <circle cx="120" cy="100" r="26" fill="#2d2d2d"/>
                    <circle cx="120" cy="100" r="24" fill="#D4AF37"/> <!-- Gold ring -->
                    <circle cx="120" cy="100" r="23" fill="#FAF8F5"/> <!-- Cream label -->
                    
                    <!-- Label Text (Curved) -->
                    <path id="curve" d="M 105 100 A 15 15 0 1 1 135 100" fill="transparent" />
                    <text font-family="monospace" font-size="5" fill="#333" font-weight="bold" letter-spacing="0.5">
                        <textPath href="#curve" startOffset="50%" text-anchor="middle">SACRED PADS</textPath>
                    </text>
                    
                    <!-- Bottom Label Text -->
                    <text x="120" y="112" font-family="sans-serif" font-size="3" fill="#8B6508" text-anchor="middle" font-weight="bold">VOL. 1</text>
                </g>

                <!-- Center Spindle -->
                <circle cx="120" cy="100" r="4" fill="#B0B0B0" filter="drop-shadow(2px 2px 2px rgba(0,0,0,0.5))"/>
                <circle cx="120" cy="100" r="1.5" fill="#111"/>

                <!-- Control Knobs (Decorative) -->
                <circle cx="35" cy="165" r="8" fill="#111" stroke="#333" stroke-width="1" filter="drop-shadow(2px 4px 4px rgba(0,0,0,0.4))"/>
                <circle cx="35" cy="165" r="6" fill="#1A1A1A"/>
                <circle cx="35" cy="163" r="1.5" fill="#333"/>
                
                <circle cx="60" cy="165" r="8" fill="#111" stroke="#333" stroke-width="1" filter="drop-shadow(2px 4px 4px rgba(0,0,0,0.4))"/>
                <circle cx="60" cy="165" r="6" fill="#1A1A1A"/>
                <circle cx="60" cy="163" r="1.5" fill="#333"/>

                <circle cx="35" cy="35" r="3" class="power-led"/> <!-- LED -->

                <!-- Brass Tonearm Group (Interactive) -->
                <g class="tonearm" id="tonearmGroup">
                    
                    <!-- Counterweight & Pivot Base -->
                    <circle cx="240" cy="50" r="18" fill="#111111" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.5))"/>
                    <circle cx="240" cy="50" r="14" fill="#1A1A1A"/>
                    <rect x="236" y="25" width="8" height="15" fill="#D4AF37" rx="1"/> <!-- Counterweight -->
                    
                    <!-- The Arm -->
                    <line x1="240" y1="50" x2="240" y2="145" stroke="#D4AF37" stroke-width="4" stroke-linecap="round"/>
                    <line x1="240" y1="50" x2="240" y2="145" stroke="#FDE68A" stroke-width="1" stroke-linecap="round" opacity="0.6"/> <!-- Highlight -->
                    
                    <!-- Pivot Pin -->
                    <circle cx="240" cy="50" r="6" fill="#222"/>
                    <circle cx="240" cy="50" r="2" fill="#D4AF37"/>

                    <!-- Stylus / Headshell -->
                    <rect x="234" y="145" width="12" height="22" fill="#1A1A1A" rx="2"/>
                    <rect x="236" y="147" width="8" height="18" fill="#262626" rx="1"/>
                    <path d="M 234 150 L 230 150 L 230 160 L 234 160 Z" fill="#D4AF37"/> <!-- Needle tip connector -->
                </g>

                <!-- Invisible massive hit area over the tonearm for easy clicking -->
                <circle cx="240" cy="100" r="40" fill="transparent" id="hitArea" style="cursor: pointer;"/>

            </svg>
        </div>

        <!-- Now Playing Info -->
        <div class="w-full flex-1 flex flex-col items-center justify-center z-10">
            <div class="track-info text-center flex flex-col items-center">
                <span class="text-[9px] font-bold tracking-widest uppercase text-[#D4AF37] mb-1.5 flex items-center space-x-2">
                    <svg class="w-3 h-3 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                    <span>Now Playing</span>
                </span>
                <p class="text-sm text-[#EDEDED] font-medium tracking-wide">Atmospheric Worship Pad</p>
            </div>
            
            <!-- Volume Control -->
            <div class="mt-6 flex items-center space-x-2 opacity-50 hover:opacity-100 transition-opacity">
                <svg class="w-3 h-3 text-[#A3A3A3]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                <input type="range" id="volumeControl" min="0" max="1" step="0.05" value="0.4">
            </div>
        </div>

    </div>

    <script>
        const container = document.getElementById('widgetContainer');
        const tonearmGroup = document.getElementById('tonearmGroup');
        const hitArea = document.getElementById('hitArea');
        const statusText = document.getElementById('statusText');
        const volumeControl = document.getElementById('volumeControl');
        
        const crackleAudio = document.getElementById('crackleAudio');
        const padAudio = document.getElementById('padAudio');

        let isPlaying = false;

        // Initialize Volume
        crackleAudio.volume = volumeControl.value * 0.4; // Crackle should be softer
        padAudio.volume = volumeControl.value;

        volumeControl.addEventListener('input', (e) => {
            const vol = e.target.value;
            padAudio.volume = vol;
            crackleAudio.volume = vol * 0.4;
        });

        function togglePlayer() {
            isPlaying = !isPlaying;

            if (isPlaying) {
                // Play animations
                container.classList.add('is-playing');
                statusText.innerText = "Selah.";
                
                // Play audio and handle promises to prevent AbortError on rapid toggling
                const cracklePromise = crackleAudio.play();
                if (cracklePromise !== undefined) {
                    cracklePromise.catch(e => { console.log("Crackle playback interrupted"); });
                }
                
                // Slight delay for the musical pad to fade in after the needle "drops"
                setTimeout(() => {
                    if(isPlaying) {
                        const padPromise = padAudio.play();
                        if (padPromise !== undefined) {
                            padPromise.catch(e => { console.log("Pad playback interrupted"); });
                        }
                    }
                }, 800);
                
            } else {
                // Pause animations
                container.classList.remove('is-playing');
                statusText.innerText = "Click the tonearm to drop the needle.";
                
                // Pause audio
                crackleAudio.pause();
                padAudio.pause();
            }
        }

        // Make both the tonearm and the invisible hit area trigger the player
        tonearmGroup.addEventListener('click', togglePlayer);
        hitArea.addEventListener('click', togglePlayer);

    </script>
</body>
</html>
