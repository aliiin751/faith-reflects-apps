<!DOCTYPE html>
<html lang="en" class="bg-[#191919]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starry Night Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        /* Notion Dark Mode Base - Forced completely */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: #191919 !important; 
            color: #D4D4D4; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        .widget-box {
            background-color: #191919; 
            border: 1px solid #2d2d2d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: all 1.5s ease;
        }

        /* Sky Container */
        .sky-container {
            background: radial-gradient(circle at center 120%, #1e2530 0%, #0d1117 50%, #05070a 100%);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
            border: 1px solid #2a313d;
        }

        /* Interactive Stars */
        .golden-star {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            animation: twinkle var(--twinkle-dur) infinite alternate ease-in-out;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.3s ease, box-shadow 0.3s ease;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .golden-star:hover {
            transform: translate(-50%, -50%) scale(1.8) !important;
            background-color: #FCD34D !important;
            box-shadow: 0 0 15px 4px rgba(252, 211, 77, 0.6) !important;
            z-index: 30;
            animation-play-state: paused;
        }

        @keyframes twinkle {
            0% { opacity: 0.4; filter: drop-shadow(0 0 2px var(--star-color)); transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 1; filter: drop-shadow(0 0 8px var(--star-color)); transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Shooting Star Animation */
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 4px 1px rgba(255,255,255,0.4);
            opacity: 0;
            transform: rotate(-45deg);
            animation: shoot 4s infinite linear;
            pointer-events: none;
        }
        .shooting-star::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
        }
        @keyframes shoot {
            0% { transform: translate(150px, -50px) rotate(-45deg); opacity: 1; }
            20% { transform: translate(-150px, 250px) rotate(-45deg); opacity: 0; }
            100% { transform: translate(-150px, 250px) rotate(-45deg); opacity: 0; }
        }

        /* Tooltip Display */
        .sky-tooltip {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .sky-tooltip.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Inputs & Buttons */
        textarea, input[type="text"] {
            background-color: #111111;
            border: 1px solid #333333;
            transition: all 0.3s ease;
            color: #E5E5E5;
        }
        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: #D4AF37;
            background-color: #1a1a1a;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }
        textarea::placeholder, input[type="text"]::placeholder { color: #525252; font-style: italic; }
        
        textarea::-webkit-scrollbar { width: 4px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: #404040; border-radius: 4px; }

        .action-btn {
            background-color: #262626;
            color: #A3A3A3;
            border: 1px solid #333333;
            transition: all 0.4s ease;
        }
        .action-btn:hover { 
            background-color: #2D2416; 
            color: #FCD34D; 
            border-color: #5C451A; 
            box-shadow: 0 0 15px rgba(217, 119, 6, 0.15);
        }
        .action-btn:active { transform: scale(0.96); }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(0,0,0,0.6); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden bg-[#191919]">

    <div id="widgetContainer" class="widget-box relative w-full max-w-sm rounded-3xl p-6 md:p-8 flex flex-col h-[600px] overflow-hidden">
        
        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-4 shrink-0">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#737373]">@faithreflects</span>
            <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#A3A3A3] border border-[#333] bg-[#1a1a1a] flex items-center space-x-1">
                <span id="starCount" class="text-[#D4AF37]">0</span>
                <span>Verses</span>
            </div>
        </div>

        <h2 class="serif text-2xl text-[#EDEDED] mb-1 shrink-0">Golden Verses</h2>
        <p class="text-xs text-[#8B8B8B] italic mb-6 shrink-0">"The ones that make your soul catch fire."</p>

        <!-- Interactive Sky Map -->
        <div class="relative w-full h-48 rounded-2xl sky-container mb-6 shrink-0 flex flex-col" id="skyArea">
            
            <!-- Shooting Star Detail -->
            <div class="shooting-star" style="top: 20%; left: 80%;"></div>

            <!-- Background Static Stars (Injected via JS) -->
            <div id="bgStarsContainer" class="absolute inset-0 pointer-events-none opacity-40"></div>
            
            <!-- User Verse Stars (Injected via JS) -->
            <div id="interactiveStarsContainer" class="absolute inset-0"></div>

            <!-- Hover Tooltip -->
            <div id="skyTooltip" class="sky-tooltip absolute bottom-2 left-2 right-2 bg-[#111111]/90 backdrop-blur-md border border-[#333] rounded-xl p-3 z-20 flex flex-col items-center justify-center text-center">
                <span id="tooltipRef" class="text-[9px] font-bold tracking-widest uppercase text-[#D4AF37] mb-1">REFERENCE</span>
                <p id="tooltipText" class="serif italic text-[11px] text-[#D4D4D4] leading-relaxed line-clamp-2">Verse text goes here...</p>
            </div>
            
            <!-- Default empty state message inside sky -->
            <div id="emptySkyMsg" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-50">
                <span class="text-[10px] uppercase tracking-widest text-[#737373]">Add a verse to light the sky</span>
            </div>
        </div>

        <!-- Input Area -->
        <div class="flex-1 flex flex-col z-10 w-full min-h-0">
            <div class="flex flex-col space-y-3 h-full">
                <textarea id="verseInput" placeholder="Write out the scripture..." class="w-full flex-1 rounded-xl px-4 py-3 text-sm font-light resize-none" autocomplete="off"></textarea>
                <div class="flex space-x-2 shrink-0">
                    <input type="text" id="refInput" placeholder="Reference (e.g. John 1:5)" class="w-1/2 rounded-xl px-4 py-3 text-xs font-light" autocomplete="off">
                    <button id="addStarBtn" class="action-btn w-1/2 py-3 rounded-xl text-xs font-semibold uppercase tracking-wider flex items-center justify-center space-x-1 shadow-lg">
                        <span>✨ Add Star</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Read/Delete Verse Modal -->
        <div id="readModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#191919] rounded-2xl p-6 w-full max-w-[280px] border border-[#D4AF37] shadow-[0_0_30px_rgba(212,175,55,0.1)] transform transition-all flex flex-col">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-xl">✨</span>
                    <button id="closeReadBtn" class="text-[#737373] hover:text-[#D4D4D4] transition-colors p-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                
                <p id="modalVerseText" class="serif italic text-[15px] text-[#EDEDED] leading-relaxed mb-4">
                    "The light shines in the darkness, and the darkness has not overcome it."
                </p>
                <p id="modalVerseRef" class="text-[10px] font-bold tracking-widest uppercase text-[#D4AF37] text-right border-b border-[#333] pb-4 mb-4">
                    John 1:5
                </p>

                <button id="deleteStarBtn" class="w-full py-2.5 rounded-xl text-xs font-semibold text-[#737373] hover:text-[#EF4444] hover:bg-[#EF4444]/10 border border-transparent hover:border-[#EF4444]/30 transition-colors">
                    Remove from Galaxy
                </button>
            </div>
        </div>

    </div>

    <script>
        // Star color palette (Realistic star colors: Blue-white, White, Yellow, Orange, Red-Dwarf)
        const starColors = ['#93C5FD', '#FFFFFF', '#FEF3C7', '#FCD34D', '#FCA5A5'];
        
        let verses = JSON.parse(localStorage.getItem('faithreflects_golden_verses')) || [];
        
        const bgStarsContainer = document.getElementById('bgStarsContainer');
        const interactiveStarsContainer = document.getElementById('interactiveStarsContainer');
        const emptySkyMsg = document.getElementById('emptySkyMsg');
        
        const verseInput = document.getElementById('verseInput');
        const refInput = document.getElementById('refInput');
        const addStarBtn = document.getElementById('addStarBtn');
        const starCount = document.getElementById('starCount');
        
        const skyTooltip = document.getElementById('skyTooltip');
        const tooltipRef = document.getElementById('tooltipRef');
        const tooltipText = document.getElementById('tooltipText');
        
        // Modal Elements
        const readModal = document.getElementById('readModal');
        const closeReadBtn = document.getElementById('closeReadBtn');
        const deleteStarBtn = document.getElementById('deleteStarBtn');
        const modalVerseText = document.getElementById('modalVerseText');
        const modalVerseRef = document.getElementById('modalVerseRef');
        
        let currentViewingId = null;

        // Generate tiny static background stars once
        function generateBackgroundStars() {
            for(let i=0; i<40; i++) {
                const star = document.createElement('div');
                const size = Math.random() * 1.5 + 0.5;
                star.style.position = 'absolute';
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.backgroundColor = '#ffffff';
                star.style.borderRadius = '50%';
                star.style.opacity = Math.random() * 0.8 + 0.2;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                bgStarsContainer.appendChild(star);
            }
        }

        // Generate a random star profile for a new verse
        function createStarData() {
            return {
                x: 10 + Math.random() * 80, // Keep away from exact edges
                y: 10 + Math.random() * 70, // Leave bottom 20% for tooltip
                size: 4 + Math.random() * 4, // 4px to 8px
                color: starColors[Math.floor(Math.random() * starColors.length)],
                twinkleSpeed: 1.5 + Math.random() * 3, // 1.5s to 4.5s
                delay: Math.random() * -5 // Offset animation start
            };
        }

        function renderGalaxy() {
            interactiveStarsContainer.innerHTML = '';
            starCount.innerText = verses.length;
            
            if (verses.length > 0) {
                emptySkyMsg.classList.add('hidden');
            } else {
                emptySkyMsg.classList.remove('hidden');
            }

            verses.forEach(v => {
                const star = document.createElement('div');
                star.className = 'golden-star';
                
                // Apply saved physical traits
                star.style.left = `${v.ui.x}%`;
                star.style.top = `${v.ui.y}%`;
                star.style.width = `${v.ui.size}px`;
                star.style.height = `${v.ui.size}px`;
                star.style.backgroundColor = v.ui.color;
                star.style.boxShadow = `0 0 6px ${v.ui.color}`;
                
                // Pass variables to CSS for animation
                star.style.setProperty('--star-color', v.ui.color);
                star.style.setProperty('--twinkle-dur', `${v.ui.twinkleSpeed}s`);
                star.style.animationDelay = `${v.ui.delay}s`;

                // Hover Interactions (Tooltip)
                star.addEventListener('mouseenter', () => {
                    tooltipRef.innerText = v.ref || "Golden Verse";
                    tooltipText.innerText = `"${v.text}"`;
                    skyTooltip.classList.add('visible');
                });
                
                star.addEventListener('mouseleave', () => {
                    skyTooltip.classList.remove('visible');
                });

                // Click Interaction (Open Modal)
                star.addEventListener('click', () => {
                    currentViewingId = v.id;
                    modalVerseText.innerText = `"${v.text}"`;
                    modalVerseRef.innerText = v.ref || "Golden Verse";
                    
                    skyTooltip.classList.remove('visible');
                    readModal.classList.remove('hidden');
                });

                interactiveStarsContainer.appendChild(star);
            });
        }

        // Add Verse
        addStarBtn.addEventListener('click', () => {
            const text = verseInput.value.trim();
            const ref = refInput.value.trim();
            
            if (text) {
                const newVerse = {
                    id: Date.now(),
                    text: text,
                    ref: ref,
                    ui: createStarData() // Lock in random positioning forever
                };
                
                verses.push(newVerse);
                localStorage.setItem('faithreflects_golden_verses', JSON.stringify(verses));
                
                verseInput.value = '';
                refInput.value = '';
                
                // Button feedback
                addStarBtn.style.transform = 'scale(0.95)';
                setTimeout(() => addStarBtn.style.transform = 'scale(1)', 150);
                
                renderGalaxy();
            }
        });

        // Close Modal
        closeReadBtn.addEventListener('click', () => {
            readModal.classList.add('hidden');
            currentViewingId = null;
        });

        // Delete Star
        deleteStarBtn.addEventListener('click', () => {
            if (currentViewingId) {
                verses = verses.filter(v => v.id !== currentViewingId);
                localStorage.setItem('faithreflects_golden_verses', JSON.stringify(verses));
                renderGalaxy();
                
                readModal.classList.add('hidden');
                currentViewingId = null;
            }
        });

        // Initial setup
        generateBackgroundStars();
        renderGalaxy();

    </script>
</body>
</html>
