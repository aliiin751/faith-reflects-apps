<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer" />
    <title>FaithReflects Worship Radio</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-text': '#4A433A', 
                        'brand-accent': '#C87A5E', 
                        'brand-gold': '#DDA15E',
                        'brand-sage': '#8C9A86',
                        'brand-bg': '#FDFBF7',
                        'brand-card': '#F8F4FA'
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: transparent !important; }

        /* Premium App Layout & Film Grain */
        .radio-card {
            background: linear-gradient(135deg, #F8F4FA, #FDF5F0, #FDFBF7, #F5EEF0);
            background-size: 300% 300%;
            animation: gradientMove 20s ease infinite;
            border: 1px solid rgba(140, 154, 134, 0.2);
            box-shadow: 0 4px 20px -5px rgba(74, 67, 58, 0.08);
            position: relative;
        }

        .radio-card::after {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.035;
            pointer-events: none;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            z-index: 1;
            border-radius: inherit;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Inner Panel */
        .glass-panel {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 15px -5px rgba(139, 115, 85, 0.05);
            position: relative;
            z-index: 10;
        }

        /* Live Badge Pulse */
        .live-dot {
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(200, 122, 94, 0.7); transform: scale(0.95); }
            70% { box-shadow: 0 0 0 6px rgba(200, 122, 94, 0); transform: scale(1); }
            100% { box-shadow: 0 0 0 0 rgba(200, 122, 94, 0); transform: scale(0.95); }
        }

        /* Animated Audio Equalizer */
        .eq-container {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 24px;
        }
        .eq-bar {
            width: 4px;
            background-color: #8C9A86;
            border-radius: 4px;
            transform-origin: bottom;
            transition: height 0.3s ease;
        }
        .is-playing .eq-bar {
            animation: eqBounce 0.8s infinite ease-in-out alternate;
        }
        .is-playing .eq-bar:nth-child(1) { animation-delay: 0.1s; height: 12px; }
        .is-playing .eq-bar:nth-child(2) { animation-delay: 0.3s; height: 20px; }
        .is-playing .eq-bar:nth-child(3) { animation-delay: 0.0s; height: 16px; }
        .is-playing .eq-bar:nth-child(4) { animation-delay: 0.4s; height: 24px; }
        .is-playing .eq-bar:nth-child(5) { animation-delay: 0.2s; height: 14px; }
        
        /* Paused state for equalizer */
        .eq-bar:nth-child(1) { height: 4px; }
        .eq-bar:nth-child(2) { height: 6px; }
        .eq-bar:nth-child(3) { height: 4px; }
        .eq-bar:nth-child(4) { height: 6px; }
        .eq-bar:nth-child(5) { height: 4px; }

        @keyframes eqBounce {
            0% { transform: scaleY(0.3); }
            100% { transform: scaleY(1); }
        }

        /* Custom Volume Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 10px;
            width: 10px;
            border-radius: 50%;
            background: #8C9A86;
            cursor: pointer;
            margin-top: -3px;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: #C87A5E;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(140, 154, 134, 0.2);
            border-radius: 2px;
        }
        input[type=range]:focus { outline: none; }
    </style>
</head>
<body class="m-0 p-4 w-screen h-screen overflow-hidden flex items-center justify-center">

    <!-- Compact Radio Card -->
    <div class="radio-card w-full max-w-[380px] rounded-[2rem] p-6 flex flex-col gap-5">
        
        <!-- Header: Badge & Status -->
        <div class="relative z-10 flex justify-between items-center">
            <span class="inline-flex items-center gap-1.5 font-sans text-[0.65rem] font-bold tracking-[0.2em] uppercase text-brand-sage">
                <i class="ph-fill ph-radio text-sm"></i> Worship Station
            </span>
            
            <!-- Live Badge -->
            <div class="flex items-center gap-1.5 bg-white/60 px-2.5 py-1 rounded-full border border-brand-accent/10">
                <div id="live-indicator" class="w-2 h-2 rounded-full bg-brand-text/30 transition-colors duration-500"></div>
                <span class="font-sans text-[0.6rem] font-bold tracking-widest uppercase text-brand-text/60">Live</span>
            </div>
        </div>

        <!-- Main Display: Equalizer & Title -->
        <div class="glass-panel rounded-2xl p-5 flex items-center gap-5">
            <!-- Visualizer -->
            <div id="visualizer" class="eq-container shrink-0 w-[36px]">
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
            </div>

            <!-- Track Info -->
            <div class="flex-1 overflow-hidden">
                <h2 class="font-serif text-xl text-brand-text leading-tight truncate">Instrumental Peace</h2>
                <p class="font-sans text-[0.7rem] font-medium tracking-wide text-brand-text/50 uppercase mt-0.5 truncate">
                    Atmospheric • Lo-Fi • Rest
                </p>
            </div>
        </div>

        <!-- Controls: Play & Volume -->
        <div class="relative z-10 flex items-center justify-between gap-4">
            
            <!-- Play/Pause Button -->
            <button onclick="togglePlay()" class="shrink-0 w-12 h-12 rounded-full bg-brand-sage text-white shadow-md shadow-brand-sage/20 flex items-center justify-center hover:bg-brand-accent hover:shadow-brand-accent/20 transition-all duration-300 transform hover:scale-105 group">
                <i id="play-icon" class="ph-fill ph-play text-xl ml-1 group-hover:scale-110 transition-transform"></i>
            </button>

            <!-- Volume Slider -->
            <div class="flex-1 flex items-center gap-2.5 bg-white/40 px-4 py-2.5 rounded-full border border-brand-text/5">
                <button onclick="toggleMute()" class="text-brand-sage hover:text-brand-accent transition-colors">
                    <i id="volume-icon" class="ph-fill ph-speaker-high text-lg"></i>
                </button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" oninput="setVolume(this.value)">
            </div>

        </div>

        <!-- Brand Footer -->
        <div class="relative z-10 text-center mt-1">
            <a href="https://instagram.com/faithreflects" target="_blank" class="font-sans font-medium tracking-[0.25em] text-[0.6rem] uppercase text-brand-text/40 hover:text-brand-accent transition-colors cursor-pointer inline-flex items-center gap-1">
                <i class="ph-fill ph-sparkle text-[8px] text-brand-accent/50"></i> @FAITHREFLECTS
            </a>
        </div>
        
    </div>

    <script>
        // --- AUDIO SETUP ---
        // Using a highly reliable, beautiful instrumental/ambient track hosted securely.
        // It acts as an endless loop "station".
        const audioUrl = "https://cdn.pixabay.com/audio/2022/05/27/audio_1808fbf07a.mp3"; 
        
        const audio = new Audio();
        audio.src = audioUrl;
        audio.loop = true; // Loops forever like a real radio station
        audio.volume = 0.5;
        audio.preload = 'none'; // Prevents pre-loading to respect Notion's bandwidth

        let isPlaying = false;
        let isMuted = false;
        let previousVolume = 0.5;

        // --- DOM ELEMENTS ---
        const playIcon = document.getElementById('play-icon');
        const visualizer = document.getElementById('visualizer');
        const liveIndicator = document.getElementById('live-indicator');
        const volumeIcon = document.getElementById('volume-icon');
        const volumeSlider = document.getElementById('volume-slider');

        // --- LOGIC ---
        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                setPlayState(false);
            } else {
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        setPlayState(true);
                    }).catch(error => {
                        console.error("Playback blocked by browser:", error);
                        // Fallback for strict browser sandboxes
                        audio.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
                        audio.play().then(() => setPlayState(true)).catch(e => console.error("Total audio block", e));
                    });
                }
            }
        }

        function setPlayState(playing) {
            isPlaying = playing;
            if (playing) {
                // UI: Playing
                playIcon.classList.remove('ph-play', 'ml-1');
                playIcon.classList.add('ph-pause');
                visualizer.classList.add('is-playing');
                
                // Live Badge turns Terracotta and pulses
                liveIndicator.classList.remove('bg-brand-text/30');
                liveIndicator.classList.add('bg-brand-accent', 'live-dot');
            } else {
                // UI: Paused
                playIcon.classList.remove('ph-pause');
                playIcon.classList.add('ph-play', 'ml-1');
                visualizer.classList.remove('is-playing');
                
                // Live Badge goes dormant
                liveIndicator.classList.add('bg-brand-text/30');
                liveIndicator.classList.remove('bg-brand-accent', 'live-dot');
            }
        }

        function setVolume(val) {
            audio.volume = val;
            isMuted = val == 0;
            updateVolumeIcon(val);
        }

        function toggleMute() {
            if (isMuted) {
                // Unmute
                audio.volume = previousVolume > 0 ? previousVolume : 0.5;
                volumeSlider.value = audio.volume;
                isMuted = false;
            } else {
                // Mute
                previousVolume = audio.volume;
                audio.volume = 0;
                volumeSlider.value = 0;
                isMuted = true;
            }
            updateVolumeIcon(audio.volume);
        }

        function updateVolumeIcon(val) {
            volumeIcon.className = "ph-fill text-lg transition-transform ";
            if (val == 0) {
                volumeIcon.classList.add('ph-speaker-x', 'text-brand-text/40');
            } else if (val < 0.5) {
                volumeIcon.classList.add('ph-speaker-low');
            } else {
                volumeIcon.classList.add('ph-speaker-high');
            }
        }

        // Initialize state
        updateVolumeIcon(audio.volume);

    </script>
</body>
</html>
