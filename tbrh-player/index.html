<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambient Soundscape — FaithReflects</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #F5F0E8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .widget {
    width: 100%;
    max-width: 800px;
    padding: 18px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    border: 1px solid rgba(212,168,83,0.15);
    border-radius: 12px;
    background: linear-gradient(135deg, #F5F0E8, #FAF6EE);
  }

  .title-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .title-row .icon {
    font-size: 14px;
  }

  .title-row .title {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #A0937D;
  }

  /* Sound buttons */
  .sounds-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 14px;
  }

  .sound-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2px solid #E0D6C4;
    background: transparent;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    position: relative;
  }

  .sound-btn .emoji {
    font-size: 20px;
    line-height: 1;
  }

  .sound-btn .name {
    font-size: 7px;
    font-weight: 500;
    color: #A0937D;
    margin-top: 2px;
    letter-spacing: 0.3px;
  }

  .sound-btn:hover {
    border-color: #D4A853;
    transform: scale(1.08);
  }

  .sound-btn.active {
    border-color: #D4A853;
    background: rgba(212,168,83,0.08);
    box-shadow: 0 0 12px rgba(212,168,83,0.2), inset 0 0 8px rgba(212,168,83,0.08);
  }

  .sound-btn.active .name {
    color: #D4A853;
    font-weight: 600;
  }

  /* Animated ring for active */
  .sound-btn.active::after {
    content: '';
    position: absolute;
    top: -4px; left: -4px; right: -4px; bottom: -4px;
    border-radius: 50%;
    border: 1.5px solid rgba(212,168,83,0.3);
    animation: pulseRing 2s ease-in-out infinite;
  }

  @keyframes pulseRing {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.1); opacity: 0; }
  }

  /* Volume + Now Playing row */
  .controls-row {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 420px;
  }

  .mute-btn {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .mute-btn:hover { opacity: 1; }

  .volume-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(90deg, #D4A853, #E0D6C4);
    outline: none;
    cursor: pointer;
  }

  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #D4A853;
    border: 2px solid #FFFDF8;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    cursor: pointer;
    transition: transform 0.15s;
  }

  .volume-slider::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  .volume-slider::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #D4A853;
    border: 2px solid #FFFDF8;
    cursor: pointer;
  }

  .now-playing {
    font-size: 10px;
    color: #A0937D;
    white-space: nowrap;
    min-width: 90px;
    text-align: right;
  }

  .now-playing .label {
    color: #D4A853;
    font-weight: 500;
  }

  /* Watermark */
  .watermark {
    position: absolute;
    bottom: 6px;
    right: 14px;
    font-family: 'Playfair Display', serif;
    font-size: 8px;
    color: #D4C9B0;
    letter-spacing: 1.5px;
  }

  @media (max-width: 500px) {
    .widget { padding: 14px 16px; }
    .sound-btn { width: 44px; height: 44px; }
    .sound-btn .emoji { font-size: 16px; }
    .sounds-row { gap: 8px; }
  }
</style>
</head>
<body>
<div class="widget">
  <div class="title-row">
    <span class="icon">🎵</span>
    <span class="title">Ambient Reading Atmosphere</span>
  </div>

  <div class="sounds-row" id="soundsRow">
    <button class="sound-btn" data-sound="rain" data-freq="200" data-label="Gentle Rain">
      <span class="emoji">🌧️</span>
      <span class="name">Rain</span>
    </button>
    <button class="sound-btn" data-sound="fire" data-freq="150" data-label="Fireplace">
      <span class="emoji">🔥</span>
      <span class="name">Fire</span>
    </button>
    <button class="sound-btn" data-sound="piano" data-freq="440" data-label="Soft Piano">
      <span class="emoji">🎹</span>
      <span class="name">Piano</span>
    </button>
    <button class="sound-btn" data-sound="ocean" data-freq="120" data-label="Ocean Waves">
      <span class="emoji">🌊</span>
      <span class="name">Ocean</span>
    </button>
    <button class="sound-btn" data-sound="birds" data-freq="800" data-label="Morning Birds">
      <span class="emoji">🐦</span>
      <span class="name">Birds</span>
    </button>
    <button class="sound-btn" data-sound="forest" data-freq="250" data-label="Forest">
      <span class="emoji">🌿</span>
      <span class="name">Forest</span>
    </button>
  </div>

  <div class="controls-row">
    <button class="mute-btn" id="muteBtn">🔊</button>
    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="40">
    <div class="now-playing" id="nowPlaying">Select a sound</div>
  </div>

  <div class="watermark">FAITHREFLECTS</div>
</div>

<script>
  // Ambient sound generation using Web Audio API (no external files needed)
  let audioCtx = null;
  let currentNodes = [];
  let currentSound = null;
  let volume = 0.4;
  let muted = false;
  let masterGain = null;

  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = volume;
      masterGain.connect(audioCtx.destination);
    }
    return audioCtx;
  }

  function stopAll() {
    currentNodes.forEach(n => {
      try { n.stop(); } catch(e) {}
      try { n.disconnect(); } catch(e) {}
    });
    currentNodes = [];
  }

  // Generate ambient noise types
  function createNoise(type) {
    const ctx = getAudioCtx();
    stopAll();

    if (type === 'rain') {
      // Brown noise + filter for rain
      const bufferSize = 2 * ctx.sampleRate;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      let last = 0;
      for (let i = 0; i < bufferSize; i++) {
        const white = Math.random() * 2 - 1;
        data[i] = (last + 0.02 * white) / 1.02;
        last = data[i];
        data[i] *= 3.5;
      }
      const src = ctx.createBufferSource();
      src.buffer = buffer;
      src.loop = true;
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 800;
      src.connect(filter);
      filter.connect(masterGain);
      src.start();
      currentNodes.push(src);

    } else if (type === 'fire') {
      // Crackling: filtered noise
      const bufferSize = 2 * ctx.sampleRate;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
        if (Math.random() > 0.97) data[i] *= 3;
      }
      const src = ctx.createBufferSource();
      src.buffer = buffer;
      src.loop = true;
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 600;
      bp.Q.value = 0.5;
      const gain = ctx.createGain();
      gain.gain.value = 0.6;
      src.connect(bp);
      bp.connect(gain);
      gain.connect(masterGain);
      src.start();
      currentNodes.push(src);

    } else if (type === 'piano') {
      // Soft tones cycle
      const notes = [261.63, 329.63, 392, 523.25, 440, 349.23, 293.66, 261.63];
      function playNote(idx) {
        if (currentSound !== 'piano') return;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = notes[idx % notes.length];
        g.gain.setValueAtTime(0, ctx.currentTime);
        g.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 0.3);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 3);
        osc.connect(g);
        g.connect(masterGain);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 3.5);
        currentNodes.push(osc);
        setTimeout(() => playNote(idx + 1), 2800);
      }
      playNote(0);

    } else if (type === 'ocean') {
      // Low noise with LFO for waves
      const bufferSize = 2 * ctx.sampleRate;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      let last = 0;
      for (let i = 0; i < bufferSize; i++) {
        const w = Math.random() * 2 - 1;
        data[i] = (last + 0.01 * w) / 1.01;
        last = data[i];
        data[i] *= 5;
      }
      const src = ctx.createBufferSource();
      src.buffer = buffer;
      src.loop = true;
      const lfo = ctx.createOscillator();
      lfo.frequency.value = 0.1;
      const lfoGain = ctx.createGain();
      lfoGain.gain.value = 0.4;
      lfo.connect(lfoGain);
      const gain = ctx.createGain();
      gain.gain.value = 0.6;
      lfoGain.connect(gain.gain);
      src.connect(gain);
      gain.connect(masterGain);
      lfo.start();
      src.start();
      currentNodes.push(src, lfo);

    } else if (type === 'birds') {
      // Chirps
      function chirp() {
        if (currentSound !== 'birds') return;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        const baseFreq = 1800 + Math.random() * 1200;
        osc.frequency.setValueAtTime(baseFreq, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.3, ctx.currentTime + 0.08);
        osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.8, ctx.currentTime + 0.15);
        g.gain.setValueAtTime(0, ctx.currentTime);
        g.gain.linearRampToValueAtTime(0.06, ctx.currentTime + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.connect(g);
        g.connect(masterGain);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.25);
        currentNodes.push(osc);
        setTimeout(chirp, 800 + Math.random() * 2000);
      }
      chirp();
      // Background breeze
      const bufferSize = 2 * ctx.sampleRate;
      const buf = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const d = buf.getChannelData(0);
      let l = 0;
      for (let i = 0; i < bufferSize; i++) {
        d[i] = (l + 0.02 * (Math.random() * 2 - 1)) / 1.02;
        l = d[i]; d[i] *= 2;
      }
      const s = ctx.createBufferSource();
      s.buffer = buf; s.loop = true;
      const f = ctx.createBiquadFilter();
      f.type = 'highpass'; f.frequency.value = 400;
      const gn = ctx.createGain(); gn.gain.value = 0.15;
      s.connect(f); f.connect(gn); gn.connect(masterGain);
      s.start();
      currentNodes.push(s);

    } else if (type === 'forest') {
      // Wind + subtle rustling
      const bufferSize = 2 * ctx.sampleRate;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      let last = 0;
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (last + 0.015 * (Math.random() * 2 - 1)) / 1.015;
        last = data[i]; data[i] *= 4;
      }
      const src = ctx.createBufferSource();
      src.buffer = buffer; src.loop = true;
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 500; bp.Q.value = 0.3;
      const lfo = ctx.createOscillator();
      lfo.frequency.value = 0.15;
      const lfoG = ctx.createGain(); lfoG.gain.value = 200;
      lfo.connect(lfoG); lfoG.connect(bp.frequency);
      src.connect(bp); bp.connect(masterGain);
      lfo.start(); src.start();
      currentNodes.push(src, lfo);
    }
  }

  // UI
  const nowPlaying = document.getElementById('nowPlaying');
  const muteBtn = document.getElementById('muteBtn');
  const volSlider = document.getElementById('volumeSlider');

  document.querySelectorAll('.sound-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const sound = btn.dataset.sound;
      const label = btn.dataset.label;

      if (currentSound === sound) {
        // Toggle off
        stopAll();
        currentSound = null;
        btn.classList.remove('active');
        nowPlaying.innerHTML = 'Select a sound';
        return;
      }

      document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSound = sound;
      nowPlaying.innerHTML = '<span class="label">Playing:</span> ' + label;
      createNoise(sound);
    });
  });

  volSlider.addEventListener('input', (e) => {
    volume = e.target.value / 100;
    if (masterGain) masterGain.gain.value = muted ? 0 : volume;
  });

  muteBtn.addEventListener('click', () => {
    muted = !muted;
    muteBtn.textContent = muted ? '\ud83d\udd07' : '\ud83d\udd0a';
    if (masterGain) masterGain.gain.value = muted ? 0 : volume;
  });
</script>
</body>
</html>
