<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rings of Devotion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        /* Light Mode Base - Relationships Aesthetic */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: transparent; 
            color: #37352f; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        /* The Widget Container */
        .widget-box {
            background-color: #FCFBF9; /* Ivory Parchment */
            border: 1px solid #F5E6E8; /* Soft blush border */
            box-shadow: 0 8px 30px rgba(159, 18, 57, 0.04), inset 0 0 20px rgba(255,255,255,0.6);
            transition: all 1.5s ease;
        }

        /* Ambient Glow */
        .ambient-glow {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(183, 110, 121, 0) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: background 1.5s ease;
        }
        .is-unified .ambient-glow {
            background: radial-gradient(circle, rgba(159, 18, 57, 0.15) 0%, rgba(212, 154, 137, 0.1) 50%, transparent 70%);
            animation: breathe-glow 4s infinite alternate ease-in-out;
        }

        @keyframes breathe-glow {
            0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
        }

        /* 3D Scene & Ring Physics */
        .perspective-scene {
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        .ring-group {
            transform-origin: 100px 100px;
            transition: transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1), filter 1s ease;
            transform-style: preserve-3d;
        }

        .ring-track {
            fill: none;
            stroke: #F5E6E8;
            stroke-width: 2;
            opacity: 0.6;
        }

        .ring-progress {
            fill: none;
            stroke-linecap: round;
            transform-origin: 100px 100px;
            transform: rotate(-90deg);
            transition: stroke-dashoffset 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Weekly Ring (Inner - Crimson) */
        #ring-weekly-progress { stroke: #9F1239; stroke-width: 6; stroke-dasharray: 251.32; stroke-dashoffset: 251.32; }
        #group-weekly { transform: rotateX(45deg) rotateY(20deg); }
        #group-weekly.is-aligned { 
            transform: rotateX(0deg) rotateY(0deg); 
            filter: drop-shadow(0 0 10px rgba(159, 18, 57, 0.4));
        }

        /* Monthly Ring (Mid - Rose Gold) */
        #ring-monthly-progress { stroke: #B76E79; stroke-width: 5; stroke-dasharray: 376.99; stroke-dashoffset: 376.99; }
        #group-monthly { transform: rotateX(-30deg) rotateY(-40deg); }
        #group-monthly.is-aligned { 
            transform: rotateX(0deg) rotateY(0deg); 
            filter: drop-shadow(0 0 10px rgba(183, 110, 121, 0.4));
        }

        /* Yearly Ring (Outer - Warm Gold) */
        #ring-yearly-progress { stroke: #D4AF37; stroke-width: 4; stroke-dasharray: 502.65; stroke-dashoffset: 502.65; }
        #group-yearly { transform: rotateX(20deg) rotateY(50deg); }
        #group-yearly.is-aligned { 
            transform: rotateX(0deg) rotateY(0deg); 
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
        }

        /* Unified state animations */
        .is-unified .ring-group {
            animation: unified-spin 20s linear infinite;
        }
        .is-unified #group-monthly { animation-direction: reverse; animation-duration: 25s; }
        .is-unified #group-weekly { animation-duration: 15s; }
        
        @keyframes unified-spin {
            100% { transform: rotateZ(360deg); }
        }

        /* Tab Navigation */
        .tab-btn {
            background: transparent;
            color: #A39F96;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .tab-btn:hover { color: #B76E79; }
        .tab-btn.active {
            color: #9F1239;
            border-bottom-color: #9F1239;
            font-weight: 600;
        }

        /* Checklist Items */
        .ritual-row {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .ritual-row:hover:not(.checked) {
            background-color: #FFFDFD;
            border-color: #F5E6E8;
            transform: translateX(2px);
        }
        
        .check-box {
            width: 18px;
            height: 18px;
            border-radius: 5px;
            border: 1.5px solid #E5D5D8;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            background-color: #fff;
        }
        
        .ritual-row.checked .check-box {
            background-color: #9F1239;
            border-color: #9F1239;
            box-shadow: 0 0 8px rgba(159, 18, 57, 0.3);
        }

        .check-mark {
            stroke-dasharray: 20;
            stroke-dashoffset: 20;
            transition: stroke-dashoffset 0.4s ease-in-out 0.1s;
            stroke: #fff;
        }
        .ritual-row.checked .check-mark { stroke-dashoffset: 0; }

        .ritual-name {
            font-size: 12px;
            color: #37352f;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .ritual-row.checked .ritual-name {
            color: #A39F96;
            text-decoration: line-through;
        }

        /* Input & Buttons */
        .add-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #E5D5D8;
            font-size: 11px;
            color: #525252;
            transition: border-color 0.3s ease;
        }
        .add-input:focus { outline: none; border-color: #B76E79; }
        .add-input::placeholder { color: #C4B5B7; font-style: italic; }

        .delete-btn { opacity: 0; transition: opacity 0.2s ease; color: #C4B5B7; }
        .ritual-row:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: #9F1239; }

        .btn-reset {
            background-color: transparent;
            color: #A39F96;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }
        .btn-reset:hover { color: #9F1239; border-bottom-color: #9F1239; }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E5D5D8; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #B76E79; }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(255,255,255,0.8); }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div id="widgetContainer" class="widget-box relative w-full max-w-2xl rounded-3xl p-6 md:p-8 flex flex-col md:flex-row h-auto min-h-[480px] overflow-hidden gap-8">
        
        <div class="ambient-glow" id="ambientGlow"></div>

        <!-- Left Side: SVG Visualizer -->
        <div class="flex-shrink-0 flex flex-col items-center w-full md:w-[260px] h-full relative z-20">
            
            <div class="w-full flex justify-between items-center mb-2">
                <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#A39F96]">@faithreflects</span>
            </div>
            
            <h2 class="serif text-2xl text-[#37352f] mb-1 text-center w-full">Rituals</h2>
            <p class="text-[10px] text-[#8A867D] italic mb-6 text-center w-full">"Love is an intentional habit."</p>

            <!-- 3D Interlocking Rings -->
            <div class="relative w-full h-52 flex justify-center items-center perspective-scene shrink-0">
                <svg viewBox="0 0 200 200" class="w-full h-full overflow-visible absolute inset-0">
                    
                    <!-- Yearly Ring (Outer) -->
                    <g id="group-yearly" class="ring-group">
                        <circle cx="100" cy="100" r="80" class="ring-track"/>
                        <circle cx="100" cy="100" r="80" class="ring-progress" id="ring-yearly-progress"/>
                    </g>

                    <!-- Monthly Ring (Middle) -->
                    <g id="group-monthly" class="ring-group">
                        <circle cx="100" cy="100" r="60" class="ring-track"/>
                        <circle cx="100" cy="100" r="60" class="ring-progress" id="ring-monthly-progress"/>
                    </g>

                    <!-- Weekly Ring (Inner) -->
                    <g id="group-weekly" class="ring-group">
                        <circle cx="100" cy="100" r="40" class="ring-track"/>
                        <circle cx="100" cy="100" r="40" class="ring-progress" id="ring-weekly-progress"/>
                    </g>

                    <!-- Center Anchor Point -->
                    <circle cx="100" cy="100" r="4" fill="#E5D5D8" id="centerAnchor" class="transition-all duration-1000"/>
                    <circle cx="100" cy="100" r="1.5" fill="#9F1239"/>

                </svg>

                <div id="unityMessage" class="absolute bottom-[-10px] text-[9px] uppercase tracking-[0.2em] font-bold text-[#9F1239] opacity-0 transition-opacity duration-1000 bg-white/80 px-3 py-1 rounded-full border border-[#F5E6E8]">
                    Perfect Unity
                </div>
            </div>
        </div>

        <!-- Right Side: Rituals Checklist -->
        <div class="flex-1 w-full flex flex-col z-20 min-h-0 pl-2 md:pl-0 border-t md:border-t-0 md:border-l border-[#F5E6E8] pt-6 md:pt-0 md:pl-8">
            
            <div class="flex justify-between items-end mb-4 shrink-0 px-1">
                <!-- Tab Navigation -->
                <div class="flex space-x-4">
                    <button onclick="switchTab('weekly')" id="tab-weekly" class="tab-btn active text-[11px] font-bold tracking-widest uppercase pb-1">Weekly</button>
                    <button onclick="switchTab('monthly')" id="tab-monthly" class="tab-btn text-[11px] font-bold tracking-widest uppercase pb-1">Monthly</button>
                    <button onclick="switchTab('yearly')" id="tab-yearly" class="tab-btn text-[11px] font-bold tracking-widest uppercase pb-1">Yearly</button>
                </div>
            </div>

            <!-- Dynamic List Container -->
            <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-1.5 mb-2 min-h-[160px]" id="ritualsList">
                <!-- Injected via JS -->
            </div>

            <!-- Add New Input -->
            <div class="flex items-center space-x-2 shrink-0 border-t border-[#F5E6E8] pt-3 mt-1 pb-1">
                <input type="text" id="newRitualInput" placeholder="Add a new rhythm..." class="add-input flex-1 py-1.5 w-full min-w-0" autocomplete="off">
                <button id="addBtn" class="text-[#B76E79] hover:text-[#9F1239] transition-colors shrink-0 p-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </button>
            </div>

            <!-- Contextual Reset Button -->
            <button id="resetTriggerBtn" class="mt-3 text-[9px] tracking-widest uppercase pb-0.5 z-10 shrink-0 btn-reset self-start">
                Reset Weekly Progress
            </button>

        </div>

    </div>

    <!-- Reset Confirmation Modal -->
    <div id="resetModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
        <div class="bg-[#FCFBF9] rounded-2xl p-6 w-full max-w-[260px] border border-[#F5E6E8] shadow-2xl text-center transform transition-all">
            <h3 id="modalTitle" class="font-serif text-xl mb-2 text-[#37352f]">Reset Rhythms?</h3>
            <p id="modalDesc" class="text-xs text-[#8A867D] mb-6">This will uncheck all Weekly rituals to start a fresh cycle.</p>
            <div class="flex space-x-3">
                <button id="cancelResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#8A867D] hover:bg-gray-100 border border-transparent transition-colors">Cancel</button>
                <button id="confirmResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#9F1239] text-white hover:bg-[#881337] transition-colors shadow-md">Reset</button>
            </div>
        </div>
    </div>

    <script>
        // Default Data aligned with Notion template
        const defaultData = {
            weekly: [
                { id: 'w1', text: "Sunday dinner together", done: false },
                { id: 'w2', text: "Phone-free date night", done: false },
                { id: 'w3', text: "Morning coffee & talk", done: false },
                { id: 'w4', text: "Shared walk", done: false }
            ],
            monthly: [
                { id: 'm1', text: "Deep conversation night", done: false },
                { id: 'm2', text: "Explore somewhere new", done: false },
                { id: 'm3', text: "Review & dream together", done: false },
                { id: 'm4', text: "Gratitude letter", done: false }
            ],
            yearly: [
                { id: 'y1', text: "Anniversary trip", done: false },
                { id: 'y2', text: "Vision-setting retreat", done: false },
                { id: 'y3', text: "Family photo session", done: false },
                { id: 'y4', text: "Handwritten love letter", done: false }
            ]
        };

        // State Management
        let state = JSON.parse(localStorage.getItem('faithreflects_devotion_rings')) || defaultData;
        let currentTab = 'weekly';

        // Math Constants for SVG Rings
        // Circumference = 2 * PI * r
        const ringData = {
            weekly: { r: 40, c: 251.32, el: document.getElementById('ring-weekly-progress'), group: document.getElementById('group-weekly') },
            monthly: { r: 60, c: 376.99, el: document.getElementById('ring-monthly-progress'), group: document.getElementById('group-monthly') },
            yearly: { r: 80, c: 502.65, el: document.getElementById('ring-yearly-progress'), group: document.getElementById('group-yearly') }
        };

        // Elements
        const container = document.getElementById('widgetContainer');
        const ritualsList = document.getElementById('ritualsList');
        const newRitualInput = document.getElementById('newRitualInput');
        const addBtn = document.getElementById('addBtn');
        const resetTriggerBtn = document.getElementById('resetTriggerBtn');
        const centerAnchor = document.getElementById('centerAnchor');
        const unityMessage = document.getElementById('unityMessage');
        
        // Modal
        const resetModal = document.getElementById('resetModal');
        const cancelResetBtn = document.getElementById('cancelResetBtn');
        const confirmResetBtn = document.getElementById('confirmResetBtn');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');

        function updateRingPhysics() {
            let fullyAlignedCount = 0;

            ['weekly', 'monthly', 'yearly'].forEach(category => {
                const items = state[category];
                const total = items.length;
                const completed = items.filter(i => i.done).length;
                
                const percentage = total === 0 ? 0 : completed / total;
                const ring = ringData[category];
                
                // Update Dash Offset (Visual Fill)
                const offset = ring.c - (percentage * ring.c);
                ring.el.style.strokeDashoffset = offset;

                // Handle Physical Alignment
                if (percentage === 1 && total > 0) {
                    ring.group.classList.add('is-aligned');
                    fullyAlignedCount++;
                } else {
                    ring.group.classList.remove('is-aligned');
                }
            });

            // Global Unity State (All rings aligned perfectly flat)
            if (fullyAlignedCount === 3) {
                container.classList.add('is-unified');
                centerAnchor.setAttribute('fill', '#FCD34D'); // Glow center
                centerAnchor.setAttribute('r', '6');
                unityMessage.style.opacity = '1';
            } else {
                container.classList.remove('is-unified');
                centerAnchor.setAttribute('fill', '#E5D5D8');
                centerAnchor.setAttribute('r', '4');
                unityMessage.style.opacity = '0';
            }
        }

        function renderList() {
            ritualsList.innerHTML = '';
            const items = state[currentTab];

            if (items.length === 0) {
                ritualsList.innerHTML = `<p class="text-xs text-[#A39F96] italic text-center mt-4">Add your intentional habits here.</p>`;
                return;
            }

            items.forEach(item => {
                const row = document.createElement('div');
                row.className = `ritual-row flex items-center justify-between p-2.5 rounded-xl ${item.done ? 'checked' : ''}`;
                
                row.innerHTML = `
                    <div class="flex items-center space-x-3 min-w-0 flex-1" onclick="toggleRitual('${item.id}')">
                        <div class="check-box shadow-sm shrink-0">
                            <svg class="w-3.5 h-3.5 check-mark" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke-linecap="round"><path d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <span class="ritual-name truncate">${item.text}</span>
                    </div>
                    <button class="delete-btn shrink-0 pl-2 p-1" onclick="deleteRitual(event, '${item.id}')" title="Remove">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                `;
                ritualsList.appendChild(row);
            });
        }

        window.switchTab = function(tabName) {
            currentTab = tabName;
            
            // Update Tab UI
            ['weekly', 'monthly', 'yearly'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tabName) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            // Update Reset Button Text
            resetTriggerBtn.innerText = `Reset ${tabName} Progress`;

            renderList();
        };

        window.toggleRitual = function(id) {
            const index = state[currentTab].findIndex(i => i.id === id);
            if (index > -1) {
                state[currentTab][index].done = !state[currentTab][index].done;
                localStorage.setItem('faithreflects_devotion_rings', JSON.stringify(state));
                renderList();
                updateRingPhysics();
            }
        };

        window.deleteRitual = function(event, id) {
            event.stopPropagation();
            state[currentTab] = state[currentTab].filter(i => i.id !== id);
            localStorage.setItem('faithreflects_devotion_rings', JSON.stringify(state));
            renderList();
            updateRingPhysics();
        };

        function addRitual() {
            const text = newRitualInput.value.trim();
            if (text) {
                state[currentTab].push({
                    id: Date.now().toString(),
                    text: text,
                    done: false
                });
                localStorage.setItem('faithreflects_devotion_rings', JSON.stringify(state));
                newRitualInput.value = '';
                renderList();
                updateRingPhysics();
                
                // Scroll to bottom
                ritualsList.scrollTop = ritualsList.scrollHeight;
            }
        }

        addBtn.addEventListener('click', addRitual);
        newRitualInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addRitual();
        });

        // Contextual Reset Logic
        resetTriggerBtn.addEventListener('click', () => {
            modalTitle.innerText = `Reset ${currentTab.charAt(0).toUpperCase() + currentTab.slice(1)}?`;
            modalDesc.innerText = `This will uncheck all ${currentTab} rituals to start a fresh cycle.`;
            resetModal.classList.remove('hidden');
        });
        
        cancelResetBtn.addEventListener('click', () => resetModal.classList.add('hidden'));
        
        confirmResetBtn.addEventListener('click', () => {
            // Only reset the CURRENT tab
            state[currentTab].forEach(item => item.done = false);
            localStorage.setItem('faithreflects_devotion_rings', JSON.stringify(state));
            
            renderList();
            updateRingPhysics();
            resetModal.classList.add('hidden');
        });

        // Initialize
        switchTab('weekly');
        
        // Small timeout allows SVG render before applying transforms
        setTimeout(updateRingPhysics, 50);

    </script>
</body>
</html>
