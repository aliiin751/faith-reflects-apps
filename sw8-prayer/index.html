<!DOCTYPE html>
<html lang="en" class="bg-[#191919]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>60-Second Suit Up Sequence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        /* Notion Dark Mode Base */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: #191919 !important; 
            color: #D4D4D4; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        .widget-box {
            background-color: #191919; 
            border: 1px solid #2d2d2d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: all 1.5s ease;
        }

        /* SVG Shield Animations */
        .shield-base {
            fill: #111111;
            stroke: #333333;
            stroke-width: 2;
            transition: all 1s ease;
        }
        
        .shield-panel {
            fill: #1A1A1A;
            stroke: #222222;
            transition: fill 1.5s ease, filter 1.5s ease;
        }

        .shield-core {
            fill: #D4AF37;
            opacity: 0;
            transform-origin: center;
            transform: scale(0.8);
            transition: all 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Ambient Glow */
        .ambient-glow {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(217, 119, 6, 0) 0%, transparent 70%);
            transition: background 1.5s ease;
            pointer-events: none;
            z-index: 0;
        }

        /* Text Transition Physics */
        .prayer-text-container {
            position: relative;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .prayer-line {
            position: absolute;
            width: 100%;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }
        
        .prayer-line.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Highlighted armor pieces in text */
        .armor-highlight {
            color: #D4AF37;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        /* Final Flashbang Effect */
        .flashbang {
            position: absolute;
            inset: 0;
            background-color: #ffffff;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            border-radius: 1.5rem;
        }
        .flashbang.trigger {
            animation: flash 2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes flash {
            0% { opacity: 0; }
            10% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Buttons */
        .action-btn {
            background-color: #262626;
            color: #E5E5E5;
            border: 1px solid #333333;
            transition: all 0.3s ease;
        }
        .action-btn:hover:not(:disabled) { 
            background-color: #333333; 
            border-color: #444444; 
        }
        .action-btn.primary {
            background-color: #2D2416;
            color: #FCD34D;
            border-color: #5C451A;
            box-shadow: 0 4px 15px rgba(217, 119, 6, 0.1);
        }
        .action-btn.primary:hover {
            background-color: #3d311d;
            box-shadow: 0 4px 20px rgba(217, 119, 6, 0.2);
        }
        .action-btn:active { transform: scale(0.96); }

        /* View States */
        .view-state {
            position: absolute;
            inset: 0;
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .hidden-state {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .visible-state {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        /* Particles for completion */
        .spark {
            position: absolute;
            width: 3px; height: 3px;
            background-color: #FCD34D;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 6px #F59E0B;
            animation: float-up 2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 10;
        }
        @keyframes float-up {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(0,0,0,0.6); }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden bg-[#191919]">

    <div id="widgetContainer" class="widget-box relative w-full max-w-sm rounded-3xl h-[560px] overflow-hidden">
        
        <div class="ambient-glow" id="ambientGlow"></div>
        <div class="flashbang" id="flashbang"></div>
        <div id="sparksContainer" class="absolute inset-0 pointer-events-none z-20"></div>

        <!-- ================= START STATE ================= -->
        <div id="startState" class="view-state visible-state items-center justify-center text-center">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#737373] mb-6 block">@faithreflects</span>
            
            <div class="mb-8">
                <svg viewBox="0 0 100 120" class="w-24 h-28 mx-auto opacity-50">
                    <path d="M 50 5 L 90 20 L 90 60 C 90 90, 50 115, 50 115 C 50 115, 10 90, 10 60 L 10 20 Z" fill="none" stroke="#525252" stroke-width="2"/>
                    <path d="M 50 15 L 50 105 M 20 50 L 80 50" stroke="#525252" stroke-width="1" stroke-dasharray="4 4"/>
                </svg>
            </div>

            <h2 class="serif text-3xl text-[#EDEDED] mb-3">Armor-Up Prayer</h2>
            <p class="text-xs text-[#8B8B8B] italic mb-10 leading-relaxed max-w-[250px]">
                "Pray this each morning. It takes 60 seconds. It changes everything."
            </p>

            <button id="startBtn" class="action-btn primary w-full py-4 rounded-xl text-xs font-bold uppercase tracking-widest flex items-center justify-center space-x-2">
                <span class="text-base">⚔️</span>
                <span>Commence Suit Up</span>
            </button>
        </div>

        <!-- ================= ACTIVE PRAYER STATE ================= -->
        <div id="activeState" class="view-state hidden-state flex flex-col">
            
            <div class="w-full flex justify-between items-center mb-6 shrink-0 z-10">
                <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#525252]">Active Protocol</span>
                <span class="text-[10px] font-bold tracking-widest text-[#D4AF37] border border-[#5C451A] bg-[#2D2416] px-3 py-1 rounded-full" id="progressText">1 / 10</span>
            </div>

            <!-- Shield Visualizer -->
            <div class="relative w-full h-48 mb-6 flex justify-center items-center z-10 shrink-0">
                <svg viewBox="0 0 120 140" class="w-full h-full overflow-visible drop-shadow-xl" id="shieldSvg">
                    
                    <!-- Base Outline -->
                    <path class="shield-base" d="M 60 5 L 110 20 L 110 70 C 110 110, 60 135, 60 135 C 60 135, 10 110, 10 70 L 10 20 Z"/>
                    
                    <!-- Inner Panels (Light up progressively) -->
                    <path id="panel-tl" class="shield-panel" d="M 58 15 L 18 25 L 18 68 L 58 68 Z"/>
                    <path id="panel-tr" class="shield-panel" d="M 62 15 L 102 25 L 102 68 L 62 68 Z"/>
                    <path id="panel-bl" class="shield-panel" d="M 58 72 L 18 72 C 18 100, 50 120, 58 125 Z"/>
                    <path id="panel-br" class="shield-panel" d="M 62 72 L 102 72 C 102 100, 70 120, 62 125 Z"/>
                    
                    <!-- Metal Cross/Trim -->
                    <path d="M 60 5 L 60 135 M 10 70 L 110 70" stroke="#111" stroke-width="4"/>
                    <path d="M 60 5 L 60 135 M 10 70 L 110 70" stroke="#333" stroke-width="1.5"/>

                    <!-- Glowing Core (Fully active at end) -->
                    <g class="shield-core" id="shieldCore">
                        <circle cx="60" cy="70" r="15" fill="#FCD34D" filter="blur(4px)" opacity="0.6"/>
                        <path d="M 60 40 L 70 60 L 90 70 L 70 80 L 60 100 L 50 80 L 30 70 L 50 60 Z" fill="#FFFBEB"/>
                        <circle cx="60" cy="70" r="4" fill="#FFFFFF"/>
                    </g>
                </svg>
            </div>

            <!-- Prayer Text Display -->
            <div class="flex-1 prayer-text-container z-10 w-full px-2" id="textContainer">
                <!-- Lines injected by JS -->
            </div>

            <!-- Navigation -->
            <div class="mt-auto pt-4 shrink-0 flex justify-end z-10">
                <button id="nextLineBtn" class="action-btn w-full py-4 rounded-xl text-xs font-semibold uppercase tracking-wider flex items-center justify-center space-x-2">
                    <span id="nextBtnLabel">Declare Next</span>
                    <svg id="nextBtnIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </div>

        <!-- ================= BATTLE READY STATE ================= -->
        <div id="readyState" class="view-state hidden-state items-center justify-center text-center">
            
            <div class="mb-6 relative">
                <!-- Glowing Shield Icon -->
                <div class="absolute inset-0 bg-[#FCD34D] blur-2xl opacity-20 rounded-full"></div>
                <svg viewBox="0 0 100 120" class="w-28 h-32 mx-auto relative z-10 filter drop-shadow-[0_0_15px_rgba(212,175,55,0.6)]">
                    <path d="M 50 5 L 90 20 L 90 60 C 90 90, 50 115, 50 115 C 50 115, 10 90, 10 60 L 10 20 Z" fill="#2D2416" stroke="#FCD34D" stroke-width="3"/>
                    <path d="M 50 30 L 60 50 L 80 60 L 60 70 L 50 90 L 40 70 L 20 60 L 40 50 Z" fill="#FFFBEB"/>
                </svg>
            </div>

            <h2 class="serif text-4xl text-[#FCD34D] mb-3">Battle Ready</h2>
            <p class="text-sm text-[#D4D4D4] italic mb-10 leading-relaxed max-w-[250px]">
                "The enemy has already lost. The victory belongs to the Lamb."
            </p>

            <button id="resetTriggerBtn" class="text-[10px] tracking-widest text-[#525252] uppercase hover:text-[#A3A3A3] transition-colors pb-1 border-b border-transparent hover:border-[#333]">
                Disengage (Reset sequence)
            </button>
        </div>

        <!-- Custom Reset Modal -->
        <div id="resetModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#191919] rounded-2xl p-6 w-full max-w-[260px] border border-[#2d2d2d] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#EDEDED]">Restart Protocol?</h3>
                <p class="text-xs text-[#8B8B8B] mb-6">This will reset your armor-up status for today.</p>
                <div class="flex space-x-3">
                    <button id="cancelResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#A3A3A3] hover:bg-[#262626] border border-transparent transition-colors">Cancel</button>
                    <button id="confirmResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#262626] text-[#EDEDED] border border-[#333] hover:bg-[#333] transition-colors">Restart</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // The Prayer Sequence Data
        const prayerLines = [
            "Father, I come before You in the mighty name of Jesus.",
            "I put on the <span class='armor-highlight'>Helmet of Salvation</span> — guard my mind today.",
            "I put on the <span class='armor-highlight'>Breastplate of Righteousness</span> — protect my heart.",
            "I buckle the <span class='armor-highlight'>Belt of Truth</span> — anchor me in Your Word.",
            "I take up the <span class='armor-highlight'>Shield of Faith</span> — extinguish every flaming arrow.",
            "I take up the <span class='armor-highlight'>Sword of the Spirit</span> — Your Word is my weapon.",
            "I put on the <span class='armor-highlight'>Shoes of the Gospel of Peace</span> — make me ready.",
            "I am dressed for battle. I stand firm in Your power — not my own.",
            "The enemy has already lost. The victory belongs to the Lamb.",
            "In Jesus' name, Amen."
        ];

        // State
        let currentIndex = 0;
        let state = JSON.parse(localStorage.getItem('faithreflects_armor_prayer')) || { lastPrayedDate: null };
        const today = new Date().toDateString();

        // Elements
        const startState = document.getElementById('startState');
        const activeState = document.getElementById('activeState');
        const readyState = document.getElementById('readyState');
        
        const startBtn = document.getElementById('startBtn');
        const nextLineBtn = document.getElementById('nextLineBtn');
        const nextBtnLabel = document.getElementById('nextBtnLabel');
        const nextBtnIcon = document.getElementById('nextBtnIcon');
        const progressText = document.getElementById('progressText');
        const textContainer = document.getElementById('textContainer');
        const ambientGlow = document.getElementById('ambientGlow');
        const flashbang = document.getElementById('flashbang');
        const sparksContainer = document.getElementById('sparksContainer');
        
        const shieldCore = document.getElementById('shieldCore');
        const panels = [
            document.getElementById('panel-tl'),
            document.getElementById('panel-tr'),
            document.getElementById('panel-bl'),
            document.getElementById('panel-br')
        ];

        // Modals
        const resetModal = document.getElementById('resetModal');
        const resetTriggerBtn = document.getElementById('resetTriggerBtn');
        const cancelResetBtn = document.getElementById('cancelResetBtn');
        const confirmResetBtn = document.getElementById('confirmResetBtn');

        function init() {
            // Pre-inject all text lines into DOM
            textContainer.innerHTML = prayerLines.map((line, i) => `
                <h3 id="line-${i}" class="prayer-line serif text-2xl text-[#EDEDED] leading-relaxed italic filter drop-shadow-md">
                    "${line}"
                </h3>
            `).join('');

            // Check if already prayed today
            if (state.lastPrayedDate === today) {
                showState(readyState);
            } else {
                showState(startState);
            }
        }

        function showState(stateElement) {
            [startState, activeState, readyState].forEach(el => {
                el.classList.remove('visible-state');
                el.classList.add('hidden-state');
            });
            stateElement.classList.remove('hidden-state');
            stateElement.classList.add('visible-state');
        }

        function updateVisuals() {
            // Update Text
            for(let i=0; i<prayerLines.length; i++) {
                const el = document.getElementById(`line-${i}`);
                if (i === currentIndex) el.classList.add('active');
                else el.classList.remove('active');
            }

            progressText.innerText = `${currentIndex + 1} / ${prayerLines.length}`;

            // Calculate Progress Ratio (0.0 to 1.0)
            const progress = currentIndex / (prayerLines.length - 1);

            // 1. Ambient Glow Increases
            ambientGlow.style.background = `radial-gradient(circle, rgba(217, 119, 6, ${progress * 0.25}) 0%, transparent 70%)`;

            // 2. Shield Panels Light Up based on index
            // Distribute the 4 panels across the sequence
            if (currentIndex >= 1) panels[0].style.fill = '#2D2416'; // Helmet
            else panels[0].style.fill = '#1A1A1A';

            if (currentIndex >= 3) panels[1].style.fill = '#2D2416'; // Belt/Breastplate
            else panels[1].style.fill = '#1A1A1A';

            if (currentIndex >= 5) panels[2].style.fill = '#2D2416'; // Shield/Sword
            else panels[2].style.fill = '#1A1A1A';

            if (currentIndex >= 7) panels[3].style.fill = '#2D2416'; // Shoes/Ready
            else panels[3].style.fill = '#1A1A1A';

            // 3. Shield Core scales up
            shieldCore.style.opacity = progress;
            shieldCore.style.transform = `scale(${0.8 + (progress * 0.2)})`;

            // 4. Update Button Text
            if (currentIndex === prayerLines.length - 1) {
                nextBtnLabel.innerText = "Amen";
                nextBtnIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>`;
                nextLineBtn.classList.add('primary');
            } else {
                nextBtnLabel.innerText = "Declare Next";
                nextBtnIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>`;
                nextLineBtn.classList.remove('primary');
            }
        }

        function createSparks() {
            for(let i=0; i<30; i++) {
                setTimeout(() => {
                    const spark = document.createElement('div');
                    spark.className = 'spark';
                    spark.style.left = '50%';
                    spark.style.top = '50%';
                    
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 50 + Math.random() * 150;
                    
                    spark.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                    spark.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                    
                    sparksContainer.appendChild(spark);
                    setTimeout(() => { if(sparksContainer.contains(spark)) spark.remove(); }, 2000);
                }, i * 20);
            }
        }

        // Start Button
        startBtn.addEventListener('click', () => {
            startBtn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                startBtn.style.transform = 'scale(1)';
                showState(activeState);
                currentIndex = 0;
                updateVisuals();
            }, 150);
        });

        // Next Line Button
        nextLineBtn.addEventListener('click', () => {
            nextLineBtn.style.transform = 'scale(0.95)';
            setTimeout(() => nextLineBtn.style.transform = 'scale(1)', 150);

            if (currentIndex < prayerLines.length - 1) {
                currentIndex++;
                updateVisuals();
            } else {
                // Sequence Complete! Trigger Flashbang & Sparks
                flashbang.classList.add('trigger');
                createSparks();
                
                // Save State
                state.lastPrayedDate = today;
                localStorage.setItem('faithreflects_armor_prayer', JSON.stringify(state));

                // Wait for flash peak (10% of 2s = 200ms) then swap views
                setTimeout(() => {
                    showState(readyState);
                    // Reset flashbang class after animation finishes
                    setTimeout(() => flashbang.classList.remove('trigger'), 2000);
                }, 300);
            }
        });

        // Reset Logic
        resetTriggerBtn.addEventListener('click', () => resetModal.classList.remove('hidden'));
        cancelResetBtn.addEventListener('click', () => resetModal.classList.add('hidden'));
        
        confirmResetBtn.addEventListener('click', () => {
            state.lastPrayedDate = null;
            localStorage.setItem('faithreflects_armor_prayer', JSON.stringify(state));
            
            currentIndex = 0;
            updateVisuals(); // Resets the shield SVG logic
            
            showState(startState);
            resetModal.classList.add('hidden');
        });

        // Start
        init();

    </script>
</body>
</html>
