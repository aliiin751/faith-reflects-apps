<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The North Star Compass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        /* Sovereign Light Mode Base */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: transparent; 
            color: #37352f; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        /* The Widget Container */
        .widget-box {
            background-color: #FCFBF9; /* Ivory Parchment */
            border: 1px solid #E9E5DC;
            box-shadow: 0 8px 30px rgba(0,0,0,0.03), inset 0 0 20px rgba(255,255,255,0.5);
            transition: all 1.5s ease;
        }

        .widget-box.is-calibrated {
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 10px 40px rgba(0,0,0,0.05), inset 0 0 40px rgba(212, 175, 55, 0.05);
        }

        /* Ambient Glow (Activated on Calibration) */
        .ambient-glow {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.0) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: background 2s ease;
        }
        .is-calibrated .ambient-glow {
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            animation: breathe-glow 4s infinite alternate ease-in-out;
        }
        
        @keyframes breathe-glow {
            0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
        }

        /* View Transitions */
        .view-section {
            position: absolute;
            inset: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), visibility 0.8s;
        }
        
        #setupView {
            opacity: 1; transform: scale(1); visibility: visible; z-index: 20;
        }
        #setupView.hidden-view {
            opacity: 0; transform: scale(0.95); visibility: hidden; pointer-events: none;
        }

        #activeView {
            opacity: 0; transform: scale(1.05); visibility: hidden; z-index: 10;
        }
        #activeView.visible-view {
            opacity: 1; transform: scale(1); visibility: visible; z-index: 30;
        }

        /* Compass SVG Styling */
        .compass-casing {
            fill: #FCFBF9;
            stroke: url(#brassGradient);
            stroke-width: 8;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }
        
        .compass-dial {
            fill: none;
            stroke: #E9E5DC;
            stroke-width: 1.5;
        }

        .compass-mark {
            fill: #A39F96;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 14px;
        }
        
        .compass-mark.north {
            fill: #D4AF37;
            font-size: 18px;
        }

        /* The Needle Physics */
        #needleGroup {
            transform-origin: 100px 100px;
            /* Default drift animation */
            animation: idleDrift 6s infinite alternate ease-in-out;
        }
        
        /* When Calibrating, JS takes over the transform with a strict transition */
        #needleGroup.calibrating {
            animation: none;
            transition: transform 3s cubic-bezier(0.25, 1, 0.2, 1);
        }

        /* When Locked, it has a tiny micro-jitter like a real magnetic needle settling */
        #needleGroup.locked {
            animation: magneticSettle 4s infinite alternate ease-in-out;
        }

        @keyframes idleDrift {
            0% { transform: rotate(-15deg); }
            50% { transform: rotate(8deg); }
            100% { transform: rotate(-5deg); }
        }

        @keyframes magneticSettle {
            0% { transform: rotate(-0.5deg); }
            100% { transform: rotate(0.5deg); }
        }

        .needle-north {
            fill: url(#needleGold);
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
        }
        .needle-south {
            fill: #37352f;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
        }

        /* Dynamic Text Reveal */
        .north-star-word {
            color: #A39F96;
            transition: all 1.5s ease;
            letter-spacing: 0.1em;
            transform: translateY(5px);
        }
        .is-calibrated .north-star-word {
            color: #B48025;
            letter-spacing: 0.2em;
            transform: translateY(0);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        /* Identities Fade In */
        .identity-item {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.8s ease;
        }
        .is-calibrated .identity-item-1 { opacity: 1; transform: translateY(0); transition-delay: 1.5s; }
        .is-calibrated .identity-item-2 { opacity: 1; transform: translateY(0); transition-delay: 1.8s; }
        .is-calibrated .identity-item-3 { opacity: 1; transform: translateY(0); transition-delay: 2.1s; }

        /* Inputs & Buttons */
        input[type="text"] {
            background-color: #FFFFFF;
            border: 1px solid #E9E5DC;
            color: #37352f;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1), inset 0 2px 4px rgba(0,0,0,0.01);
        }
        input::placeholder { color: #A39F96; font-style: italic; }

        .btn-primary {
            background: linear-gradient(180deg, #37352f 0%, #1a1a1a 100%);
            color: #D4AF37;
            border: 1px solid #2d2d2d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.4s ease;
        }
        .btn-primary:hover:not(:disabled) { 
            background: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
            color: #FCD34D;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.15), inset 0 1px 0 rgba(255,255,255,0.05);
            transform: translateY(-2px);
        }
        .btn-primary:active:not(:disabled) { transform: translateY(1px) scale(0.98); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-reset {
            background-color: transparent;
            color: #A39F96;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }
        .btn-reset:hover { 
            color: #37352f; 
            border-bottom-color: #37352f;
        }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div id="widgetContainer" class="widget-box relative w-full max-w-sm rounded-3xl h-[600px] overflow-hidden">
        
        <div class="ambient-glow"></div>

        <!-- ================= VIEW 1: SETUP ================= -->
        <div id="setupView" class="view-section">
            
            <div class="w-full flex justify-between items-center mb-6 shrink-0">
                <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#A39F96]">@faithreflects</span>
                <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#8A867D] border border-[#E9E5DC] bg-white">
                    Alignment
                </div>
            </div>

            <h2 class="serif text-3xl text-[#37352f] mb-1">Define Your Horizon</h2>
            <p class="text-xs text-[#8A867D] italic mb-6">"Where intention becomes identity."</p>

            <div class="flex-1 flex flex-col space-y-5 justify-center pb-4">
                
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold tracking-widest uppercase text-[#A39F96] mb-2 pl-1">My Decade Word (North Star)</label>
                    <input type="text" id="wordInput" placeholder="e.g., Dominion, Resilience, Joy..." class="w-full rounded-xl px-4 py-3 text-sm font-bold text-[#B48025]" autocomplete="off">
                </div>

                <div class="flex flex-col space-y-3 mt-4">
                    <label class="text-[10px] font-bold tracking-widest uppercase text-[#A39F96] pl-1">3 Core Identities</label>
                    <input type="text" id="id1Input" placeholder="1. A faithful husband and father..." class="w-full rounded-xl px-4 py-3 text-xs font-medium" autocomplete="off">
                    <input type="text" id="id2Input" placeholder="2. A builder of beautiful things..." class="w-full rounded-xl px-4 py-3 text-xs font-medium" autocomplete="off">
                    <input type="text" id="id3Input" placeholder="3. A disciplined steward of wealth..." class="w-full rounded-xl px-4 py-3 text-xs font-medium" autocomplete="off">
                </div>

            </div>

            <button id="saveBtn" class="btn-primary w-full py-4 rounded-xl text-xs font-bold uppercase tracking-widest flex items-center justify-center space-x-2 shrink-0">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                <span>Save Coordinates</span>
            </button>

        </div>

        <!-- ================= VIEW 2: ACTIVE COMPASS ================= -->
        <div id="activeView" class="view-section items-center">
            
            <div class="w-full flex justify-between items-center mb-4 shrink-0 z-10">
                <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#A39F96]">North Star</span>
                <button id="editBtn" class="text-[10px] tracking-widest uppercase font-semibold text-[#8A867D] hover:text-[#37352f] transition-colors flex items-center space-x-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                    <span>Edit</span>
                </button>
            </div>

            <!-- The Dynamic North Star Word -->
            <h2 id="displayWord" class="serif text-3xl font-semibold mb-6 text-center z-10 north-star-word">
                Word
            </h2>

            <!-- The Heavy Brass Compass SVG -->
            <div class="relative w-full h-56 flex items-center justify-center z-10 shrink-0">
                <svg viewBox="0 0 200 200" class="w-full h-full overflow-visible">
                    
                    <defs>
                        <!-- Brass Casing Gradient -->
                        <linearGradient id="brassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#FDE68A"/>
                            <stop offset="30%" stop-color="#D4AF37"/>
                            <stop offset="70%" stop-color="#B48025"/>
                            <stop offset="100%" stop-color="#5C451A"/>
                        </linearGradient>
                        <!-- Needle Gold Gradient -->
                        <linearGradient id="needleGold" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#FCD34D"/>
                            <stop offset="50%" stop-color="#D4AF37"/>
                            <stop offset="100%" stop-color="#B48025"/>
                        </linearGradient>
                        <!-- Glass Dome Reflection -->
                        <radialGradient id="glassReflection" cx="30%" cy="30%" r="70%">
                            <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
                            <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
                            <stop offset="100%" stop-color="transparent"/>
                        </radialGradient>
                    </defs>

                    <!-- Outer Casing -->
                    <circle cx="100" cy="100" r="90" class="compass-casing"/>
                    
                    <!-- Inner Dials -->
                    <circle cx="100" cy="100" r="82" class="compass-dial"/>
                    <circle cx="100" cy="100" r="70" class="compass-dial" stroke-dasharray="2 4"/>
                    
                    <!-- Cardinal Marks -->
                    <text x="100" y="32" class="compass-mark north" text-anchor="middle">N</text>
                    <text x="100" y="178" class="compass-mark" text-anchor="middle">S</text>
                    <text x="175" y="105" class="compass-mark" text-anchor="middle">E</text>
                    <text x="25" y="105" class="compass-mark" text-anchor="middle">W</text>

                    <!-- Compass Rose Star (Background pattern) -->
                    <g fill="#F5F4F0" stroke="#E9E5DC" stroke-width="0.5">
                        <polygon points="100,40 110,90 100,100 90,90"/>
                        <polygon points="100,160 110,110 100,100 90,110"/>
                        <polygon points="160,100 110,90 100,100 110,110"/>
                        <polygon points="40,100 90,90 100,100 90,110"/>
                    </g>

                    <!-- The Needle -->
                    <g id="needleGroup">
                        <!-- North Pointer (Gold) -->
                        <path d="M100 20 L108 100 L92 100 Z" class="needle-north"/>
                        <!-- South Pointer (Dark Iron) -->
                        <path d="M100 180 L108 100 L92 100 Z" class="needle-south"/>
                        
                        <!-- Center Pin -->
                        <circle cx="100" cy="100" r="8" fill="#111111" stroke="#D4AF37" stroke-width="2" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.4))"/>
                        <circle cx="100" cy="100" r="3" fill="#FFFBEB"/>
                    </g>

                    <!-- Glass Dome Overlay -->
                    <circle cx="100" cy="100" r="86" fill="url(#glassReflection)" pointer-events="none"/>
                </svg>
            </div>

            <!-- Core Identities List -->
            <div class="flex-1 w-full flex flex-col justify-center space-y-3 z-10 px-2 mt-4" id="identitiesList">
                <!-- Injected via JS -->
            </div>

            <!-- Action -->
            <div class="w-full mt-auto pt-4 shrink-0 z-10">
                <button id="calibrateBtn" class="btn-primary w-full py-4 rounded-xl text-xs font-bold uppercase tracking-widest flex items-center justify-center space-x-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5"></path></svg>
                    <span id="calibrateText">Calibrate</span>
                </button>
            </div>

        </div>

    </div>

    <script>
        // State
        let state = JSON.parse(localStorage.getItem('sovereign_north_star')) || {
            word: '',
            identities: ['', '', ''],
            isConfigured: false
        };

        let currentRotation = 0;
        let isCalibrating = false;

        // Elements
        const container = document.getElementById('widgetContainer');
        const setupView = document.getElementById('setupView');
        const activeView = document.getElementById('activeView');
        
        const wordInput = document.getElementById('wordInput');
        const idInputs = [
            document.getElementById('id1Input'),
            document.getElementById('id2Input'),
            document.getElementById('id3Input')
        ];
        
        const displayWord = document.getElementById('displayWord');
        const identitiesList = document.getElementById('identitiesList');
        const needleGroup = document.getElementById('needleGroup');
        
        const saveBtn = document.getElementById('saveBtn');
        const editBtn = document.getElementById('editBtn');
        const calibrateBtn = document.getElementById('calibrateBtn');
        const calibrateText = document.getElementById('calibrateText');

        function init() {
            if (state.isConfigured && state.word) {
                // Populate Active View
                displayWord.innerText = state.word;
                
                identitiesList.innerHTML = state.identities.filter(id => id.trim() !== '').map((id, index) => `
                    <div class="flex items-start space-x-2 identity-item identity-item-${index + 1}">
                        <span class="text-[#D4AF37] font-bold text-lg leading-none mt-[-2px]">·</span>
                        <p class="text-xs text-[#525252] font-medium leading-relaxed">${id}</p>
                    </div>
                `).join('');

                // Show Active View
                setupView.classList.add('hidden-view');
                activeView.classList.add('visible-view');
                
                // Start needle drifting
                needleGroup.className.baseVal = '';
                container.classList.remove('is-calibrated');
                calibrateBtn.disabled = false;
                calibrateText.innerText = "Calibrate Alignment";

            } else {
                // Populate Setup View
                wordInput.value = state.word;
                idInputs.forEach((input, i) => input.value = state.identities[i]);

                // Show Setup View
                setupView.classList.remove('hidden-view');
                activeView.classList.remove('visible-view');
            }
        }

        // Save Configuration
        saveBtn.addEventListener('click', () => {
            const word = wordInput.value.trim();
            if (!word) {
                wordInput.focus();
                return;
            }

            state.word = word;
            state.identities = idInputs.map(input => input.value.trim());
            state.isConfigured = true;
            
            localStorage.setItem('sovereign_north_star', JSON.stringify(state));
            
            // Button feedback
            saveBtn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                saveBtn.style.transform = 'scale(1)';
                init(); // Reload UI
            }, 150);
        });

        // Edit Configuration
        editBtn.addEventListener('click', () => {
            if (isCalibrating) return;
            state.isConfigured = false;
            localStorage.setItem('sovereign_north_star', JSON.stringify(state));
            init();
        });

        // The Calibration Physics Engine
        calibrateBtn.addEventListener('click', () => {
            if (isCalibrating) return;
            isCalibrating = true;

            // UI Feedback
            calibrateBtn.disabled = true;
            calibrateText.innerText = "Aligning...";
            calibrateBtn.style.transform = 'scale(0.95)';
            setTimeout(() => calibrateBtn.style.transform = 'scale(1)', 150);

            // Halt the drift animation by applying JS control class
            needleGroup.className.baseVal = 'calibrating';

            // Calculate rotation to lock onto North (0 degrees).
            // We want it to spin rapidly a few times (e.g., 3 spins = 1080 degrees)
            // and land perfectly on a multiple of 360.
            
            // Current rotation might be 0, we just add 1080 to it.
            // If we want it to look dynamic, we force the CSS to spin it 1080 degrees from its current computed angle,
            // but since it was on an infinite keyframe, CSS transitions from 0.
            
            currentRotation += 1080; 
            
            // Trigger the spin
            setTimeout(() => {
                needleGroup.style.transform = `rotate(${currentRotation}deg)`;
            }, 50);

            // Wait for the 3s spin to finish
            setTimeout(() => {
                // Lock it in
                container.classList.add('is-calibrated');
                calibrateText.innerText = "Alignment Locked";
                
                // Apply the tiny magnetic micro-jitter
                needleGroup.className.baseVal = 'locked';
                
                isCalibrating = false;
            }, 3000);

        });

        // Start
        init();

    </script>
</body>
</html>
