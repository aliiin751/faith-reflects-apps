<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sermon Prep Countdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Native Notion Colors & FaithReflects Branding */
            --bg-color: transparent; 
            --text-main: #37352f;
            --text-muted: #787774;
            --brand-warm: #d4a373;
            --box-bg: rgba(255, 255, 255, 0.4);
            --box-border: rgba(55, 53, 47, 0.08);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .widget-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 280px;
            padding: 30px 20px;
            box-sizing: border-box;
            position: relative;
            /* Soft, moving gradient background to make it feel alive but subtle */
            background: linear-gradient(135deg, rgba(212, 163, 115, 0.05) 0%, rgba(212, 163, 115, 0.15) 50%, rgba(212, 163, 115, 0.05) 100%);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
            border-radius: 16px;
            max-width: 400px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--text-main);
            font-weight: 600;
            margin: 0 0 6px 0;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--brand-warm);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            font-weight: 500;
        }

        .countdown-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 65px;
            height: 70px;
            background: var(--box-bg);
            border: 1px solid var(--box-border);
            border-radius: 12px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
        }

        .time-number {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--text-main);
            font-weight: 500;
            line-height: 1;
            margin-bottom: 4px;
        }

        .time-label {
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .prompt-message {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            color: var(--text-main);
            font-style: italic;
            text-align: center;
            margin-top: 15px;
            opacity: 0.8;
        }

        .brand-tag {
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            color: #b5b3ad;
            letter-spacing: 0.8px;
            text-decoration: none;
            transition: color 0.3s ease;
            position: absolute;
            bottom: 12px;
        }

        .brand-tag:hover {
            color: var(--brand-warm);
        }
    </style>
</head>
<body>

    <div class="widget-wrapper">
        <div class="header-section">
            <h2 class="title">Sermon Prep</h2>
            <p class="subtitle">Next Sunday Service</p>
        </div>

        <div class="countdown-container">
            <div class="time-box">
                <span class="time-number" id="days">00</span>
                <span class="time-label">Days</span>
            </div>
            <div class="time-box">
                <span class="time-number" id="hours">00</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="time-box">
                <span class="time-number" id="minutes">00</span>
                <span class="time-label">Mins</span>
            </div>
            <div class="time-box">
                <span class="time-number" id="seconds">00</span>
                <span class="time-label">Secs</span>
            </div>
        </div>

        <div class="prompt-message" id="dynamic-prompt">Prepare your heart to receive.</div>

        <a href="https://www.instagram.com/faithreflects/" target="_blank" class="brand-tag">@faithreflects</a>
    </div>

    <script>
        function getNextSunday() {
            const now = new Date();
            const resultDate = new Date();
            
            // Set time to 10:00 AM (typical service time, can be adjusted)
            resultDate.setHours(10, 0, 0, 0);

            // Calculate days until next Sunday (0 is Sunday)
            let daysUntilSunday = 0 - now.getDay();
            if (daysUntilSunday < 0 || (daysUntilSunday === 0 && now.getHours() >= 10)) {
                daysUntilSunday += 7; // Move to next week if it's past 10AM on Sunday
            }

            resultDate.setDate(now.getDate() + daysUntilSunday);
            return resultDate;
        }

        function updateCountdown() {
            const now = new Date();
            const targetDate = getNextSunday();
            const difference = targetDate - now;

            // Math for time units
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Update DOM with leading zeros
            document.getElementById('days').innerText = days.toString().padStart(2, '0');
            document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = seconds.toString().padStart(2, '0');

            // Dynamic Prompt based on how close it is
            const promptEl = document.getElementById('dynamic-prompt');
            if (days === 0 && hours < 2) {
                promptEl.innerText = "Service is starting soon. Quiet your mind.";
            } else if (days === 0) {
                promptEl.innerText = "Today is the day. Come expectant.";
            } else if (days === 1) {
                promptEl.innerText = "Tomorrow we gather. Prepare your heart.";
            } else if (days > 4) {
                promptEl.innerText = "Reflect on last week's application step.";
            } else {
                promptEl.innerText = "Prepare your heart to receive.";
            }
        }

        // Initialize and set interval
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
