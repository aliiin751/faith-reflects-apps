<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Daily Connection Rose</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        /* Light Mode Base - Relationships Aesthetic */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: transparent; 
            color: #37352f; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        /* The Widget Container */
        .widget-box {
            background-color: #FCFBF9; /* Ivory Parchment */
            border: 1px solid #F5E6E8; /* Soft blush border */
            box-shadow: 0 8px 30px rgba(159, 18, 57, 0.04), inset 0 0 20px rgba(255,255,255,0.6);
            transition: all 1.5s ease;
        }

        /* Rose Gold & Crimson Palette */
        :root {
            --rose-gold: #D49A89;
            --rose-gold-dark: #B76E79;
            --crimson: #9F1239;
            --crimson-dark: #881337;
            --blush: #FFE4E6;
            --sage: #4A5D23;
        }

        /* Ambient Glow */
        .ambient-glow {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 154, 137, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: all 2s ease;
        }
        .stage-4 ~ .ambient-glow {
            background: radial-gradient(circle, rgba(159, 18, 57, 0.2) 0%, rgba(212, 154, 137, 0.1) 40%, transparent 70%);
            animation: breathe-glow 4s infinite alternate ease-in-out;
        }
        
        @keyframes breathe-glow {
            0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; filter: drop-shadow(0 0 10px rgba(159, 18, 57, 0.2)); }
        }

        /* --- SVG Rose Animations --- */
        .petal {
            transform-origin: 100px 130px; /* Base of the flower */
            transition: all 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            transform: scale(0.2) rotate(0deg);
        }
        
        .sepal {
            transform-origin: 100px 130px;
            transition: all 1.5s ease;
        }

        /* Stage 0: Tight Bud (0%) */
        .stage-0 .petal-core { opacity: 1; transform: scale(0.6); fill: #E11D48; }
        .stage-0 .sepal-left { transform: rotate(15deg); }
        .stage-0 .sepal-right { transform: rotate(-15deg); }

        /* Stage 1: Slight Opening (1-33%) */
        .stage-1 .petal-core { opacity: 1; transform: scale(0.8); }
        .stage-1 .petal-inner { opacity: 1; transform: scale(0.5) rotate(-5deg); }
        .stage-1 .sepal-left { transform: rotate(5deg); }
        .stage-1 .sepal-right { transform: rotate(-5deg); }

        /* Stage 2: Half Bloom (34-66%) */
        .stage-2 .petal-core { opacity: 1; transform: scale(0.9); }
        .stage-2 .petal-inner { opacity: 1; transform: scale(0.8); }
        .stage-2 .petal-mid { opacity: 1; transform: scale(0.6) rotate(10deg); }
        .stage-2 .sepal-left { transform: rotate(-10deg) translateY(2px); }
        .stage-2 .sepal-right { transform: rotate(10deg) translateY(2px); }

        /* Stage 3: Almost Full (67-99%) */
        .stage-3 .petal-core { opacity: 1; transform: scale(1); }
        .stage-3 .petal-inner { opacity: 1; transform: scale(1); }
        .stage-3 .petal-mid { opacity: 1; transform: scale(0.9); }
        .stage-3 .petal-outer { opacity: 0.8; transform: scale(0.7) rotate(-5deg); }
        .stage-3 .sepal-left { transform: rotate(-25deg) translateY(5px); }
        .stage-3 .sepal-right { transform: rotate(25deg) translateY(5px); }

        /* Stage 4: Full Bloom (100%) */
        .stage-4 .petal-core { opacity: 1; transform: scale(1.05); }
        .stage-4 .petal-inner { opacity: 1; transform: scale(1.05); }
        .stage-4 .petal-mid { opacity: 1; transform: scale(1.05); }
        .stage-4 .petal-outer { opacity: 1; transform: scale(1.05); }
        .stage-4 .sepal-left { transform: rotate(-40deg) translateY(10px); }
        .stage-4 .sepal-right { transform: rotate(40deg) translateY(10px); }
        
        .stage-4 .flower-group {
            filter: drop-shadow(0 4px 15px rgba(159, 18, 57, 0.4));
            animation: gentle-sway 6s infinite alternate ease-in-out;
            transform-origin: 100px 200px;
        }

        @keyframes gentle-sway {
            0% { transform: rotate(-1deg); }
            100% { transform: rotate(1deg); }
        }

        /* Falling Petals Animation */
        .falling-petal {
            position: absolute;
            width: 12px;
            height: 10px;
            background-color: var(--crimson);
            border-radius: 50% 0 50% 50%;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            box-shadow: 0 2px 4px rgba(159, 18, 57, 0.3);
        }
        .stage-4 .falling-petal {
            animation: fall 3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes fall {
            0% { transform: translate(0, 0) rotate(0deg) scale(0.8); opacity: 0.8; }
            100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1); opacity: 0; }
        }

        /* Custom Checkbox */
        .person-row {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .person-row:hover:not(.checked) {
            background-color: #FFFDFD;
            border-color: #F5E6E8;
            transform: translateX(2px);
        }
        
        .check-box {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid #E5D5D8;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            background-color: #fff;
        }
        
        .person-row.checked .check-box {
            background-color: var(--crimson);
            border-color: var(--crimson);
            box-shadow: 0 0 10px rgba(159, 18, 57, 0.2);
        }

        .check-mark {
            stroke-dasharray: 20;
            stroke-dashoffset: 20;
            transition: stroke-dashoffset 0.4s ease-in-out 0.1s;
            stroke: #fff;
        }
        .person-row.checked .check-mark { stroke-dashoffset: 0; }

        .person-name {
            font-size: 13px;
            color: #37352f;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .person-row.checked .person-name {
            color: #A39F96;
            text-decoration: line-through;
        }

        /* Inputs & Buttons */
        .add-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #E5D5D8;
            font-size: 11px;
            color: #525252;
            transition: border-color 0.3s ease;
        }
        .add-input:focus {
            outline: none;
            border-color: var(--rose-gold-dark);
        }
        .add-input::placeholder { color: #C4B5B7; font-style: italic; }

        .btn-reset {
            background-color: transparent;
            color: #A39F96;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }
        .btn-reset:hover { 
            color: var(--crimson); 
            border-bottom-color: var(--crimson);
        }

        .delete-btn {
            opacity: 0;
            transition: opacity 0.2s ease;
            color: #C4B5B7;
        }
        .person-row:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: var(--crimson); }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E5D5D8; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--rose-gold-dark); }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(255,255,255,0.8); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div id="widgetContainer" class="widget-box relative w-full max-w-sm rounded-3xl p-6 md:p-8 flex flex-col h-[620px] overflow-hidden">
        
        <!-- Animated Container for Rose -->
        <div id="roseState" class="stage-0 absolute inset-0 pointer-events-none z-0">
            <div class="ambient-glow"></div>
            
            <!-- Falling Petals (Triggered at 100%) -->
            <div class="falling-petal" style="top: 40%; left: 45%; --tx: -30px; --ty: 80px; --rot: -45deg; animation-delay: 1.2s;"></div>
            <div class="falling-petal" style="top: 45%; left: 55%; --tx: 40px; --ty: 60px; --rot: 60deg; animation-delay: 1.5s;"></div>
            <div class="falling-petal" style="top: 35%; left: 50%; --tx: 10px; --ty: 100px; --rot: 20deg; animation-delay: 2s;"></div>

            <!-- SVG Rose Visualizer -->
            <div class="relative w-full h-[260px] flex justify-center items-end mt-12">
                <svg viewBox="0 0 200 200" class="w-full h-full overflow-visible">
                    
                    <defs>
                        <linearGradient id="crimsonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#BE123C"/>
                            <stop offset="100%" stop-color="#881337"/>
                        </linearGradient>
                        <linearGradient id="blushGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#F43F5E"/>
                            <stop offset="100%" stop-color="#9F1239"/>
                        </linearGradient>
                        <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#3E5C4E"/>
                            <stop offset="100%" stop-color="#2F453B"/>
                        </linearGradient>
                    </defs>

                    <g class="flower-group">
                        <!-- Stem -->
                        <path d="M 100 130 Q 110 170 95 220" stroke="url(#stemGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
                        
                        <!-- Leaves -->
                        <path d="M 100 160 Q 130 140 145 155 Q 120 170 100 160 Z" fill="#3E5C4E" filter="drop-shadow(0 2px 2px rgba(0,0,0,0.1))"/>
                        <path d="M 102 180 Q 70 165 60 180 Q 85 195 102 180 Z" fill="#4A5D23" filter="drop-shadow(0 2px 2px rgba(0,0,0,0.1))"/>

                        <!-- Sepals (Green base holding the petals) -->
                        <path class="sepal sepal-left" d="M 100 135 Q 70 120 60 100 Q 80 125 100 130 Z" fill="#3E5C4E"/>
                        <path class="sepal sepal-right" d="M 100 135 Q 130 120 140 100 Q 120 125 100 130 Z" fill="#2F453B"/>
                        <path d="M 90 120 L 110 120 L 100 135 Z" fill="#3E5C4E"/>

                        <!-- PETALS (Layered back to front) -->
                        <!-- Outer Petals (Stage 3 & 4) -->
                        <path class="petal petal-outer" d="M 100 130 C 30 110, 20 40, 80 20 C 100 40, 90 80, 100 130 Z" fill="url(#crimsonGrad)"/>
                        <path class="petal petal-outer" d="M 100 130 C 170 110, 180 40, 120 20 C 100 40, 110 80, 100 130 Z" fill="url(#crimsonGrad)"/>
                        
                        <!-- Mid Petals (Stage 2) -->
                        <path class="petal petal-mid" d="M 100 130 C 50 110, 50 50, 90 40 C 100 60, 95 90, 100 130 Z" fill="url(#blushGrad)"/>
                        <path class="petal petal-mid" d="M 100 130 C 150 110, 150 50, 110 40 C 100 60, 105 90, 100 130 Z" fill="url(#crimsonGrad)"/>

                        <!-- Inner Petals (Stage 1) -->
                        <path class="petal petal-inner" d="M 100 130 C 70 110, 75 60, 100 55 C 105 80, 95 100, 100 130 Z" fill="#E11D48"/>
                        <path class="petal petal-inner" d="M 100 130 C 130 110, 125 60, 100 55 C 95 80, 105 100, 100 130 Z" fill="#BE123C"/>

                        <!-- Core Bud (Always visible, expands slightly) -->
                        <path class="petal petal-core" d="M 90 120 C 85 90, 95 70, 100 70 C 105 70, 115 90, 110 120 Z" fill="#9F1239"/>
                        <!-- Core highlight -->
                        <path class="petal petal-core" d="M 95 120 C 92 100, 98 80, 100 80 C 102 80, 108 100, 105 120 Z" fill="#E11D48"/>
                    </g>
                </svg>
            </div>
        </div>

        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-2 z-10 shrink-0">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#A39F96]">@faithreflects</span>
            <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#B76E79] border border-[#F5E6E8] bg-white flex items-center space-x-1 shadow-sm">
                <span id="progressText">0 / 0</span>
                <span>Reached</span>
            </div>
        </div>

        <h2 class="serif text-2xl text-[#37352f] mb-1 z-10 shrink-0">Reach Out</h2>
        <p class="text-xs text-[#8A867D] italic mb-4 z-10 shrink-0">"Relationships bloom when watered."</p>

        <!-- Dynamic List -->
        <div class="flex-1 w-full flex flex-col mt-44 z-10 bg-white/50 backdrop-blur-sm rounded-t-2xl pt-2 border-t border-[#F5E6E8] min-h-0">
            <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-1 mb-2 min-h-0" id="contactsList">
                <!-- Injected via JS -->
            </div>

            <!-- Add Input -->
            <div class="flex items-center space-x-2 shrink-0 border-t border-[#F5E6E8] pt-3 mt-1 pb-1">
                <input type="text" id="newContactInput" placeholder="Add someone to reach out to..." class="add-input flex-1 py-1.5 w-full min-w-0" autocomplete="off">
                <button id="addBtn" class="text-[#B76E79] hover:text-[#9F1239] transition-colors shrink-0 p-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </button>
            </div>
            
            <button id="resetTriggerBtn" class="mt-3 text-[9px] tracking-widest uppercase pb-0.5 z-10 shrink-0 btn-reset self-center">
                Clear List (New Week)
            </button>
        </div>

        <!-- Custom Reset Modal -->
        <div id="resetModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#FCFBF9] rounded-2xl p-6 w-full max-w-[260px] border border-[#F5E6E8] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#37352f]">Reset Garden?</h3>
                <p class="text-xs text-[#8A867D] mb-6">This will clear your contact list to begin a new week.</p>
                <div class="flex space-x-3">
                    <button id="cancelResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#8A867D] hover:bg-gray-100 border border-transparent transition-colors">Cancel</button>
                    <button id="confirmResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#9F1239] text-white hover:bg-[#881337] transition-colors shadow-md">Clear</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Default Template Data
        const defaultContacts = [
            { id: 1, name: "Call Grandma", checked: false },
            { id: 2, name: "Voice note to cousin Luke", checked: false },
            { id: 3, name: "Coffee with mentor Paul", checked: false },
            { id: 4, name: "Handwritten letter to Dad", checked: false }
        ];

        // State Management
        let state = JSON.parse(localStorage.getItem('faithreflects_connection_rose')) || [...defaultContacts];

        // Elements
        const contactsList = document.getElementById('contactsList');
        const roseState = document.getElementById('roseState');
        const progressText = document.getElementById('progressText');
        const newContactInput = document.getElementById('newContactInput');
        const addBtn = document.getElementById('addBtn');
        
        // Modal
        const resetModal = document.getElementById('resetModal');
        const resetTriggerBtn = document.getElementById('resetTriggerBtn');
        const cancelResetBtn = document.getElementById('cancelResetBtn');
        const confirmResetBtn = document.getElementById('confirmResetBtn');

        function updateVisuals() {
            const total = state.length;
            const checked = state.filter(c => c.checked).length;
            
            // Text Update
            progressText.innerText = `${checked} / ${total}`;

            // Calculate Stage (0 to 4)
            let stage = 0;
            if (total > 0) {
                const percentage = checked / total;
                if (percentage === 1) stage = 4;
                else if (percentage >= 0.67) stage = 3;
                else if (percentage >= 0.34) stage = 2;
                else if (percentage > 0) stage = 1;
            }

            // Update SVG Classes
            roseState.className = `stage-${stage} absolute inset-0 pointer-events-none z-0`;
        }

        function renderList() {
            contactsList.innerHTML = '';
            
            if (state.length === 0) {
                contactsList.innerHTML = '<p class="text-xs text-[#A39F96] text-center italic mt-4">Who needs to hear from you today?</p>';
                return;
            }

            state.forEach(contact => {
                const row = document.createElement('div');
                row.className = `person-row flex items-center justify-between p-2 rounded-xl ${contact.checked ? 'checked' : ''}`;
                
                row.innerHTML = `
                    <div class="flex items-center space-x-3 min-w-0 flex-1" onclick="toggleContact(${contact.id})">
                        <div class="check-box shadow-sm shrink-0">
                            <svg class="w-3.5 h-3.5 check-mark" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke-linecap="round"><path d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <span class="person-name truncate">${contact.name}</span>
                    </div>
                    <button class="delete-btn shrink-0 pl-2 p-1" onclick="deleteContact(event, ${contact.id})" title="Remove">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                `;
                contactsList.appendChild(row);
            });
        }

        window.toggleContact = function(id) {
            const index = state.findIndex(c => c.id === id);
            if (index > -1) {
                state[index].checked = !state[index].checked;
                localStorage.setItem('faithreflects_connection_rose', JSON.stringify(state));
                renderList();
                updateVisuals();
            }
        };

        window.deleteContact = function(event, id) {
            event.stopPropagation();
            state = state.filter(c => c.id !== id);
            localStorage.setItem('faithreflects_connection_rose', JSON.stringify(state));
            renderList();
            updateVisuals();
        };

        function addContact() {
            const text = newContactInput.value.trim();
            if (text) {
                state.push({ id: Date.now(), name: text, checked: false });
                localStorage.setItem('faithreflects_connection_rose', JSON.stringify(state));
                
                newContactInput.value = '';
                renderList();
                updateVisuals();
                
                // Scroll to bottom
                contactsList.scrollTop = contactsList.scrollHeight;
            }
        }

        addBtn.addEventListener('click', addContact);
        newContactInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addContact();
        });

        // Modal Logic
        resetTriggerBtn.addEventListener('click', () => resetModal.classList.remove('hidden'));
        cancelResetBtn.addEventListener('click', () => resetModal.classList.add('hidden'));
        
        confirmResetBtn.addEventListener('click', () => {
            // Keep the names, but uncheck them to start a new week
            // Or completely clear it? Let's clear completely based on the button text "Clear List"
            state = []; 
            localStorage.setItem('faithreflects_connection_rose', JSON.stringify(state));
            
            renderList();
            updateVisuals();
            resetModal.classList.add('hidden');
        });

        // Initialize
        renderList();
        setTimeout(updateVisuals, 50); // Delay for initial CSS transition catch

    </script>
</body>
</html>
