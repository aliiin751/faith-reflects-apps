<!DOCTYPE html>
<html lang="en" class="bg-[#191919]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grace Garden</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        /* Notion Dark Mode Base - Forced completely */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: #191919 !important; 
            color: #D4D4D4; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        .widget-box {
            background-color: #191919; 
            border: 1px solid #2d2d2d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: all 1.5s ease;
        }

        /* Ambient Rain & Night Sky */
        .garden-sky {
            background: linear-gradient(to bottom, #0f172a 0%, #111827 50%, #0a0a0a 100%);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            border: 1px solid #2d2d2d;
            overflow: hidden;
            position: relative;
        }

        .drop {
            position: absolute;
            width: 1px;
            height: 15px;
            background: linear-gradient(to bottom, rgba(96, 165, 250, 0), rgba(96, 165, 250, 0.4));
            animation: rainfall linear infinite;
        }
        @keyframes rainfall {
            0% { transform: translateY(-20px) rotate(15deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(180px) rotate(15deg); opacity: 0; }
        }

        /* Bioluminescent Flower Animations */
        .flower-group {
            position: absolute;
            bottom: 25px; /* Sits on the soil */
            transform-origin: bottom center;
        }

        .flower-stem {
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
        }
        
        .is-growing .flower-stem {
            animation: growStem 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes growStem {
            0% { stroke-dashoffset: 200; }
            100% { stroke-dashoffset: 0; }
        }

        .flower-leaf-group {
            opacity: 0;
            transform-origin: bottom center;
        }
        .is-growing .flower-leaf-group {
            animation: fadeInLeaf 1.5s ease forwards 0.5s;
        }
        .flower-group.grown .flower-leaf-group {
            opacity: 1;
        }
        @keyframes fadeInLeaf {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .flower-head {
            transform-origin: center;
            transform: scale(0);
            opacity: 0;
        }
        
        .is-growing .flower-head {
            animation: bloomFlower 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 1s; /* Delays until stem grows */
        }
        @keyframes bloomFlower {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; filter: drop-shadow(0 0 0px var(--glow-color)); }
            60% { transform: scale(1.1) rotate(5deg); opacity: 1; filter: drop-shadow(0 0 12px var(--glow-color)); }
            100% { transform: scale(1) rotate(0deg); opacity: 0.95; filter: drop-shadow(0 0 8px var(--glow-color)); }
        }

        /* Ambient floating spores around flowers */
        .spore {
            position: absolute;
            width: 2.5px;
            height: 2.5px;
            border-radius: 50%;
            background-color: var(--glow-color);
            box-shadow: 0 0 5px var(--glow-color);
            animation: floatSpore 4s infinite alternate ease-in-out;
            opacity: 0;
            pointer-events: none;
        }
        .is-growing .spore {
            animation: floatSpore 4s infinite alternate ease-in-out 2s;
        }
        @keyframes floatSpore {
            0% { transform: translate(0, 0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translate(var(--tx), var(--ty)); opacity: 0; }
        }

        /* Static fully grown state */
        .flower-group.grown .flower-stem { stroke-dashoffset: 0; }
        .flower-group.grown .flower-head { transform: scale(1); opacity: 0.95; filter: drop-shadow(0 0 8px var(--glow-color)); }
        .flower-group.grown .spore { opacity: 0.8; }

        /* Soil */
        .garden-soil {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35px;
            background: #0f1115;
            border-top: 1px solid #1a1d24;
            border-radius: 50% 50% 0 0 / 100% 100% 0 0; /* Creates curved mound */
            z-index: 10;
        }

        /* Buttons */
        .grace-btn {
            background-color: #262626;
            color: #A3A3A3;
            border: 1px solid #333333;
            transition: all 0.4s ease;
        }
        .grace-btn:hover { 
            background-color: #132b24; 
            color: #34d399; 
            border-color: #059669; 
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);
        }
        .grace-btn:active { transform: scale(0.96); }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(0,0,0,0.6); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden bg-[#191919]">

    <div id="widgetContainer" class="widget-box relative w-full max-w-sm rounded-3xl p-6 md:p-8 flex flex-col h-[520px] overflow-hidden">
        
        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-4 z-10 shrink-0">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#737373]">@faithreflects</span>
            <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#A3A3A3] border border-[#333] bg-[#1a1a1a] flex items-center space-x-1">
                <span id="graceCount" class="text-[#34d399]">0</span>
                <span>Grace Days</span>
            </div>
        </div>

        <h2 class="serif text-2xl text-[#EDEDED] mb-1 z-10 shrink-0">The Grace Garden</h2>
        <p class="text-xs text-[#8B8B8B] italic mb-6 z-10 shrink-0 text-center">"Rest is not a failure. Rest produces life."</p>

        <!-- Interactive Visual Garden -->
        <div class="relative w-full h-56 rounded-2xl garden-sky mb-6 shrink-0" id="gardenArea">
            
            <!-- Rain Container -->
            <div id="rainContainer" class="absolute inset-0 pointer-events-none opacity-50 z-0"></div>

            <!-- Flowers inject here -->
            <div id="flowersContainer" class="absolute inset-0 z-10"></div>
            
            <!-- Default empty state -->
            <div id="emptyMsg" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-40 z-20">
                <span class="text-[10px] uppercase tracking-widest text-[#737373] mt-8 text-center px-4">Your grace days will bloom here</span>
            </div>

            <!-- Dark Soil Mound -->
            <div class="garden-soil"></div>
        </div>

        <!-- Controls -->
        <div class="flex-1 w-full flex flex-col justify-end z-10 min-h-0">
            <button id="graceBtn" class="grace-btn w-full py-3.5 rounded-xl text-xs font-semibold uppercase tracking-wider flex items-center justify-center space-x-2 shadow-lg shrink-0">
                <span class="text-base">🌿</span>
                <span>Receive Grace Today</span>
            </button>
            
            <button id="resetTriggerBtn" class="mt-4 text-[10px] tracking-widest text-[#525252] uppercase hover:text-[#A3A3A3] transition-colors pb-1 text-center border-b border-transparent hover:border-[#333] self-center">
                Clear Garden (New Month)
            </button>
        </div>

        <!-- Reset Modal -->
        <div id="resetModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#191919] rounded-2xl p-6 w-full max-w-[260px] border border-[#2d2d2d] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#34d399]">A New Season?</h3>
                <p class="text-xs text-[#8B8B8B] mb-6">This clears your garden to begin planting grace for a new month.</p>
                <div class="flex space-x-3">
                    <button id="cancelResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#A3A3A3] hover:bg-[#262626] border border-transparent transition-colors">Cancel</button>
                    <button id="confirmResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#262626] text-[#EDEDED] border border-[#333] hover:bg-[#333] transition-colors">Clear</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Ethereal flower color palettes (Teals, Purples, Blues, Pinks)
        const glowColors = ['#2DD4BF', '#A78BFA', '#60A5FA', '#F472B6', '#818CF8'];
        
        // State
        let flowers = JSON.parse(localStorage.getItem('faithreflects_grace_garden')) || [];
        const today = new Date().toDateString();
        
        // Elements
        const flowersContainer = document.getElementById('flowersContainer');
        const rainContainer = document.getElementById('rainContainer');
        const emptyMsg = document.getElementById('emptyMsg');
        const graceBtn = document.getElementById('graceBtn');
        const graceCount = document.getElementById('graceCount');
        
        const resetModal = document.getElementById('resetModal');
        const resetTriggerBtn = document.getElementById('resetTriggerBtn');
        const cancelResetBtn = document.getElementById('cancelResetBtn');
        const confirmResetBtn = document.getElementById('confirmResetBtn');

        // Generate constant gentle rain
        function generateRain() {
            for(let i=0; i<15; i++) {
                const drop = document.createElement('div');
                drop.className = 'drop';
                drop.style.left = `${Math.random() * 100}%`;
                drop.style.animationDelay = `${Math.random() * 2}s`;
                drop.style.animationDuration = `${0.8 + Math.random() * 0.5}s`;
                rainContainer.appendChild(drop);
            }
        }

        // Deep, muted greens for the organic plant bodies so only the flowers glow
        const stemColor = "#3A4D3E";
        const leafColor1 = "#2C3E30";
        const leafColor2 = "#3A4D3E";

        // Beautiful, organic SVG Templates
        const flowerTypes = [
            // Type 0: Elegant Lily Sprout
            (curveX) => `
                <path class="flower-stem" d="M0,20 Q${curveX},0 ${curveX/2},-30" stroke="${stemColor}" stroke-width="2" fill="none" stroke-linecap="round"/>
                <g class="flower-leaf-group">
                    <path d="M${curveX*0.2},10 Q${curveX*0.2-15},5 ${curveX*0.2-10},-10 Q${curveX*0.2-2},0 ${curveX*0.2},10" fill="${leafColor1}"/>
                    <path d="M${curveX*0.6},-5 Q${curveX*0.6+15},-10 ${curveX*0.6+10},-25 Q${curveX*0.6+2},-15 ${curveX*0.6},-5" fill="${leafColor2}"/>
                </g>
                <g class="flower-head" transform="translate(${curveX/2}, -30)">
                    <path d="M0,4 C-8,-5 -5,-15 0,-20 C5,-15 8,-5 0,4 Z" fill="var(--glow-color)" opacity="0.85"/>
                    <path d="M0,2 C-3,-5 -2,-12 0,-16 C2,-12 3,-5 0,2 Z" fill="#ffffff" opacity="0.9"/>
                </g>
            `,
            // Type 1: Soft Wildflower
            (curveX) => `
                <path class="flower-stem" d="M0,20 Q${curveX},-10 ${curveX/2},-25" stroke="${stemColor}" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                <g class="flower-leaf-group">
                    <path d="M${curveX*0.4},0 Q${curveX*0.4-12},-5 ${curveX*0.4-15},5 Q${curveX*0.4-5},10 ${curveX*0.4},0" fill="${leafColor1}"/>
                    <path d="M${curveX*0.7},-10 Q${curveX*0.7+10},-15 ${curveX*0.7+12},-5 Q${curveX*0.7+5},0 ${curveX*0.7},-10" fill="${leafColor2}"/>
                </g>
                <g class="flower-head" transform="translate(${curveX/2}, -25)">
                    <circle cx="0" cy="-5" r="3.5" fill="var(--glow-color)" opacity="0.9"/>
                    <circle cx="-5" cy="2" r="3.5" fill="var(--glow-color)" opacity="0.9"/>
                    <circle cx="5" cy="2" r="3.5" fill="var(--glow-color)" opacity="0.9"/>
                    <circle cx="0" cy="0" r="2.5" fill="#ffffff" opacity="0.9"/>
                </g>
            `,
            // Type 2: Weeping Bell
            (curveX) => `
                <path class="flower-stem" d="M0,20 Q${curveX},-20 ${curveX*1.5},-10 T${curveX*1.8},5" stroke="${leafColor1}" stroke-width="2" fill="none" stroke-linecap="round"/>
                <g class="flower-leaf-group">
                    <path d="M${curveX*0.8},-10 Q${curveX*0.8},0 ${curveX*0.8-5},5 Q${curveX*0.8-8},0 ${curveX*0.8},-10" fill="${stemColor}"/>
                    <path d="M${curveX*1.3},-12 Q${curveX*1.3}, -2 ${curveX*1.3+4},3 Q${curveX*1.3+7},-2 ${curveX*1.3},-12" fill="${leafColor1}"/>
                </g>
                <g class="flower-head" transform="translate(${curveX*1.8}, 5)">
                    <path d="M0,-3 C-5,5 0,12 0,12 C0,12 5,5 0,-3 Z" fill="var(--glow-color)" opacity="0.9"/>
                    <circle cx="0" cy="9" r="1.5" fill="#ffffff"/>
                </g>
            `,
            // Type 3: Clustered Stalk
            (curveX) => `
                <path class="flower-stem" d="M0,20 Q${curveX},-5 ${curveX/2},-35" stroke="${stemColor}" stroke-width="2" fill="none" stroke-linecap="round"/>
                <g class="flower-leaf-group">
                    <path d="M0,10 Q-15,0 -20,-5 Q-10,5 0,10" fill="${leafColor1}"/>
                    <path d="M${curveX*0.3},0 Q${curveX*0.3+10},-10 ${curveX*0.3+15},-20 Q${curveX*0.3+5},-5 ${curveX*0.3},0" fill="${stemColor}"/>
                </g>
                <g class="flower-head" transform="translate(${curveX/2}, -35)">
                    <path d="M0,-2 L0,15" stroke="${stemColor}" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                    <circle cx="0" cy="0" r="3" fill="var(--glow-color)"/>
                    <circle cx="-5" cy="5" r="2.5" fill="var(--glow-color)"/>
                    <circle cx="5" cy="7" r="3" fill="var(--glow-color)"/>
                    <circle cx="-4" cy="12" r="2" fill="var(--glow-color)"/>
                    <circle cx="3" cy="14" r="1.5" fill="var(--glow-color)"/>
                    <circle cx="0" cy="0" r="1" fill="#fff"/>
                    <circle cx="5" cy="7" r="1" fill="#fff"/>
                </g>
            `
        ];

        // Draw a single flower to the DOM
        function renderFlower(flowerData, isNew = false) {
            const group = document.createElement('div');
            group.className = `flower-group ${isNew ? 'is-growing' : 'grown'}`;
            
            // Safe fallbacks for older data structures
            const xPos = flowerData.x !== undefined ? flowerData.x : (10 + Math.random() * 80);
            const yOff = flowerData.yOffset !== undefined ? flowerData.yOffset : (Math.random() * 25);
            const scale = flowerData.scale !== undefined ? flowerData.scale : (0.6 + Math.random() * 0.4);
            const curveDir = flowerData.curveDir !== undefined ? flowerData.curveDir : (Math.random() > 0.5 ? 1 : -1);
            const type = flowerData.type !== undefined ? (flowerData.type % 4) : Math.floor(Math.random() * 4);
            
            // Apply depth and positioning
            group.style.left = `${xPos}%`; 
            group.style.bottom = `${25 - yOff}px`; 
            group.style.transform = `scale(${scale})`;
            
            // Z-Index: Elements closer to the bottom of the screen (smaller yOff) overlay the ones in the back
            group.style.zIndex = Math.floor(100 - yOff + (scale * 10));
            
            group.style.setProperty('--glow-color', flowerData.color);

            const curveX = curveDir * 20;

            group.innerHTML = `
                <svg width="80" height="100" viewBox="-40 -60 80 100" style="overflow: visible;">
                    ${flowerTypes[type](curveX)}
                </svg>
                <div class="spore" style="top: -20px; left: 0px; --tx: ${curveDir * 15}px; --ty: -30px;"></div>
                <div class="spore" style="top: -10px; left: ${curveDir * 10}px; --tx: ${-curveDir * 10}px; --ty: -20px; animation-delay: 1s;"></div>
            `;

            flowersContainer.appendChild(group);
        }

        // Render all saved flowers on load
        function renderGarden() {
            flowersContainer.innerHTML = '';
            graceCount.innerText = flowers.length;
            
            if (flowers.length > 0) emptyMsg.classList.add('hidden');
            else emptyMsg.classList.remove('hidden');

            flowers.forEach(f => renderFlower(f, false));
        }

        // Handle clicking the Grace Button
        graceBtn.addEventListener('click', () => {
            graceBtn.style.transform = 'scale(0.95)';
            setTimeout(() => graceBtn.style.transform = 'scale(1)', 150);

            // Generate physically grounded traits for the new flower
            const newFlower = {
                id: Date.now(),
                date: today,
                x: 5 + (Math.random() * 90), // Spread across the full width
                yOffset: Math.random() * 25, // Depth scattering
                scale: 0.6 + (Math.random() * 0.4), // Scale variations
                color: glowColors[Math.floor(Math.random() * glowColors.length)],
                type: Math.floor(Math.random() * flowerTypes.length),
                curveDir: Math.random() > 0.5 ? 1 : -1
            };

            flowers.push(newFlower);
            localStorage.setItem('faithreflects_grace_garden', JSON.stringify(flowers));
            
            graceCount.innerText = flowers.length;
            emptyMsg.classList.add('hidden');

            renderFlower(newFlower, true);
        });

        // Modal Logic
        resetTriggerBtn.addEventListener('click', () => resetModal.classList.remove('hidden'));
        cancelResetBtn.addEventListener('click', () => resetModal.classList.add('hidden'));
        
        confirmResetBtn.addEventListener('click', () => {
            flowers = [];
            localStorage.setItem('faithreflects_grace_garden', JSON.stringify(flowers));
            renderGarden();
            resetModal.classList.add('hidden');
        });

        // Init
        generateRain();
        renderGarden();

    </script>
</body>
</html>
