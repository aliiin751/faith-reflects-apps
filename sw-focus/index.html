<!DOCTYPE html>
<html lang="en" class="bg-[#191919]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lo-Fi Cassette Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <!-- Digital font for the timer -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* Notion Dark Mode Base - Forced completely */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: #191919 !important; 
            color: #D4D4D4; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }
        .digital { font-family: 'Share Tech Mono', monospace; }

        .widget-box {
            background-color: #191919; 
            border: 1px solid #2d2d2d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: all 1.5s ease;
        }

        .widget-box.is-playing {
            border-color: rgba(217, 119, 6, 0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 30px rgba(217, 119, 6, 0.03);
        }

        /* SVG Animations */
        .reel {
            transform-origin: center;
        }
        
        .is-playing .reel-left {
            animation: spin 3s linear infinite;
        }
        .is-playing .reel-right {
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* LED Equalizer Animations */
        .led-bar {
            transform-origin: bottom;
            transform: scaleY(0.1);
            transition: transform 0.2s ease;
            fill: #404040; /* Off state */
        }

        .is-playing .led-bar {
            fill: url(#ledGlow);
            filter: drop-shadow(0 0 4px rgba(245, 158, 11, 0.6));
        }

        .is-playing .led-1 { animation: eqBounce 0.8s ease-in-out infinite alternate; }
        .is-playing .led-2 { animation: eqBounce 1.2s ease-in-out infinite alternate 0.1s; }
        .is-playing .led-3 { animation: eqBounce 0.9s ease-in-out infinite alternate 0.3s; }
        .is-playing .led-4 { animation: eqBounce 1.4s ease-in-out infinite alternate 0.2s; }
        .is-playing .led-5 { animation: eqBounce 1.1s ease-in-out infinite alternate 0.5s; }
        .is-playing .led-6 { animation: eqBounce 0.7s ease-in-out infinite alternate 0.4s; }
        .is-playing .led-7 { animation: eqBounce 1.3s ease-in-out infinite alternate 0.2s; }

        @keyframes eqBounce {
            0% { transform: scaleY(0.2); }
            50% { transform: scaleY(0.8); }
            100% { transform: scaleY(0.4); }
        }

        /* Custom Volume Slider */
        #volumeSlider {
            -webkit-appearance: none;
            background: transparent;
        }
        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 10px; width: 10px;
            border-radius: 50%;
            background: #FCD34D;
            cursor: pointer;
            margin-top: -4px;
        }
        #volumeSlider::-webkit-slider-runnable-track {
            width: 100%; height: 2px;
            cursor: pointer; background: #404040; border-radius: 1px;
        }
        #volumeSlider:focus { outline: none; }

        /* Button Styling */
        .control-btn {
            background-color: #262626;
            color: #A3A3A3;
            border: 1px solid #333333;
            transition: all 0.3s ease;
        }
        .control-btn:hover { 
            background-color: #333; 
            color: #E5E5E5; 
            border-color: #444; 
        }
        .control-btn:active { transform: scale(0.95); }

        .control-btn.active {
            background-color: #2D2416;
            color: #FCD34D;
            border-color: #5C451A;
            box-shadow: 0 0 15px rgba(217, 119, 6, 0.15);
        }

        /* Ambient Glow */
        .ambient-glow {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(217, 119, 6, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
            z-index: 0;
        }
        .is-playing .ambient-glow { opacity: 1; }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden bg-[#191919]">

    <!-- Hidden Audio Player -->
    <audio id="lofiAudio" loop>
        <source src="https://cdn.pixabay.com/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div id="widgetContainer" class="widget-box relative w-full max-w-sm rounded-3xl p-8 flex flex-col items-center h-[520px] overflow-hidden">
        
        <div class="ambient-glow"></div>

        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-6 z-10 shrink-0">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#737373]">@faithreflects</span>
            <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#A3A3A3] border border-[#333] bg-[#1a1a1a]">
                Worship Lounge
            </div>
        </div>

        <h2 class="serif text-2xl text-[#EDEDED] mb-1 z-10">Lo-Fi Focus</h2>
        <p class="text-xs text-[#8B8B8B] italic mb-8 z-10 text-center">"Be still before the Lord."</p>

        <!-- Cassette Player SVG -->
        <div class="relative w-full max-w-[240px] h-36 mb-6 z-10 shrink-0 flex justify-center items-center">
            <svg viewBox="0 0 240 140" class="w-full h-full overflow-visible">
                
                <!-- Cassette Body -->
                <rect x="5" y="10" width="230" height="120" rx="10" fill="#222222" stroke="#333333" stroke-width="2"/>
                <!-- Bottom cutout detail -->
                <path d="M 30 130 L 50 115 L 190 115 L 210 130 Z" fill="#1A1A1A" stroke="#333" stroke-width="1.5"/>
                
                <!-- Screws -->
                <circle cx="15" cy="20" r="2" fill="#555"/>
                <circle cx="225" cy="20" r="2" fill="#555"/>
                <circle cx="15" cy="120" r="2" fill="#555"/>
                <circle cx="225" cy="120" r="2" fill="#555"/>

                <!-- Label Sticker -->
                <rect x="20" y="25" width="200" height="60" rx="4" fill="#EAE5D9"/>
                <rect x="20" y="25" width="200" height="15" rx="4" fill="#D4AF37"/> <!-- Orange/Gold accent strip -->
                <text x="120" y="36" font-family="monospace" font-size="8" fill="#111" text-anchor="middle" font-weight="bold" letter-spacing="1">STILL WATERS VOL. 1</text>
                
                <!-- Tape Window -->
                <rect x="55" y="45" width="130" height="30" rx="6" fill="#111111" stroke="#333" stroke-width="2"/>

                <!-- Left Reel -->
                <g class="reel reel-left" style="transform-origin: 80px 60px;">
                    <circle cx="80" cy="60" r="12" fill="#FDFBF7"/>
                    <!-- Tape amount (fuller on left) -->
                    <circle cx="80" cy="60" r="22" fill="none" stroke="#2D2416" stroke-width="5" opacity="0.8"/>
                    <!-- Spokes -->
                    <circle cx="80" cy="60" r="4" fill="#111"/>
                    <path d="M 80 50 L 82 46 L 78 46 Z" fill="#111"/>
                    <path d="M 80 70 L 82 74 L 78 74 Z" fill="#111"/>
                    <path d="M 70 60 L 66 62 L 66 58 Z" fill="#111"/>
                    <path d="M 90 60 L 94 62 L 94 58 Z" fill="#111"/>
                </g>

                <!-- Right Reel -->
                <g class="reel reel-right" style="transform-origin: 160px 60px;">
                    <circle cx="160" cy="60" r="12" fill="#FDFBF7"/>
                    <!-- Tape amount (emptier on right) -->
                    <circle cx="160" cy="60" r="14" fill="none" stroke="#2D2416" stroke-width="3" opacity="0.8"/>
                    <!-- Spokes -->
                    <circle cx="160" cy="60" r="4" fill="#111"/>
                    <path d="M 160 50 L 162 46 L 158 46 Z" fill="#111"/>
                    <path d="M 160 70 L 162 74 L 158 74 Z" fill="#111"/>
                    <path d="M 150 60 L 146 62 L 146 58 Z" fill="#111"/>
                    <path d="M 170 60 L 174 62 L 174 58 Z" fill="#111"/>
                </g>

                <!-- Magnetic Tape Line passing between reels -->
                <path d="M 80 82 L 160 82" stroke="#2D2416" stroke-width="2"/>

                <defs>
                    <linearGradient id="ledGlow" x1="0" y1="1" x2="0" y2="0">
                        <stop offset="0%" stop-color="#FCD34D"/>
                        <stop offset="50%" stop-color="#F59E0B"/>
                        <stop offset="100%" stop-color="#D97706"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <!-- Digital Timer & LED Visualizer -->
        <div class="w-full flex items-center justify-between bg-[#111111] border border-[#2d2d2d] rounded-xl p-4 mb-8 z-10 shrink-0">
            
            <!-- LED Visualizer -->
            <div class="flex items-end space-x-1.5 h-8">
                <rect class="led-bar led-1" width="4" height="24" rx="1"></rect>
                <rect class="led-bar led-2" width="4" height="30" rx="1"></rect>
                <rect class="led-bar led-3" width="4" height="20" rx="1"></rect>
                <rect class="led-bar led-4" width="4" height="28" rx="1"></rect>
                <rect class="led-bar led-5" width="4" height="22" rx="1"></rect>
                <rect class="led-bar led-6" width="4" height="16" rx="1"></rect>
                <rect class="led-bar led-7" width="4" height="26" rx="1"></rect>
            </div>

            <!-- Timer & Volume Control -->
            <div class="flex flex-col items-end">
                <div class="digital text-3xl tracking-widest text-[#FCD34D] filter drop-shadow-[0_0_8px_rgba(245,158,11,0.4)] leading-none" id="timerDisplay">
                    25:00
                </div>
                
                <!-- Subtle Volume Slider -->
                <div class="flex items-center space-x-1.5 mt-2 opacity-50 hover:opacity-100 transition-opacity w-[75px]">
                    <svg class="w-3 h-3 text-[#A3A3A3]" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd"></path></svg>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.3" class="w-full">
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex space-x-3 w-full z-10 shrink-0 mt-auto">
            <button id="playBtn" class="control-btn flex-[2] py-3.5 rounded-xl text-xs font-semibold uppercase tracking-wider flex items-center justify-center space-x-2">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                <span id="playBtnText">Play</span>
            </button>
            <button id="resetBtn" class="control-btn flex-1 py-3.5 rounded-xl text-xs font-semibold uppercase tracking-wider flex items-center justify-center space-x-1">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"></path></svg>
            </button>
        </div>

    </div>

    <script>
        const DEFAULT_TIME = 25 * 60; // 25 minutes in seconds
        let timeLeft = DEFAULT_TIME;
        let timerId = null;
        let isPlaying = false;

        const container = document.getElementById('widgetContainer');
        const timerDisplay = document.getElementById('timerDisplay');
        const playBtn = document.getElementById('playBtn');
        const playBtnText = document.getElementById('playBtnText');
        const resetBtn = document.getElementById('resetBtn');
        const lofiAudio = document.getElementById('lofiAudio');
        const volumeSlider = document.getElementById('volumeSlider');

        // Init audio volume
        lofiAudio.volume = volumeSlider.value;
        volumeSlider.addEventListener('input', (e) => {
            lofiAudio.volume = e.target.value;
        });

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            timerDisplay.innerText = formatTime(timeLeft);
        }

        function togglePlay() {
            if (isPlaying) {
                // Pause
                clearInterval(timerId);
                isPlaying = false;
                container.classList.remove('is-playing');
                playBtn.classList.remove('active');
                lofiAudio.pause();
                
                // Update Button SVG to Play
                playBtn.innerHTML = `
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                    <span id="playBtnText">Resume</span>
                `;
            } else {
                // Play
                if (timeLeft <= 0) timeLeft = DEFAULT_TIME;
                
                isPlaying = true;
                container.classList.add('is-playing');
                playBtn.classList.add('active');
                
                // Attempt to play audio
                lofiAudio.play().catch(error => console.log("Audio play prevented by browser policy:", error));
                
                // Update Button SVG to Pause
                playBtn.innerHTML = `
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                    <span id="playBtnText">Pause</span>
                `;

                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        isPlaying = false;
                        container.classList.remove('is-playing');
                        playBtn.classList.remove('active');
                        lofiAudio.pause();
                        playBtn.innerHTML = `
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                            <span id="playBtnText">Start</span>
                        `;
                    }
                }, 1000);
            }
        }

        playBtn.addEventListener('click', () => {
            // Button feedback
            playBtn.style.transform = 'scale(0.95)';
            setTimeout(() => playBtn.style.transform = 'scale(1)', 150);
            togglePlay();
        });

        resetBtn.addEventListener('click', () => {
            // Button feedback
            resetBtn.style.transform = 'scale(0.95)';
            setTimeout(() => resetBtn.style.transform = 'scale(1)', 150);
            
            clearInterval(timerId);
            isPlaying = false;
            timeLeft = DEFAULT_TIME;
            updateDisplay();
            
            container.classList.remove('is-playing');
            playBtn.classList.remove('active');
            
            // Stop and reset audio
            lofiAudio.pause();
            lofiAudio.currentTime = 0;

            playBtn.innerHTML = `
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                <span id="playBtnText">Play</span>
            `;
        });

        // Initialize
        updateDisplay();
    </script>
</body>
</html>
