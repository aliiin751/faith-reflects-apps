<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Still Waters Breathing Pool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        /* Notion Dark Mode Base */
        body { 
            font-family: 'Inter', sans-serif; 
            background: transparent; 
            color: #D4D4D4; 
            user-select: none; 
        }
        .serif { font-family: 'Playfair Display', serif; }

        .widget-box {
            background-color: #191919; 
            border: 1px solid #2d2d2d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: border-color 1.5s ease, box-shadow 1.5s ease;
        }

        /* The Midnight Pool */
        .pool {
            background-color: #111111;
            border: 2px solid #262626;
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.8), 0 0 0 1px #333333;
            position: relative;
            overflow: hidden;
        }

        /* The Breathing Glow/Ripple */
        .breathe-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 1px solid rgba(217, 119, 6, 0.4);
            background: radial-gradient(circle, rgba(217, 119, 6, 0.1) 0%, transparent 70%);
            transform: translate(-50%, -50%) scale(1);
            transition: transform 4s ease-in-out, opacity 4s ease-in-out, box-shadow 4s ease-in-out, border-color 4s ease-in-out;
            box-shadow: 0 0 15px rgba(217, 119, 6, 0.1);
        }

        .inhale .breathe-circle {
            transform: translate(-50%, -50%) scale(2.8);
            box-shadow: 0 0 40px rgba(217, 119, 6, 0.5), inset 0 0 20px rgba(217, 119, 6, 0.3);
            border-color: rgba(217, 119, 6, 0.8);
        }
        .exhale .breathe-circle {
            transform: translate(-50%, -50%) scale(1);
            box-shadow: 0 0 15px rgba(217, 119, 6, 0.1);
            border-color: rgba(217, 119, 6, 0.4);
        }

        /* Constant soft water ripples when active */
        .water-ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 1px solid rgba(245, 158, 11, 0.3);
            transform: translate(-50%, -50%) scale(0.5);
            opacity: 0;
            pointer-events: none;
        }
        .is-active .water-ripple {
            animation: emitRipple 4s infinite cubic-bezier(0.25, 1, 0.5, 1);
        }
        .is-active .ripple-delay {
            animation-delay: 2s;
        }

        @keyframes emitRipple {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; border-width: 2px; }
            100% { transform: translate(-50%, -50%) scale(3); opacity: 0; border-width: 0px; }
        }

        /* Moon Reflection */
        .moon-reflection {
            transition: transform 4s ease-in-out, filter 4s ease-in-out;
            filter: drop-shadow(0 0 8px rgba(252, 211, 77, 0.6)) blur(0.5px);
        }
        .inhale .moon-reflection {
            transform: scale(1.15) rotate(5deg);
            filter: drop-shadow(0 0 15px rgba(252, 211, 77, 0.9)) blur(1px);
        }
        .exhale .moon-reflection {
            transform: scale(1) rotate(0deg);
            filter: drop-shadow(0 0 8px rgba(252, 211, 77, 0.6)) blur(0.5px);
        }

        /* Button Styling */
        .action-btn {
            background-color: #262626;
            color: #E5E5E5;
            border: 1px solid #333333;
            transition: all 0.3s ease;
        }
        .action-btn:hover { background-color: #333333; border-color: #444444; }
        .action-btn:active { transform: scale(0.96); }

        .btn-cancel {
            background-color: transparent;
            color: #737373;
            border: 1px solid #333;
        }
        .btn-cancel:hover { background-color: #1f1f1f; color: #A3A3A3; }

        /* Text Fading */
        .fade-text {
            transition: opacity 1s ease-in-out;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div class="widget-box relative w-full max-w-sm rounded-3xl p-8 flex flex-col items-center min-h-[480px] overflow-hidden">
        
        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-6 z-10">
            <span class="text-[10px] tracking-[0.2em] uppercase font-medium text-[#737373]">@faithreflects</span>
            <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#A3A3A3] border border-[#333] bg-[#1a1a1a]">
                <span id="timeDisplay">01:00</span>
            </div>
        </div>

        <h2 class="serif text-2xl text-[#EDEDED] mb-1 z-10">Breathing Pool</h2>
        <p class="text-xs text-[#8B8B8B] italic mb-8 z-10">"He leads me beside still waters."</p>

        <!-- The Interactive Midnight Pool -->
        <div class="pool w-48 h-48 rounded-full mb-8 z-10 flex items-center justify-center" id="poolContainer">
            
            <!-- Expanding breath visualizer -->
            <div class="breathe-circle"></div>
            
            <!-- Continuous subtle water ripples -->
            <div class="water-ripple"></div>
            <div class="water-ripple ripple-delay"></div>

            <!-- Crescent Moon SVG -->
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="moon-reflection relative z-10">
                <path d="M21.53 15.93c-1.02.26-2.12.38-3.26.38-6.19 0-11.23-4.88-11.23-10.9 0-2.31.73-4.46 1.99-6.2C4.12 1.34 0 5.86 0 11.38 0 17.25 4.75 22 10.62 22c5.07 0 9.32-3.53 10.45-8.31a11.53 11.53 0 0 1 .46 2.24z" fill="#FCD34D"/>
            </svg>
        </div>

        <!-- Breathing Prompt Text -->
        <div class="h-10 flex items-center justify-center w-full mb-4 z-10">
            <p id="breathText" class="serif italic text-[15px] text-[#A3A3A3] fade-text opacity-100 text-center">
                Press begin to pause and center your soul.
            </p>
        </div>

        <!-- Controls -->
        <div class="mt-auto w-full flex space-x-3 z-10" id="controls">
            <button id="startBtn" class="action-btn flex-1 py-3.5 rounded-2xl text-xs font-semibold uppercase tracking-wider flex items-center justify-center space-x-2 shadow-lg">
                <span>🌙 Begin Selah</span>
            </button>
            <button id="cancelBtn" class="btn-cancel hidden flex-1 py-3.5 rounded-2xl text-xs font-semibold uppercase tracking-wider flex items-center justify-center shadow-lg">
                <span>End</span>
            </button>
        </div>

    </div>

    <script>
        const poolContainer = document.getElementById('poolContainer');
        const breathText = document.getElementById('breathText');
        const timeDisplay = document.getElementById('timeDisplay');
        const startBtn = document.getElementById('startBtn');
        const cancelBtn = document.getElementById('cancelBtn');

        let isRunning = false;
        let timeLeft = 60;
        let timerId = null;
        let breathCycleId = null;

        const formatTime = (seconds) => {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `0${m}:${s.toString().padStart(2, '0')}`;
        };

        const updateTextSmoothly = (newText) => {
            breathText.style.opacity = 0;
            setTimeout(() => {
                if(!isRunning && newText !== "Selah complete. You are ready.") return; // Guard
                breathText.innerText = newText;
                breathText.style.opacity = 1;
            }, 1000); // CSS transition is 1s
        };

        const runBreathCycle = () => {
            if(!isRunning) return;

            // INHALE (4 seconds)
            poolContainer.classList.remove('exhale');
            poolContainer.classList.add('inhale');
            
            // Toggle text back and forth gracefully
            const inhales = ["Inhale His peace...", "Inhale grace...", "Breathe in His presence..."];
            const exhales = ["Exhale your striving...", "Exhale anxiety...", "Release your burdens..."];
            
            const randomInhale = inhales[Math.floor(Math.random() * inhales.length)];
            const randomExhale = exhales[Math.floor(Math.random() * exhales.length)];

            updateTextSmoothly(randomInhale);

            // EXHALE (4 seconds) - triggered halfway through the 8s loop
            setTimeout(() => {
                if(!isRunning) return;
                poolContainer.classList.remove('inhale');
                poolContainer.classList.add('exhale');
                updateTextSmoothly(randomExhale);
            }, 4000);
        };

        const stopSelah = (completed = false) => {
            isRunning = false;
            clearInterval(timerId);
            clearInterval(breathCycleId);
            
            // Reset Visuals
            poolContainer.classList.remove('is-active', 'inhale');
            poolContainer.classList.add('exhale');
            
            // Reset Buttons
            cancelBtn.classList.add('hidden');
            startBtn.classList.remove('hidden');
            startBtn.innerHTML = '<span>🌙 Begin Selah</span>';
            
            if (completed) {
                updateTextSmoothly("Selah complete. You are ready.");
                timeDisplay.innerText = "00:00";
            } else {
                updateTextSmoothly("Press begin to pause and center your soul.");
                timeLeft = 60;
                timeDisplay.innerText = formatTime(timeLeft);
            }
        };

        const startSelah = () => {
            if (isRunning) return;
            
            isRunning = true;
            timeLeft = 60;
            timeDisplay.innerText = formatTime(timeLeft);
            
            // UI Updates
            startBtn.classList.add('hidden');
            cancelBtn.classList.remove('hidden');
            poolContainer.classList.add('is-active');
            
            // Start the very first breath immediately
            runBreathCycle();
            
            // Loop the breath every 8 seconds (4s inhale, 4s exhale)
            breathCycleId = setInterval(runBreathCycle, 8000);

            // Run the countdown timer
            timerId = setInterval(() => {
                timeLeft--;
                timeDisplay.innerText = formatTime(timeLeft);
                
                if (timeLeft <= 0) {
                    stopSelah(true);
                }
            }, 1000);
        };

        // Event Listeners
        startBtn.addEventListener('click', startSelah);
        cancelBtn.addEventListener('click', () => stopSelah(false));

    </script>
</body>
</html>
