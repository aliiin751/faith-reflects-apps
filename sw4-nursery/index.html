<!DOCTYPE html>
<html lang="en" class="bg-[#191919]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaced Repetition Planter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        /* Notion Dark Mode Base */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: #191919 !important; 
            color: #D4D4D4; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        .widget-box {
            background-color: #191919; 
            border: 1px solid #2d2d2d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: all 1.5s ease;
        }

        /* Input Styling */
        input[type="text"], textarea {
            background-color: #111111;
            border: 1px solid #333333;
            transition: all 0.3s ease;
            color: #E5E5E5;
        }
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #A3B8AC;
            background-color: #1a1a1a;
            box-shadow: 0 0 15px rgba(163, 184, 172, 0.1);
        }
        input::placeholder, textarea::placeholder { color: #525252; font-style: italic; }

        /* Custom Checkbox Checklist */
        .stage-row {
            transition: all 0.3s ease;
            cursor: pointer;
            border-left: 2px solid transparent;
        }
        .stage-row:hover:not(.locked):not(.completed) {
            background-color: #222222;
            border-left-color: #525252;
        }
        .stage-row.completed {
            background-color: #151816;
            border-left-color: #A3B8AC;
        }
        .stage-row.locked {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .check-circle { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .stage-row.completed .check-circle {
            background-color: #A3B8AC;
            border-color: #8A9D92;
        }
        .check-mark {
            stroke-dasharray: 20;
            stroke-dashoffset: 20;
            transition: stroke-dashoffset 0.4s ease-in-out 0.1s;
        }
        .stage-row.completed .check-mark { stroke-dashoffset: 0; }

        /* SVG Plant Animations */
        .plant-part {
            transition: all 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Seed (Stage 1) */
        #seed { opacity: 0; transform: translateY(-50px); }
        .stage-1 #seed, .stage-2 #seed, .stage-3 #seed, .stage-4 #seed, .stage-5 #seed {
            opacity: 1; transform: translateY(0);
        }

        /* Stem Growth */
        #stem {
            stroke-dasharray: 150;
            stroke-dashoffset: 150;
        }
        .stage-2 #stem { stroke-dashoffset: 110; } /* Tiny shoot */
        .stage-3 #stem { stroke-dashoffset: 60; }  /* Halfway */
        .stage-4 #stem, .stage-5 #stem { stroke-dashoffset: 0; }   /* Full */

        /* Leaves */
        .leaf { transform: scale(0); transform-origin: center bottom; opacity: 0; }
        .stage-3 .leaf.lower, .stage-4 .leaf.lower, .stage-5 .leaf.lower {
            transform: scale(1); opacity: 1; transition-delay: 0.5s;
        }
        .stage-4 .leaf.upper, .stage-5 .leaf.upper {
            transform: scale(1); opacity: 1; transition-delay: 0.5s;
        }

        /* Flower (Stage 5) */
        #flower {
            transform: scale(0) rotate(-30deg);
            transform-origin: center;
            opacity: 0;
            transition: transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s, opacity 1.5s ease 0.8s;
        }
        .stage-5 #flower {
            transform: scale(1) rotate(0deg);
            opacity: 1;
        }

        /* Roots (Stage 5) */
        .root-line {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            transition: stroke-dashoffset 2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s, filter 2s ease;
            opacity: 0;
        }
        .stage-5 .root-line {
            stroke-dashoffset: 0;
            opacity: 1;
            filter: drop-shadow(0 0 6px rgba(212, 175, 55, 0.8));
        }

        /* Glowing Aura (Stage 5) */
        #holy-glow {
            opacity: 0;
            transition: opacity 2.5s ease 1s;
        }
        .stage-5 #holy-glow { opacity: 1; }

        /* Watering Can Animation (Temporary class) */
        #watering-can {
            transform-origin: 200px 50px;
            transform: translateX(100px) rotate(0deg);
            opacity: 0;
            transition: all 0.8s ease;
        }
        #water-drops { opacity: 0; transition: opacity 0.3s ease; }
        .water-drop { animation: none; }

        .is-watering #watering-can {
            transform: translateX(0) rotate(-25deg);
            opacity: 1;
        }
        .is-watering #water-drops {
            opacity: 1;
            transition-delay: 0.8s;
        }
        .is-watering .water-drop {
            animation: dropFall 0.8s infinite linear;
        }
        .is-watering .wd-1 { animation-delay: 0.8s; }
        .is-watering .wd-2 { animation-delay: 1.0s; }
        .is-watering .wd-3 { animation-delay: 1.2s; }

        @keyframes dropFall {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(40px); opacity: 0; }
        }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(0,0,0,0.6); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden bg-[#191919]">

    <div id="widgetContainer" class="widget-box stage-0 relative w-full max-w-lg rounded-3xl p-6 md:p-8 flex flex-col md:flex-row h-auto min-h-[500px] overflow-hidden gap-6 md:gap-8">
        
        <!-- Left Side: Visual Garden -->
        <div class="flex-shrink-0 flex flex-col items-center md:items-start w-full md:w-2/5 h-full relative z-20">
            
            <div class="w-full flex justify-between items-center mb-2">
                <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#737373]">Spaced Repetition</span>
            </div>
            
            <h2 class="serif text-3xl text-[#EDEDED] mb-1">Nursery</h2>
            <p class="text-[11px] text-[#8B8B8B] italic mb-4">"Watch God grow something beautiful."</p>

            <!-- SVG Planter Area -->
            <div class="relative w-full h-56 flex justify-center items-end mt-auto" id="svgArea">
                
                <svg viewBox="0 0 200 220" class="w-full h-full overflow-visible">
                    
                    <!-- Ambient Glow (Stage 5) -->
                    <circle id="holy-glow" cx="100" cy="100" r="70" fill="url(#glowGrad)"/>

                    <!-- Roots (Hidden until Stage 5) -->
                    <g stroke="#FCD34D" stroke-width="2" fill="none" stroke-linecap="round">
                        <path class="root-line" d="M100 170 Q90 190 80 205"/>
                        <path class="root-line" d="M100 170 Q105 195 115 210"/>
                        <path class="root-line" d="M100 170 Q120 185 135 195"/>
                        <path class="root-line" d="M100 170 Q75 180 60 190"/>
                    </g>

                    <!-- The Dark Stone Pot (Cross-section view so roots show through slightly) -->
                    <path d="M 50 160 L 60 215 L 140 215 L 150 160 Z" fill="#1A1A1A" stroke="#2d2d2d" stroke-width="3"/>
                    <rect x="40" y="150" width="120" height="10" rx="3" fill="#222222" stroke="#2d2d2d" stroke-width="2"/>
                    <!-- Soil Level -->
                    <ellipse cx="100" cy="155" rx="55" ry="8" fill="#111111"/>

                    <!-- The Seed (Stage 1) -->
                    <ellipse id="seed" class="plant-part" cx="100" cy="160" rx="4" ry="2.5" fill="#D4AF37" filter="drop-shadow(0 0 4px rgba(212,175,55,0.6))"/>

                    <!-- The Plant -->
                    <!-- Stem -->
                    <path id="stem" class="plant-part" d="M 100 160 Q 90 100 100 50" stroke="#A3B8AC" stroke-width="4" fill="none" stroke-linecap="round"/>
                    
                    <!-- Leaves -->
                    <!-- Lower Leaves (Stage 3) -->
                    <g class="plant-part leaf lower" style="transform-origin: 98px 120px;">
                        <path d="M98 120 Q120 130 125 110 Q110 100 98 120" fill="#8A9D92"/>
                    </g>
                    <g class="plant-part leaf lower" style="transform-origin: 95px 100px;">
                        <path d="M95 100 Q70 110 65 95 Q80 85 95 100" fill="#C5D5CB"/>
                    </g>
                    
                    <!-- Upper Leaves (Stage 4) -->
                    <g class="plant-part leaf upper" style="transform-origin: 98px 75px;">
                        <path d="M98 75 Q115 80 120 65 Q105 55 98 75" fill="#A3B8AC"/>
                    </g>
                    <g class="plant-part leaf upper" style="transform-origin: 99px 55px;">
                        <path d="M99 55 Q80 60 75 45 Q90 35 99 55" fill="#8A9D92"/>
                    </g>

                    <!-- The Flower (Stage 5) -->
                    <g id="flower" class="plant-part" style="transform-origin: 100px 50px;">
                        <!-- Glowing aura behind flower -->
                        <circle cx="100" cy="50" r="15" fill="#FCD34D" opacity="0.3" filter="blur(4px)"/>
                        <!-- Petals -->
                        <circle cx="100" cy="40" r="6" fill="#fcfbf9" stroke="#e9e9e7" stroke-width="1"/>
                        <circle cx="110" cy="50" r="6" fill="#fcfbf9" stroke="#e9e9e7" stroke-width="1"/>
                        <circle cx="100" cy="60" r="6" fill="#fcfbf9" stroke="#e9e9e7" stroke-width="1"/>
                        <circle cx="90" cy="50" r="6" fill="#fcfbf9" stroke="#e9e9e7" stroke-width="1"/>
                        <circle cx="107" cy="43" r="5" fill="#fcfbf9" stroke="#e9e9e7" stroke-width="1"/>
                        <circle cx="107" cy="57" r="5" fill="#fcfbf9" stroke="#e9e9e7" stroke-width="1"/>
                        <circle cx="93" cy="57" r="5" fill="#fcfbf9" stroke="#e9e9e7" stroke-width="1"/>
                        <circle cx="93" cy="43" r="5" fill="#fcfbf9" stroke="#e9e9e7" stroke-width="1"/>
                        <!-- Center -->
                        <circle cx="100" cy="50" r="4" fill="#FCD34D"/>
                        <circle cx="100" cy="50" r="2" fill="#FFFBEB"/>
                    </g>

                    <!-- Watering Can & Water Drops (Stage 2 Transition) -->
                    <g id="watering-can">
                        <path d="M 150 70 L 180 70 L 190 100 L 140 100 Z" fill="#404040"/>
                        <path d="M 150 70 L 125 55" stroke="#404040" stroke-width="6" stroke-linecap="round"/>
                        <ellipse cx="125" cy="55" rx="3" ry="8" fill="#525252" transform="rotate(30 125 55)"/>
                        <path d="M 180 75 C 200 75, 200 95, 185 95" fill="none" stroke="#404040" stroke-width="4"/>
                    </g>

                    <g id="water-drops">
                        <line x1="115" y1="65" x2="110" y2="75" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" class="water-drop wd-1"/>
                        <line x1="125" y1="70" x2="120" y2="80" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" class="water-drop wd-2"/>
                        <line x1="135" y1="65" x2="130" y2="75" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" class="water-drop wd-3"/>
                    </g>

                    <defs>
                        <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="rgba(212, 175, 55, 0.2)"/>
                            <stop offset="100%" stop-color="rgba(212, 175, 55, 0)"/>
                        </radialGradient>
                    </defs>
                </svg>
            </div>
        </div>

        <!-- Right Side: Input & Spaced Repetition Checklist -->
        <div class="flex-1 w-full flex flex-col z-20 min-h-0">
            
            <!-- Focus Verse Input -->
            <div class="bg-[#111111] border border-[#2d2d2d] rounded-2xl p-4 mb-4 shrink-0">
                <input type="text" id="verseRef" placeholder="Reference (e.g. Psalm 23:1)" class="w-full bg-transparent text-sm font-bold text-[#D4AF37] mb-2 placeholder-[#525252]" autocomplete="off">
                <textarea id="verseText" placeholder="Write or paste the scripture here..." class="w-full bg-transparent text-sm text-[#D4D4D4] italic resize-none placeholder-[#525252]" rows="2"></textarea>
            </div>

            <!-- 5 Stages Checklist -->
            <div class="flex-1 flex flex-col space-y-2 overflow-y-auto pr-1" id="stagesContainer">
                <!-- Injected via JS -->
            </div>

            <!-- Reset -->
            <button id="resetTriggerBtn" class="mt-4 text-[10px] tracking-widest text-[#525252] uppercase hover:text-[#A3A3A3] transition-colors pt-2 border-t border-[#2d2d2d] w-full text-center shrink-0">
                Harvest & Plant New Seed
            </button>

        </div>

        <!-- Custom Reset Modal -->
        <div id="resetModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#191919] rounded-2xl p-6 w-full max-w-[260px] border border-[#2d2d2d] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#D4AF37]">Harvest Seed?</h3>
                <p class="text-xs text-[#8B8B8B] mb-6">This clears your planter so you can begin memorizing a new verse.</p>
                <div class="flex space-x-3">
                    <button id="cancelResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#A3A3A3] hover:bg-[#262626] border border-transparent transition-colors">Cancel</button>
                    <button id="confirmResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#262626] text-[#EDEDED] border border-[#333] hover:bg-[#333] transition-colors">Confirm</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const stagesData = [
            { id: 1, title: 'Day 1 — Plant', desc: 'Read 10x, write 3x, say out loud' },
            { id: 2, title: 'Day 3 — Water', desc: 'Recite from memory, check accuracy' },
            { id: 3, title: 'Day 7 — Tend', desc: 'Write from memory, no peeking' },
            { id: 4, title: 'Day 14 — Grow', desc: 'Recite to someone or record yourself' },
            { id: 5, title: 'Day 30 — Rooted', desc: 'Final review — verse is planted!' }
        ];

        // State Management
        let state = JSON.parse(localStorage.getItem('faithreflects_spaced_rep')) || {
            verseRef: '', verseText: '', currentStage: 0
        };

        const container = document.getElementById('widgetContainer');
        const stagesContainer = document.getElementById('stagesContainer');
        const verseRefInput = document.getElementById('verseRef');
        const verseTextInput = document.getElementById('verseText');
        
        // Modal
        const resetModal = document.getElementById('resetModal');
        const resetTriggerBtn = document.getElementById('resetTriggerBtn');
        const cancelResetBtn = document.getElementById('cancelResetBtn');
        const confirmResetBtn = document.getElementById('confirmResetBtn');

        // Setup Inputs
        verseRefInput.value = state.verseRef;
        verseTextInput.value = state.verseText;

        verseRefInput.addEventListener('input', (e) => { state.verseRef = e.target.value; saveState(); });
        verseTextInput.addEventListener('input', (e) => { state.verseText = e.target.value; saveState(); });

        function saveState() {
            localStorage.setItem('faithreflects_spaced_rep', JSON.stringify(state));
        }

        function playWateringAnimation() {
            container.classList.add('is-watering');
            setTimeout(() => {
                container.classList.remove('is-watering');
            }, 3000); // Pour for 3 seconds
        }

        function setStage(stageLevel) {
            // Can only advance 1 step at a time, or click an already completed step to undo back to that point
            if (stageLevel > state.currentStage + 1) return;

            // If clicking the current exact level, uncheck it (go back 1)
            if (stageLevel === state.currentStage) {
                state.currentStage = stageLevel - 1;
            } else {
                state.currentStage = stageLevel;
                // If they specifically hit stage 2 (Water), trigger the can animation
                if (stageLevel === 2) playWateringAnimation();
            }
            
            saveState();
            updateUI();
        }

        function updateUI() {
            // Set main container class for SVG styling (e.g., "stage-0", "stage-3")
            container.className = `widget-box relative w-full max-w-lg rounded-3xl p-6 md:p-8 flex flex-col md:flex-row h-auto min-h-[500px] overflow-hidden gap-6 md:gap-8 stage-${state.currentStage}`;

            // Render Checklist
            stagesContainer.innerHTML = stagesData.map(stage => {
                const isCompleted = stage.id <= state.currentStage;
                const isLocked = stage.id > state.currentStage + 1; // Locked if it's more than 1 step ahead

                let classes = 'stage-row p-3 rounded-xl border flex items-center ';
                if (isCompleted) classes += 'completed border-[#333]';
                else if (isLocked) classes += 'locked border-[#2d2d2d] bg-[#111] opacity-50';
                else classes += 'border-[#2d2d2d] bg-[#1a1a1a]';

                return `
                    <div class="${classes}" onclick="${isLocked ? '' : `setStage(${stage.id})`}">
                        <div class="check-circle w-5 h-5 rounded border border-[#333] mr-3 flex items-center justify-center shrink-0">
                            <svg class="w-3 h-3 text-[#191919] check-mark ${isCompleted ? 'stroke-dashoffset-0' : 'stroke-dashoffset-20'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                            </svg>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-xs font-semibold ${isCompleted ? 'text-[#A3B8AC]' : 'text-[#EDEDED]'}">${stage.title}</h3>
                            <p class="text-[10px] text-[#737373] mt-0.5">${stage.desc}</p>
                        </div>
                        ${!isLocked && !isCompleted ? '<div class="w-2 h-2 rounded-full bg-[#D4AF37] animate-pulse ml-2"></div>' : ''}
                    </div>
                `;
            }).join('');
        }

        // Modal Logic
        resetTriggerBtn.addEventListener('click', () => resetModal.classList.remove('hidden'));
        cancelResetBtn.addEventListener('click', () => resetModal.classList.add('hidden'));
        
        confirmResetBtn.addEventListener('click', () => {
            state = { verseRef: '', verseText: '', currentStage: 0 };
            saveState();
            verseRefInput.value = '';
            verseTextInput.value = '';
            updateUI();
            resetModal.classList.add('hidden');
        });

        // Initialize
        updateUI();
    </script>
</body>
</html>
