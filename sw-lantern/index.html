<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanctuary Lantern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        /* Notion Dark Mode Base */
        body { 
            font-family: 'Inter', sans-serif; 
            background: transparent; 
            color: #D4D4D4; 
            user-select: none; 
        }
        .serif { font-family: 'Playfair Display', serif; }

        .widget-box {
            background-color: #191919; /* Notion dark mode background */
            border: 1px solid #2d2d2d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: border-color 1.5s ease, box-shadow 1.5s ease;
        }

        .widget-box.is-lit {
            border-color: rgba(217, 119, 6, 0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 60px rgba(217, 119, 6, 0.05);
        }

        /* Ambient Glow */
        .ambient-glow {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(217, 119, 6, 0.15) 0%, rgba(217, 119, 6, 0.05) 40%, transparent 70%);
            opacity: 0;
            transition: opacity 2.5s ease-in-out;
            pointer-events: none;
            z-index: 0;
        }
        .is-lit .ambient-glow { opacity: 1; }

        /* Flame Animation */
        .flame {
            transform-origin: 50% 100%;
            opacity: 0;
            transform: scale(0);
            transition: opacity 1s ease, transform 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .is-lit .flame {
            opacity: 1;
            transform: scale(1);
            animation: flicker 3s ease-in-out infinite alternate 1s; /* Starts flickering after growing */
        }

        @keyframes flicker {
            0% { transform: scale(1) rotate(-1deg); filter: drop-shadow(0 0 12px rgba(245, 158, 11, 0.5)); }
            33% { transform: scale(1.05) rotate(1deg); filter: drop-shadow(0 0 18px rgba(245, 158, 11, 0.7)); }
            66% { transform: scale(0.97) rotate(-2deg); filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.4)); }
            100% { transform: scale(1.02) rotate(2deg); filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.6)); }
        }

        /* Lantern Glass Reflection */
        .glass-reflection {
            opacity: 0.1;
            transition: opacity 1.5s ease;
        }
        .is-lit .glass-reflection {
            opacity: 0.3;
        }

        /* Sparks */
        .spark {
            position: absolute;
            width: 3px;
            height: 3px;
            background-color: #FCD34D;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 8px #F59E0B;
            animation: fly-spark 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 10;
        }
        @keyframes fly-spark {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* Button Styling */
        .enter-btn {
            background-color: #262626;
            color: #E5E5E5;
            border: 1px solid #333333;
            transition: all 0.3s ease;
        }
        .enter-btn:hover { background-color: #333333; border-color: #444444; }
        .enter-btn:active { transform: scale(0.96); }
        
        .is-lit .enter-btn {
            background-color: #2D2416;
            color: #FCD34D;
            border-color: #5C451A;
            pointer-events: none;
        }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(0,0,0,0.6); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div id="widgetContainer" class="widget-box relative w-full max-w-sm rounded-3xl p-8 flex flex-col items-center min-h-[480px] overflow-hidden">
        
        <div class="ambient-glow"></div>

        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-6 z-10">
            <span class="text-[10px] tracking-[0.2em] uppercase font-medium text-[#737373]">@faithreflects</span>
            <button id="resetBtn" class="text-[10px] tracking-widest text-[#525252] uppercase hover:text-[#A3A3A3] transition-colors" title="Reset Streak">
                Reset
            </button>
        </div>

        <h2 class="serif text-2xl text-[#EDEDED] mb-1 z-10">Still Waters</h2>
        <p class="text-xs text-[#8B8B8B] italic mb-8 z-10">"He restores my soul."</p>

        <!-- Lantern SVG -->
        <div class="relative w-36 h-48 mb-8 z-10 flex justify-center items-end" id="lanternArea">
            <div id="sparksContainer" class="absolute inset-0 z-20 pointer-events-none"></div>

            <svg viewBox="0 0 120 160" class="w-full h-full overflow-visible z-10">
                <!-- Handle -->
                <path d="M 60 10 C 35 10, 30 30, 30 40" fill="none" stroke="#2A2A2A" stroke-width="4" stroke-linecap="round"/>
                <path d="M 60 10 C 85 10, 90 30, 90 40" fill="none" stroke="#2A2A2A" stroke-width="4" stroke-linecap="round"/>
                <circle cx="60" cy="10" r="5" fill="none" stroke="#2A2A2A" stroke-width="3"/>
                
                <!-- Hood -->
                <path d="M 35 55 L 85 55 L 75 35 L 45 35 Z" fill="#1F1F1F" stroke="#111" stroke-width="1"/>
                <rect x="30" y="55" width="60" height="6" rx="2" fill="#151515"/>
                
                <!-- Glass Body Background -->
                <path d="M 35 61 L 85 61 L 78 125 L 42 125 Z" fill="#222222" opacity="0.6"/>
                
                <!-- Inner Candle Wax -->
                <rect x="52" y="95" width="16" height="30" rx="2" fill="#D4D4D4" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.5))"/>
                <path d="M 60 95 L 60 90" stroke="#111" stroke-width="2" stroke-linecap="round"/>
                
                <!-- The Flame -->
                <path class="flame" d="M 60 65 C 60 65, 52 80, 52 88 C 52 93, 56 97, 60 97 C 64 97, 68 93, 68 88 C 68 80, 60 65, 60 65 Z" fill="url(#flameGrad)"/>
                
                <!-- Glass Reflection (Front) -->
                <path class="glass-reflection" d="M 35 61 L 85 61 L 78 125 L 42 125 Z" fill="url(#glassGrad)"/>
                
                <!-- Metal Cage Lines -->
                <line x1="60" y1="61" x2="60" y2="125" stroke="#111" stroke-width="2" opacity="0.8"/>
                <line x1="45" y1="61" x2="52" y2="125" stroke="#111" stroke-width="2" opacity="0.8"/>
                <line x1="75" y1="61" x2="68" y2="125" stroke="#111" stroke-width="2" opacity="0.8"/>

                <!-- Base -->
                <rect x="35" y="125" width="50" height="8" rx="1" fill="#151515"/>
                <path d="M 35 133 L 85 133 L 95 150 L 25 150 Z" fill="#1F1F1F" stroke="#111" stroke-width="1"/>
                <rect x="20" y="150" width="80" height="6" rx="3" fill="#111"/>

                <defs>
                    <linearGradient id="flameGrad" x1="60" y1="65" x2="60" y2="97" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#FFFBEB"/>     <!-- White hot top -->
                        <stop offset="30%" stop-color="#FCD34D"/>    <!-- Yellow middle -->
                        <stop offset="70%" stop-color="#F59E0B"/>    <!-- Orange -->
                        <stop offset="100%" stop-color="#B45309"/>   <!-- Dark orange base -->
                    </linearGradient>
                    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="rgba(255,255,255,0.8)"/>
                        <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
                        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <!-- Interactions -->
        <button id="enterBtn" class="enter-btn mt-auto w-full py-3.5 rounded-2xl text-xs font-semibold uppercase tracking-wider flex items-center justify-center space-x-2 z-10 shadow-lg">
            <span id="btnIcon">✦</span>
            <span id="btnText">Enter Sanctuary</span>
        </button>

        <div class="w-full text-center mt-4 z-10">
            <span class="text-[11px] font-medium text-[#A3A3A3]" id="streakText">Day 0 of seeking stillness</span>
        </div>

        <!-- Custom Reset Modal -->
        <div id="resetModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#191919] rounded-2xl p-6 w-full max-w-[260px] border border-[#2d2d2d] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#EDEDED]">Reset Streak?</h3>
                <p class="text-xs text-[#8B8B8B] mb-6">This will reset your consecutive days to zero.</p>
                <div class="flex space-x-3">
                    <button id="cancelResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#A3A3A3] hover:bg-[#262626] border border-transparent transition-colors">Cancel</button>
                    <button id="confirmResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#262626] text-[#EDEDED] border border-[#333] hover:bg-[#333] transition-colors">Reset</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Elements
        const container = document.getElementById('widgetContainer');
        const enterBtn = document.getElementById('enterBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const streakText = document.getElementById('streakText');
        const sparksContainer = document.getElementById('sparksContainer');
        
        const resetBtn = document.getElementById('resetBtn');
        const resetModal = document.getElementById('resetModal');
        const cancelResetBtn = document.getElementById('cancelResetBtn');
        const confirmResetBtn = document.getElementById('confirmResetBtn');

        // State Management
        let state = JSON.parse(localStorage.getItem('faithreflects_sanctuary_lantern')) || {
            streak: 0,
            lastLitDate: null
        };

        const today = new Date().toDateString();

        function createSparks() {
            for(let i=0; i<12; i++) {
                setTimeout(() => {
                    const spark = document.createElement('div');
                    spark.className = 'spark';
                    
                    // Start near the wick
                    spark.style.left = '50%';
                    spark.style.top = '65%';
                    
                    // Explosive upward/outward trajectory
                    const angle = (Math.random() * Math.PI) + Math.PI; // Upper half circle
                    const distance = 40 + Math.random() * 60;
                    
                    spark.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                    spark.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                    
                    sparksContainer.appendChild(spark);
                    
                    setTimeout(() => {
                        if (sparksContainer.contains(spark)) spark.remove();
                    }, 1200);
                }, i * 50);
            }
        }

        function updateStreakLogic() {
            if (!state.lastLitDate) {
                // First time ever
                state.streak = 1;
            } else if (state.lastLitDate !== today) {
                const lastDate = new Date(state.lastLitDate);
                const currentDate = new Date(today);
                const diffTime = Math.abs(currentDate - lastDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 

                if (diffDays === 1) {
                    // Consecutive day
                    state.streak += 1;
                } else {
                    // Missed a day(s)
                    state.streak = 1;
                }
            }
            // If state.lastLitDate === today, streak remains the same.
            
            state.lastLitDate = today;
            localStorage.setItem('faithreflects_sanctuary_lantern', JSON.stringify(state));
            updateStreakText();
        }

        function updateStreakText() {
            streakText.innerText = `Day ${state.streak} of seeking stillness`;
        }

        function lightLantern() {
            // Visuals
            createSparks();
            container.classList.add('is-lit');
            btnText.innerText = "Sanctuary Open";
            btnIcon.innerText = "🔥";
            
            // Logic
            updateStreakLogic();
        }

        // Check if already lit today on page load
        if (state.lastLitDate === today) {
            // It's already been lit today, so we'll light it immediately without sparks
            container.classList.add('is-lit');
            btnText.innerText = "Sanctuary Open";
            btnIcon.innerText = "🔥";
            updateStreakText();
        } else {
            updateStreakText(); // Just show current streak
        }

        // Button Listeners
        enterBtn.addEventListener('click', () => {
            if (state.lastLitDate !== today) {
                lightLantern();
            }
        });

        // Modal Logic
        resetBtn.addEventListener('click', () => resetModal.classList.remove('hidden'));
        cancelResetBtn.addEventListener('click', () => resetModal.classList.add('hidden'));
        
        confirmResetBtn.addEventListener('click', () => {
            state = { streak: 0, lastLitDate: null };
            localStorage.setItem('faithreflects_sanctuary_lantern', JSON.stringify(state));
            
            // Reset Visuals
            container.classList.remove('is-lit');
            btnText.innerText = "Enter Sanctuary";
            btnIcon.innerText = "✦";
            updateStreakText();
            
            resetModal.classList.add('hidden');
        });

    </script>
</body>
</html>
