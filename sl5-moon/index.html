<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Circadian Lunar Dial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        /* Sovereign Light Mode Base - Health & Wellness Vibe */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: transparent; 
            color: #37352f; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        /* The Widget Container */
        .widget-box {
            background-color: #FCFBF9; /* Ivory Parchment */
            border: 1px solid #E9E5DC;
            box-shadow: 0 8px 30px rgba(0,0,0,0.03), inset 0 0 20px rgba(255,255,255,0.5);
            transition: all 1.5s ease;
        }

        /* Ambient Silver Glow */
        .ambient-glow {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(148, 163, 184, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: background 1.5s ease;
        }
        .optimal-rest .ambient-glow {
            background: radial-gradient(circle, rgba(226, 232, 240, 0.25) 0%, rgba(148, 163, 184, 0.1) 50%, transparent 70%);
            animation: breathe-glow 4s infinite alternate ease-in-out;
        }

        @keyframes breathe-glow {
            0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; filter: drop-shadow(0 0 10px rgba(226, 232, 240, 0.4)); }
        }

        /* SVG Dial & Moon Physics */
        .astronomical-ring {
            fill: none;
            stroke: url(#silverGrad);
            stroke-width: 6;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .moon-body {
            fill: #F8FAFC;
            transition: filter 1.5s ease;
            filter: drop-shadow(0 0 2px rgba(248, 250, 252, 0.2));
        }

        .optimal-rest .moon-body {
            filter: drop-shadow(0 0 20px rgba(248, 250, 252, 0.9)) drop-shadow(0 0 40px rgba(226, 232, 240, 0.6));
        }

        .moon-shadow {
            fill: #0F172A; /* Matches night sky exactly */
            transition: transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Stars Animation */
        .star {
            fill: #FFFFFF;
            opacity: 0.2;
            transition: opacity 1.5s ease, filter 1.5s ease;
        }
        
        .optimal-rest .star {
            animation: twinkle var(--twinkle-dur) infinite alternate ease-in-out;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(0.8); filter: drop-shadow(0 0 2px rgba(255,255,255,0.4)); }
            100% { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 6px rgba(255,255,255,0.9)); }
        }

        /* Status Banner */
        .status-banner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: linear-gradient(90deg, #94A3B8, #E2E8F0, #94A3B8);
            color: #0F172A;
            padding: 4px 16px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 3px;
            box-shadow: 0 4px 15px rgba(226, 232, 240, 0.3);
            white-space: nowrap;
            opacity: 0;
            z-index: 30;
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .optimal-rest .status-banner {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            transition-delay: 1s; /* Wait for moon to reveal */
        }

        /* Inputs & Buttons */
        input[type="number"] {
            background-color: #FFFFFF;
            border: 1px solid #E9E5DC;
            color: #37352f;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #94A3B8;
            box-shadow: 0 0 10px rgba(148, 163, 184, 0.2), inset 0 2px 4px rgba(0,0,0,0.01);
        }
        
        /* Hide number spin buttons */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn-log {
            background-color: #37352f;
            color: #FFFFFF;
            border: 1px solid #2d2d2d;
            transition: all 0.4s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn-log:hover { 
            background-color: #000000; 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }
        .btn-log:active { transform: translateY(1px) scale(0.98); }

        .optimal-rest .btn-log {
            background-color: #F8FAFC;
            color: #475569;
            border-color: #CBD5E1;
            box-shadow: 0 0 15px rgba(226, 232, 240, 0.5);
            pointer-events: none;
        }

        .reset-btn {
            background-color: transparent;
            color: #A39F96;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }
        .reset-btn:hover { color: #37352f; border-bottom-color: #37352f; }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(255,255,255,0.8); }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div id="widgetContainer" class="widget-box relative w-full max-w-sm rounded-3xl p-6 md:p-8 flex flex-col h-[560px] overflow-hidden">
        
        <div class="ambient-glow"></div>

        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-4 z-10 shrink-0">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#A39F96]">@faithreflects</span>
            <div id="scoreBadge" class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#8A867D] border border-[#E9E5DC] bg-white flex items-center space-x-1 shadow-sm transition-colors duration-500">
                <span>Score:</span>
                <span id="scoreDisplay" class="text-[#37352f]">0%</span>
            </div>
        </div>

        <h2 class="serif text-2xl text-[#37352f] mb-1 z-10 shrink-0 text-center">Lunar Recovery</h2>
        <p class="text-[11px] text-[#8A867D] italic mb-6 z-10 shrink-0 text-center">"Sleep is the most anabolic thing you can do."</p>

        <!-- SVG Astronomical Dial -->
        <div class="relative w-full h-48 mb-6 z-10 flex justify-center items-center shrink-0">
            <svg viewBox="0 0 200 200" class="w-full h-full overflow-visible">
                <defs>
                    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#F8FAFC"/>
                        <stop offset="40%" stop-color="#CBD5E1"/>
                        <stop offset="80%" stop-color="#94A3B8"/>
                        <stop offset="100%" stop-color="#475569"/>
                    </linearGradient>
                    <!-- Clip path to keep everything inside the night sky -->
                    <clipPath id="skyClip">
                        <circle cx="100" cy="100" r="86"/>
                    </clipPath>
                </defs>

                <!-- Outer Silver Casing -->
                <circle cx="100" cy="100" r="95" fill="#FCFBF9" stroke="#E9E5DC" stroke-width="2"/>
                <circle cx="100" cy="100" r="90" class="astronomical-ring"/>
                
                <!-- Inner Ticks -->
                <circle cx="100" cy="100" r="86" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="2 6"/>
                
                <!-- Compass point details -->
                <polygon points="100,5 105,15 95,15" fill="#D4AF37"/>
                <polygon points="100,195 105,185 95,185" fill="#94A3B8"/>
                <polygon points="5,100 15,95 15,105" fill="#94A3B8"/>
                <polygon points="195,100 185,95 185,105" fill="#94A3B8"/>

                <!-- The Night Sky Portal -->
                <g clip-path="url(#skyClip)">
                    <rect x="0" y="0" width="200" height="200" fill="#0F172A"/>
                    
                    <!-- Stars injected via JS -->
                    <g id="starsContainer"></g>

                    <!-- The Moon -->
                    <!-- Base glowing white moon -->
                    <circle cx="100" cy="100" r="35" class="moon-body"/>
                    <!-- Moon Craters (subtle) -->
                    <circle cx="90" cy="90" r="6" fill="#E2E8F0" opacity="0.6"/>
                    <circle cx="115" cy="105" r="8" fill="#E2E8F0" opacity="0.4"/>
                    <circle cx="105" cy="85" r="4" fill="#E2E8F0" opacity="0.5"/>
                    <circle cx="85" cy="115" r="5" fill="#E2E8F0" opacity="0.5"/>
                    
                    <!-- The Dark Shadow (Translates right to reveal moon) -->
                    <circle cx="100" cy="100" r="36" class="moon-shadow" id="moonShadow"/>
                </g>

                <!-- Inner Bezel Ring -->
                <circle cx="100" cy="100" r="86" fill="none" stroke="#1E293B" stroke-width="2" opacity="0.5"/>
            </svg>

            <!-- Victory Banner (Hidden until full) -->
            <div class="status-banner" id="statusBanner">OPTIMAL RECOVERY</div>
        </div>

        <!-- Input Area -->
        <div class="w-full flex-1 flex flex-col justify-center z-10 min-h-0">
            
            <div class="flex justify-center space-x-6 mb-6">
                <!-- Hours -->
                <div class="flex flex-col items-center w-24">
                    <label class="text-[9px] font-bold tracking-widest uppercase text-[#8A867D] mb-2">Hours</label>
                    <input type="number" id="hrsInput" placeholder="0" min="0" max="24" class="w-full rounded-2xl py-3 shadow-sm">
                </div>
                <!-- Minutes -->
                <div class="flex flex-col items-center w-24">
                    <label class="text-[9px] font-bold tracking-widest uppercase text-[#8A867D] mb-2">Minutes</label>
                    <input type="number" id="minsInput" placeholder="0" min="0" max="59" class="w-full rounded-2xl py-3 shadow-sm">
                </div>
            </div>

            <button id="logBtn" class="btn-log w-full py-4 rounded-xl text-xs font-bold uppercase tracking-widest flex items-center justify-center space-x-2">
                <span id="btnIcon">🌙</span>
                <span id="btnText">Log Sleep</span>
            </button>
            
            <button id="resetTriggerBtn" class="mt-5 text-[9px] tracking-widest text-[#A39F96] uppercase hover:text-[#37352f] transition-colors pb-0.5 border-b border-transparent hover:border-[#37352f] self-center">
                Clear Dial (New Night)
            </button>
        </div>

        <!-- Custom Reset Modal -->
        <div id="resetModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#FCFBF9] rounded-2xl p-6 w-full max-w-[260px] border border-[#E9E5DC] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#37352f]">Reset Lunar Dial?</h3>
                <p class="text-xs text-[#8A867D] mb-6">This will clear last night's data and reset the moon to shadow.</p>
                <div class="flex space-x-3">
                    <button id="cancelResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#8A867D] hover:bg-gray-100 border border-transparent transition-colors">Cancel</button>
                    <button id="confirmResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#37352f] text-white hover:bg-black transition-colors shadow-md">Clear</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Target is 8 Hours (480 minutes)
        const TARGET_MINUTES = 480; 

        // State Management
        const today = new Date().toDateString();
        let state = JSON.parse(localStorage.getItem('sovereign_circadian')) || {
            date: today,
            hours: '',
            minutes: ''
        };

        // Auto-reset if it's a new day
        if (state.date !== today) {
            state = { date: today, hours: '', minutes: '' };
            localStorage.setItem('sovereign_circadian', JSON.stringify(state));
        }

        // Elements
        const container = document.getElementById('widgetContainer');
        const moonShadow = document.getElementById('moonShadow');
        const starsContainer = document.getElementById('starsContainer');
        
        const hrsInput = document.getElementById('hrsInput');
        const minsInput = document.getElementById('minsInput');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const scoreBadge = document.getElementById('scoreBadge');
        const logBtn = document.getElementById('logBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        
        // Modal
        const resetModal = document.getElementById('resetModal');
        const resetTriggerBtn = document.getElementById('resetTriggerBtn');
        const cancelResetBtn = document.getElementById('cancelResetBtn');
        const confirmResetBtn = document.getElementById('confirmResetBtn');

        // Generate Static Stars in the sky
        function generateStars() {
            starsContainer.innerHTML = '';
            for(let i = 0; i < 30; i++) {
                const star = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                star.setAttribute("cx", Math.random() * 200);
                star.setAttribute("cy", Math.random() * 200);
                star.setAttribute("r", Math.random() * 1.5 + 0.5);
                star.setAttribute("class", "star");
                
                // Randomize twinkle speeds and delays using CSS vars
                star.style.setProperty('--twinkle-dur', `${1.5 + Math.random() * 3}s`);
                star.style.animationDelay = `${Math.random() * 2}s`;
                
                starsContainer.appendChild(star);
            }
        }

        function updateVisuals(animate = true) {
            const h = parseInt(state.hours) || 0;
            const m = parseInt(state.minutes) || 0;
            
            // Allow empty state to be treated as 0 without NaN errors
            if (state.hours === '' && state.minutes === '') {
                moonShadow.style.transform = `translateX(0px)`;
                scoreDisplay.innerText = `0%`;
                container.classList.remove('optimal-rest');
                return;
            }

            const totalMins = (h * 60) + m;
            
            // Calculate Score (Cap at 100%)
            const ratio = Math.min(totalMins / TARGET_MINUTES, 1);
            const score = Math.round(ratio * 100);
            
            // Update Score Text
            scoreDisplay.innerText = `${score}%`;

            // Calculate Moon Phase (Shadow slide)
            // The shadow circle needs to move 70px to the right to completely reveal the 35px radius moon.
            const shadowTravel = ratio * 72; // Move it 72px right for full exposure
            
            if (!animate) {
                moonShadow.style.transition = 'none';
            } else {
                moonShadow.style.transition = 'transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
            }
            
            // We use transform to physically slide the dark cover off the white moon base
            // Since cx=100 and moon r=35, moving it positive X reveals the left side (waxing)
            moonShadow.style.transform = `translateX(${shadowTravel}px)`;
            
            // Force reflow if we removed transitions to re-enable them for future interactions
            if (!animate) {
                void moonShadow.offsetWidth;
                moonShadow.style.transition = 'transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
            }

            // Handle Optimal State (100%)
            if (score >= 100) {
                container.classList.add('optimal-rest');
                btnText.innerText = "Target Reached";
                btnIcon.innerText = "✨";
                scoreBadge.classList.replace('border-[#E9E5DC]', 'border-[#CBD5E1]');
                scoreBadge.classList.replace('bg-white', 'bg-[#F8FAFC]');
                scoreDisplay.classList.replace('text-[#37352f]', 'text-[#475569]');
            } else {
                container.classList.remove('optimal-rest');
                btnText.innerText = "Log Sleep";
                btnIcon.innerText = "🌙";
                scoreBadge.classList.replace('border-[#CBD5E1]', 'border-[#E9E5DC]');
                scoreBadge.classList.replace('bg-[#F8FAFC]', 'bg-white');
                scoreDisplay.classList.replace('text-[#475569]', 'text-[#37352f]');
            }
        }

        // Setup Initial UI
        hrsInput.value = state.hours;
        minsInput.value = state.minutes;
        generateStars();
        
        // Wait a tiny bit before initial visual update so CSS is fully loaded
        setTimeout(() => updateVisuals(true), 100);

        // Actions
        logBtn.addEventListener('click', () => {
            state.hours = hrsInput.value;
            state.minutes = minsInput.value;
            localStorage.setItem('sovereign_circadian', JSON.stringify(state));
            
            // Button feedback
            logBtn.style.transform = 'scale(0.95)';
            setTimeout(() => logBtn.style.transform = 'scale(1)', 150);

            updateVisuals(true);
        });

        // Modal Logic
        resetTriggerBtn.addEventListener('click', () => resetModal.classList.remove('hidden'));
        cancelResetBtn.addEventListener('click', () => resetModal.classList.add('hidden'));
        
        confirmResetBtn.addEventListener('click', () => {
            state = { date: today, hours: '', minutes: '' };
            localStorage.setItem('sovereign_circadian', JSON.stringify(state));
            
            hrsInput.value = '';
            minsInput.value = '';
            
            updateVisuals(true);
            resetModal.classList.add('hidden');
        });

    </script>
</body>
</html>
