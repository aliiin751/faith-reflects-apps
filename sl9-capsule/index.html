<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Amber Time Capsule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        /* Sovereign Light Mode Base - Home & Lifestyle Vibe */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: transparent; 
            color: #37352f; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        /* The Widget Container */
        .widget-box {
            background-color: #FCFBF9; /* Ivory Parchment */
            border: 1px solid #E9E5DC;
            box-shadow: 0 8px 30px rgba(0,0,0,0.03), inset 0 0 20px rgba(255,255,255,0.5);
            transition: all 1.5s ease;
        }

        /* Ambient Glow (Gets warmer as jar fills) */
        .ambient-glow {
            position: absolute;
            top: 40%;
            left: 25%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(217, 119, 6, 0) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: background 1.5s ease;
        }

        /* Scroll Animations & Physics */
        .scroll-item {
            transform-origin: 0px 0px; /* Fix for SVG orbital rotation bug */
            transform-box: fill-box;
            transition: all 0.5s ease;
            cursor: pointer;
        }
        
        .scroll-item:hover {
            filter: drop-shadow(0 0 6px rgba(217, 119, 6, 0.4)) brightness(1.1);
        }

        .dropping-scroll {
            animation: dropIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes dropIn {
            0% { transform: translateY(-250px) rotate(var(--rot)) scale(1.5); opacity: 0; filter: drop-shadow(0 20px 10px rgba(0,0,0,0.2)); }
            50% { opacity: 1; }
            80% { transform: translateY(5px) rotate(calc(var(--rot) + 5deg)) scale(1); filter: drop-shadow(0 2px 3px rgba(0,0,0,0.1)); }
            100% { transform: translateY(0) rotate(var(--rot)) scale(1); opacity: 1; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1)); }
        }

        .placed-scroll {
            transform: rotate(var(--rot)) scale(1);
            opacity: 1;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
        }

        /* Jar Glass Reflections */
        .glass-highlight {
            fill: none;
            stroke: #ffffff;
            stroke-linecap: round;
            opacity: 0.6;
        }

        /* List & Inputs */
        .memory-row {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .memory-row:hover {
            background-color: #FFFFFF;
            border-color: #E9E5DC;
            transform: translateX(2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        textarea {
            background-color: #FFFFFF;
            border: 1px solid #E9E5DC;
            color: #37352f;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
            resize: none;
        }
        textarea:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1), inset 0 2px 4px rgba(0,0,0,0.01);
        }
        textarea::placeholder { color: #A39F96; font-style: italic; }

        .btn-primary {
            background: linear-gradient(180deg, #D97706 0%, #B45309 100%);
            color: #FFFBEB;
            border: 1px solid #92400E;
            transition: all 0.4s ease;
            box-shadow: 0 4px 10px rgba(217, 119, 6, 0.2), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .btn-primary:hover { 
            background: linear-gradient(180deg, #EA580C 0%, #C2410C 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(217, 119, 6, 0.3), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .btn-primary:active { transform: translateY(1px) scale(0.98); }

        .btn-reset {
            background-color: transparent;
            color: #A39F96;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }
        .btn-reset:hover { color: #EF4444; border-bottom-color: #EF4444; }
        
        .delete-btn { opacity: 0; transition: opacity 0.2s ease; color: #C4B5B7; }
        .memory-row:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: #EF4444; }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #DCD7CA; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #D97706; }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(255,255,255,0.8); }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div id="widgetContainer" class="widget-box relative w-full max-w-3xl rounded-3xl p-6 md:p-10 flex flex-col md:flex-row h-[850px] md:h-[580px] overflow-hidden gap-8">
        
        <div class="ambient-glow" id="ambientGlow"></div>

        <!-- Left Side: The Visual Jar -->
        <div class="flex-shrink-0 flex flex-col items-center w-full md:w-[300px] h-full relative z-20">
            
            <div class="w-full flex justify-between items-center mb-2">
                <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#A39F96]">@faithreflects</span>
                <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#D97706] border border-[#FDE68A] bg-[#FFFBEB] flex items-center space-x-1 shadow-sm">
                    <span id="scrollCount">0</span>
                    <span>Preserved</span>
                </div>
            </div>
            
            <h2 class="serif text-2xl text-[#37352f] mb-1 text-center w-full">Time Capsule</h2>
            <p class="text-[11px] text-[#8A867D] italic mb-4 text-center w-full border-b border-[#E9E5DC] pb-4">"A few per month of what to remember."</p>

            <!-- SVG Jar Area -->
            <div class="relative w-full h-[320px] flex justify-center items-end" id="jarContainer">
                <svg viewBox="0 0 200 240" class="w-full h-full overflow-visible z-10">
                    <defs>
                        <linearGradient id="glassBack" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="rgba(245, 245, 245, 0.4)"/>
                            <stop offset="50%" stop-color="rgba(255, 255, 255, 0.1)"/>
                            <stop offset="100%" stop-color="rgba(220, 220, 220, 0.4)"/>
                        </linearGradient>
                        <linearGradient id="glassFront" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="rgba(255, 255, 255, 0.6)"/>
                            <stop offset="20%" stop-color="rgba(255, 255, 255, 0.1)"/>
                            <stop offset="80%" stop-color="rgba(255, 255, 255, 0)"/>
                            <stop offset="100%" stop-color="rgba(255, 255, 255, 0.3)"/>
                        </linearGradient>
                        <radialGradient id="amberGlowInside" cx="50%" cy="70%" r="60%">
                            <stop offset="0%" stop-color="rgba(217, 119, 6, 0.2)"/>
                            <stop offset="100%" stop-color="transparent"/>
                        </radialGradient>
                        <linearGradient id="corkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#C19A6B"/>
                            <stop offset="100%" stop-color="#8B5A2B"/>
                        </linearGradient>
                    </defs>

                    <!-- Wooden Desk Base -->
                    <path d="M 10 230 L 190 230 L 180 240 L 20 240 Z" fill="#A06B44"/>
                    <rect x="0" y="220" width="200" height="10" rx="2" fill="#D2B48C"/>
                    
                    <!-- Jar Shadow -->
                    <ellipse cx="100" cy="220" rx="55" ry="10" fill="rgba(0,0,0,0.1)"/>

                    <!-- Jar Back Glass -->
                    <path d="M 65 60 C 65 60, 45 80, 45 120 L 45 190 C 45 220, 155 220, 155 190 L 155 120 C 155 80, 135 60, 135 60 Z" fill="url(#glassBack)" stroke="#E9E5DC" stroke-width="1.5"/>
                    <rect x="75" y="40" width="50" height="20" fill="url(#glassBack)" stroke="#E9E5DC" stroke-width="1.5"/>

                    <!-- Amber Glow (Intensifies with more scrolls) -->
                    <path id="amberFill" d="M 45 120 L 45 190 C 45 220, 155 220, 155 190 L 155 120 C 155 80, 135 60, 135 60 C 135 60, 65 60, 65 60 Z" fill="url(#amberGlowInside)" opacity="0" transition="opacity 1.5s ease"/>

                    <!-- Scrolls Injected Here -->
                    <g id="scrollsGroup"></g>

                    <!-- Jar Front Glass -->
                    <path d="M 65 60 C 65 60, 45 80, 45 120 L 45 190 C 45 220, 155 220, 155 190 L 155 120 C 155 80, 135 60, 135 60 Z" fill="url(#glassFront)" pointer-events="none"/>
                    <rect x="75" y="40" width="50" height="20" fill="url(#glassFront)" pointer-events="none"/>
                    
                    <!-- Jar Lip/Rim -->
                    <ellipse cx="100" cy="40" rx="30" ry="6" fill="rgba(255,255,255,0.6)" stroke="#E9E5DC" stroke-width="2"/>
                    <ellipse cx="100" cy="40" rx="26" ry="4" fill="transparent" stroke="#E9E5DC" stroke-width="1" opacity="0.6"/>

                    <!-- Glass Highlights -->
                    <path d="M 52 100 C 52 140, 52 180, 60 200" class="glass-highlight" stroke-width="3"/>
                    <path d="M 142 90 C 142 120, 142 150, 135 170" class="glass-highlight" stroke-width="1.5"/>

                    <!-- The Cork (Sitting next to the jar) -->
                    <g transform="translate(160, 205) rotate(15)">
                        <path d="M 0 0 L 25 0 L 22 15 L 3 15 Z" fill="url(#corkGrad)"/>
                        <ellipse cx="12.5" cy="0" rx="12.5" ry="4" fill="#D2B48C"/>
                        <ellipse cx="12.5" cy="15" rx="9.5" ry="3" fill="#8B5A2B"/>
                    </g>
                </svg>
            </div>
        </div>

        <!-- Right Side: Input & List -->
        <div class="flex-1 w-full flex flex-col z-20 min-h-0 pl-2 md:pl-0 border-t md:border-t-0 md:border-l border-[#E9E5DC] pt-6 md:pt-0 md:pl-8">
            
            <!-- Input Area -->
            <div class="w-full shrink-0 mb-6 bg-[#FFFFFF] border border-[#E9E5DC] rounded-2xl p-4 shadow-sm relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-[#D97706]"></div>
                <div class="flex justify-between items-center mb-2 pl-2">
                    <span class="text-[9px] font-bold tracking-widest uppercase text-[#A39F96]">Record a Memory</span>
                </div>
                
                <textarea id="memoryInput" placeholder="We laughed so hard when..." class="w-full rounded-xl p-3 text-sm font-medium leading-relaxed min-h-[80px] mb-3 border-transparent bg-[#FCFBF9]" autocomplete="off"></textarea>
                
                <button id="preserveBtn" class="btn-primary w-full py-3.5 rounded-xl text-xs font-bold uppercase tracking-widest flex items-center justify-center space-x-2">
                    <span class="text-base">📜</span>
                    <span>Preserve Memory</span>
                </button>
            </div>

            <div class="flex justify-between items-end mb-2 shrink-0 px-1">
                <span class="text-[11px] font-bold tracking-widest uppercase text-[#37352f]">The Archive</span>
            </div>

            <!-- Dynamic List -->
            <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-2 mb-2 min-h-[120px]" id="memoryList">
                <!-- Injected via JS -->
            </div>

            <!-- Reset Button -->
            <button id="resetTriggerBtn" class="mt-4 text-[9px] tracking-widest uppercase pb-0.5 z-10 shrink-0 btn-reset self-start">
                Empty Jar (New Year)
            </button>

        </div>

        <!-- View Memory Modal -->
        <div id="viewModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#FCFBF9] rounded-2xl p-6 md:p-8 w-full max-w-[340px] border border-[#E9E5DC] shadow-[0_20px_50px_rgba(0,0,0,0.15)] flex flex-col max-h-[80vh]">
                
                <div class="flex justify-between items-start border-b border-[#E9E5DC] pb-4 mb-4 shrink-0">
                    <div class="flex flex-col">
                        <span class="text-2xl mb-2">📜</span>
                        <span id="modalDate" class="text-[10px] font-bold tracking-widest uppercase text-[#D97706]">Date</span>
                    </div>
                    <button id="closeModalBtn" class="text-[#A39F96] hover:text-[#37352f] p-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>

                <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 mb-4">
                    <p id="modalText" class="serif text-[17px] text-[#37352f] leading-relaxed whitespace-pre-wrap"></p>
                </div>

            </div>
        </div>

        <!-- Custom Reset Modal -->
        <div id="resetModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#FCFBF9] rounded-2xl p-6 w-full max-w-[260px] border border-[#E9E5DC] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#37352f]">Empty the Jar?</h3>
                <p class="text-xs text-[#8A867D] mb-6">This will permanently clear all memories to start a new collection.</p>
                <div class="flex space-x-3">
                    <button id="cancelResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#8A867D] hover:bg-gray-100 border border-transparent transition-colors">Cancel</button>
                    <button id="confirmResetBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#EF4444] text-white hover:bg-red-600 transition-colors shadow-md">Empty</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // State
        let memories = JSON.parse(localStorage.getItem('faithreflects_time_capsule')) || [];

        // Elements
        const memoryList = document.getElementById('memoryList');
        const memoryInput = document.getElementById('memoryInput');
        const preserveBtn = document.getElementById('preserveBtn');
        const scrollCount = document.getElementById('scrollCount');
        const scrollsGroup = document.getElementById('scrollsGroup');
        const ambientGlow = document.getElementById('ambientGlow');
        const amberFill = document.getElementById('amberFill');
        
        // Modal
        const viewModal = document.getElementById('viewModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const modalDate = document.getElementById('modalDate');
        const modalText = document.getElementById('modalText');

        const resetModal = document.getElementById('resetModal');
        const resetTriggerBtn = document.getElementById('resetTriggerBtn');
        const cancelResetBtn = document.getElementById('cancelResetBtn');
        const confirmResetBtn = document.getElementById('confirmResetBtn');

        // Math/Geometry for stacking scrolls inside the jar
        // Jar bounds: roughly X: 55 to 145, Y: 190 (bottom) up to 90
        function generateScrollPosition(index) {
            // We stack them organically from bottom up. 
            // Max visually displayed is ~24 to prevent overflow, but data stores infinitely.
            const row = Math.floor(index / 4); // 4 per row roughly
            const posInRow = index % 4;
            
            // X positioning spreads them across the jar width
            const baseX = 65 + (posInRow * 20); 
            const jitterX = (Math.random() * 10) - 5;
            
            // Y positioning stacks them up
            const baseY = 180 - (row * 15);
            const jitterY = (Math.random() * 8) - 4;
            
            // Rotation makes them look piled
            const rotation = (Math.random() * 60) - 30; // -30 to 30 degrees

            return {
                x: baseX + jitterX,
                y: baseY + jitterY,
                rot: rotation
            };
        }

        function getScrollSvg() {
            return `
                <g>
                    <!-- Shadow -->
                    <rect x="-10" y="-14" width="22" height="32" rx="3" fill="rgba(0,0,0,0.15)" transform="rotate(2)"/>
                    <!-- Parchment Roll -->
                    <rect x="-12" y="-16" width="24" height="32" rx="3" fill="#FDFCFB" stroke="#DCD7CA" stroke-width="1.5"/>
                    <!-- Curled Edge -->
                    <path d="M 6 -16 C 10 -16, 12 -12, 12 -6 L 12 16" fill="none" stroke="#DCD7CA" stroke-width="1.5"/>
                    <path d="M 8 -16 L 8 16" fill="none" stroke="#E9E5DC" stroke-width="1"/>
                    <!-- Red Tie String -->
                    <line x1="-13" y1="-2" x2="13" y2="-2" stroke="#9F1239" stroke-width="2"/>
                    <line x1="-13" y1="2" x2="13" y2="2" stroke="#9F1239" stroke-width="2"/>
                    <!-- String Knot -->
                    <circle cx="0" cy="0" r="2" fill="#BE123C"/>
                </g>
            `;
        }

        function renderJar(animateLast = false) {
            scrollsGroup.innerHTML = '';
            scrollCount.innerText = memories.length;

            // Ambient Effects based on count
            const intensity = Math.min(1, memories.length / 15); // Max glow at 15 memories
            ambientGlow.style.background = `radial-gradient(circle, rgba(217, 119, 6, ${intensity * 0.15}) 0%, transparent 70%)`;
            amberFill.style.opacity = intensity * 0.8;

            // Render visual scrolls (cap at 28 to fit in jar)
            const displayCount = Math.min(memories.length, 28);
            
            for(let i = 0; i < displayCount; i++) {
                const isNew = animateLast && (i === displayCount - 1);
                
                // Use a seeded random approach or just store positions in memory?
                // For simplicity, we just generate on the fly. It creates a nice "settling" effect on load.
                const pos = generateScrollPosition(i);
                
                const scrollOuter = document.createElementNS("http://www.w3.org/2000/svg", "g");
                scrollOuter.setAttribute("transform", `translate(${pos.x}, ${pos.y})`);
                
                const scrollInner = document.createElementNS("http://www.w3.org/2000/svg", "g");
                
                if (isNew) {
                    scrollInner.setAttribute('class', 'scroll-item dropping-scroll');
                } else {
                    scrollInner.setAttribute('class', 'scroll-item placed-scroll');
                }

                // CSS Variables for animation / placement
                scrollInner.style.setProperty('--rot', `${pos.rot}deg`);
                scrollInner.innerHTML = getScrollSvg();
                
                scrollOuter.appendChild(scrollInner);
                scrollsGroup.appendChild(scrollOuter);
            }
        }

        function renderList() {
            memoryList.innerHTML = '';
            
            if (memories.length === 0) {
                memoryList.innerHTML = '<p class="text-xs text-[#A39F96] italic text-center mt-6">Your jar is empty.</p>';
                return;
            }

            // Show newest at top
            [...memories].reverse().forEach((mem) => {
                const row = document.createElement('div');
                row.className = 'memory-row p-3 rounded-xl flex items-start justify-between group bg-[#FCFBF9] border border-[#E9E5DC]';
                
                row.innerHTML = `
                    <div class="flex flex-col min-w-0 flex-1 pr-3" onclick="openModal(${mem.id})">
                        <div class="flex items-center space-x-2 mb-1">
                            <span class="text-xs">📜</span>
                            <span class="text-[9px] font-bold uppercase tracking-widest text-[#D97706]">${mem.date}</span>
                        </div>
                        <p class="text-xs text-[#37352f] leading-relaxed line-clamp-2 italic">"${mem.text}"</p>
                    </div>
                    <button class="delete-btn shrink-0 p-1 mt-1" onclick="deleteMemory(event, ${mem.id})" title="Remove">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                `;
                memoryList.appendChild(row);
            });
        }

        // Actions
        preserveBtn.addEventListener('click', () => {
            const text = memoryInput.value.trim();
            if (text) {
                
                // Button feedback
                preserveBtn.style.transform = 'scale(0.95)';
                setTimeout(() => preserveBtn.style.transform = 'scale(1)', 150);

                const newMem = {
                    id: Date.now(),
                    text: text,
                    date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
                };

                memories.push(newMem);
                localStorage.setItem('faithreflects_time_capsule', JSON.stringify(memories));
                
                memoryInput.value = '';
                
                // Update visuals
                renderJar(true); // Animate the drop
                renderList();
            } else {
                memoryInput.focus();
            }
        });

        // Enter key to submit
        memoryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                preserveBtn.click();
            }
        });

        window.deleteMemory = function(event, id) {
            event.stopPropagation();
            memories = memories.filter(m => m.id !== id);
            localStorage.setItem('faithreflects_time_capsule', JSON.stringify(memories));
            
            renderJar(false); // Re-render without drop animation
            renderList();
        };

        // View Modal Logic
        window.openModal = function(id) {
            const mem = memories.find(m => m.id === id);
            if (mem) {
                modalDate.innerText = mem.date;
                modalText.innerText = mem.text;
                viewModal.classList.remove('hidden');
            }
        };

        closeModalBtn.addEventListener('click', () => {
            viewModal.classList.add('hidden');
        });

        // Clear Modal Logic
        resetTriggerBtn.addEventListener('click', () => resetModal.classList.remove('hidden'));
        cancelResetBtn.addEventListener('click', () => resetModal.classList.add('hidden'));
        
        confirmResetBtn.addEventListener('click', () => {
            memories = [];
            localStorage.setItem('faithreflects_time_capsule', JSON.stringify(memories));
            
            renderJar(false);
            renderList();
            resetModal.classList.add('hidden');
        });

        // Initialize
        renderJar(false);
        renderList();

    </script>
</body>
</html>
