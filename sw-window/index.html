<!DOCTYPE html>
<html lang="en" class="bg-[#191919]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Weather Window</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        /* Notion Dark Mode Base - Forced completely */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: #191919 !important; 
            color: #D4D4D4; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        .widget-box {
            background-color: #191919; 
            border: 1px solid #2d2d2d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: all 1.5s ease;
        }

        /* Weather Layers */
        .weather-layer {
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            pointer-events: none;
        }
        .weather-layer.active {
            opacity: 1;
        }

        /* 1. At Peace (Stars & Moon) */
        .star { animation: twinkle 3s infinite ease-in-out alternate; }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 5px #fff; }
        }

        /* 2. Heavy (Rain) */
        .rain-drop {
            stroke: #60A5FA;
            stroke-width: 1.5;
            stroke-linecap: round;
            opacity: 0.6;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-50px) translateX(10px); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(200px) translateX(-30px); opacity: 0; }
        }

        /* 3. Restless (Fog) */
        .fog-cloud {
            fill: #9CA3AF;
            filter: blur(8px);
            opacity: 0.4;
            animation: drift 12s linear infinite alternate;
        }
        @keyframes drift {
            0% { transform: translateX(-20px); }
            100% { transform: translateX(20px); }
        }

        /* 4. Hopeful (Dawn Glow) */
        .dawn-glow {
            animation: riseGlow 4s ease-in-out infinite alternate;
        }
        @keyframes riseGlow {
            0% { transform: translateY(10px); opacity: 0.7; }
            100% { transform: translateY(-5px); opacity: 1; }
        }

        /* 5. On Fire (Floating Embers) */
        .window-ember {
            fill: #F59E0B;
            filter: drop-shadow(0 0 4px #D97706);
            animation: floatUp 4s ease-in infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(200px) scale(1); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-50px) scale(0.5); opacity: 0; }
        }

        /* Selection Buttons */
        .weather-btn {
            background-color: transparent;
            color: #737373;
            border: 1px solid #333333;
            transition: all 0.3s ease;
        }
        .weather-btn:hover {
            color: #A3A3A3;
            border-color: #525252;
            background-color: #262626;
        }
        .weather-btn.selected {
            background-color: #2D2416;
            color: #FCD34D;
            border-color: #5C451A;
        }

        /* Text transitions */
        .fade-text {
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.8s ease;
        }
        .fade-text.visible {
            opacity: 1;
            transform: translateY(0);
        }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden bg-[#191919]">

    <div class="widget-box relative w-full max-w-sm rounded-3xl p-8 flex flex-col items-center h-[520px] overflow-hidden">
        
        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-4 z-10 shrink-0">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#737373]">@faithreflects</span>
            <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#A3A3A3] border border-[#333] bg-[#1a1a1a]">
                Selah
            </div>
        </div>

        <h2 class="serif text-2xl text-[#EDEDED] mb-1 z-10">Soul Weather</h2>
        <p class="text-xs text-[#8B8B8B] italic mb-6 z-10 text-center">"How is your soul right now?"</p>

        <!-- Arched Window SVG -->
        <div class="relative w-40 h-52 mb-6 z-10 shrink-0" id="windowContainer">
            <svg viewBox="0 0 160 220" class="w-full h-full">
                
                <!-- Definition for Window Clipping -->
                <defs>
                    <clipPath id="windowClip">
                        <!-- Arched path: radius 60, straight sides down -->
                        <path d="M 20 80 A 60 60 0 0 1 140 80 L 140 200 L 20 200 Z" />
                    </clipPath>
                    
                    <!-- Gradients -->
                    <linearGradient id="nightSky" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#0F172A"/>
                        <stop offset="100%" stop-color="#1E293B"/>
                    </linearGradient>
                    <linearGradient id="heavySky" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#1E293B"/>
                        <stop offset="100%" stop-color="#334155"/>
                    </linearGradient>
                    <linearGradient id="dawnSky" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#1E293B"/>
                        <stop offset="60%" stop-color="#475569"/>
                        <stop offset="100%" stop-color="#D97706"/>
                    </linearGradient>
                </defs>

                <!-- Window Content (Clipped to Arch) -->
                <g clip-path="url(#windowClip)">
                    
                    <!-- Default/Base Sky -->
                    <rect x="0" y="0" width="160" height="220" fill="url(#nightSky)"/>

                    <!-- LAYER 1: At Peace (Stars & Moon) -->
                    <g id="layer-peace" class="weather-layer active">
                        <circle cx="110" cy="60" r="15" fill="#FEF3C7" filter="drop-shadow(0 0 8px rgba(254, 243, 199, 0.5))"/>
                        <circle cx="40" cy="50" r="1" fill="#fff" class="star" style="animation-delay: 0s;"/>
                        <circle cx="80" cy="30" r="1.5" fill="#fff" class="star" style="animation-delay: 0.5s;"/>
                        <circle cx="130" cy="110" r="1" fill="#fff" class="star" style="animation-delay: 1s;"/>
                        <circle cx="50" cy="130" r="2" fill="#fff" class="star" style="animation-delay: 1.5s;"/>
                        <circle cx="90" cy="170" r="1" fill="#fff" class="star" style="animation-delay: 0.2s;"/>
                    </g>

                    <!-- LAYER 2: Heavy (Rain & Blue Sky) -->
                    <g id="layer-heavy" class="weather-layer">
                        <rect x="0" y="0" width="160" height="220" fill="url(#heavySky)"/>
                        <!-- Generated Raindrops -->
                        <line x1="30" y1="0" x2="30" y2="15" class="rain-drop" style="animation-duration: 1.2s; animation-delay: 0s;"/>
                        <line x1="60" y1="0" x2="60" y2="20" class="rain-drop" style="animation-duration: 1.5s; animation-delay: 0.4s;"/>
                        <line x1="90" y1="0" x2="90" y2="12" class="rain-drop" style="animation-duration: 1.1s; animation-delay: 0.2s;"/>
                        <line x1="120" y1="0" x2="120" y2="18" class="rain-drop" style="animation-duration: 1.4s; animation-delay: 0.7s;"/>
                        <line x1="45" y1="0" x2="45" y2="15" class="rain-drop" style="animation-duration: 1.3s; animation-delay: 0.9s;"/>
                        <line x1="105" y1="0" x2="105" y2="20" class="rain-drop" style="animation-duration: 1.6s; animation-delay: 0.1s;"/>
                    </g>

                    <!-- LAYER 3: Restless (Fog) -->
                    <g id="layer-restless" class="weather-layer">
                        <rect x="0" y="0" width="160" height="220" fill="#1E293B"/>
                        <circle cx="40" cy="100" r="40" class="fog-cloud" style="animation-delay: 0s;"/>
                        <circle cx="120" cy="140" r="50" class="fog-cloud" style="animation-delay: -3s; animation-direction: reverse;"/>
                        <circle cx="80" cy="180" r="45" class="fog-cloud" style="animation-delay: -6s;"/>
                        <circle cx="60" cy="60" r="35" class="fog-cloud" style="animation-delay: -2s; animation-direction: reverse;"/>
                    </g>

                    <!-- LAYER 4: Hopeful (Dawn) -->
                    <g id="layer-hopeful" class="weather-layer">
                        <rect x="0" y="0" width="160" height="220" fill="url(#dawnSky)" class="dawn-glow"/>
                        <circle cx="40" cy="70" r="1" fill="#fff" opacity="0.4"/>
                        <circle cx="120" cy="50" r="1.5" fill="#fff" opacity="0.3"/>
                    </g>

                    <!-- LAYER 5: On Fire (Embers) -->
                    <g id="layer-fire" class="weather-layer">
                        <rect x="0" y="0" width="160" height="220" fill="url(#nightSky)"/>
                        <rect x="0" y="150" width="160" height="70" fill="url(#dawnSky)" opacity="0.3"/> <!-- Warm base glow -->
                        <!-- Generated Embers -->
                        <circle cx="50" cy="220" r="2" class="window-ember" style="animation-duration: 4s; animation-delay: 0s;"/>
                        <circle cx="110" cy="220" r="3" class="window-ember" style="animation-duration: 5s; animation-delay: 1.5s;"/>
                        <circle cx="80" cy="220" r="1.5" class="window-ember" style="animation-duration: 3.5s; animation-delay: 0.8s;"/>
                        <circle cx="30" cy="220" r="2.5" class="window-ember" style="animation-duration: 4.5s; animation-delay: 2.2s;"/>
                        <circle cx="130" cy="220" r="2" class="window-ember" style="animation-duration: 4.2s; animation-delay: 0.4s;"/>
                    </g>
                    
                    <!-- Glass Reflection -->
                    <path d="M 20 80 A 60 60 0 0 1 140 80 L 140 200 L 20 200 Z" fill="rgba(255,255,255,0.03)" pointer-events="none"/>
                    <path d="M 30 90 L 60 200" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none" pointer-events="none"/>
                </g>

                <!-- Window Frame (Outer overlay) -->
                <path d="M 20 80 A 60 60 0 0 1 140 80 L 140 200 L 20 200 Z" fill="none" stroke="#262626" stroke-width="12"/>
                <path d="M 20 80 A 60 60 0 0 1 140 80 L 140 200 L 20 200 Z" fill="none" stroke="#111111" stroke-width="2"/>
                
                <!-- Window Panes/Crossbars -->
                <line x1="80" y1="20" x2="80" y2="200" stroke="#262626" stroke-width="6"/>
                <line x1="80" y1="20" x2="80" y2="200" stroke="#111111" stroke-width="1"/>
                <line x1="20" y1="120" x2="140" y2="120" stroke="#262626" stroke-width="6"/>
                <line x1="20" y1="120" x2="140" y2="120" stroke="#111111" stroke-width="1"/>
                
                <!-- Window Sill -->
                <rect x="10" y="200" width="140" height="10" fill="#2A2A2A" rx="2"/>
                <rect x="15" y="210" width="130" height="5" fill="#1A1A1A" rx="1"/>

            </svg>
        </div>

        <!-- Emotion Buttons -->
        <div class="flex flex-wrap justify-center gap-2 mb-4 w-full z-10 shrink-0">
            <button onclick="setWeather('peace')" id="btn-peace" class="weather-btn selected px-3 py-1.5 rounded-xl text-[10px] font-semibold uppercase tracking-wider">🕊️ At Peace</button>
            <button onclick="setWeather('heavy')" id="btn-heavy" class="weather-btn px-3 py-1.5 rounded-xl text-[10px] font-semibold uppercase tracking-wider">🌧️ Heavy</button>
            <button onclick="setWeather('restless')" id="btn-restless" class="weather-btn px-3 py-1.5 rounded-xl text-[10px] font-semibold uppercase tracking-wider">🌫️ Restless</button>
            <button onclick="setWeather('hopeful')" id="btn-hopeful" class="weather-btn px-3 py-1.5 rounded-xl text-[10px] font-semibold uppercase tracking-wider">🌅 Hopeful</button>
            <button onclick="setWeather('fire')" id="btn-fire" class="weather-btn px-3 py-1.5 rounded-xl text-[10px] font-semibold uppercase tracking-wider">🔥 On Fire</button>
        </div>

        <!-- Encouragement Message -->
        <div class="mt-auto h-12 flex items-center justify-center w-full z-10">
            <p id="weatherMessage" class="serif italic text-[13px] text-[#A3A3A3] text-center leading-relaxed fade-text visible px-2">
                "He leads me beside still waters."
            </p>
        </div>

    </div>

    <script>
        const weatherData = {
            'peace': { msg: '"Let the peace of Christ rule in your hearts." — Col 3:15' },
            'heavy': { msg: '"Come to me, all you who are weary and burdened, and I will give you rest." — Matt 11:28' },
            'restless': { msg: '"Be still before the Lord and wait patiently for him." — Ps 37:7' },
            'hopeful': { msg: '"But those who hope in the Lord will renew their strength." — Isa 40:31' },
            'fire': { msg: '"Never be lacking in zeal, but keep your spiritual fervor." — Rom 12:11' }
        };

        const today = new Date().toDateString();
        
        // State
        let state = JSON.parse(localStorage.getItem('faithreflects_soul_weather')) || { weather: 'peace', date: today };

        // Reset if new day
        if(state.date !== today) {
            state = { weather: 'peace', date: today };
            localStorage.setItem('faithreflects_soul_weather', JSON.stringify(state));
        }

        const msgElement = document.getElementById('weatherMessage');
        const buttons = document.querySelectorAll('.weather-btn');
        const layers = document.querySelectorAll('.weather-layer');

        function setWeather(weatherId) {
            // Update State
            state.weather = weatherId;
            localStorage.setItem('faithreflects_soul_weather', JSON.stringify(state));

            // Update Buttons
            buttons.forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`btn-${weatherId}`).classList.add('selected');

            // Update Visual Window Layers
            layers.forEach(layer => layer.classList.remove('active'));
            document.getElementById(`layer-${weatherId}`).classList.add('active');

            // Update Message Text Smoothly
            msgElement.classList.remove('visible');
            setTimeout(() => {
                msgElement.innerText = weatherData[weatherId].msg;
                msgElement.classList.add('visible');
            }, 800); // Wait for CSS fade out
        }

        // Initialize on load
        setWeather(state.weather);

    </script>
</body>
</html>
