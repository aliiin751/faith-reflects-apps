<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milestone Stepping Stones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: transparent; color: #37352f; user-select: none; }
        .serif { font-family: 'Playfair Display', serif; }

        /* The Stream Container */
        .stream-container {
            position: relative;
            width: 100%;
            height: 280px;
            background-color: #eef3f1; /* Water color */
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: inset 0 4px 15px rgba(0,0,0,0.03);
            border: 2px solid #ffffff;
        }

        /* Stone Styling & Animations */
        .stone-wrapper {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .stone {
            width: 36px;
            height: 26px;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            box-shadow: 
                0 4px 8px rgba(0,0,0,0.1), 
                inset -2px -4px 6px rgba(0,0,0,0.15),
                inset 2px 2px 4px rgba(255,255,255,0.4);
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.3s ease;
            animation: dropIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .stone:hover {
            transform: scale(1.15) rotate(5deg) translateY(-2px);
            filter: brightness(1.05);
            z-index: 20;
        }

        @keyframes dropIn {
            0% { transform: translateY(-60px) scale(0.8); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* Flower Bloom Animations */
        .flowers {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            margin-top: -25px;
            margin-left: -25px;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.5) rotate(-30deg);
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .flowers.bloomed {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        /* Tooltip Card */
        .tooltip-card {
            opacity: 0;
            transform: translateY(-10px) scale(0.95);
            transition: all 0.3s ease;
            pointer-events: none;
            position: absolute;
            top: 20px;
            left: 50%;
            margin-left: -45%; /* 90% width centered */
            width: 90%;
            z-index: 30;
        }
        
        .tooltip-card.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div class="relative w-full max-w-sm bg-white rounded-3xl p-8 border border-[#e9e9e7] shadow-[0_8px_30px_rgb(0,0,0,0.03)] flex flex-col items-center min-h-[580px]">
        
        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-6">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#a3b8ac]">@faithreflects</span>
            <div class="px-3 py-1 bg-[#f7f6f3] rounded-full text-[10px] font-semibold tracking-wider text-gray-500">
                <span id="stoneCount">0</span> MILESTONES
            </div>
        </div>

        <h2 class="serif text-2xl text-[#37352f] mb-1">Faith Stepping Stones</h2>
        <p class="text-xs text-gray-400 italic mb-6 text-center px-2">"Walking across the waters of faith."</p>

        <!-- Stream & Stones Container -->
        <div class="stream-container mb-6" id="streamContainer">
            
            <!-- SVG River Banks & Ripples -->
            <svg viewBox="0 0 100 100" preserveAspectRatio="none" class="absolute inset-0 w-full h-full pointer-events-none">
                <!-- Left Bank -->
                <path d="M 0 0 L 25 0 C 15 30, 35 70, 10 100 L 0 100 Z" fill="#f4f1eb"/>
                <path d="M 0 0 L 25 0 C 15 30, 35 70, 10 100 L 0 100 Z" fill="none" stroke="#e9e5dc" stroke-width="0.5"/>
                
                <!-- Right Bank -->
                <path d="M 100 0 L 85 0 C 95 40, 70 80, 95 100 L 100 100 Z" fill="#f4f1eb"/>
                <path d="M 100 0 L 85 0 C 95 40, 70 80, 95 100 L 100 100 Z" fill="none" stroke="#e9e5dc" stroke-width="0.5"/>

                <!-- Water Ripples -->
                <path d="M 40 20 Q 45 18 50 20" stroke="#dce4e0" stroke-width="1" fill="none" stroke-linecap="round"/>
                <path d="M 55 50 Q 65 48 75 50" stroke="#dce4e0" stroke-width="1" fill="none" stroke-linecap="round"/>
                <path d="M 25 75 Q 35 72 45 75" stroke="#dce4e0" stroke-width="1" fill="none" stroke-linecap="round"/>
                <path d="M 60 90 Q 65 88 70 90" stroke="#dce4e0" stroke-width="1" fill="none" stroke-linecap="round"/>
            </svg>

            <!-- Stones injected here via JS -->
            <div id="stonesLayer" class="absolute inset-0"></div>

            <!-- Hover Tooltip inside the stream bounds -->
            <div id="tooltip" class="tooltip-card bg-[#37352f]/95 backdrop-blur-md text-white rounded-xl p-4 text-center shadow-xl">
                <span id="tooltipDate" class="text-[9px] font-bold tracking-widest uppercase text-[#D4AF37] block mb-1">DATE</span>
                <p id="tooltipText" class="text-xs font-medium leading-relaxed mb-1">Hover text here</p>
                <span class="text-[8px] text-gray-400 italic">(Click to remove)</span>
            </div>
        </div>

        <!-- Input Area -->
        <div class="w-full flex space-x-2 z-10 mt-auto">
            <input type="text" id="milestoneInput" placeholder="What milestone was reached?" class="flex-1 px-4 py-3 bg-[#fdfdfc] border border-[#e9e9e7] focus:border-[#D4AF37] rounded-xl text-sm text-[#5a5852] outline-none transition-colors">
            <button id="addBtn" class="bg-[#37352f] text-white px-4 py-3 rounded-xl hover:bg-black transition-colors flex items-center justify-center shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </button>
        </div>
        
        <button id="resetBtn" class="mt-4 text-[9px] tracking-widest text-gray-300 uppercase hover:text-gray-500 transition-colors w-full text-center">
            Clear Stream
        </button>

        <!-- Custom Delete Single Entry Modal -->
        <div id="deleteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-white/60 backdrop-blur-sm transition-opacity">
            <div class="bg-white rounded-2xl p-6 w-full max-w-[260px] border border-[#e9e9e7] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#37352f]">Remove Stone?</h3>
                <p id="deleteStoneText" class="text-xs text-gray-500 italic mb-6 leading-relaxed line-clamp-3"></p>
                <div class="flex space-x-3">
                    <button id="cancelDeleteBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-gray-500 hover:bg-gray-50 border border-transparent hover:border-gray-200 transition-colors">Cancel</button>
                    <button id="confirmDeleteBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-red-500 text-white hover:bg-red-600 transition-colors">Remove</button>
                </div>
            </div>
        </div>

        <!-- Custom Clear All Modal -->
        <div id="clearModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-white/60 backdrop-blur-sm transition-opacity">
            <div class="bg-white rounded-2xl p-6 w-full max-w-[260px] border border-[#e9e9e7] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#37352f]">Clear Stream?</h3>
                <p class="text-xs text-gray-400 mb-6">This will wash away all stones so you can start a new path.</p>
                <div class="flex space-x-3">
                    <button id="cancelClearBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-gray-500 hover:bg-gray-50 border border-transparent hover:border-gray-200 transition-colors">Cancel</button>
                    <button id="confirmClearBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#37352f] text-white hover:bg-black transition-colors">Clear</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Array of coordinate maps crossing the stream
        const positions = [
            { top: '15%', left: '35%', rot: 12, color: '#C4C2BC' },
            { top: '22%', left: '55%', rot: -15, color: '#D4DFD2' },
            { top: '32%', left: '75%', rot: 25, color: '#E2DFD8' },
            { top: '48%', left: '68%', rot: -10, color: '#D2B48C' },
            { top: '55%', left: '48%', rot: 18, color: '#C4C2BC' },
            { top: '65%', left: '30%', rot: -22, color: '#D4DFD2' },
            { top: '78%', left: '45%', rot: 5, color: '#E2DFD8' },
            { top: '88%', left: '65%', rot: 30, color: '#D2B48C' },
            { top: '80%', left: '85%', rot: -18, color: '#C4C2BC' },
            { top: '92%', left: '50%', rot: 15, color: '#D4DFD2' }
        ];

        let state = JSON.parse(localStorage.getItem('faithreflects_milestones')) || [];
        
        const stonesLayer = document.getElementById('stonesLayer');
        const input = document.getElementById('milestoneInput');
        const countDisplay = document.getElementById('stoneCount');
        const tooltip = document.getElementById('tooltip');
        const tooltipText = document.getElementById('tooltipText');
        const tooltipDate = document.getElementById('tooltipDate');
        
        // Modals
        const deleteModal = document.getElementById('deleteModal');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
        const deleteStoneText = document.getElementById('deleteStoneText');
        
        const clearModal = document.getElementById('clearModal');
        const cancelClearBtn = document.getElementById('cancelClearBtn');
        const confirmClearBtn = document.getElementById('confirmClearBtn');
        
        let stoneToDelete = -1;

        // SVGs for the little flowers that bloom around the stone
        const getFlowerSvg = () => `
            <svg class="w-full h-full" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Tiny leaves -->
                <path d="M 5 20 Q 10 15 15 25 Q 10 25 5 20 Z" fill="#8FBC8F"/>
                <path d="M 40 30 Q 45 25 45 35 Q 35 35 40 30 Z" fill="#8FBC8F"/>
                <path d="M 25 45 Q 20 40 30 40 Q 30 50 25 45 Z" fill="#8FBC8F"/>
                
                <!-- White/Yellow Flowers -->
                <circle cx="10" cy="20" r="3" fill="#ffffff" stroke="#e9e9e7" stroke-width="0.5"/>
                <circle cx="10" cy="20" r="1" fill="#FCD34D"/>
                
                <circle cx="42" cy="32" r="3" fill="#ffffff" stroke="#e9e9e7" stroke-width="0.5"/>
                <circle cx="42" cy="32" r="1" fill="#FCD34D"/>
                
                <circle cx="28" cy="42" r="2.5" fill="#ffffff" stroke="#e9e9e7" stroke-width="0.5"/>
                <circle cx="28" cy="42" r="1" fill="#FCD34D"/>
            </svg>
        `;

        function updateStream(animateLast = false) {
            countDisplay.innerText = state.length;
            stonesLayer.innerHTML = '';

            state.forEach((milestone, i) => {
                const pos = positions[i % positions.length];
                const isLast = (i === state.length - 1);
                
                const wrapper = document.createElement('div');
                wrapper.className = 'stone-wrapper';
                wrapper.style.top = pos.top;
                wrapper.style.left = pos.left;

                // The Stone
                const stone = document.createElement('div');
                stone.className = 'stone';
                stone.style.backgroundColor = pos.color;
                stone.style.transform = `rotate(${pos.rot}deg)`;
                
                // If not animating the newly added one, remove the dropIn animation
                if (!animateLast || !isLast) {
                    stone.style.animation = 'none';
                }

                // The Flowers
                const flowers = document.createElement('div');
                flowers.className = 'flowers';
                flowers.innerHTML = getFlowerSvg();
                
                // Trigger bloom after a tiny delay if it's new, otherwise show immediately
                if (animateLast && isLast) {
                    setTimeout(() => flowers.classList.add('bloomed'), 600);
                } else {
                    flowers.classList.add('bloomed');
                    flowers.style.transition = 'none';
                }

                wrapper.appendChild(flowers);
                wrapper.appendChild(stone);
                stonesLayer.appendChild(wrapper);

                // Hover Interaction
                stone.addEventListener('mouseenter', () => {
                    const dateObj = new Date(milestone.timestamp);
                    tooltipDate.innerText = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    tooltipText.innerText = `"${milestone.text}"`;
                    tooltip.classList.add('visible');
                });
                
                stone.addEventListener('mouseleave', () => {
                    tooltip.classList.remove('visible');
                });
                
                // Click to Delete
                stone.addEventListener('click', () => {
                    stoneToDelete = i;
                    deleteStoneText.innerText = `"${milestone.text}"`;
                    deleteModal.classList.remove('hidden');
                    tooltip.classList.remove('visible');
                });
            });
        }

        // Add Logic
        document.getElementById('addBtn').addEventListener('click', () => {
            const text = input.value.trim();
            if (text && state.length < 10) {
                state.push({ text: text, timestamp: Date.now() });
                localStorage.setItem('faithreflects_milestones', JSON.stringify(state));
                
                input.value = '';
                updateStream(true); // Animate the new stone
            } else if (state.length >= 10) {
                alert("The stream is full! What a beautiful journey. Clear the stream to start a new path.");
            }
        });

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('addBtn').click();
        });

        // Clear All Logic
        document.getElementById('resetBtn').addEventListener('click', () => {
            clearModal.classList.remove('hidden');
        });
        cancelClearBtn.addEventListener('click', () => clearModal.classList.add('hidden'));
        confirmClearBtn.addEventListener('click', () => {
            state = [];
            localStorage.setItem('faithreflects_milestones', JSON.stringify(state));
            updateStream();
            clearModal.classList.add('hidden');
        });

        // Delete Single Logic
        cancelDeleteBtn.addEventListener('click', () => {
            deleteModal.classList.add('hidden');
            stoneToDelete = -1;
        });
        confirmDeleteBtn.addEventListener('click', () => {
            if (stoneToDelete > -1) {
                state.splice(stoneToDelete, 1);
                localStorage.setItem('faithreflects_milestones', JSON.stringify(state));
                updateStream();
            }
            deleteModal.classList.add('hidden');
            stoneToDelete = -1;
        });

        // Init
        updateStream();
    </script>
</body>
</html>
