<!DOCTYPE html>
<html lang="en" class="bg-[#191919]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Engraved Quotes Wall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        /* Notion Dark Mode Base */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: #191919 !important; 
            color: #D4D4D4; 
            user-select: none; 
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Playfair Display', serif; }

        .widget-box {
            background-color: #191919; 
            border: 1px solid #2d2d2d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        /* The Slate Wall Background */
        .slate-wall {
            background: linear-gradient(145deg, #151515 0%, #0a0a0a 100%);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
            border: 1px solid #222;
            position: relative;
            overflow: hidden;
        }
        
        /* Subtle stone texture overlay */
        .slate-wall::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.15;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Engraved Quote Block */
        .quote-block {
            position: relative;
            z-index: 10;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-top: 1px solid rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(0,0,0,0.5);
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
            border-radius: 0.5rem;
            transition: all 0.4s ease;
        }
        
        /* The Text Engraving Effect */
        .engraved-text {
            color: #A0783D; /* Muted, cooled gold */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8), -1px -1px 1px rgba(255,255,255,0.05);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .engraved-author {
            color: #525252;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.8);
            transition: color 0.5s ease;
        }

        /* Hover: Heating up the engraving */
        .quote-block:hover .engraved-text {
            color: #FCD34D;
            text-shadow: 0 0 12px rgba(245, 158, 11, 0.6), 0 0 20px rgba(217, 119, 6, 0.4), 1px 1px 0px #000;
            transform: scale(1.02);
        }
        .quote-block:hover .engraved-author {
            color: #A3A3A3;
        }
        .quote-block:hover {
            background: linear-gradient(180deg, rgba(245, 158, 11, 0.05) 0%, transparent 100%);
            border-top-color: rgba(245, 158, 11, 0.1);
        }

        /* Carving Animation (When newly added) */
        .is-carving {
            animation: burnIn 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes burnIn {
            0% { opacity: 0; color: #FFFBEB; text-shadow: 0 0 30px #F59E0B, 0 0 50px #D97706; transform: scale(0.95); }
            30% { opacity: 1; color: #FCD34D; text-shadow: 0 0 20px #F59E0B; transform: scale(1.02); }
            100% { opacity: 1; color: #A0783D; text-shadow: 1px 1px 2px rgba(0,0,0,0.8), -1px -1px 1px rgba(255,255,255,0.05); transform: scale(1); }
        }

        /* Sparks Physics */
        .spark {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 30;
            animation: fly-spark 1s cubic-bezier(0.25, 1, 0.3, 1) forwards;
        }
        .spark.hot { background-color: #FFFBEB; box-shadow: 0 0 8px #FCD34D; }
        .spark.mid { background-color: #FCD34D; box-shadow: 0 0 10px #F59E0B; }
        .spark.cool { background-color: #D97706; box-shadow: 0 0 6px #B45309; }

        @keyframes fly-spark {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* Inputs & Buttons */
        textarea, input[type="text"] {
            background-color: #111111;
            border: 1px solid #333333;
            transition: all 0.3s ease;
            color: #E5E5E5;
        }
        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: #D4AF37;
            background-color: #151515;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }
        textarea::placeholder, input[type="text"]::placeholder { color: #525252; font-style: italic; }
        textarea { resize: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }

        .engrave-btn {
            background-color: #2D2416;
            color: #FCD34D;
            border: 1px solid #5C451A;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }
        .engrave-btn:hover { 
            box-shadow: 0 0 15px rgba(217, 119, 6, 0.2);
            background-color: #3d311d;
        }
        .engrave-btn:active { 
            transform: scale(0.96); 
            background-color: #1a140b; /* Like striking a chisel */
        }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); background-color: rgba(0,0,0,0.7); }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden bg-[#191919]">

    <div id="widgetContainer" class="widget-box relative w-full max-w-lg rounded-3xl p-6 md:p-8 flex flex-col h-[650px] overflow-hidden">
        
        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-6 shrink-0 z-20">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#737373]">@faithreflects</span>
            <div class="px-3 py-1 rounded-full text-[10px] font-semibold tracking-wider text-[#A3A3A3] border border-[#333] bg-[#1a1a1a] flex items-center space-x-1">
                <span id="quoteCount" class="text-[#D4AF37]">0</span>
                <span>Engraved</span>
            </div>
        </div>

        <h2 class="serif text-2xl text-[#EDEDED] mb-1 shrink-0 z-20">Golden Quotes</h2>
        <p class="text-xs text-[#8B8B8B] italic mb-6 shrink-0 z-20">"The lines from sermons that branded your heart."</p>

        <!-- Input Area -->
        <div class="w-full flex flex-col space-y-3 mb-6 shrink-0 z-20">
            <textarea id="quoteInput" placeholder='"God does not call the qualified — He qualifies the called."' class="w-full rounded-xl px-4 py-3 text-sm font-light leading-relaxed min-h-[80px]" autocomplete="off"></textarea>
            
            <div class="flex space-x-3">
                <div class="relative flex-1">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-[#525252] text-xs uppercase tracking-widest font-bold">By</span>
                    <input type="text" id="speakerInput" placeholder="Speaker / Pastor" class="w-full rounded-xl pl-10 pr-4 py-3 text-xs font-medium" autocomplete="off">
                </div>
                <button id="engraveBtn" class="engrave-btn px-6 py-3 rounded-xl text-xs flex items-center justify-center space-x-2 shadow-lg shrink-0">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                    <span>Engrave</span>
                </button>
            </div>
        </div>

        <!-- The Slate Wall (Display Area) -->
        <div class="flex-1 w-full relative rounded-2xl slate-wall p-2 overflow-hidden z-10 min-h-0 flex flex-col">
            
            <!-- Sparks Container -->
            <div id="sparksContainer" class="absolute inset-0 pointer-events-none z-50"></div>

            <!-- Quotes List -->
            <div id="wallContainer" class="flex-1 overflow-y-auto custom-scrollbar p-2 flex flex-col relative z-20">
                <!-- Quotes injected here by JS -->
            </div>

            <!-- Empty State -->
            <div id="emptyMsg" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-40 z-10">
                <span class="text-[10px] uppercase tracking-widest text-[#737373]">Awaiting the chisel...</span>
            </div>

        </div>

        <button id="clearTriggerBtn" class="mt-4 text-[10px] tracking-widest text-[#525252] uppercase hover:text-[#A3A3A3] transition-colors pb-1 border-b border-transparent hover:border-[#333] self-center shrink-0 z-20">
            Demolish Wall
        </button>

        <!-- Delete Single Quote Modal -->
        <div id="deleteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#191919] rounded-2xl p-6 w-full max-w-[280px] border border-[#2d2d2d] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#EDEDED]">Chisel Out Quote?</h3>
                <p id="deleteQuoteText" class="serif italic text-[13px] text-[#A3A3A3] mb-6 leading-relaxed line-clamp-3"></p>
                <div class="flex space-x-3">
                    <button id="cancelDeleteBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#A3A3A3] hover:bg-[#262626] border border-transparent transition-colors">Cancel</button>
                    <button id="confirmDeleteBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#EF4444]/10 text-[#EF4444] border border-[#EF4444]/30 hover:bg-[#EF4444]/20 transition-colors">Remove</button>
                </div>
            </div>
        </div>

        <!-- Clear Entire Wall Modal -->
        <div id="clearModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg transition-opacity">
            <div class="bg-[#191919] rounded-2xl p-6 w-full max-w-[260px] border border-[#2d2d2d] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#EDEDED]">Demolish Wall?</h3>
                <p class="text-xs text-[#8B8B8B] mb-6">This will permanently destroy all engraved quotes.</p>
                <div class="flex space-x-3">
                    <button id="cancelClearBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-[#A3A3A3] hover:bg-[#262626] border border-transparent transition-colors">Cancel</button>
                    <button id="confirmClearBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#262626] text-[#EDEDED] border border-[#333] hover:bg-[#333] transition-colors">Demolish</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // State
        let quotes = JSON.parse(localStorage.getItem('faithreflects_golden_quotes')) || [];
        
        // Elements
        const quoteInput = document.getElementById('quoteInput');
        const speakerInput = document.getElementById('speakerInput');
        const engraveBtn = document.getElementById('engraveBtn');
        const wallContainer = document.getElementById('wallContainer');
        const sparksContainer = document.getElementById('sparksContainer');
        const countDisplay = document.getElementById('quoteCount');
        const emptyMsg = document.getElementById('emptyMsg');
        
        // Modals
        const deleteModal = document.getElementById('deleteModal');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
        const deleteQuoteText = document.getElementById('deleteQuoteText');
        
        const clearModal = document.getElementById('clearModal');
        const clearTriggerBtn = document.getElementById('clearTriggerBtn');
        const cancelClearBtn = document.getElementById('cancelClearBtn');
        const confirmClearBtn = document.getElementById('confirmClearBtn');
        
        let quoteToDelete = null;

        // Visual Spark Effect Generator
        function strikeSparks(targetElement) {
            // Get bounding box of the newly added quote block relative to the sparks container
            const rect = targetElement.getBoundingClientRect();
            const containerRect = sparksContainer.getBoundingClientRect();
            
            const startY = rect.top - containerRect.top + (rect.height / 2);
            
            // Generate 30 sparks originating randomly along the width of the text
            for(let i=0; i<30; i++) {
                setTimeout(() => {
                    const spark = document.createElement('div');
                    
                    const typeRand = Math.random();
                    let typeClass = 'hot';
                    if (typeRand > 0.4) typeClass = 'mid';
                    if (typeRand > 0.8) typeClass = 'cool';
                    
                    const size = Math.random() * 3 + 1;
                    
                    spark.className = `spark ${typeClass}`;
                    spark.style.width = `${size}px`;
                    spark.style.height = `${size}px`;
                    
                    // Spawn randomly along the horizontal axis of the quote
                    const startX = (Math.random() * rect.width) + (rect.left - containerRect.left);
                    
                    spark.style.left = `${startX}px`;
                    spark.style.top = `${startY}px`;
                    
                    // Explosive outward trajectory (mostly outwards and slightly down/up)
                    const angle = (Math.random() * Math.PI * 2); 
                    const distance = 30 + Math.random() * 80;
                    
                    spark.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                    spark.style.setProperty('--ty', `${Math.sin(angle) * distance + 20}px`); // Bias slightly downwards like gravity
                    
                    sparksContainer.appendChild(spark);
                    
                    // Cleanup
                    setTimeout(() => {
                        if (sparksContainer.contains(spark)) spark.remove();
                    }, 1000);
                }, Math.random() * 200); // Stagger over 200ms
            }
        }

        function renderWall() {
            wallContainer.innerHTML = '';
            countDisplay.innerText = quotes.length;

            if (quotes.length > 0) emptyMsg.classList.add('hidden');
            else emptyMsg.classList.remove('hidden');

            // Render from newest to oldest
            [...quotes].reverse().forEach(q => {
                createQuoteElement(q, false);
            });
        }

        function createQuoteElement(q, animate = false) {
            const block = document.createElement('div');
            block.className = 'quote-block group flex flex-col';
            block.id = `quote-${q.id}`;
            
            const speakerText = q.speaker ? `— ${q.speaker}` : "— Unknown";
            
            block.innerHTML = `
                <p class="serif text-lg leading-relaxed mb-3 engraved-text ${animate ? 'is-carving' : ''}">"${q.text}"</p>
                <div class="flex justify-between items-end w-full">
                    <span class="text-[10px] uppercase tracking-widest font-bold engraved-author">${speakerText}</span>
                    <button onclick="triggerDelete(${q.id}, '${q.text.replace(/'/g, "\\'")}')" class="opacity-0 group-hover:opacity-100 text-[#525252] hover:text-[#EF4444] transition-all p-1" title="Chisel Out">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            `;
            
            if (animate) {
                // Prepend so it shows at the top
                wallContainer.insertBefore(block, wallContainer.firstChild);
                
                // Wait for the DOM to render the block to get its coordinates, then strike sparks!
                requestAnimationFrame(() => {
                    strikeSparks(block);
                });
            } else {
                wallContainer.appendChild(block);
            }
        }

        // Engrave Logic
        engraveBtn.addEventListener('click', () => {
            const text = quoteInput.value.trim();
            const speaker = speakerInput.value.trim();
            
            if (text) {
                // Button feedback (like striking a chisel)
                engraveBtn.style.transform = 'scale(0.92)';
                setTimeout(() => engraveBtn.style.transform = 'scale(1)', 100);

                const newQuote = {
                    id: Date.now(),
                    text: text,
                    speaker: speaker
                };
                
                quotes.push(newQuote);
                localStorage.setItem('faithreflects_golden_quotes', JSON.stringify(quotes));
                
                quoteInput.value = '';
                speakerInput.value = '';
                
                emptyMsg.classList.add('hidden');
                countDisplay.innerText = quotes.length;
                
                createQuoteElement(newQuote, true);
                
                // Scroll to top to see the new engraving
                wallContainer.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                quoteInput.focus();
            }
        });

        // Enter key support
        quoteInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                engraveBtn.click();
            }
        });

        // Delete Single Logic
        window.triggerDelete = function(id, text) {
            quoteToDelete = id;
            deleteQuoteText.innerText = `"${text}"`;
            deleteModal.classList.remove('hidden');
        };

        cancelDeleteBtn.addEventListener('click', () => {
            deleteModal.classList.add('hidden');
            quoteToDelete = null;
        });
        
        confirmDeleteBtn.addEventListener('click', () => {
            if (quoteToDelete) {
                // Find element and fade it out before deleting
                const block = document.getElementById(`quote-${quoteToDelete}`);
                if (block) {
                    block.style.opacity = '0';
                    block.style.transform = 'scale(0.95)';
                    
                    setTimeout(() => {
                        quotes = quotes.filter(q => q.id !== quoteToDelete);
                        localStorage.setItem('faithreflects_golden_quotes', JSON.stringify(quotes));
                        renderWall();
                    }, 300);
                } else {
                    // Fallback
                    quotes = quotes.filter(q => q.id !== quoteToDelete);
                    localStorage.setItem('faithreflects_golden_quotes', JSON.stringify(quotes));
                    renderWall();
                }
            }
            deleteModal.classList.add('hidden');
            quoteToDelete = null;
        });

        // Clear All Logic
        clearTriggerBtn.addEventListener('click', () => clearModal.classList.remove('hidden'));
        cancelClearBtn.addEventListener('click', () => clearModal.classList.add('hidden'));
        
        confirmClearBtn.addEventListener('click', () => {
            quotes = [];
            localStorage.setItem('faithreflects_golden_quotes', JSON.stringify(quotes));
            
            // Add crumbling effect to the whole wall
            const blocks = document.querySelectorAll('.quote-block');
            blocks.forEach(b => {
                b.style.opacity = '0';
                b.style.transform = 'translateY(20px) rotate(2deg)';
            });
            
            setTimeout(() => {
                renderWall();
                clearModal.classList.add('hidden');
            }, 400);
        });

        // Initial render
        renderWall();
    </script>
</body>
</html>
