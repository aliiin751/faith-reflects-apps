<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaithReflects Premium Bible Reader</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-text': '#4A433A', 
                        'brand-accent': '#C87A5E', 
                        'brand-gold': '#DDA15E',
                        'brand-sage': '#8C9A86',
                        'brand-bg': '#FDFBF7',
                        'brand-card': '#F8F4FA'
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Transparent body ensures it blends seamlessly with Notion's background (Light or Dark mode) */
        body { background-color: transparent !important; }

        /* Premium App Layout */
        .reader-card {
            background: linear-gradient(145deg, #ffffff, #FDFBF7);
            border: 1px solid rgba(140, 154, 134, 0.2);
            box-shadow: 0 4px 20px -5px rgba(74, 67, 58, 0.08);
        }

        /* Custom Scrollbars */
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(140, 154, 134, 0.3);
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(140, 154, 134, 0.6); }

        /* Chapter Ribbon Styling */
        .chapter-ribbon::-webkit-scrollbar { height: 0px; } 
        
        .chapter-btn { transition: all 0.2s ease; }
        .chapter-active {
            background-color: #C87A5E;
            color: #ffffff;
            border-color: #C87A5E;
            box-shadow: 0 4px 10px rgba(200, 122, 94, 0.25);
        }

        /* Sidebar Item Hover */
        .book-item { transition: all 0.2s ease; border-left: 2px solid transparent; }
        .book-item:hover { background-color: rgba(140, 154, 134, 0.08); }
        .book-active {
            background-color: rgba(140, 154, 134, 0.12);
            border-left-color: #8C9A86;
            font-weight: 500;
            color: #4A433A;
        }
        
        /* Mobile Overlay Transition */
        #mobile-sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<!-- Fluid layout: takes exactly the 100% dimensions of the Notion iframe embed box -->
<body class="m-0 p-0 w-screen h-screen overflow-hidden flex items-center justify-center">

    <div class="reader-card relative w-full h-full overflow-hidden flex flex-col md:flex-row rounded-xl sm:rounded-2xl">
        
        <!-- ================= SIDEBAR (DESKTOP) ================= -->
        <aside class="hidden md:flex flex-col w-64 bg-[#FAF8F5] border-r border-brand-text/10 shrink-0 h-full">
            <div class="p-6 pb-4 border-b border-brand-text/5 shrink-0 flex items-center gap-2">
                <i class="ph-fill ph-book-open-text text-brand-accent text-xl"></i>
                <h2 class="font-serif text-xl text-brand-text leading-tight">Library</h2>
            </div>
            
            <div id="sidebar-content" class="custom-scroll flex-1 overflow-y-auto p-4 pb-12 flex flex-col gap-6">
                <!-- Categories and books injected via JS -->
            </div>
        </aside>

        <!-- ================= MOBILE SIDEBAR (OVERLAY) ================= -->
        <div id="mobile-sidebar-bg" class="fixed inset-0 bg-brand-text/20 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity md:hidden" onclick="toggleMobileMenu()"></div>
        <aside id="mobile-sidebar" class="fixed top-0 left-0 bottom-0 w-[80%] max-w-[300px] bg-[#FAF8F5] shadow-2xl z-50 transform -translate-x-full md:hidden flex flex-col">
            <div class="p-6 pb-4 border-b border-brand-text/5 shrink-0 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <i class="ph-fill ph-book-open-text text-brand-accent text-xl"></i>
                    <h2 class="font-serif text-xl text-brand-text leading-tight">Library</h2>
                </div>
                <button onclick="toggleMobileMenu()" class="text-brand-text/60 hover:text-brand-accent"><i class="ph ph-x text-xl"></i></button>
            </div>
            <div id="mobile-sidebar-content" class="custom-scroll flex-1 overflow-y-auto p-4 pb-12 flex flex-col gap-6">
                <!-- Copied from desktop sidebar via JS -->
            </div>
        </aside>

        <!-- ================= MAIN CONTENT AREA ================= -->
        <!-- FIX: min-w-0 prevents the flex child from expanding beyond the screen width and causing cut-offs -->
        <main class="flex-1 flex flex-col h-full bg-white relative min-w-0">
            
            <!-- Top Header -->
            <header class="flex justify-between items-center px-6 sm:px-10 py-5 border-b border-brand-text/5 shrink-0">
                <div class="flex items-center gap-3">
                    <button onclick="toggleMobileMenu()" class="md:hidden text-brand-text/60 hover:text-brand-accent flex items-center justify-center w-8 h-8 bg-brand-bg rounded-lg">
                        <i class="ph ph-list text-xl"></i>
                    </button>
                    <div>
                        <span class="inline-flex items-center gap-1.5 font-sans text-[0.6rem] font-bold tracking-[0.2em] uppercase text-brand-sage mb-0.5">
                            Reading Now
                        </span>
                        <h1 id="current-book-title" class="font-serif text-2xl sm:text-3xl text-brand-text leading-none">Genesis</h1>
                    </div>
                </div>

                <!-- Reading Controls (Font Size) -->
                <div class="flex items-center gap-1 bg-[#FAF8F5] border border-brand-text/10 rounded-full p-1 shadow-sm shrink-0">
                    <button onclick="changeFontSize(-1)" class="w-8 h-8 rounded-full flex items-center justify-center text-brand-text/60 hover:bg-white hover:text-brand-text transition-colors tooltip" title="Decrease font size">
                        <span class="font-serif text-sm">A-</span>
                    </button>
                    <div class="w-[1px] h-4 bg-brand-text/10"></div>
                    <button onclick="changeFontSize(1)" class="w-8 h-8 rounded-full flex items-center justify-center text-brand-text/60 hover:bg-white hover:text-brand-text transition-colors tooltip" title="Increase font size">
                        <span class="font-serif text-lg">A+</span>
                    </button>
                </div>
            </header>

            <!-- Chapter Ribbon -->
            <div class="w-full border-b border-brand-text/5 bg-[#FDFBF7] shrink-0">
                <div id="chapter-ribbon" class="chapter-ribbon flex items-center gap-2 overflow-x-auto px-6 sm:px-10 py-3 scroll-smooth">
                    <!-- Chapter buttons injected via JS -->
                </div>
            </div>

            <!-- Reading Pane -->
            <div class="relative flex-1 overflow-hidden bg-white">
                <!-- Floating Next/Prev Arrows -->
                <div class="absolute bottom-6 right-6 z-10 flex gap-2">
                    <button onclick="navigateChapter(-1)" class="w-11 h-11 rounded-full bg-white/90 backdrop-blur-md shadow-[0_4px_15px_rgba(0,0,0,0.08)] border border-brand-text/10 flex items-center justify-center text-brand-text/60 hover:text-brand-accent hover:border-brand-accent transition-all group">
                        <i class="ph ph-caret-left text-xl group-hover:-translate-x-0.5 transition-transform"></i>
                    </button>
                    <button onclick="navigateChapter(1)" class="w-11 h-11 rounded-full bg-white/90 backdrop-blur-md shadow-[0_4px_15px_rgba(0,0,0,0.08)] border border-brand-text/10 flex items-center justify-center text-brand-text/60 hover:text-brand-accent hover:border-brand-accent transition-all group">
                        <i class="ph ph-caret-right text-xl group-hover:translate-x-0.5 transition-transform"></i>
                    </button>
                </div>

                <!-- Text injected here -->
                <div id="reading-content" class="custom-scroll w-full h-full px-6 sm:px-12 py-8 sm:py-10 overflow-y-auto scroll-smooth">
                </div>
            </div>

            <!-- Subtly Branded Footer -->
            <footer class="px-6 py-3 border-t border-brand-text/5 flex justify-between items-center bg-[#FAF8F5] shrink-0">
                <span class="font-sans text-[0.6rem] font-medium text-brand-text/40 tracking-wider uppercase">WEB Translation</span>
                <a href="https://instagram.com/faithreflects" target="_blank" class="font-sans font-medium tracking-[0.25em] text-[0.6rem] uppercase text-brand-text/50 hover:text-brand-accent transition-colors cursor-pointer inline-flex items-center gap-1.5">
                    @FAITHREFLECTS
                </a>
            </footer>

        </main>
    </div>

    <script>
        // --- CATEGORIZED BIBLE DATA ---
        const bibleData = [
            {
                category: "The Law",
                books: [{n:"Genesis", c:50}, {n:"Exodus", c:40}, {n:"Leviticus", c:27}, {n:"Numbers", c:36}, {n:"Deuteronomy", c:34}]
            },
            {
                category: "History",
                books: [{n:"Joshua", c:24}, {n:"Judges", c:21}, {n:"Ruth", c:4}, {n:"1 Samuel", c:31}, {n:"2 Samuel", c:24}, {n:"1 Kings", c:22}, {n:"2 Kings", c:25}, {n:"1 Chronicles", c:29}, {n:"2 Chronicles", c:36}, {n:"Ezra", c:10}, {n:"Nehemiah", c:13}, {n:"Esther", c:10}]
            },
            {
                category: "Poetry & Wisdom",
                books: [{n:"Job", c:42}, {n:"Psalms", c:150}, {n:"Proverbs", c:31}, {n:"Ecclesiastes", c:12}, {n:"Song of Solomon", c:8}]
            },
            {
                category: "Major Prophets",
                books: [{n:"Isaiah", c:66}, {n:"Jeremiah", c:52}, {n:"Lamentations", c:5}, {n:"Ezekiel", c:48}, {n:"Daniel", c:12}]
            },
            {
                category: "Minor Prophets",
                books: [{n:"Hosea", c:14}, {n:"Joel", c:3}, {n:"Amos", c:9}, {n:"Obadiah", c:1}, {n:"Jonah", c:4}, {n:"Micah", c:7}, {n:"Nahum", c:3}, {n:"Habakkuk", c:3}, {n:"Zephaniah", c:3}, {n:"Haggai", c:2}, {n:"Zechariah", c:14}, {n:"Malachi", c:4}]
            },
            {
                category: "The Gospels",
                books: [{n:"Matthew", c:28}, {n:"Mark", c:16}, {n:"Luke", c:24}, {n:"John", c:21}]
            },
            {
                category: "Church History",
                books: [{n:"Acts", c:28}]
            },
            {
                category: "Pauline Epistles",
                books: [{n:"Romans", c:16}, {n:"1 Corinthians", c:16}, {n:"2 Corinthians", c:13}, {n:"Galatians", c:6}, {n:"Ephesians", c:6}, {n:"Philippians", c:4}, {n:"Colossians", c:4}, {n:"1 Thessalonians", c:5}, {n:"2 Thessalonians", c:3}, {n:"1 Timothy", c:6}, {n:"2 Timothy", c:4}, {n:"Titus", c:3}, {n:"Philemon", c:1}]
            },
            {
                category: "General Epistles",
                books: [{n:"Hebrews", c:13}, {n:"James", c:5}, {n:"1 Peter", c:5}, {n:"2 Peter", c:3}, {n:"1 John", c:5}, {n:"2 John", c:1}, {n:"3 John", c:1}, {n:"Jude", c:1}]
            },
            {
                category: "Prophecy",
                books: [{n:"Revelation", c:22}]
            }
        ];

        let flatBooks = [];
        bibleData.forEach(cat => {
            cat.books.forEach(book => flatBooks.push(book));
        });

        // --- APP STATE ---
        let currentBook = flatBooks[0];
        let currentChapter = 1;
        let baseFontSize = 1.15; // in rem

        const sidebarContent = document.getElementById('sidebar-content');
        const mobileSidebarContent = document.getElementById('mobile-sidebar-content');
        const ribbon = document.getElementById('chapter-ribbon');
        const readingContent = document.getElementById('reading-content');
        const titleEl = document.getElementById('current-book-title');
        const mobileSidebar = document.getElementById('mobile-sidebar');
        const mobileSidebarBg = document.getElementById('mobile-sidebar-bg');

        // --- INITIALIZATION ---
        function init() {
            renderSidebars();
            
            const savedBook = localStorage.getItem('fr_last_book');
            const savedChapter = localStorage.getItem('fr_last_chapter');
            
            if (savedBook && savedChapter) {
                const foundBook = flatBooks.find(b => b.n === savedBook);
                if (foundBook) {
                    currentBook = foundBook;
                    currentChapter = parseInt(savedChapter);
                }
            }

            selectBook(currentBook.n, currentChapter);
            applyFontSize();
        }

        // --- UI RENDERING ---
        function renderSidebars() {
            let html = '';
            bibleData.forEach(cat => {
                html += `
                    <div class="mb-2">
                        <h3 class="font-sans text-[0.65rem] font-bold tracking-[0.2em] uppercase text-brand-sage mb-3 px-3 flex items-center gap-1.5">
                            ${cat.category}
                        </h3>
                        <ul class="flex flex-col">
                `;
                cat.books.forEach(book => {
                    html += `
                        <li>
                            <button id="book-btn-${book.n.replace(/\s+/g, '-')}" onclick="selectBook('${book.n}')" class="book-item w-full text-left px-4 py-2 rounded-r-lg font-sans text-[0.85rem] text-brand-text/70 transition-colors">
                                ${book.n}
                            </button>
                        </li>
                    `;
                });
                html += `</ul></div>`;
            });

            sidebarContent.innerHTML = html;
            mobileSidebarContent.innerHTML = html;
        }

        function renderChapterRibbon() {
            ribbon.innerHTML = '';
            for (let i = 1; i <= currentBook.c; i++) {
                const btn = document.createElement('button');
                btn.className = `chapter-btn min-w-[40px] h-[40px] shrink-0 rounded-xl border border-brand-text/10 font-sans text-sm font-medium text-brand-text hover:bg-white hover:border-brand-accent/50 flex items-center justify-center ${i === currentChapter ? 'chapter-active' : 'bg-transparent'}`;
                btn.innerText = i;
                btn.onclick = () => selectChapter(i);
                btn.id = `chap-btn-${i}`;
                ribbon.appendChild(btn);
            }
            scrollToActiveChapter();
        }

        function scrollToActiveChapter() {
            const activeBtn = document.getElementById(`chap-btn-${currentChapter}`);
            if(activeBtn) {
                const ribbonRect = ribbon.getBoundingClientRect();
                const btnRect = activeBtn.getBoundingClientRect();
                ribbon.scrollTo({
                    left: activeBtn.offsetLeft - (ribbonRect.width / 2) + (btnRect.width / 2),
                    behavior: 'smooth'
                });
            }
        }

        function updateSidebarHighlights() {
            document.querySelectorAll('.book-active').forEach(el => el.classList.remove('book-active'));
            const safeName = currentBook.n.replace(/\s+/g, '-');
            const btns = document.querySelectorAll(`#book-btn-${safeName}`);
            btns.forEach(btn => btn.classList.add('book-active'));
        }

        // --- NAVIGATION LOGIC ---
        function selectBook(bookName, chapter = 1) {
            currentBook = flatBooks.find(b => b.n === bookName);
            currentChapter = chapter;
            
            titleEl.innerText = currentBook.n;
            
            updateSidebarHighlights();
            renderChapterRibbon();
            fetchReading();

            if(!mobileSidebar.classList.contains('-translate-x-full')) {
                toggleMobileMenu();
            }
        }

        function selectChapter(chapter) {
            currentChapter = chapter;
            renderChapterRibbon();
            fetchReading();
        }

        function navigateChapter(direction) {
            const currentIndex = flatBooks.findIndex(b => b.n === currentBook.n);
            
            if (direction === 1) {
                if (currentChapter < currentBook.c) {
                    selectChapter(currentChapter + 1);
                } else if (currentIndex < flatBooks.length - 1) {
                    selectBook(flatBooks[currentIndex + 1].n, 1);
                }
            } else {
                if (currentChapter > 1) {
                    selectChapter(currentChapter - 1);
                } else if (currentIndex > 0) {
                    const prevBook = flatBooks[currentIndex - 1];
                    selectBook(prevBook.n, prevBook.c);
                }
            }
        }

        function toggleMobileMenu() {
            mobileSidebar.classList.toggle('-translate-x-full');
            
            if (mobileSidebarBg.classList.contains('hidden')) {
                mobileSidebarBg.classList.remove('hidden');
                setTimeout(() => mobileSidebarBg.classList.remove('opacity-0'), 10);
            } else {
                mobileSidebarBg.classList.add('opacity-0');
                setTimeout(() => mobileSidebarBg.classList.add('hidden'), 300);
            }
        }

        // --- FONT SETTINGS ---
        function changeFontSize(step) {
            baseFontSize += (step * 0.1);
            if (baseFontSize < 0.8) baseFontSize = 0.8;
            if (baseFontSize > 1.8) baseFontSize = 1.8;
            applyFontSize();
        }

        function applyFontSize() {
            const textContainer = document.querySelector('.bible-text');
            if (textContainer) {
                textContainer.style.fontSize = `${baseFontSize}rem`;
            }
        }

        // --- API INTEGRATION & TEXT FORMATTING ---
        async function fetchReading() {
            localStorage.setItem('fr_last_book', currentBook.n);
            localStorage.setItem('fr_last_chapter', currentChapter);

            readingContent.innerHTML = `
                <div class="h-full flex flex-col items-center justify-center text-brand-sage/50 gap-3">
                    <i class="ph ph-spinner-gap animate-spin text-4xl"></i>
                    <span class="font-sans text-xs tracking-widest uppercase">Fetching Truth...</span>
                </div>
            `;

            try {
                // FIX: Single-chapter book bug
                // bible-api.com interprets "Philemon 1" as verse 1 instead of chapter 1.
                // We need to explicitly request the full verse range for these 5 specific books.
                const singleChapterVerseCounts = {
                    "Obadiah": 21,
                    "Philemon": 25,
                    "2 John": 13,
                    "3 John": 14,
                    "Jude": 25
                };

                let query = `${encodeURIComponent(currentBook.n)}+${currentChapter}`;
                
                if (currentBook.c === 1 && singleChapterVerseCounts[currentBook.n]) {
                    // Requests e.g. "Philemon 1:1-25" to force the API to return all verses
                    query = `${encodeURIComponent(currentBook.n)}+1:1-${singleChapterVerseCounts[currentBook.n]}`;
                }

                const url = `https://bible-api.com/${query}?translation=web`;
                const response = await fetch(url);
                if (!response.ok) throw new Error("API Fetch Failed");
                const data = await response.json();
                
                let html = `
                    <div class="max-w-3xl mx-auto pb-16">
                        <h2 class="font-serif text-3xl sm:text-4xl text-brand-text mb-6 border-b border-brand-text/10 pb-4">Chapter ${currentChapter}</h2>
                        <div class="bible-text font-serif leading-[2.1] text-brand-text/90 transition-all duration-300 break-words whitespace-normal" style="font-size: ${baseFontSize}rem;">
                `;

                html += '<p class="mb-5 indent-6">';
                data.verses.forEach((v, index) => {
                    // Remove double spaces/newlines returned by the API
                    const cleanText = v.text.replace(/\s+/g, ' ').trim();
                    
                    html += `<sup class="font-sans font-bold text-brand-accent/80 mr-1.5 ml-0.5 select-none" style="font-size: 0.6em; top: -0.5em;">${v.verse}</sup>${cleanText} `;
                    
                    // Create a new paragraph every 4 verses to prevent giant walls of text
                    if ((index + 1) % 4 === 0 && index !== data.verses.length - 1) {
                        html += '</p><p class="mb-5 indent-6">';
                    }
                });
                html += '</p></div></div>';

                readingContent.innerHTML = html;
                readingContent.scrollTop = 0; // Back to top

            } catch (error) {
                readingContent.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-brand-text/50 gap-3 text-center">
                        <i class="ph ph-warning-circle text-4xl text-brand-accent/70"></i>
                        <p class="font-sans text-sm">We couldn't reach the digital library.</p>
                        <button onclick="fetchReading()" class="px-6 py-2 rounded-full border border-brand-accent text-brand-accent hover:bg-brand-accent hover:text-white transition-colors text-xs uppercase tracking-wider font-semibold">Try Again</button>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
