<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gratitude Chimes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: transparent; color: #37352f; }
        .serif { font-family: 'Playfair Display', serif; }

        /* Chime Physics Animations */
        .chime-tube {
            transform-origin: 50% 0%;
            transition: all 0.3s ease;
        }

        .swing-left { animation: swingL 3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .swing-right { animation: swingR 3.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .swing-center { animation: swingC 2.8s cubic-bezier(0.34, 1.56, 0.64, 1); }

        @keyframes swingL {
            0% { transform: rotate(0deg); }
            15% { transform: rotate(18deg); }
            35% { transform: rotate(-12deg); }
            60% { transform: rotate(6deg); }
            80% { transform: rotate(-2deg); }
            100% { transform: rotate(0deg); }
        }
        @keyframes swingR {
            0% { transform: rotate(0deg); }
            15% { transform: rotate(-15deg); }
            35% { transform: rotate(10deg); }
            60% { transform: rotate(-5deg); }
            80% { transform: rotate(2deg); }
            100% { transform: rotate(0deg); }
        }
        @keyframes swingC {
            0% { transform: rotate(0deg); }
            20% { transform: rotate(12deg); }
            40% { transform: rotate(-8deg); }
            65% { transform: rotate(4deg); }
            85% { transform: rotate(-1deg); }
            100% { transform: rotate(0deg); }
        }

        /* Sound Wave Ripples (Visual Audio) */
        .sound-wave {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 1px solid #D4AF37;
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }
        .play-wave { animation: emitWave 2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }

        @keyframes emitWave {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.8; border-width: 2px; }
            100% { transform: translate(-50%, -50%) scale(3); opacity: 0; border-width: 0px; }
        }

        /* Log items */
        .log-item {
            animation: slideDown 0.4s ease forwards;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Modal blur */
        .modal-bg { backdrop-filter: blur(5px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen w-full p-4 overflow-hidden">

    <div class="relative w-full max-w-sm bg-white rounded-3xl p-8 border border-[#e9e9e7] shadow-[0_8px_30px_rgb(0,0,0,0.03)] flex flex-col items-center min-h-[580px]">
        
        <!-- Header -->
        <div class="w-full flex justify-between items-center mb-4 z-10">
            <span class="text-[10px] tracking-[0.2em] uppercase font-bold text-[#a3b8ac]">@faithreflects</span>
            <div class="px-3 py-1 bg-[#f7f6f3] rounded-full text-[10px] font-semibold tracking-wider text-gray-500 uppercase flex items-center space-x-1">
                <span id="totalCount" class="text-[#37352f]">0</span>
                <span>Blessings</span>
            </div>
        </div>

        <h2 class="serif text-2xl text-[#37352f] mb-1 z-10">Gratitude Chimes</h2>
        <p class="text-xs text-gray-400 italic mb-8 text-center z-10">"Enter His gates with thanksgiving."</p>

        <!-- Interactive SVG Chimes -->
        <div class="relative w-48 h-48 mb-6 z-10 flex justify-center" id="chimeContainer">
            
            <!-- Visual Sound Waves injected here -->
            <div id="waveContainer" class="absolute inset-0"></div>

            <svg viewBox="0 0 100 120" class="w-full h-full overflow-visible z-10">
                <!-- Top Wooden Ring -->
                <ellipse cx="50" cy="10" rx="30" ry="6" fill="#A06B44"/>
                <ellipse cx="50" cy="8" rx="28" ry="5" fill="#8B5A2B"/>
                
                <!-- Hanging Hook -->
                <path d="M50 8 C50 0, 45 -5, 50 -10" stroke="#555" stroke-width="1.5" fill="none"/>

                <!-- Chime 1 (Left) -->
                <g class="chime-tube" id="tube1" style="transform-origin: 30px 10px;">
                    <line x1="30" y1="12" x2="30" y2="25" stroke="#ccc" stroke-width="0.5"/>
                    <rect x="27" y="25" width="6" height="55" rx="1" fill="#EAE5D9" stroke="#d4d4d0" stroke-width="0.5"/>
                    <rect x="28" y="25" width="2" height="55" fill="#fff" opacity="0.5"/> <!-- highlight -->
                </g>

                <!-- Chime 2 (Back/Center-Left) -->
                <g class="chime-tube" id="tube2" style="transform-origin: 40px 8px;">
                    <line x1="40" y1="10" x2="40" y2="30" stroke="#ccc" stroke-width="0.5"/>
                    <rect x="37" y="30" width="6" height="70" rx="1" fill="#D4DFD2" stroke="#a3b8ac" stroke-width="0.5"/>
                    <rect x="38" y="30" width="2" height="70" fill="#fff" opacity="0.4"/>
                </g>

                <!-- Chime 3 (Right) -->
                <g class="chime-tube" id="tube3" style="transform-origin: 70px 10px;">
                    <line x1="70" y1="12" x2="70" y2="20" stroke="#ccc" stroke-width="0.5"/>
                    <rect x="67" y="20" width="6" height="60" rx="1" fill="#EAE5D9" stroke="#d4d4d0" stroke-width="0.5"/>
                    <rect x="68" y="20" width="2" height="60" fill="#fff" opacity="0.5"/>
                </g>

                <!-- Chime 4 (Front/Center-Right) -->
                <g class="chime-tube" id="tube4" style="transform-origin: 60px 12px;">
                    <line x1="60" y1="12" x2="60" y2="25" stroke="#ccc" stroke-width="0.5"/>
                    <rect x="57" y="25" width="6" height="65" rx="1" fill="#E8D5C4" stroke="#D2B48C" stroke-width="0.5"/>
                    <rect x="58" y="25" width="2" height="65" fill="#fff" opacity="0.6"/>
                </g>

                <!-- Center Striker & Wind Catcher -->
                <g class="chime-tube" id="striker" style="transform-origin: 50px 10px;">
                    <line x1="50" y1="10" x2="50" y2="90" stroke="#999" stroke-width="0.5" stroke-dasharray="2 1"/>
                    <!-- Striker Disc -->
                    <ellipse cx="50" cy="50" rx="12" ry="3" fill="#8B5A2B"/>
                    <!-- Wind Catcher Leaf -->
                    <path d="M50 90 Q60 105 50 120 Q40 105 50 90 Z" fill="#D4AF37" stroke="#C2831E" stroke-width="0.5"/>
                </g>
            </svg>
        </div>

        <!-- Input Area -->
        <div class="w-full flex space-x-2 z-10 mb-6">
            <input type="text" id="gratitudeInput" placeholder="I am thankful for..." class="flex-1 px-4 py-3 bg-[#fdfdfc] border border-[#e9e9e7] focus:border-[#D4AF37] rounded-xl text-sm text-[#5a5852] outline-none transition-colors">
            <button id="logBtn" class="bg-[#37352f] text-white px-4 py-3 rounded-xl hover:bg-black transition-colors flex items-center justify-center">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </button>
        </div>

        <!-- Recent Logs (Last 3) -->
        <div class="w-full flex-1 flex flex-col space-y-2" id="logList">
            <!-- Injected by JS -->
        </div>

        <!-- Hidden Clear trigger -->
        <button id="clearTriggerBtn" class="mt-4 text-[9px] tracking-widest text-gray-300 uppercase hover:text-gray-500 transition-colors">
            Clear History
        </button>

        <!-- Custom Clear Confirmation Modal -->
        <div id="clearModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg bg-white/60 transition-opacity">
            <div class="bg-white rounded-2xl p-6 w-full max-w-[260px] border border-[#e9e9e7] shadow-2xl text-center transform transition-all">
                <h3 class="font-serif text-xl mb-2 text-[#37352f]">Clear Gratitude Log?</h3>
                <p class="text-xs text-gray-400 mb-6">This will reset your blessings count to zero.</p>
                <div class="flex space-x-3">
                    <button id="cancelClearBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-gray-500 hover:bg-gray-50 border border-transparent hover:border-gray-200 transition-colors">Cancel</button>
                    <button id="confirmClearBtn" class="flex-1 py-2.5 rounded-xl text-xs font-semibold bg-[#37352f] text-white hover:bg-black transition-colors">Clear</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // State
        let logs = JSON.parse(localStorage.getItem('faithreflects_gratitude')) || [];
        
        const input = document.getElementById('gratitudeInput');
        const logBtn = document.getElementById('logBtn');
        const logList = document.getElementById('logList');
        const totalCount = document.getElementById('totalCount');
        const waveContainer = document.getElementById('waveContainer');
        
        // Modal elements
        const clearModal = document.getElementById('clearModal');
        const clearTriggerBtn = document.getElementById('clearTriggerBtn');
        const cancelClearBtn = document.getElementById('cancelClearBtn');
        const confirmClearBtn = document.getElementById('confirmClearBtn');

        const tubes = [
            document.getElementById('tube1'),
            document.getElementById('tube2'),
            document.getElementById('tube3'),
            document.getElementById('tube4'),
            document.getElementById('striker')
        ];

        // Web Audio API for Synthesized Chime Sound
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playChimeSound() {
            if(audioCtx.state === 'suspended') audioCtx.resume();

            // Frequencies for a peaceful, ethereal chime (Pentatonic chord)
            const frequencies = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
            
            frequencies.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    // Envelope for a bell-like strike and smooth fade out
                    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.02);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);
                    
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 2.5);
                }, i * 150); // Stagger notes for an arpeggio effect
            });
        }

        // Expose remove function to global scope for the inline onclick handler
        window.removeLog = function(id) {
            logs = logs.filter(log => log.id !== id);
            localStorage.setItem('faithreflects_gratitude', JSON.stringify(logs));
            renderLogs();
        };

        function renderLogs() {
            totalCount.innerText = logs.length;
            logList.innerHTML = '';
            
            // Show only the 3 most recent
            const recentLogs = logs.slice().reverse().slice(0, 3);
            
            if (recentLogs.length === 0) {
                logList.innerHTML = `<p class="text-xs text-gray-400 text-center mt-4 italic">Your log is empty. Start counting blessings.</p>`;
                return;
            }

            recentLogs.forEach((log, index) => {
                const item = document.createElement('div');
                // Added 'relative group' for the hover-reveal delete button
                item.className = 'log-item bg-[#fdfdfc] border border-gray-100 p-3 rounded-xl flex items-start space-x-3 shadow-sm relative group';
                item.style.animationDelay = `${index * 0.1}s`;
                
                item.innerHTML = `
                    <div class="text-[#D4AF37] mt-0.5">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path></svg>
                    </div>
                    <p class="text-xs text-[#5a5852] leading-relaxed break-words flex-1 pr-6">${log.text}</p>
                    <button onclick="removeLog(${log.id})" class="absolute right-3 top-3 opacity-0 group-hover:opacity-100 transition-opacity text-gray-300 hover:text-red-400" title="Remove blessing">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                `;
                logList.appendChild(item);
            });
        }

        function ringChimes() {
            // Trigger the audio synth
            playChimeSound();

            // Remove animation classes to reset
            tubes.forEach(t => {
                t.classList.remove('swing-left', 'swing-right', 'swing-center');
                // Force reflow
                void t.offsetWidth; 
            });

            // Assign random swing directions to create chaotic wind collision effect
            tubes.forEach(t => {
                const rand = Math.random();
                if (rand < 0.33) t.classList.add('swing-left');
                else if (rand < 0.66) t.classList.add('swing-right');
                else t.classList.add('swing-center');
            });

            // Create Visual Sound Waves
            for(let i=0; i<3; i++) {
                setTimeout(() => {
                    const wave = document.createElement('div');
                    wave.className = 'sound-wave play-wave';
                    waveContainer.appendChild(wave);
                    setTimeout(() => wave.remove(), 2000);
                }, i * 400); // Stagger waves
            }
        }

        logBtn.addEventListener('click', () => {
            const text = input.value.trim();
            if (text) {
                logs.push({ text: text, id: Date.now() });
                localStorage.setItem('faithreflects_gratitude', JSON.stringify(logs));
                
                input.value = '';
                renderLogs();
                ringChimes();
                
                // Button click feedback
                logBtn.style.transform = 'scale(0.95)';
                setTimeout(() => logBtn.style.transform = 'scale(1)', 150);
            }
        });

        // Enter key to submit
        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') logBtn.click();
        });

        // Modal Logic
        clearTriggerBtn.addEventListener('click', () => clearModal.classList.remove('hidden'));
        cancelClearBtn.addEventListener('click', () => clearModal.classList.add('hidden'));
        
        confirmClearBtn.addEventListener('click', () => {
            logs = [];
            localStorage.setItem('faithreflects_gratitude', JSON.stringify(logs));
            renderLogs();
            clearModal.classList.add('hidden');
        });

        // Init
        renderLogs();
    </script>
</body>
</html>
